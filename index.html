<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIT Platform</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard','Malgun Gothic',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;text-align:center;padding:24px;}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 44px;max-width:520px;}
  h1{font-size:38px;letter-spacing:-.02em;margin-bottom:14px;}
  p{font-size:18px;color:#94a3b8;line-height:1.6;}
  .badge{display:inline-block;font-size:13px;font-weight:700;letter-spacing:.1em;color:#7dd3fc;background:rgba(56,189,248,.12);padding:6px 14px;border-radius:999px;margin-bottom:22px;}
</style>
</head>
<body>
  <div class="card">
    <span class="badge">FIT PLATFORM</span>
    <h1>준비 중입니다 🚧</h1>
    <p>통합 웹앱을 구축하고 있습니다.<br>곧 로그인 기능과 함께 찾아옵니다.</p>
  </div>
</body>
</html>

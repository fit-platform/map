<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIT Platform</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  .hub{max-width:720px;margin:0 auto;padding:48px 18px 80px;}
  .hub-header{text-align:center;margin-bottom:48px;}
  .hub-header .badge{font-size:13px;font-weight:800;letter-spacing:.14em;color:var(--accent);background:#eff6ff;padding:7px 16px;border-radius:999px;display:inline-block;margin-bottom:18px;}
  .hub-header h1{font-size:32px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px;}
  .hub-header p{color:var(--muted);font-size:16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 4px 18px rgba(15,23,42,.07);text-decoration:none;color:var(--ink);transition:transform .15s, box-shadow .15s;display:block;}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(15,23,42,.12);}
  .card .icon{font-size:32px;margin-bottom:14px;}
  .card .name{font-size:18px;font-weight:700;margin-bottom:6px;}
  .card .desc{font-size:14px;color:var(--muted);line-height:1.5;}
  .card .tag{display:inline-block;font-size:12px;font-weight:600;color:var(--accent);background:#eff6ff;padding:3px 10px;border-radius:999px;margin-top:14px;}
</style>
</head>
<body>
  <div class="hub">
    <div class="hub-header">
      <div class="badge">FIT PLATFORM</div>
      <h1>메인 허브</h1>
      <p>팀 앱 모음 — 원하는 앱을 선택하세요</p>
    </div>

    <div class="grid">
      <a class="card" href="shinjae/">
        <div class="icon">🗂️</div>
        <div class="name">이신재</div>
        <div class="desc">이신재 개발 앱입니다.</div>
        <span class="tag">개발 중</span>
      </a>

      <a class="card" href="jubyung/">
        <div class="icon">📊</div>
        <div class="name">이주병</div>
        <div class="desc">이주병 개발 앱입니다.</div>
        <span class="tag">개발 중</span>
      </a>

      <a class="card" href="sangeun/">
        <div class="icon">📝</div>
        <div class="name">한상은</div>
        <div class="desc">한상은 개발 앱입니다.</div>
        <span class="tag">개발 중</span>
      </a>

      <a class="card" href="heejin/">
        <div class="icon">📌</div>
        <div class="name">엄희진</div>
        <div class="desc">엄희진 개발 앱입니다.</div>
        <span class="tag">개발 중</span>
      </a>
    </div>
  </div>
</body>
</html>

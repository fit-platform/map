<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>FIT Platform</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
  /* ===== Apple HIG · 무채색(achromatic) 디자인 시스템 ===== */
  :root{
    --bg:#f5f5f7; --bg-elev:#ffffff;
    --label:#1d1d1f; --label-2:#6e6e73; --label-3:#8e8e93;
    --separator:rgba(0,0,0,.12); --hairline:rgba(0,0,0,.07);
    --fill:rgba(120,120,128,.12);
    --accent:#1d1d1f; --accent-ink:#ffffff; --accent-press:#000000;
    --ring:rgba(0,0,0,.18);
    --card:#ffffff; --card-shadow:0 4px 24px rgba(0,0,0,.06);
    --card-shadow-hover:0 18px 48px rgba(0,0,0,.14);
    --tile-1:#4a4a4d; --tile-2:#262629; --tile-shadow:rgba(0,0,0,.22);
    --nav-bg:rgba(245,245,247,.72);
    --radius-card:22px; --radius-field:12px; --radius-icon:15px;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#000000; --bg-elev:#1c1c1e;
      --label:#f5f5f7; --label-2:#a1a1a6; --label-3:#8d8d93;
      --separator:rgba(255,255,255,.16); --hairline:rgba(255,255,255,.09);
      --fill:rgba(120,120,128,.28);
      --accent:#f5f5f7; --accent-ink:#1d1d1f; --accent-press:#ffffff;
      --ring:rgba(255,255,255,.26);
      --card:#1c1c1e; --card-shadow:0 4px 24px rgba(0,0,0,.5);
      --card-shadow-hover:0 18px 48px rgba(0,0,0,.66);
      --tile-1:#5b5b60; --tile-2:#333337; --tile-shadow:rgba(0,0,0,.6);
      --nav-bg:rgba(0,0,0,.6);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Pretendard Variable",Pretendard,"Helvetica Neue",sans-serif;
    background:var(--bg); color:var(--label); min-height:100vh;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    letter-spacing:-.011em; line-height:1.47;
  }
  button{cursor:pointer;border:none;font-family:inherit;color:inherit;background:none;}
  a{color:inherit;text-decoration:none;}

  /* ===== 로그인 = 전체화면 오버레이 ===== */
  #loginView{
    position:fixed; inset:0; z-index:1000;
    display:grid; place-items:center; padding:24px; background:var(--bg);
    transition:opacity .5s var(--ease), visibility .5s var(--ease);
  }
  #loginView.hide{opacity:0; visibility:hidden; pointer-events:none;}
  .login-card{width:100%; max-width:340px; text-align:center;}
  .login-logo{
    width:74px; height:74px; margin:0 auto 22px; border-radius:18px;
    display:grid; place-items:center; color:#fff; font-weight:700; font-size:23px; letter-spacing:.02em;
    background:linear-gradient(135deg,#48484a,#1d1d1f);
    box-shadow:0 10px 30px rgba(0,0,0,.30);
  }
  .login-title{font-size:28px; font-weight:600; letter-spacing:-.021em; line-height:1.1;}
  .login-sub{margin-top:6px; margin-bottom:26px; color:var(--label-2); font-size:16px;}
  .field{margin-bottom:11px;}
  input{
    width:100%; padding:14px 16px; font-size:16px; color:var(--label);
    background:var(--bg-elev); border:1px solid var(--separator); border-radius:var(--radius-field);
    outline:none; transition:border-color .15s, box-shadow .15s; line-height:1.2;
  }
  input::placeholder{color:var(--label-3);}
  input:focus{border-color:var(--label); box-shadow:0 0 0 4px var(--ring);}
  .btn{
    width:100%; margin-top:6px; padding:14px; font-size:17px; font-weight:500;
    color:var(--accent-ink); background:var(--accent); border-radius:var(--radius-field);
    transition:background .2s, transform .1s var(--ease), opacity .2s;
  }
  .btn:hover{background:var(--accent-press);}
  .btn:active{transform:scale(.985);}
  .btn:disabled{opacity:.55; cursor:default;}
  .msg{min-height:20px; margin-top:14px; font-size:14px; color:var(--label-2);}
  .msg.err{color:var(--label); font-weight:500;}

  /* ===== 내비게이션 바 (translucent material) ===== */
  .nav{
    position:sticky; top:0; z-index:50; height:52px;
    background:var(--nav-bg); border-bottom:1px solid var(--hairline);
    -webkit-backdrop-filter:saturate(180%) blur(20px); backdrop-filter:saturate(180%) blur(20px);
  }
  .nav-inner{max-width:980px; height:100%; margin:0 auto; padding:0 22px; display:flex; align-items:center; justify-content:space-between;}
  .wordmark{font-size:17px; font-weight:600; letter-spacing:-.01em;}
  .nav-right{display:flex; align-items:center; gap:12px;}
  .who{font-size:13px; color:var(--label-2); max-width:42vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .signout{font-size:13px; font-weight:500; color:var(--label); padding:6px 12px; border-radius:980px; transition:background .15s;}
  .signout:hover{background:var(--fill);}

  /* ===== 허브 ===== */
  .hub{max-width:980px; margin:0 auto; padding:64px 22px 96px;}
  .hero{text-align:center; margin-bottom:52px;}
  .eyebrow{font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--label-3);}
  .hero h1{margin-top:8px; font-size:clamp(38px,6vw,60px); font-weight:600; letter-spacing:-.02em; line-height:1.05;}
  .lede{margin-top:14px; font-size:clamp(18px,2.4vw,22px); color:var(--label-2); font-weight:400;}

  /* 5개 앱 = 수평 1열 */
  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:18px;}
  .app-card{
    background:var(--card); border-radius:var(--radius-card); padding:20px 20px;
    box-shadow:var(--card-shadow); border:1px solid var(--hairline);
    display:flex; flex-direction:column; align-items:center; text-align:center;
    transition:transform .35s var(--ease), box-shadow .35s var(--ease);
  }
  .app-card:hover{transform:translateY(-6px); box-shadow:var(--card-shadow-hover);}
  .app-card:active{transform:translateY(-2px);}
  .app-icon{
    width:58px; height:58px; margin-bottom:18px; border-radius:var(--radius-icon);
    display:grid; place-items:center; color:#fff;   /* SF 심볼 글리프 = 흰색 */
    background:linear-gradient(135deg,var(--tile-1),var(--tile-2));
    box-shadow:0 8px 18px var(--tile-shadow);
  }
  .app-icon svg{width:30px; height:30px; display:block;}
  .app-name{font-size:16px; font-weight:600; letter-spacing:-.013em;}
  .app-desc{margin-top:5px; font-size:14px; color:var(--label-2);}
  .status{margin-top:15px; font-size:12px; font-weight:600; color:var(--label-2); background:var(--fill); padding:4px 11px; border-radius:980px;}
  .foot{margin-top:60px; text-align:center; font-size:12px; color:var(--label-3);}

  :focus-visible{outline:2px solid var(--label-2); outline-offset:3px;}
  @media (max-width:560px){ .grid{grid-template-columns:repeat(2,1fr);} }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body>

  <!-- 로그인 (전체화면 오버레이 · 성공 시 슥 사라지며 뒤 허브가 드러남) -->
  <section id="loginView">
    <div class="login-card">
      <div class="login-logo">FIT</div>
      <h1 class="login-title">FIT Platform</h1>
      <p class="login-sub">계속하려면 로그인하세요</p>
      <div class="field"><input id="email" type="email" placeholder="이메일" autocomplete="username"></div>
      <div class="field"><input id="password" type="password" placeholder="비밀번호" autocomplete="current-password"></div>
      <button class="btn" id="loginBtn">로그인</button>
      <div class="msg" id="loginMsg"></div>
    </div>
  </section>

  <!-- 메인 허브 (오버레이 뒤에 항상 존재) -->
  <section id="appView">
    <nav class="nav">
      <div class="nav-inner">
        <span class="wordmark"> FIT Platform</span>
        <div class="nav-right">
          <span class="who" id="userEmail"></span>
          <button class="signout" id="logoutBtn">로그아웃</button>
        </div>
      </div>
    </nav>

    <main class="hub">
      <header class="hero">
        <p class="eyebrow">FIT Platform</p>
        <h1>APPs Testbed</h1>
        <p class="lede">원하는 앱을 선택해 시작하세요.</p>
      </header>

      <div class="grid">

        <a class="app-card" href="jubyung/">
          <span class="app-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="12" width="3.4" height="7.5" rx="1.2"/><rect x="10.3" y="8" width="3.4" height="11.5" rx="1.2"/><rect x="16.1" y="4.5" width="3.4" height="15" rx="1.2"/></svg></span>
          <span class="app-name">FIT Platform SCM Matrix</span>
          <span class="app-desc">이주병 그룹장</span>
          <span class="status">개발 중</span>
        </a>

        <a class="app-card" href="shinjae/">
          <span class="app-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7.5A2 2 0 0 1 5 5.5h3.2a2 2 0 0 1 1.4.6l1 1a2 2 0 0 0 1.4.6H19a2 2 0 0 1 2 2V16a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7.5z"/></svg></span>
          <span class="app-name">PJT Report Helper</span>
          <span class="app-desc">이신재 프로</span>
          <span class="status">개발 중</span>
        </a>

        <a class="app-card" href="sangeun/">
          <span class="app-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3.8H7.6A1.6 1.6 0 0 0 6 5.4v13.2A1.6 1.6 0 0 0 7.6 20.2h8.8A1.6 1.6 0 0 0 18 18.6V8.8z"/><path d="M13 3.8V8.8H18"/><path d="M9 12.7h6M9 15.7h6"/></svg></span>
          <span class="app-name">Massing to Estimate</span>
          <span class="app-desc">한상은 프로</span>
          <span class="status">개발 중</span>
        </a>

        <a class="app-card" href="heejin/">
          <span class="app-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.5c3.5-3.6 5.5-6.6 5.5-9.5a5.5 5.5 0 1 0-11 0c0 2.9 2 5.9 5.5 9.5z"/><circle cx="12" cy="11" r="2.1"/></svg></span>
          <span class="app-name">Massing to Render</span>
          <span class="app-desc">엄희진 프로</span>
          <span class="status">개발 중</span>
        </a>

        <a class="app-card" href="yoonhee/">
          <span class="app-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.003 1.003 0 0 0 0-1.42l-2.5-2.5a1.003 1.003 0 0 0-1.42 0l-1.96 1.96 3.75 3.75 2.13-1.79z"/></svg></span>
          <span class="app-name">Project Management</span>
          <span class="app-desc">조윤희 프로</span>
          <span class="status">개발 중</span>
        </a>
      </div>

      <footer class="foot">© FIT Platform</footer>
    </main>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    function updateView(session){
      if(session){
        $('userEmail').textContent = session.user.email;
        $('loginView').classList.add('hide');     // 로그인 오버레이가 슥 사라지며 뒤 허브가 드러남
      } else {
        $('loginView').classList.remove('hide');  // 로그아웃 = 오버레이 다시 덮음
      }
    }

    $('loginBtn').onclick = async () => {
      const email = $('email').value.trim(), password = $('password').value;
      const msg = $('loginMsg'); msg.className = 'msg'; msg.textContent = '';
      if(!email || !password){ msg.className = 'msg err'; msg.textContent = '이메일과 비밀번호를 입력하세요.'; return; }
      if(typeof sb === 'undefined' || !sb || !sb.auth){   // supabase 라이브러리(CDN)가 안 떴을 때
        msg.className = 'msg err';
        msg.textContent = '로그인 모듈을 불러오지 못했습니다 — 인터넷 연결, 광고 차단/보안 프로그램을 확인하세요.';
        return;
      }
      $('loginBtn').disabled = true; $('loginBtn').textContent = '로그인 중...';
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if(error){ msg.className = 'msg err'; msg.textContent = '로그인 실패: ' + error.message; }
      } catch(e) {   // 네트워크 예외 등도 화면에 표기(조용한 실패 방지)
        msg.className = 'msg err'; msg.textContent = '로그인 오류: ' + (e && e.message ? e.message : e);
      } finally {
        $('loginBtn').disabled = false; $('loginBtn').textContent = '로그인';
      }
    };
    $('password').addEventListener('keydown', e => { if(e.key === 'Enter') $('loginBtn').click(); });
    $('logoutBtn').onclick = async () => { await sb.auth.signOut(); };

    sb.auth.onAuthStateChange((event, session) => updateView(session));
    sb.auth.getSession().then(({ data:{ session } }) => updateView(session));
  </script>
</body>
</html>

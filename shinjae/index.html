          {massGeom&&mass&&mass.label&&<text x={W/2} y={24} textAnchor="middle" style={{fontSize:12,fill:'#fff',fontFamily:"'DM Mono',monospace",paintOrder:'stroke',stroke:'rgba(0,0,0,.8)',strokeWidth:3}}>{mass.label}{massGeom.clampScale<0.999?` · ⚠ 경계 1m 이격 맞춤 ${Math.round(massGeom.clampScale*100)}%`:''}</text>}
          {view!=='2d'&&!mass&&<text x={W/2} y={24} textAnchor="middle" style={{fontSize:11,fill:'#ddd',paintOrder:'stroke',stroke:'rgba(0,0,0,.7)',strokeWidth:3}}>③에서 매스 옵션을 선택하면 입체 매스가 표시됩니다</text>}
          {view!=='2d'&&mass&&!showMass&&<text x={W/2} y={24} textAnchor="middle" style={{fontSize:11,fill:'#ddd',paintOrder:'stroke',stroke:'rgba(0,0,0,.7)',strokeWidth:3}}>매스 숨김 — 🏢 버튼으로 다시 표시</text>}
          {drawing&&<text x={W/2} y={24} textAnchor="middle" style={{fontSize:11,fill:'#FF8a8a',paintOrder:'stroke',stroke:'rgba(0,0,0,.8)',strokeWidth:3}}>✏️ 평면 작도 중 — 지도를 클릭해 꼭짓점 추가, ✔완료로 닫기</text>}
          {frontMode&&<text x={W/2} y={24} textAnchor="middle" style={{fontSize:11,fill:'#FF8a8a',paintOrder:'stroke',stroke:'rgba(0,0,0,.8)',strokeWidth:3}}>🎯 정면 지정 — 큰 도로에 면하는 매스 변을 클릭하세요</text>}
          {view==='2d'&&pts.length>0&&(()=>{
            const pp=pts.map(q=>toPx(q[0],q[1]));
            return(<g>
              <polyline points={P2(pp)} fill="none" stroke="#FF5252" strokeWidth="2" strokeDasharray="6 3"/>
              {pp.map((q,i)=>(<g key={i}>
                <circle cx={q[0]} cy={q[1]} r="4" fill="#FF5252" stroke="#fff" strokeWidth="1.5"/>
                {i>0&&<text x={(q[0]+pp[i-1][0])/2} y={(q[1]+pp[i-1][1])/2-6} textAnchor="middle" style={{fontSize:10,fill:'#fff',fontFamily:"'DM Mono',monospace",paintOrder:'stroke',stroke:'rgba(0,0,0,.8)',strokeWidth:3}}>{fmtD(segs[i-1])}</text>}
              </g>))}
              {pts.length>2&&<text x={pp[pp.length-1][0]} y={pp[pp.length-1][1]+18} textAnchor="middle" style={{fontSize:10,fill:'#FFD54A',fontFamily:"'DM Mono',monospace",paintOrder:'stroke',stroke:'rgba(0,0,0,.8)',strokeWidth:3}}>합계 {fmtD(tot)}</text>}
            </g>);
          })()}
          <g transform={`translate(12,${H-16})`}>
            <rect x="-4" y="-14" width="118" height="22" fill="rgba(0,0,0,.45)"/>
            <line x1="0" y1="0" x2="100" y2="0" stroke="#fff" strokeWidth="2"/>
            <line x1="0" y1="-4" x2="0" y2="4" stroke="#fff" strokeWidth="2"/>
            <line x1="100" y1="-4" x2="100" y2="4" stroke="#fff" strokeWidth="2"/>
            <text x="50" y="-5" textAnchor="middle" style={{fontSize:9,fill:'#fff',fontFamily:"'DM Mono',monospace"}}>{(mpp*100)>=1000?((mpp*100)/1000).toFixed(1)+'km':Math.round(mpp*100)+'m'}{view==='3dp'?' (중심 기준)':''}</text>
          </g>
          {view!=='2d'&&(()=>{
            const nx=W-34,ny=40;
            return(<g transform={`rotate(${rot} ${nx} ${ny})`}>
              <circle cx={nx} cy={ny} r="16" fill="rgba(0,0,0,.45)"/>
              <polygon points={`${nx},${ny-11} ${nx-5},${ny+6} ${nx+5},${ny+6}`} fill="#FF5252"/>
              <text x={nx} y={ny+13} textAnchor="middle" style={{fontSize:8,fill:'#fff'}}>N</text>
            </g>);
          })()}
          {!vworldKey&&<text x={W/2} y={H/2} textAnchor="middle" style={{fontSize:11,fill:'#ccc'}}>V-World 키 미등록 — 항공사진을 표시할 수 없습니다 (ADMIN 탭)</text>}
        </svg>
      </div>
      <p style={{fontSize:9.5,color:C.light,marginTop:8,lineHeight:1.6}}>※ 배경: V-World 항공사진(WMTS, 최대 L19 — 이후 확대보간) · 노란 경계: 연속지적도(참조용) · 파란 점선: 매스 면적선(경계 기준축 정렬·경계 내 1m 이격 강제) / 하늘색: <b>FIT FRAME</b>(매스 면을 따라 깊이만큼 돌출 — 깊이·적용 입면·루버 사양 연동) · <b>2D</b> 드래그=이동·📏 측정·✏️ D-커스텀 작도 / <b>3D·투시</b> 좌클릭=이동·휠버튼 드래그=회전·고도 · <b>휠</b>=줌 · 🏢 매스+FIT 표시 전환. 🏙️주변·🏚️현황 건물은 VWorld 건물 데이터(footprint+지상층수)를 층당 3.3m로 압출한 LoD1 개략 매스입니다(VWorld 3D LoD4 API는 폐쇄됨). 루버·매스·건물은 법규 검토 전 참고용입니다.</p>
    </div>
  );
}

/* ═══ ADDR SEARCH INPUT — 행안부 주소검색이 결합된 공용 주소 입력란 ═══
   입력값을 검색어로 사용. 검색 버튼/Enter → 드롭다운 결과 → 선택 시 도로명주소로 채움 */
function AddrSearchInput({value,onChange,confmKey,placeholder,onPick}){
  const [res,setRes]=useState(null);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const doSearch=()=>{
    if(busy)return;
    setBusy(true);setErr('');setRes(null);
    jusoSearch(value,1,confmKey,
      r=>{setBusy(false);setRes(r);if(r.total===0)setErr('결과 없음 — 검색어를 더 구체적으로 (예: 도로명+번호, 동명+지번)');},
      m=>{setBusy(false);setErr(m);});
  };
  const pick=j=>{onChange(j.roadAddr||j.roadAddrPart1||'');setRes(null);setErr('');if(onPick)onPick(j);};
  return(
    <div style={{position:'relative'}}>
      <div style={{display:'flex',gap:6}}>
        <input value={value||''} onChange={e=>onChange(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder={placeholder||'주소 입력 후 검색 (행안부 API)'}
          style={{flex:1,minWidth:0,border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'7px 10px'}}/>
        <button type="button" onClick={doSearch} disabled={busy} style={{background:C.ink,color:C.white,border:'none',padding:'0 13px',fontSize:11,cursor:busy?'wait':'pointer',whiteSpace:'nowrap',opacity:busy?0.6:1}}>{busy?'…':'검색'}</button>
      </div>
      {err&&<p style={{fontSize:9.5,color:C.red,marginTop:4,lineHeight:1.5}}>⚠ {err}</p>}
      {res&&res.list.length>0&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:300,maxHeight:200,overflowY:'auto',background:C.white,border:`1.5px solid ${C.ink}`,boxShadow:'0 8px 22px rgba(0,0,0,.18)'}}>
          {res.list.map((j,i)=>(
            <button key={i} type="button" onClick={()=>pick(j)} style={{display:'block',width:'100%',textAlign:'left',padding:'7px 10px',border:'none',borderBottom:`1px solid ${C.border}`,background:'transparent',cursor:'pointer'}}>
              <span style={{display:'block',fontSize:11.5,color:C.ink}}>{j.roadAddr}</span>
              <span style={{display:'block',fontSize:9.5,color:C.sub,fontFamily:"'DM Mono',monospace",marginTop:1}}>{j.jibunAddr} · {j.zipNo}</span>
            </button>
          ))}
          {res.total>10&&<p style={{fontSize:9,color:C.light,padding:'5px 10px'}}>총 {fmt(res.total)}건 중 10건 — 검색어를 좁히세요</p>}
        </div>
      )}
    </div>
  );
}

/* ═══ PARCEL MODAL — 필지 추가 팝업 (실제 지번: 행안부 주소검색 / 가상 필지: 직접 입력) ═══ */
function ParcelModal({open,onCancel,onAdd,confmKey,onSetKey,vworldKey}){
  const INIT={type:'real',addr:'',jibun:'',area:''};
  const [v,setV]=useState(INIT);
  const [kw,setKw]=useState('');
  const [searching,setSearching]=useState(false);
  const [res,setRes]=useState(null); /* {total,list} */
  const [errMsg,setErrMsg]=useState('');
  const [pickedIdx,setPickedIdx]=useState(-1);
  const [keyInput,setKeyInput]=useState('');
  const [landQ,setLandQ]=useState(null); /* 지적도 조회 상태 {state:'loading'|'ok'|'err', pnu, areaM2, jimok, useZone, rings, msg} */
  if(!open)return null;
  /* 주소 선택 → PNU → 연속지적도 경계 → (성공 시) 중심점으로 용도지역 조회 */
  const lookupLand=(j)=>{
    const pnu=jusoPNU(j);
    if(!pnu||!vworldKey){setLandQ(null);return;}
    setLandQ({state:'loading',pnu});
    vworldData({data:'LP_PA_CBND_BUBUN',key:vworldKey,attrFilter:'pnu:=:'+pnu},fc=>{
      const st=fc&&vwGeomStats(fc);
      if(!st){setLandQ({state:'err',pnu,msg:'해당 지번의 연속지적도 경계를 찾지 못했습니다 — 면적을 직접 입력하세요.'});return;}
      const props=(fc.features[0]&&fc.features[0].properties)||{};
      const jimok=((props.jibun||'').match(/[가-힣]+$/)||[''])[0];
      const rings=st.rings.map(r=>r.map(q=>[+q[0].toFixed(6),+q[1].toFixed(6)])); /* 저장 용량 절약(약 0.1m 정밀도) */
      setLandQ({state:'ok',pnu,areaM2:st.areaM2,jimok,useZone:'',rings});
      setV(s=>({...s,area:s.area===''?String(Math.round(st.areaM2*10)/10):s.area})); /* 비어 있을 때만 자동 입력 */
      vworldData({data:'LT_C_UQ111',key:vworldKey,geomFilter:`POINT(${st.center[0]} ${st.center[1]})`},fz=>{
        const u=(fz&&fz.features&&fz.features[0]&&fz.features[0].properties&&fz.features[0].properties.uname)||'';
        if(u)setLandQ(p=>(p&&p.pnu===pnu)?{...p,useZone:u}:p);
      },()=>{}); /* 용도지역은 보조 정보 — 실패해도 무시 */
    },m=>setLandQ({state:'err',pnu,msg:m}));
  };
  const isTestKey=!confmKey||confmKey==='TESTJUSOGOKR';
  const doSearch=(page)=>{
    setSearching(true);setErrMsg('');setRes(null);setPickedIdx(-1);
    jusoSearch(kw,page||1,confmKey,
      r=>{setSearching(false);setRes(r);
        if(r.total===0)setErrMsg(isTestKey
          ?'결과 없음 — 테스트키(TESTJUSOGOKR)는 샘플 검색어 "강남대로 12길"만 조회됩니다. 아래에 발급받은 승인키를 등록하면 모든 주소가 검색됩니다.'
          :'검색 결과가 없습니다 — 검색어를 더 구체적으로 입력하세요 (예: 도로명+건물번호, 동명+지번).');},
      m=>{setSearching(false);setErrMsg(m+(isTestKey?' (테스트키 사용 중 — 운영 승인키 등록 필요할 수 있음)':''));});
  };
  const saveKey=()=>{
    const k=keyInput.trim();
    if(!k){window.alert('승인키를 입력하세요.');return;}
    if(onSetKey)onSetKey(k);
    setKeyInput('');setErrMsg('');
  };
  const pick=(j,i)=>{
    const jib=`${j.emdNm||''} ${j.lnbrMnnm||''}${(+j.lnbrSlno>0)?'-'+j.lnbrSlno:''}`.trim();
    setV(s=>({...s,addr:j.roadAddr||j.roadAddrPart1||'',jibun:jib,area:''})); /* 면적은 지적도 계산값으로 새로 채움 */
    setPickedIdx(i);
    lookupLand(j);
  };
  const isV=v.type==='virtual';
  const areaDisp=v.area===''?'':(isFinite(Number(String(v.area).replace(/,/g,'')))?Number(String(v.area).replace(/,/g,'')).toLocaleString():v.area);
  const submit=()=>{
    const area=numParse(v.area);
    if(!v.addr.trim()){window.alert(isV?'가상 주소(명칭)를 입력하세요.':'주소를 입력하세요.');return;}
    if(isV&&area<=0){window.alert('가상 필지는 면적 입력이 필수입니다.');return;}
    const land=(!isV&&landQ&&landQ.state==='ok')?{pnu:landQ.pnu,jimok:landQ.jimok,useZone:landQ.useZone,rings:landQ.rings,calcArea:Math.round(landQ.areaM2*10)/10}:{};
    onAdd({id:Date.now(),type:v.type,addr:v.addr.trim(),jibun:v.jibun.trim(),area,...land});
    setV(INIT);setPickedIdx(-1);setLandQ(null); /* 검색 결과는 유지 — 같은 결과에서 인접 필지 연속 추가 가능 */
  };
  const closeAll=()=>{setV(INIT);setKw('');setRes(null);setErrMsg('');setPickedIdx(-1);setLandQ(null);onCancel();};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'grid',placeItems:'center',padding:24}}>
      <div style={{background:C.white,border:`2px solid ${C.ink}`,padding:'26px 30px',maxWidth:520,width:'100%',boxShadow:'0 12px 40px rgba(0,0,0,.25)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:'.1em',color:C.ink}}>ADD PARCEL</span>
          <span style={{fontSize:11,color:C.light}}>필지 추가</span>
        </div>
        <p style={{fontSize:10.5,color:C.sub,marginBottom:16,lineHeight:1.7}}>한 필지씩 추가합니다. 지구단위계획구역 등 지번이 확정되지 않은 사업지는 <b>가상 필지</b>로 명칭·면적을 입력하세요.</p>
        <div style={{marginBottom:16}}>
          <Lbl ch="필지 유형"/>
          <ChoiceGrid options={[{id:'real',label:'실제 필지',sub:'행안부 주소검색'},{id:'virtual',label:'가상 필지',sub:'지구단위계획구역 등'}]} value={v.type} onChange={t=>setV(s=>({...s,type:t}))} cols={2}/>
        </div>
        {!isV&&(
          <div style={{marginBottom:16,padding:'14px 14px 12px',background:C.panel,border:`1px solid ${C.border}`}}>
            <Lbl ch="주소 검색 — 행안부 도로명주소 API"/>
            <div style={{display:'flex',gap:8}}>
              <input autoFocus value={kw} onChange={e=>setKw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!searching&&doSearch(1)} placeholder="예: 세종로 1, 태평로1가 31" style={{flex:1,border:`1px solid ${C.borderDark}`,background:C.white,fontSize:13,color:C.ink,outline:'none',padding:'8px 10px'}}/>
              <button onClick={()=>doSearch(1)} disabled={searching} style={{background:C.ink,color:C.white,border:'none',padding:'8px 18px',fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.06em',cursor:searching?'wait':'pointer',opacity:searching?0.6:1}}>{searching?'검색 중…':'검색'}</button>
            </div>
            {errMsg&&<p style={{fontSize:10.5,color:C.red,marginTop:8,lineHeight:1.5}}>⚠ {errMsg}</p>}
            {res&&res.list.length>0&&(
              <div style={{marginTop:10,maxHeight:180,overflowY:'auto',border:`1px solid ${C.border}`,background:C.white}}>
                {res.list.map((j,i)=>(
                  <button key={i} onClick={()=>pick(j,i)} style={{display:'block',width:'100%',textAlign:'left',padding:'8px 12px',border:'none',borderBottom:`1px solid ${C.border}`,background:pickedIdx===i?C.greenLt:'transparent',cursor:'pointer'}}>
                    <span style={{display:'block',fontSize:12,color:C.ink,fontWeight:pickedIdx===i?700:400}}>{pickedIdx===i?'✓ ':''}{j.roadAddr}</span>
                    <span style={{display:'block',fontSize:10.5,color:C.sub,marginTop:2,fontFamily:"'DM Mono',monospace"}}>{j.jibunAddr} · {j.zipNo}</span>
                  </button>
                ))}
              </div>
            )}
            {res&&res.total>10&&<p style={{fontSize:10,color:C.light,marginTop:6}}>총 {fmt(res.total)}건 중 10건 표시 — 검색어를 더 구체적으로 입력하면 좁혀집니다.</p>}
            {isTestKey&&(
              <div style={{marginTop:10,padding:'10px 12px',background:C.amberLt,border:`1px solid ${C.amber}`}}>
                <p style={{fontSize:10.5,color:C.amber,fontWeight:700,marginBottom:6}}>⚠ 테스트키 사용 중 — 샘플 검색어 "강남대로 12길"만 조회됩니다</p>
                <p style={{fontSize:10,color:C.amber,lineHeight:1.6,marginBottom:8}}>모든 주소를 검색하려면 business.juso.go.kr에서 검색API 승인키를 발급받아 등록하세요 (개발승인키는 본인인증 없이 즉시 발급).</p>
                <div style={{display:'flex',gap:6}}>
                  <input value={keyInput} onChange={e=>setKeyInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveKey()} placeholder="발급받은 승인키 붙여넣기" style={{flex:1,border:`1px solid ${C.amber}`,background:C.white,fontSize:11,color:C.ink,outline:'none',padding:'6px 9px',fontFamily:"'DM Mono',monospace"}}/>
                  <button onClick={saveKey} style={{background:C.amber,color:C.white,border:'none',padding:'6px 14px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>키 등록</button>
                </div>
              </div>
            )}
            <p style={{fontSize:9.5,color:C.light,marginTop:8,lineHeight:1.6}}>※ 결과 선택 시 주소·지번이 자동 입력되고, 연속지적도에서 경계·계산면적·지목·용도지역을 자동 조회합니다.{!isTestKey&&' 키 변경은 ADMIN 탭에서 가능합니다.'}</p>
          </div>
        )}
        {!isV&&landQ&&(
          <div style={{marginBottom:16,padding:'10px 12px',
            background:landQ.state==='ok'?C.greenLt:landQ.state==='err'?C.amberLt:C.panel,
            border:`1px solid ${landQ.state==='ok'?C.green:landQ.state==='err'?C.amber:C.border}`}}>
            {landQ.state==='loading'&&<p style={{fontSize:10.5,color:C.sub}}>연속지적도 조회 중… (V-World)</p>}
            {landQ.state==='err'&&<p style={{fontSize:10.5,color:C.amber,lineHeight:1.6}}>⚠ {landQ.msg}</p>}
            {landQ.state==='ok'&&(
              <p style={{fontSize:10.5,color:C.green,lineHeight:1.7}}>
                ✓ 연속지적도 경계 확인 — 계산면적 <b>{fmt(Math.round(landQ.areaM2*10)/10)}㎡</b>
                {landQ.jimok&&<> · 지목 <b>{landQ.jimok}</b></>}
                {landQ.useZone&&<> · 용도지역 <b>{landQ.useZone}</b></>}
                <span style={{color:C.sub}}> · PNU {landQ.pnu}</span><br/>
                <span style={{fontSize:9.5,color:C.sub}}>※ 계산면적은 경계 폴리곤 기준 참고치입니다 — 공부상 면적과 다를 수 있으니 필요시 아래에서 수정하세요.</span>
              </p>
            )}
          </div>
        )}
        <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:20}}>
          <div><Lbl ch={isV?'가상 주소 (명칭)':'주소 (검색 결과 자동 입력 — 수정 가능)'}/>
            <input value={v.addr} onChange={e=>setV(s=>({...s,addr:e.target.value}))} placeholder={isV?'예: ○○지구 특별계획구역 A블록':'위 검색에서 선택하거나 직접 입력'} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:13,color:C.ink,outline:'none',padding:'8px 10px'}}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><Lbl ch={isV?'블록/획지 번호 (선택)':'지번 (선택)'}/>
              <input value={v.jibun} onChange={e=>setV(s=>({...s,jibun:e.target.value}))} placeholder={isV?'예: A-1':'예: 100-1'} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:13,color:C.ink,outline:'none',padding:'8px 10px'}}/>
            </div>
            <div><Lbl ch={isV?'면적 (필수)':'면적 (지적도 계산값 자동 입력 — 수정 가능)'}/>
              <div style={{display:'flex',alignItems:'baseline',gap:6,border:`1px solid ${C.borderDark}`,background:C.white,padding:'8px 10px'}}>
                <input value={areaDisp} onChange={e=>setV(s=>({...s,area:e.target.value.replace(/,/g,'').replace(/[^\d.]/g,'')}))} inputMode="decimal" style={{flex:1,border:'none',background:'transparent',fontSize:13,color:C.ink,outline:'none',padding:0,fontFamily:"'DM Mono',monospace"}}/>
                <span style={{fontSize:11,color:C.light}}>㎡</span>
              </div>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          <button onClick={closeAll} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.sub,padding:'9px 18px',fontSize:12,cursor:'pointer'}}>닫기</button>
          <button onClick={submit} style={{background:C.ink,color:C.white,border:'none',padding:'9px 24px',fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:'.08em',cursor:'pointer'}}>추가 ADD (연속 입력 가능)</button>
        </div>
      </div>
    </div>
  );
}

/* PlanTab 외부 정의 — 내부 정의 시 렌더마다 컴포넌트 identity가 바뀌어 input 포커스가 끊김 */
const PlanConf=({level,note})=>{
  const col=level==='높음'?C.green:level==='중간'?C.amber:C.red;
  return<span style={{fontSize:9,padding:'1px 6px',border:`1px solid ${col}`,color:col,marginLeft:8,whiteSpace:'nowrap'}}>신뢰도 {level}{note?` · ${note}`:''}</span>;
};
const PlanStep=({n,title,sub,mode,children})=>(
  <div style={{marginBottom:26}}>
    <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:12,borderBottom:`1.5px solid ${C.ink}`,paddingBottom:8}}>
      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:C.amber}}>{n}</span>
      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:'.08em',color:C.ink}}>{title}</span>
      {sub&&<span style={{fontSize:10.5,color:C.light}}>{sub}</span>}
      <TagChip t={mode}/>
    </div>
    {children}
  </div>
);

function PlanTab({plan,setPlan,FD,setFD,applyPlan,toast,activeFrame,renders,setTab,aiRenderView,renderBusy,onRegisterCapture}){
  const st=plan.site,tg=plan.targets,fit=plan.fit;
  const [planExtra,setPlanExtra]=useState('');
  const upd=(grp,k)=>v=>setPlan(p=>({...p,[grp]:{...p[grp],[k]:v}}));
  const [showParcel,setShowParcel]=useState(false);
  const parcels=Array.isArray(st.parcels)?st.parcels:[];
  const parcelArea=parcels.reduce((s,p)=>s+(Number(p.area)||0),0);
  const addParcel=(pc)=>{
    setPlan(p=>({...p,site:{...p.site,parcels:[...(Array.isArray(p.site.parcels)?p.site.parcels:[]),pc]}}));
    toast(`필지를 추가했습니다 — ${pc.addr}${pc.area>0?` (${fmt(pc.area)}㎡)`:''}`);
  };
  const delParcel=(id)=>setPlan(p=>({...p,site:{...p.site,parcels:(Array.isArray(p.site.parcels)?p.site.parcels:[]).filter(x=>x.id!==id)}}));
  const opt=plan.options.find(o=>o.id===plan.selected)||null;
  const qty=useMemo(()=>planQty(opt,fit),[opt,fit]);
  const est=useMemo(()=>planEstimate(opt,fit,qty,FD),[opt,fit,qty,FD]);
  const gen=()=>{
    const ops=genPlanOptions(st,tg);
    setPlan(p=>({...p,options:ops,selected:(p.selected&&ops.some(o=>o.id===p.selected))?p.selected:ops[0].id}));
    toast('계획안 3개 옵션을 생성했습니다 — 검토 후 선택하세요');
  };
  const doRender=()=>{
    if(!opt){window.alert('먼저 계획안 옵션을 생성·선택하세요.');return;}
    const ver=(plan.render?plan.render.ver:0)+1;
    setPlan(p=>({...p,render:{footW:opt.footW,footD:opt.footD,floors:opt.floors,floorH:opt.floorH,moduleW:fit.moduleW,faces:{...fit.faces},from:qty.from,to:qty.to,time:new Date().toLocaleString('ko-KR'),ver}}));
    toast(`렌더 v${ver}를 생성했습니다`);
  };
  const saveVersion=()=>{
    if(!opt||!qty)return;
    const v={n:(plan.versions||[]).length+1,time:new Date().toLocaleString('ko-KR'),opt:opt.id,floors:opt.floors,gfa:opt.gfa,moduleW:fit.moduleW,total:qty.total,estTotal:est?est.total:0};
    setPlan(p=>({...p,versions:[...(p.versions||[]),v]}));
    toast(`계획안 버전 v${v.n}을 저장했습니다`);
  };
  const apply=()=>{
    if(!opt||!qty||qty.total<=0){window.alert('적용할 계획안·수량이 없습니다.');return;}
    applyPlan({opt,fit,qty});
  };
  const Conf=PlanConf, Step=PlanStep;
  return(
    <div style={{maxWidth:1200,margin:'0 auto',padding:'24px 32px'}}>
      <SH code="PLAN GENERATOR" sub={undefined}/>{/* sub 미표기: "계획안 자동 생성 및 조정 — MVP (기획서 v0.2)" */}
      <p style={{fontSize:11,color:C.sub,marginBottom:20,lineHeight:1.7}}>파라메트릭 Planning Model 기준으로 매스·모듈·수량·견적이 산출됩니다. 렌더 이미지는 모델의 시각화 결과물이며 <b>「다시 렌더하기」</b> 클릭 시에만 갱신됩니다.</p>

      <Step n="①" mode="input" title="SITE" sub="대지 정보 — 실제 필지는 연속지적도 자동 조회 (V-World)">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:10}}>
          <Lbl ch={`필지 목록 — ${parcels.length}필지${parcelArea>0?` · 합계 ${fmt(parcelArea)}㎡`:''}`}/>
          <button onClick={()=>setShowParcel(true)} style={{background:C.ink,color:C.white,border:'none',padding:'8px 18px',fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.08em',cursor:'pointer'}}>＋ 필지 추가</button>
        </div>
        {parcels.length>0?(
          <div style={{border:`1px solid ${C.border}`,marginBottom:14}}>
            <table><thead><tr style={{borderBottom:`1.5px solid ${C.ink}`,background:C.panel}}>{[['유형','left'],['주소/명칭','left'],['지번/블록','left'],['지목·용도지역','left'],['면적','right'],['','center']].map(([h,a],i)=><th key={i} style={{padding:'7px 12px',textAlign:a,fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.06em',color:C.sub,fontWeight:400}}>{h}</th>)}</tr></thead>
            <tbody>
              {parcels.map(pc=>(
                <tr key={pc.id} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'7px 12px',width:80}}><span style={{fontSize:9,padding:'2px 7px',border:`1px solid ${pc.type==='virtual'?C.amber:C.green}`,color:pc.type==='virtual'?C.amber:C.green,whiteSpace:'nowrap'}}>{pc.type==='virtual'?'가상':'실제'}</span></td>
                  <td style={{padding:'7px 12px',fontSize:11.5,color:C.ink}} title={pc.pnu?`PNU ${pc.pnu}`:undefined}>{pc.addr}</td>
                  <td style={{padding:'7px 12px',fontSize:11,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{pc.jibun||'—'}</td>
                  <td style={{padding:'7px 12px',fontSize:10.5,color:C.sub}}>{(pc.jimok||pc.useZone)?`${pc.jimok||''}${pc.jimok&&pc.useZone?' · ':''}${pc.useZone||''}`:'—'}</td>
                  <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11.5}} title={pc.calcArea>0?`지적도 계산면적 ${fmt(pc.calcArea)}㎡`:undefined}>{pc.area>0?`${fmt(pc.area)}㎡`:'—'}</td>
                  <td style={{padding:'7px 12px',textAlign:'center',width:60}}><button onClick={()=>delParcel(pc.id)} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.red,padding:'3px 9px',fontSize:10,cursor:'pointer'}}>삭제</button></td>
                </tr>
              ))}
              {parcelArea>0&&<tr style={{background:C.panel}}><td colSpan={4} style={{padding:'8px 12px',fontSize:11.5,fontWeight:700}}>합계 (산정 대지면적)</td><td style={{padding:'8px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,color:C.amber}}>{fmt(parcelArea)}㎡</td><td/></tr>}
            </tbody></table>
          </div>
        ):(
          <div style={{border:`1px dashed ${C.borderDark}`,padding:'22px 16px',textAlign:'center',fontSize:11,color:C.light,marginBottom:14,lineHeight:1.8}}>등록된 필지가 없습니다 — 「＋ 필지 추가」로 한 필지씩 입력하세요.<br/>지구단위계획구역은 <b>가상 필지</b>(명칭+면적)로 추가할 수 있습니다.</div>
        )}
        {(()=>{const dims=siteDims(st);return(<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:'14px 18px',marginBottom:8}}>
            {dims.derived?(<>
              <div><Lbl ch="건폐율 한도 — 공공데이터"/><div style={{padding:'8px 10px',background:C.greenLt,border:`1px solid ${C.green}`,borderLeft:`3px solid ${C.green}`}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:15,color:C.green}}>{dims.cov}</span><span style={{fontSize:11,color:C.light}}> %</span></div></div>
              <div><Lbl ch="용적률 한도 — 공공데이터"/><div style={{padding:'8px 10px',background:C.greenLt,border:`1px solid ${C.green}`,borderLeft:`3px solid ${C.green}`}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:15,color:C.green}}>{fmt(dims.far)}</span><span style={{fontSize:11,color:C.light}}> %</span></div></div>
            </>):(<>
              <NF label="건폐율 한도 (가상 대지)" unit="%" value={st.coverage} step={5} onChange={upd('site','coverage')}/>
              <NF label="용적률 한도 (가상 대지)" unit="%" value={st.far} step={50} onChange={upd('site','far')}/>
            </>)}
          </div>
          <p style={{fontSize:10,color:dims.derived?C.green:C.sub,marginBottom:10,lineHeight:1.6}}>
            {dims.derived
              ?`✓ 용도지역 「${dims.zone}」 법정 상한(국토계획법 시행령 기준)을 자동 적용 — 지자체 조례·지구단위계획에 따라 다를 수 있으니 확인하세요.`
              :(parcels.some(q=>q.type!=='virtual')?'※ 용도지역 미확인 — 한도를 직접 입력하세요 (주소 재선택 시 자동 조회 재시도).':'※ 가상 대지 — 건폐율·용적률 한도를 직접 입력하세요.')}
            {` 산정 대지 치수(자동): 약 ${fmt(Math.round(dims.sw))} × ${fmt(Math.round(dims.sd))} m${dims.pArea>0?` · 면적 ${fmt(Math.round(dims.pArea))}㎡`:''}`}
          </p>
        </>);})()}
        <div style={{padding:'10px 14px',background:C.amberLt,border:`1px solid ${C.amber}`,fontSize:10.5,color:C.amber,lineHeight:1.7}}>
          ⓘ 실제 필지는 주소 선택 시 <b>연속지적도(V-World) 경계·계산면적·지목·용도지역</b>이 자동 조회됩니다. 연속지적도는 측량 성과가 아닌 참조용 도면이며, 공부상 면적(토지대장)은 API 제약으로 미연동 — 계산면적은 <b>계획 검토용 참고치</b>이므로 공부상 면적을 알면 직접 수정하세요. 건축물대장 연동은 2차 범위입니다.<Conf level="중간" note="연속지적도 참고치"/>
        </div>
      </Step>

      <Step n="②" mode="input" title="TARGET" sub="계획 조건">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'14px 18px'}}>
          <div><Lbl ch="용도"/><select value={tg.use} onChange={e=>upd('targets','use')(e.target.value)} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'8px 10px'}}>{['업무시설','공동주택','복합시설','교육연구','의료시설','문화집회','기타'].map(u=><option key={u}>{u}</option>)}</select></div>
          <NF label="목표 용적률" unit="%" value={tg.far!=null?tg.far:400} step={10} onChange={upd('targets','far')}/>
          <NF label="목표 층수 (0=자동)" unit="F" value={tg.floors} step={1} onChange={upd('targets','floors')}/>
          <NF label="기준 층고" unit="mm" value={tg.floorH} step={100} onChange={upd('targets','floorH')}/>
        </div>
      </Step>

      <Step n="③" mode="result" title="MASS OPTIONS" sub="복수 계획안 자동 생성 — 기획서 5.2">
        <button onClick={gen} style={{background:C.ink,color:C.white,border:'none',padding:'10px 26px',fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.08em',cursor:'pointer',marginBottom:16}}>계획안 생성 GENERATE</button>
        {plan.options.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:14}}>
            {plan.options.map(o=>{
              const on=plan.selected===o.id;
              return(
                <button key={o.id} onClick={()=>setPlan(p=>({...p,selected:o.id}))} style={{textAlign:'left',padding:'16px 18px',border:`2px solid ${on?C.ink:C.border}`,background:on?C.white:C.panel,cursor:'pointer',transition:'all .15s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:'.04em',color:on?C.ink:C.sub}}>{o.name}</span>
                    {on&&<span style={{fontSize:9,color:C.green,fontWeight:700}}>● 선택됨</span>}
                  </div>
                  <p style={{fontSize:10.5,color:C.sub,lineHeight:1.6,marginBottom:10}}>{o.strategy}</p>
                  {[['매스',`${fmt(o.footW)}×${fmt(o.footD)}m × ${o.floors}F (H ${o.height}m)`],['연면적',`${fmt(o.gfa)}㎡`],['건폐율 / 용적률',`${o.bcr}% / ${o.far}%`]].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}><span style={{color:C.light}}>{k}</span><span style={{fontFamily:"'DM Mono',monospace",color:C.ink}}>{v}</span></div>
                  ))}
                  {o.risks.length>0&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px dashed ${C.border}`}}>{o.risks.map((rk,i)=><p key={i} style={{fontSize:9.5,color:C.red,lineHeight:1.5}}>⚠ {rk}</p>)}</div>}
                </button>
              );
            })}
          </div>
        )}
      </Step>

      <ParcelMapSVG parcels={parcels} vworldKey={FD.vworld_key||''}
        drawEnabled={!!(opt&&opt.custom)}
        onDrawComplete={(ring,area)=>{
          setPlan(p=>{
            const site={...p.site,customMass:{ring,area:Math.round(area*10)/10}};
            return{...p,site,options:genPlanOptions(site,p.targets),selected:'D'};
          });
          toast(`커스텀 평면 작도 완료 — ${fmt(Math.round(area))}㎡ · Option D 갱신`);
        }}
        onSetFront={(ei)=>{setPlan(p=>({...p,fit:{...p.fit,frontEdge:ei}}));toast(`정면을 지정했습니다 (변 ${ei+1}) — 시계방향으로 우측면·배면·좌측면 자동 설정`);}}
        onRegisterCapture={onRegisterCapture}
        mass={opt?{
          heightM:opt.floors*opt.floorH/1000,floors:opt.floors,floorH:opt.floorH,frontEdge:fit.frontEdge||0,
          rect:(opt.custom&&st.customMass&&st.customMass.ring)?null:{wM:opt.footW,dM:opt.footD},
          ringGeo:(opt.custom&&st.customMass&&st.customMass.ring)?st.customMass.ring:null,
          label:`${opt.name.split(' — ')[0]}${opt.custom&&opt.hasShape?' (작도)':''} · ${opt.floors}F · H ${opt.height}m`,
          fit:{depthM:fit.depth/1000,faces:fit.faces,from:qty?qty.from:1,to:qty?qty.to:opt.floors,moduleWM:fit.moduleW/1000,skinType:fit.skinType,hasSkin:fit.hasSkin}
        }:null}/>

      {/* 시뮬레이션 하단 — AI 렌더 (외부 투시 우선 · 대화형) */}
      <div style={{border:`1px solid ${C.border}`,background:C.panel,padding:'12px 14px',marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'stretch',flexWrap:'wrap'}}>
          <button onClick={async()=>{const ok=await aiRenderView('exterior',planExtra);if(ok&&setTab)setTab('PERSP');}} disabled={renderBusy==='exterior'} style={{background:renderBusy==='exterior'?C.light:C.ink,color:C.white,border:'none',padding:'0 22px',minHeight:54,fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.06em',cursor:renderBusy==='exterior'?'wait':'pointer',whiteSpace:'nowrap'}}>
            {renderBusy==='exterior'?'🎨 생성 중…':'🎨 AI 렌더 생성 (외부 투시)'}
          </button>
          <textarea value={planExtra} onChange={e=>setPlanExtra(e.target.value)} placeholder="이미지 생성 추가 지시 (예: 저녁 노을 분위기, 보행자 시점, 목재 톤 루버 강조, 주변 가로수)" style={{flex:1,minWidth:240,minHeight:54,border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'8px 10px',resize:'vertical',fontFamily:'inherit'}}/>
        </div>
        <p style={{fontSize:10.5,color:C.sub,lineHeight:1.6,marginTop:8}}>현재 SIMULATION의 <b>매스 형상·배치(VWorld 3D 기반)</b>를 베이스로, 매스·입면·스킨 사양 + 위 추가 지시를 반영해 <b>외부 투시</b>를 생성합니다. 디테일·인테리어 뷰는 <b>PERSPECTIVE 탭</b>에서 개별 생성합니다.{(!((FD&&FD.ai_provider==='openai')?FD.ai_image_key:(FD&&FD.ai_gemini_key)))?' (ADMIN 탭에 AI 키 등록 필요)':(renders&&renders.time?` · 최근 ${renders.time}`:'')}</p>
      </div>

      {opt&&<>
      <Step n="④" mode="input" title="FIT APPLICATION" sub="적용 입면·적용층·모듈 분할 — 기획서 7장">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
          <div>
            <Lbl ch="적용 입면 (정면=큰 도로측 · SIMULATION에서 🎯정면지정)"/>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
              {FACES.map(f=>{
                const on=fit.faces&&fit.faces[f.id];
                return<button key={f.id} onClick={()=>setPlan(p=>({...p,fit:{...p.fit,faces:{...p.fit.faces,[f.id]:!(p.fit.faces&&p.fit.faces[f.id])}}}))} style={{padding:'10px 0',border:`1.5px solid ${on?C.ink:C.border}`,background:on?C.ink:'transparent',color:on?C.white:C.sub,fontFamily:"'Bebas Neue',sans-serif",fontSize:13,cursor:'pointer'}}>{f.ko}</button>;
              })}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:16}}>
              <NF label="적용 시작층" unit="F" value={fit.floorFrom} step={1} onChange={upd('fit','floorFrom')}/>
              <NF label="적용 끝층" unit="F" value={fit.floorTo} step={1} onChange={upd('fit','floorTo')}/>
            </div>
            <div style={{marginBottom:16}}><Lbl ch="Typical Module 폭"/><ChoiceGrid options={[{id:1200,label:'1,200mm'},{id:1500,label:'1,500mm'},{id:1800,label:'1,800mm'}]} value={fit.moduleW} onChange={upd('fit','moduleW')} cols={3}/></div>
            <div style={{marginBottom:16}}><Lbl ch="코너 처리"/><ChoiceGrid options={[{id:'corner',label:'코너 이형 모듈',sub:'코너부 별도 모듈 4개소/층'},{id:'equal',label:'동일 폭 분할',sub:'잔여폭 흡수'}]} value={fit.corner} onChange={upd('fit','corner')} cols={2}/></div>
          </div>
          <div>
            {activeFrame&&(
              <button onClick={()=>{
                setPlan(p=>({...p,
                  fit:{...p.fit,moduleW:Math.max(600,Math.round((activeFrame.frameWidth||p.fit.moduleW)/50)*50),depth:activeFrame.depth||p.fit.depth},
                  targets:{...p.targets,floorH:activeFrame.frameHeight||p.targets.floorH}}));
                toast(`FRAME '${activeFrame.name}' 사양을 가져왔습니다 — 폭→모듈, 깊이, 층고 동기화`);
              }} style={{display:'block',width:'100%',marginBottom:14,padding:'9px 14px',background:'transparent',border:`1px dashed ${C.blue}`,color:C.blue,fontSize:11.5,cursor:'pointer',textAlign:'left'}}>
                ⟳ FRAME 탭 사양 가져오기 — '{activeFrame.name}' (폭 {fmt(activeFrame.frameWidth)} · 깊이 {fmt(activeFrame.depth)} · 층고 {fmt(activeFrame.frameHeight)})
              </button>
            )}
            <div style={{marginBottom:16}}><SR label="FIT 적용 깊이 (D)" value={fit.depth} min={450} max={1500} step={50} onChange={upd('fit','depth')} unit="mm"/></div>
            <div style={{marginBottom:12}}>
              <Toggle on={fit.hasSkin} onClick={()=>upd('fit','hasSkin')(!fit.hasSkin)} label="스킨카트리지 적용" sub="선택한 깊이가 적용범위를 만족할 때만 수량·견적에 반영"/>
            </div>
            {fit.hasSkin&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
              {SKIN_CARTS.map(c=>{
                const on=fit.skinType===c.id;const ok=fit.depth>=c.minD&&fit.depth<=c.maxD;
                return<button key={c.id} onClick={()=>upd('fit','skinType')(c.id)} disabled={!ok} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',border:`1px solid ${on?C.ink:C.border}`,background:on?C.ink:ok?'transparent':C.panel,color:on?C.white:ok?C.ink:C.light,opacity:ok?1:0.45,cursor:ok?'pointer':'not-allowed',fontSize:11,textAlign:'left'}}>
                  <span>{c.label}</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:10}}>{won(skinP(c,FD))}/대 · D{c.minD}↑</span>
                </button>;
              })}
            </div>}
          </div>
        </div>
      </Step>

      <Step n="⑤" mode="result" title="QUANTITY · ESTIMATE" sub="수량 산출 + 개략 견적 — 모델 변경 시 준실시간 갱신">
        {qty&&qty.total>0?(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
            <div style={{border:`1px solid ${C.border}`}}>
              <table><thead><tr style={{borderBottom:`1.5px solid ${C.ink}`,background:C.panel}}>{['입면','입면 길이','모듈/층','적용층수','소계'].map((h,i)=><th key={h} style={{padding:'7px 12px',textAlign:i===0?'left':'right',fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.06em',color:C.sub,fontWeight:400}}>{h}</th>)}</tr></thead>
              <tbody>
                {Object.entries(qty.per).map(([f,n])=>(
                  <tr key={f} style={{borderBottom:`1px solid ${C.border}`}}>
                    <td style={{padding:'7px 12px',fontSize:11,fontWeight:600}}>{FACE_KO[f]||f}</td>
                    <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub}}>{fmt(Math.round((qty.faceLen&&qty.faceLen[f])||0))}m</td>
                    <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{fmt(n)}</td>
                    <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub}}>{qty.nF}F</td>
                    <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700}}>{fmt(n*qty.nF)}</td>
                  </tr>
                ))}
                {qty.cornerN>0&&<tr style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:'7px 12px',fontSize:11,fontWeight:600}}>코너 이형</td><td style={{padding:'7px 12px',textAlign:'right',fontSize:11,color:C.sub}}>—</td><td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{qty.cornerN}</td><td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub}}>{qty.nF}F</td><td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700}}>{fmt(qty.cornerN*qty.nF)}</td></tr>}
                <tr style={{background:C.panel}}><td colSpan={4} style={{padding:'8px 12px',fontSize:12,fontWeight:700}}>총 FIT Frame 모듈 (적용 {qty.from}~{qty.to}F)</td><td style={{padding:'8px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:C.amber}}>{fmt(qty.total)}EA</td></tr>
              </tbody></table>
            </div>
            <div>
              {est?<>
                <div style={{border:`1.5px solid ${C.ink}`,padding:'16px 18px',marginBottom:12}}>
                  <Lbl ch="개략 견적 (자동 생성 직후 — ±15% 범위)"/>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:C.amber,lineHeight:1.1,marginBottom:4}}>{won(est.lo)} ~ {won(est.hi)}</div>
                  <div style={{fontSize:10.5,color:C.light,marginBottom:10}}>중심값 {won(est.total)} · FIT 견적 엔진 산출<Conf level="중간" note="개략값"/></div>
                  {[['FRAME+GLASS (엔진)',est.frameCost],['스킨카트리지',est.skinCost],['세트단가(1개)',est.unitSet]].map(([k,v])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3,opacity:v>0?1:0.4}}><span style={{color:C.sub}}>{k}</span><span style={{fontFamily:"'DM Mono',monospace"}}>{won(v)}</span></div>
                  ))}
                  {fit.hasSkin&&!est.skinOk&&<p style={{fontSize:10,color:C.red,marginTop:6}}>⚠ 선택 스킨카트리지가 적용 깊이 범위를 벗어나 견적 제외됨</p>}
                </div>
                <div style={{padding:'10px 14px',background:C.greenLt,border:`1px solid ${C.green}`,fontSize:10.5,color:C.green,lineHeight:1.7}}>외피 적용면적 약 {fmt(qty.facadeArea)}㎡ · ⑦에서 프로젝트에 적용하면 COST·ENERGY 탭에서 정밀 분석으로 이어집니다.</div>
              </>:<p style={{fontSize:11,color:C.light}}>견적 엔진 오류 — 모듈 폭·층고를 확인하세요.</p>}
            </div>
          </div>
        ):<p style={{fontSize:11,color:C.red}}>적용 입면이 없거나 모듈 수가 0입니다 — ④에서 입면·모듈 폭을 확인하세요.</p>}
      </Step>

      <Step n="⑥" title="APPLY · VERSION" sub="프로젝트 연동 + 버전 관리 — 기획서 12.1">
        <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
          <button onClick={apply} style={{background:C.green,color:C.white,border:'none',padding:'11px 26px',fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.08em',cursor:'pointer'}}>프로젝트에 적용 APPLY TO PROJECT</button>
          <button onClick={saveVersion} style={{background:'transparent',color:C.sub,border:`1px solid ${C.border}`,padding:'11px 18px',fontSize:12,cursor:'pointer'}}>버전 스냅샷 저장</button>
        </div>
        <p style={{fontSize:10.5,color:C.sub,marginBottom:14,lineHeight:1.7}}>적용 시 — 모듈 폭×층고 프레임(TYPE A) 생성, 적용 입면별 존 구성, 스킨카트리지 설정 반영 후 PLATFORM 탭으로 이동합니다. 기존 작업 중 프레임·존은 대체됩니다.</p>
        {(plan.versions||[]).length>0&&(
          <div style={{border:`1px solid ${C.border}`}}>
            <table><thead><tr style={{borderBottom:`1.5px solid ${C.ink}`,background:C.panel}}>{['버전','생성 시점','옵션','층수','연면적','모듈폭','총 모듈','개략 견적'].map((h,i)=><th key={h} style={{padding:'7px 12px',textAlign:i<3?'left':'right',fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.06em',color:C.sub,fontWeight:400}}>{h}</th>)}</tr></thead>
            <tbody>{plan.versions.map(v=>(
              <tr key={v.n} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'7px 12px',fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700}}>v{v.n}</td>
                <td style={{padding:'7px 12px',fontSize:10.5,color:C.sub}}>{v.time}</td>
                <td style={{padding:'7px 12px',fontSize:11}}>Option {v.opt}</td>
                <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{v.floors}F</td>
                <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{fmt(v.gfa)}㎡</td>
                <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{fmt(v.moduleW)}</td>
                <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11}}>{fmt(v.total)}EA</td>
                <td style={{padding:'7px 12px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.amber}}>{won(v.estTotal)}</td>
              </tr>
            ))}</tbody></table>
          </div>
        )}
      </Step>
      </>}

      <ParcelModal open={showParcel} onCancel={()=>setShowParcel(false)} onAdd={addParcel} confmKey={FD.juso_confm_key||'TESTJUSOGOKR'} vworldKey={FD.vworld_key||''}
        onSetKey={k=>{if(setFD){setFD(d=>({...d,juso_confm_key:k}));toast('승인키를 등록했습니다 — 다시 검색해 보세요');}}}/>
    </div>
  );
}

/* AdminTab 외부 정의 — 내부 정의 시 렌더마다 컴포넌트 identity가 바뀌어 input 포커스·편집 버퍼가 초기화됨 */
const AdminSec=({title,sub,open,onToggle,children})=>(
  <div style={{border:`1px solid ${C.border}`,marginBottom:14,background:C.white}}>
    <button onClick={onToggle} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'12px 16px',background:'transparent',border:'none',cursor:'pointer'}}>
      <span style={{textAlign:'left'}}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.08em',color:C.ink}}>{title}</span>{sub&&<span style={{fontSize:10.5,color:C.light,marginLeft:8}}>{sub}</span>}</span>
      <IcoDn s={15} rot={open?180:0}/>
    </button>
    {open&&<div style={{padding:'4px 16px 18px',borderTop:`1px solid ${C.border}`}}>{children}</div>}
  </div>
);

/* ═══ ADMIN TAB ═══ 관리자 — 단가·계수 기준값 GUI 편집 */
function AdminTab({FD,setFD,toast,P,setP}){
  const [open,setOpen]=useState({energy:true,unit:false,raw:false,glass:false,skin:false,extra:false,disc:false,base:false,sam:false,api:false,vw:false,airender:false});
  const tog=k=>()=>setOpen(s=>({...s,[k]:!s[k]}));
  const upd=(path,value)=>{
    setFD(d=>{
      const next={...d,_placeholder:false};
      const keys=path.split('.');
      let cur=next;
      for(let i=0;i<keys.length-1;i++){cur[keys[i]]={...cur[keys[i]]};cur=cur[keys[i]];}
      cur[keys[keys.length-1]]=value;
      return next;
    });
  };
  const reset=()=>{
    if(!window.confirm('관리자 설정을 기본값으로 복원할까요?\n현재 변경한 값이 모두 사라집니다.'))return;
    setFD(FIT_DATA_DEFAULT);
    toast('관리자 설정을 기본값으로 복원했습니다');
  };
  const ef=FD.energy_factors||FIT_DATA_DEFAULT.energy_factors;
  const up=FD.unit_price||{};
  const rm=FD.raw_material||{};
  const gp=(FD.glass_price_preset&&FD.glass_price_preset['시장단가_중간'])||{};
  const dt=FD.discount_tiers||[];
  const bc=FD.base_construction||{per_pyeong:0,desc:''};
  const sm=FD.samoo_multiplier||{};
  const pct=(label,key,step)=>(
    <NF label={label} value={Math.round((ef[key]||0)*1000)/10} step={step||0.1} onChange={v=>upd(`energy_factors.${key}`,Math.round(v*10)/1000)} unit="%"/>
  );
  return(
    <div style={{maxWidth:1100,margin:'0 auto',padding:'28px 32px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6,flexWrap:'wrap',gap:10}}>
        <SH code="ADMIN" sub="관리자 — 단가·계수 기준값" tag="input"/>
        <button onClick={reset} style={{background:'transparent',color:C.red,border:`1px solid ${C.border}`,padding:'6px 14px',fontSize:11,cursor:'pointer'}}>기본값 복원</button>
      </div>
      <p style={{fontSize:11,color:C.sub,marginBottom:20,lineHeight:1.7}}>
        프로젝트 단가 산출과 에너지 절감 계산의 기준값을 편집합니다. 변경은 <b>즉시</b> 모든 탭의 결과에 반영되며 이 브라우저에 자동 저장됩니다. 다른 PC로 옮기려면 「저장」으로 fitproj.json 파일에 같이 보관하세요.
      </p>

      <AdminSec open={open.energy} onToggle={tog('energy')} title="에너지 절감 계수" sub="시뮬레이션 마진 효과 — 곱셈 중첩식에 투입">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:'14px 18px'}}>
          {pct('외피 — 일반 외부유리','env_std')}
          {pct('외피 — 고사양(일사차폐)','env_high')}
          {pct('공조카트리지','hvac')}
          {pct('GRID — 채광 센서','grid_daylight')}
          {pct('GRID — Dimming','grid_dimming')}
          {pct('OS — Sun Tracking','os_suntrack')}
          {pct('OS — Energy Monitoring','os_energy')}
        </div>
        <p style={{fontSize:10,color:C.light,marginTop:12,lineHeight:1.7}}>※ 기본값은 태평로빌딩 EnergyPlus(rev-05) 시뮬레이션 마진 효과 — 다른 건물에 적용 시 정밀 시뮬레이션으로 재교정 권장. Skin Cartridge 절감(%)은 카트리지 종류별로 별도 관리됩니다.</p>
      </AdminSec>

      <AdminSec open={open.unit} onToggle={tog('unit')} title="단위 단가 (UNIT PRICE)" sub="원자재·가공·관리이윤 계수">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'14px 18px'}}>
          <NF label="할증률 (배수)" value={up.할증률||1.05} step={0.01} onChange={v=>upd('unit_price.할증률',v)}/>
          <NF label="원자재 단가/kg" value={up.원자재_per_kg||8000} step={500} onChange={v=>upd('unit_price.원자재_per_kg',v)} unit="원"/>
          <NF label="AZON Loss 배수" value={up.azon_loss배수||1.3} step={0.05} onChange={v=>upd('unit_price.azon_loss배수',v)}/>
          <NF label="AZON 단가/m" value={up.azon_per_m||3000} step={500} onChange={v=>upd('unit_price.azon_per_m',v)} unit="원"/>
          <NF label="GASKET Loss 배수" value={up.gasket_loss배수||1.1} step={0.05} onChange={v=>upd('unit_price.gasket_loss배수',v)}/>
          <NF label="GASKET 단가/m" value={up.gasket_per_m||2000} step={500} onChange={v=>upd('unit_price.gasket_per_m',v)} unit="원"/>
          <NF label="가공비/kg" value={up.가공비_per_kg||3000} step={500} onChange={v=>upd('unit_price.가공비_per_kg',v)} unit="원"/>
          <NF label="관리이윤율" value={up.관리이윤율||0.15} step={0.01} onChange={v=>upd('unit_price.관리이윤율',v)}/>
        </div>
      </AdminSec>

      <AdminSec open={open.raw} onToggle={tog('raw')} title="원자재 단중·이름 (PROFILES)" sub="MPS 코드별 단위중량(kg/m)">
        <div style={{maxHeight:360,overflowY:'auto',overflowX:'auto',border:`1px solid ${C.border}`}}><table>
          <thead><tr style={{borderBottom:`1.5px solid ${C.ink}`,background:C.panel,position:'sticky',top:0}}>{['코드','이름','단위중량 (kg/m)'].map(h=><th key={h} style={{textAlign:'left',padding:'6px 10px',fontSize:10,color:C.sub,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.06em',fontWeight:400}}>{h}</th>)}</tr></thead>
          <tbody>
            {Object.entries(rm).map(([code,m])=>(
              <tr key={code} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'6px 10px',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.ink,width:100}}>{code}</td>
                <td style={{padding:'4px 10px'}}><input value={m.name||''} onChange={e=>upd(`raw_material.${code}`,{...m,name:e.target.value})} style={{width:'100%',border:'none',borderBottom:`1px solid ${C.border}`,background:'transparent',fontSize:11,color:C.ink,outline:'none',padding:'4px 0'}}/></td>
                <td style={{padding:'4px 10px',width:140}}><NumCell value={m.unit_weight||0} onChange={v=>upd(`raw_material.${code}`,{...m,unit_weight:v})}/></td>
              </tr>
            ))}
          </tbody>
        </table></div>
      </AdminSec>

      <AdminSec open={open.glass} onToggle={tog('glass')} title="시장단가 프리셋 (GLASS m²)" sub="유리 m²당 단가">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'14px 18px'}}>
          {['외부접합_13.52T','외부접합_17.52T','내부복층','단열시트','단판유리','진공단열패널'].map(k=>(
            <NF key={k} label={k.replace(/_/g,' ')} value={gp[k]||0} step={1000} onChange={v=>upd(`glass_price_preset.시장단가_중간.${k}`,v)} unit="원/㎡"/>
          ))}
        </div>
        <p style={{fontSize:10,color:C.light,marginTop:10,lineHeight:1.7}}>※ 현재는 단일 프리셋(시장단가_중간)을 사용합니다. 다중 프리셋(최저/중간/최고)은 추후 확장 예정.</p>
      </AdminSec>

      <AdminSec open={open.skin} onToggle={tog('skin')} title="스킨카트리지 단가 (SKIN CARTRIDGE)" sub="종류별 대당 단가">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'14px 18px'}}>
          {SKIN_CARTS.map(c=>(
            <NF key={c.id} label={`${c.label} (D${c.minD}~${c.maxD})`} value={skinP(c,FD)} step={100000} onChange={v=>upd(`skin_prices.${c.id}`,v)} unit="원/대"/>
          ))}
        </div>
        <p style={{fontSize:10,color:C.light,marginTop:10,lineHeight:1.7}}>※ SKIN 탭·PLAN 탭의 표시 단가와 견적 산출(존별 수량 × 단가)에 즉시 반영됩니다. 차양효과(%)는 에너지 절감 계수와 별도 관리됩니다.</p>
      </AdminSec>

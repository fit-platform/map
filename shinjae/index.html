        <div style={{display:'flex',gap:14,minWidth:520}}>
          {steps.map((st,i)=><span key={i} style={{flex:1,textAlign:'center',fontSize:9.5,color:i===0?C.sub:st.col,fontFamily:FF.mono,letterSpacing:'.02em',lineHeight:1.35,wordBreak:'keep-all',minWidth:54}}>{st.label}</span>)}
          <span style={{flex:1,textAlign:'center',fontSize:9.5,color:C.green,fontFamily:FF.mono,fontWeight:700,lineHeight:1.35,minWidth:60}}>FIT 적용</span>
        </div>
      </div>

      {/* FORMULA */}
      <SH code="METHODOLOGY" sub="산정 공식"/>
      <div style={{background:C.ink,color:C.white,padding:'20px 24px',marginBottom:28,fontFamily:FF.mono}}>
        <p style={{fontSize:11,color:'#aaa',marginBottom:12,letterSpacing:'.04em'}}>// 절감률 = 1 − (1−외피)(1−차양−OS)(1−공조)(1−조명)</p>
        <p style={{fontSize:14,lineHeight:1.9}}>
          절감률 = 1 − (1−<span style={{color:C.blue,filter:'brightness(2)'}}>{(envFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:C.amber,filter:'brightness(2.2)'}}>{(shadeFac*100).toFixed(1)}%</span>−<span style={{color:'#ccc'}}>{(osFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:C.green,filter:'brightness(2)'}}>{(hvacFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:'#b89adb'}}>{(gridFac*100).toFixed(1)}%</span>)
        </p>
        <p style={{fontSize:20,marginTop:14,color:C.green,filter:'brightness(1.6)'}}>= {pct(agg.savedFrac)}</p>
        <p style={{fontSize:10,color:'#888',marginTop:12,lineHeight:1.7}}>* 곱셈 중첩 방식: 단순 합산이 아닌 중첩 보정으로 100%를 초과하지 않으며 실제 누적 효과를 반영합니다.<br/>* 연간 절감 에너지 = 기준 EUI({C_.E.eui} kWh/㎡·년) × 전용면적 × 절감률</p>
      </div>

      {/* SYSTEM CARDS */}
      <SH code="SYSTEM CONTRIBUTION" sub="시스템별 절감 메커니즘"/>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {systems.map(s=>(
          <div key={s.code} style={{display:'flex',gap:18,padding:'16px 18px',border:`1px solid ${C.border}`,opacity:s.on?1:0.4,background:s.on?C.white:C.panel}}>
            <div style={{width:90,flexShrink:0,borderRight:`1px solid ${C.border}`,paddingRight:18}}>
              <span style={{display:'block',fontFamily:FF.disp,fontSize:14,letterSpacing:'.06em',color:s.col}}>{s.code}</span>
              <span style={{display:'block',fontSize:10.5,color:C.sub,marginTop:1}}>{s.ko}</span>
              <span style={{display:'block',fontFamily:FF.disp,fontSize:28,color:s.on?s.col:C.light,marginTop:8}}>-{(s.fac*100).toFixed(1)}%</span>
            </div>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:C.sub,lineHeight:1.7}}>{s.mech}</p>
              {!s.on&&<p style={{fontSize:11,color:C.red,marginTop:6}}>※ 현재 미적용 — 해당 탭에서 활성화하면 절감 효과가 반영됩니다.</p>}
            </div>
          </div>
        ))}
      </div>

      <p style={{fontSize:11,color:C.light,marginTop:24,lineHeight:1.7}}>
        ※ 절감 계수는 태평로빌딩 EnergyPlus 시뮬레이션 기준으로 보정된 값이며, 다른 건물·기후대·운전 시나리오에 적용할 때는 별도 정밀 시뮬레이션으로 재교정하는 것이 권장됩니다. 기준 EUI 250 kWh/㎡·년은 시뮬레이션의 스마트 합리화 모델 값으로, 프로젝트별 기준값은 PLATFORM 탭에서 조정 가능합니다.
      </p>
    </div>
  );
}

/* 대상지 주소 → 임대권역 id 자동 매핑 (기준 임대료 책정용). 못 찾으면 null */
function regionFromAddress(addr){
  const s=String(addr||'');
  if(!s.trim())return null;
  if(/서울/.test(s)){
    if(/(강남|서초|역삼|삼성동|논현|대치|개포|양재|도곡|청담|압구정)/.test(s))return'sel_gbd';
    if(/(여의도|영등포)/.test(s))return'sel_ybd';
    if(/(종로|중구|을지로|광화문|시청|명동|충정로|서대문|회현|북창)/.test(s))return'sel_cbd';
    return'sel_etc';
  }
  if(/(분당|판교)/.test(s))return'bundang';
  if(/(부산|대구|대전|광주|울산|세종|광역시)/.test(s))return'metro';
  if(/(경기|인천|수원|용인|고양|성남|안양|부천|화성|평택|시흥|김포|광명|군포|의왕|하남|남양주|의정부|안산|파주|구리|오산)/.test(s))return'gyeonggi';
  if(/(도|시|군|읍|면)/.test(s))return'local';
  return null;
}

/* LCC 가치 기반 분석 — 비용(에너지·유지) + 부동산 편익(공조실 제거 임대면적·인증 프리미엄) + 비교기준 현실화(관행 공조설비 대체). LccTab·PlatformTab 공용. addr=대상지 주소(지역 자동 책정) */
function lccAnalyze(agg,lp,Pc,FD,addr){
  lp=lp||{}; Pc=Pc||{};
  const lease=(FD&&FD.lease)||FIT_DATA_DEFAULT.lease;
  const yrs=Math.max(5,Math.min(50,Math.round(lp.lccYears??30)));
  const r=Math.max(0,(lp.lccDiscount??3))/100;
  const esc=Math.max(0,(lp.lccEnergyEsc??2))/100;
  const maintR=Math.max(0,(lp.lccMaintRate??1.0))/100;
  const totalM2=agg.totalM2||0;
  const bz=lp.lccBenefits||{energy:true,area:true,cert:true,equip:true};
  const convCW=Math.round(agg.conventional||0);
  const convHvacRate=(lp.convHvac==='ehp_erv')?(Pc.pEhp||250000):(Pc.pCentral||300000);
  const convHvacCost=Math.round(totalM2*convHvacRate);
  const equipCredit=bz.equip!==false?convHvacCost:0;
  const convInit=convCW+equipCredit;
  const fitInit=Math.round(agg.execTotal||0);
  const netPremium=fitInit-convInit;
  const maintDiff=netPremium*maintR;
  const regionAuto=(!lp.leaseRegion||lp.leaseRegion==='auto');
  const regId=regionAuto?(regionFromAddress(addr)||'sel_etc'):lp.leaseRegion;
  const reg=lease.regions.find(x=>x.id===regId)||lease.regions[0];
  const useId=lp.leaseUse||'office';
  const baseRent=(reg&&(reg[useId]||reg.office))||0;
  const ageF=((lease.ageFactors||[]).find(a=>(lp.leaseAge||0)<=a.maxAge)||{f:1}).f;
  const rent=baseRent*ageF;
  const vac=1-(lease.vacancy||0);
  const nra=lease.nra_ratio||0.65;
  const rentableM2=totalM2*nra;
  const energyAnnual=bz.energy!==false?(agg.annualSave||0):0;
  const cartCount=agg.hvacN||0;                                                    /* 공조카트리지 대수(=FIT 적용 존수) */
  const areaPerCart=(lp.areaPerCart!=null&&lp.areaPerCart!=='')?Number(lp.areaPerCart):(lease.area_per_cart||8.75);
  const areaGainM2=cartCount*areaPerCart;                                          /* 공조카트리지 1대당 전용면적 증가 × 대수 */
  const rentGainAnnual=bz.area!==false?areaGainM2*rent*12*vac:0;
  const cpAuto=(lease.certPremium||{})[lp.cert||'none']||0;
  const cp=(lp.certPremiumPct!=null&&lp.certPremiumPct!=='')?(Math.max(0,Number(lp.certPremiumPct))/100):cpAuto;  /* 임대료 프리미엄 — 직접입력(%) 우선, 없으면 인증 매핑 */
  const rentPremAnnual=bz.cert!==false?rentableM2*rent*12*vac*cp:0;
  const annualBenefit=energyAnnual+rentGainAnnual+rentPremAnnual;
  let cum=-netPremium, npv=-netPremium, pay=(netPremium<=0?0:null);
  const series=[{y:0,cum}];
  for(let t=1;t<=yrs;t++){const k=Math.pow(1+esc,t-1);const b=annualBenefit*k-maintDiff;cum+=b;npv+=b/Math.pow(1+r,t);series.push({y:t,cum});if(pay===null&&cum>=0)pay=t;}
  return {lease,yrs,r,esc,maintR,totalM2,bz,convCW,convHvacRate,convHvacCost,equipCredit,convInit,fitInit,netPremium,maintDiff,reg,useId,baseRent,ageF,rent,vac,nra,rentableM2,energyAnnual,cartCount,areaPerCart,areaGainM2,rentGainAnnual,cp,rentPremAnnual,annualBenefit,cum,npv,pay,series,regionAuto,regId,hasData:(totalM2>0&&fitInit>0)};
}

function LccTab({zones,frames,f,crt,grd,os,E,P,FD,committed}){
  const C_=committed||{zones,frames,crt,grd,os,E,P};
  const agg=useMemo(()=>zoneAgg(C_.zones,C_.floorZones,C_.frames,C_.crt,C_.grd,C_.os,C_.E,C_.P,FD,C_.zonePer),[committed,FD]);
  const lp=C_.E||E||{};
  const Pc=C_.P||P||{};
  const A=lccAnalyze(agg,lp,Pc,FD,(C_.overview&&C_.overview.location)||'');
  const {lease,yrs,r,esc,maintR,totalM2,bz,convCW,convHvacRate,equipCredit,convInit,fitInit,netPremium,reg,useId,rent,ageF,vac,nra,energyAnnual,areaGainM2,rentGainAnnual,cp,rentPremAnnual,annualBenefit,regionAuto}=A;
  const siteAddr=(C_.overview&&C_.overview.location)||'';
  const hasData=A.hasData;
  const L={series:A.series,cum:A.cum,npv:A.npv,pay:A.pay};

  const wd=v=>(v<0?'−':'')+won(Math.abs(Math.round(v||0)));
  const fmtY=v=>{const a=Math.abs(v);const s=v<0?'−':'';return a>=1e8?s+(a/1e8).toLocaleString(undefined,{maximumFractionDigits:1})+'억':s+Math.round(a/1e4).toLocaleString()+'만';};

  /* 차트(누적 순현금흐름) */
  const CW=760,CH=300,padL=70,padR=22,padT=18,padB=36;
  const plotW=CW-padL-padR, plotH=CH-padT-padB;
  const vals=L.series.map(p=>p.cum);
  const minV=Math.min(0,...vals), maxV=Math.max(0,...vals), span=(maxV-minV)||1;
  const xAt=t=>padL+plotW*(t/yrs);
  const yAt=v=>padT+plotH*(1-(v-minV)/span);
  const y0=yAt(0);
  const linePts=L.series.map(p=>`${xAt(p.y).toFixed(1)},${yAt(p.cum).toFixed(1)}`).join(' ');
  const areaPts=`${padL},${y0.toFixed(1)} ${linePts} ${xAt(yrs).toFixed(1)},${y0.toFixed(1)}`;
  const yticks=Array.from({length:5},(_,i)=>minV+span*i/4);
  const xStep=yrs<=15?5:10; const xticks=[]; for(let t=0;t<=yrs;t+=xStep)xticks.push(t); if(xticks[xticks.length-1]!==yrs)xticks.push(yrs);

  const payTxt=L.pay===0?'즉시':(L.pay!=null?`${L.pay}년`:'기간 내 미회수');
  const cards=[
    {l:'순 추가투자 (FIT−관행)',v:wd(netPremium),s:netPremium<=0?'초기부터 FIT 유리':`관행 ${won(convInit)} → FIT ${won(fitInit)}`,col:netPremium<=0?C.green:C.amber},
    {l:'연간 총편익',v:won(annualBenefit),s:`에너지+임대+프리미엄 (1년차)`,col:C.green},
    {l:'투자 회수 시점',v:payTxt,s:L.pay!=null?'누적 순편익 ≥ 0':'편익 합계 부족',col:L.pay!=null?C.green:C.sub},
    {l:`순현재가치 NPV (${yrs}년)`,v:wd(L.npv),s:`명목 누적 ${wd(L.cum)}`,col:L.npv>0?C.green:C.red},
  ];
  const benefitRows=[
    ['에너지 절감',energyAnnual,'냉난방·조명 절감액',bz.energy!==false],
    ['임대면적 증가수익',rentGainAnnual,`카트리지 ${fmt(A.cartCount)}대 × ${A.areaPerCart}㎡ = +${Math.round(areaGainM2).toLocaleString()}㎡`,bz.area!==false],
    ['인증·공간품질 프리미엄',rentPremAnnual,`${({none:'미적용',leed:'LEED',well:'WELL',both:'LEED+WELL'})[lp.cert||'none']} · 임대료 +${(cp*100).toFixed(0)}%`,bz.cert!==false],
  ];
  const initRows=[
    ['커튼월/외피',convCW,fitInit],
    ['공조설비 (관행) / 분산공조(FIT 포함)',equipCredit,0],
  ];

  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="LCC" sub="생애주기비용 — 비용·부동산 가치 통합 분석" tag="result"/>
      <p style={{fontSize:13,color:C.sub,marginBottom:8,lineHeight:1.8}}>
        에너지 절감만으로는 투자 회수에 한계가 있어, FIT의 <b style={{color:C.ink}}>부동산 가치 편익</b>을 함께 반영합니다 —
        분산공조로 <b style={{color:C.ink}}>공조실(기계실)을 제거</b>해 임대면적이 늘고, <b style={{color:C.ink}}>LEED·WELL 등 인증·공간품질</b>로 임대료 프리미엄이 발생합니다.
        초기비는 FIT가 <b style={{color:C.ink}}>관행 공조설비(중앙공조/EHP+ERV)를 대체</b>하는 점을 반영해 비교합니다. (가정값은 PLAN·ADMIN에서 조정)
      </p>

      {!hasData?(
        <div style={{padding:'16px 18px',borderRadius:12,background:C.panel,border:`1px solid ${C.border}`,fontSize:12.5,color:C.sub,lineHeight:1.7}}>
          LCC 산정에 필요한 데이터가 아직 없습니다 — <b>PLAN 탭</b>에서 층구간·존(모듈)과 에너지·임대 가정을 입력하면 자동 산정됩니다.
        </div>
      ):(<>
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',background:C.blueLt,border:`1px solid ${C.blue}`,borderRadius:13,padding:'12px 16px',marginTop:16}}>
          <span style={{fontSize:11,fontWeight:700,color:C.blue,letterSpacing:'.02em'}}>기준 임대료</span>
          <span style={{fontSize:12.5,color:C.ink}}>{regionAuto?'🎯 대상지 자동':'수동 선택'} · <b>{reg?reg.name:'-'}</b> · {({office:'업무시설',knowledge:'지식산업센터',retail:'근린·리테일'})[useId]||useId}{ageF!==1?` · 준공경과 ×${ageF}`:''}</span>
          <span style={{marginLeft:'auto',fontFamily:FF.mono,fontSize:17,fontWeight:700,color:C.blue}}>{fmt(Math.round(rent)).toLocaleString()}<span style={{fontSize:10,color:C.sub,fontWeight:400}}> 원/㎡·월</span></span>
        </div>
        {regionAuto&&!siteAddr&&<p style={{fontSize:10.5,color:C.amber,margin:'8px 0 0'}}>※ 대상지 주소가 없어 기본권역으로 책정 중입니다 — PLATFORM 탭 「대지위치」에 주소를 입력하면 해당 지역 임대료로 자동 책정됩니다.</p>}
        {regionAuto&&siteAddr&&<p style={{fontSize:10,color:C.light,margin:'8px 0 0'}}>대상지 「{siteAddr}」 기준 자동 책정 · 권역/임대료를 직접 지정하려면 PLAN 탭에서 지역을 선택하세요.</p>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:10,margin:'16px 0 22px'}}>
          {cards.map(k=>(
            <div key={k.l} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px 16px'}}>
              <Lbl ch={k.l}/>
              <div style={{fontFamily:FF.disp,fontWeight:700,fontSize:23,letterSpacing:'-.02em',color:k.col,lineHeight:1.1,marginTop:2}}>{k.v}</div>
              <div style={{fontSize:10.5,color:C.light,marginTop:5,fontFamily:FF.mono}}>{k.s}</div>
            </div>
          ))}
        </div>

        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:16,padding:'16px 18px 8px',marginBottom:22}}>
          <div style={{display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap',marginBottom:6}}>
            <span style={{fontFamily:FF.disp,fontWeight:700,fontSize:14,letterSpacing:'-.01em',color:C.ink}}>누적 순편익 곡선</span>
            <span style={{fontSize:10.5,color:C.light}}>FIT 대비 관행 · 0선 교차 = 투자 회수 · 단위 원</span>
            <span style={{marginLeft:'auto',fontSize:11,color:C.sub}}>연 {(esc*100).toFixed(1)}% 상승 가정</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <svg viewBox={`0 0 ${CW} ${CH}`} style={{width:'100%',minWidth:560,height:'auto',display:'block'}}>
              {yticks.map((v,i)=>(
                <g key={i}>
                  <line x1={padL} y1={yAt(v)} x2={CW-padR} y2={yAt(v)} stroke={C.hair||'#e5e5ea'} strokeWidth="1"/>
                  <text x={padL-8} y={yAt(v)+3} textAnchor="end" fontSize="9" fontFamily={FF.mono} fill={C.light}>{fmtY(v)}</text>
                </g>
              ))}
              {xticks.map(t=>(<text key={t} x={xAt(t)} y={CH-padB+18} textAnchor="middle" fontSize="9" fontFamily={FF.mono} fill={C.light}>{t}년</text>))}
              <line x1={padL} y1={y0} x2={CW-padR} y2={y0} stroke={C.borderDark} strokeWidth="1.2"/>
              <polygon points={areaPts} fill={C.green} opacity="0.08"/>
              <polyline points={linePts} fill="none" stroke={C.green} strokeWidth="2.4" strokeLinejoin="round"/>
              {L.pay!=null&&L.pay>0&&(
                <g>
                  <line x1={xAt(L.pay)} y1={padT} x2={xAt(L.pay)} y2={padT+plotH} stroke={C.green} strokeWidth="1" strokeDasharray="3 3"/>
                  <circle cx={xAt(L.pay)} cy={y0} r="4" fill={C.green}/>
                  <text x={xAt(L.pay)} y={padT-4} textAnchor="middle" fontSize="9.5" fontWeight="700" fontFamily={FF.mono} fill={C.green}>회수 {L.pay}년</text>
                </g>
              )}
            </svg>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,alignItems:'start'}}>

/* ═══ AI 렌더 — Gemini(gemini-2.5-flash-image, 기본) / OpenAI(gpt-image-1) ═══ */
async function aiRenderImage(prompt,key,size,provider,baseB64){
  if((provider||'gemini')==='gemini'){
    const parts=[];
    if(baseB64)parts.push({inlineData:{mimeType:'image/png',data:baseB64}});
    parts.push({text:prompt});
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key='+encodeURIComponent(key),{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts}],generationConfig:{responseModalities:['IMAGE','TEXT']}})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||'Gemini 오류');
    const rparts=(((d.candidates||[])[0]||{}).content||{}).parts||[];
    const img=rparts.find(q=>q.inlineData&&q.inlineData.data);
    if(!img){const t=rparts.find(q=>q.text);throw new Error('이미지가 반환되지 않았습니다'+(t?' — '+t.text.slice(0,140):' (안전필터/한도 가능성)'));}
    return 'data:'+(img.inlineData.mimeType||'image/png')+';base64,'+img.inlineData.data;
  }
  const r=await fetch('https://api.openai.com/v1/images/generations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-image-1',prompt,size:size||'1536x1024',n:1})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'OpenAI 오류');
  const b=(d.data&&d.data[0])||{};
  return b.b64_json?('data:image/png;base64,'+b.b64_json):(b.url||'');
}
function renderPrompts(opt,fit,use,site,hasBase){
  const sk=(SKIN_CARTS.find(c=>c.id===fit.skinType)||{}).en||'motorized louver';
  const faces=FACES.filter(f=>fit.faces&&fit.faces[f.id]).map(f=>({F:'front (main road side)',R:'right',B:'rear',L:'left'}[f.id]||f.ko)).join(', ')||'front';
  const hM=Math.round((opt.floors||1)*(opt.floorH||4500)/1000);
  const loc=(site&&site.addr)?` on a site at ${site.addr}, South Korea`:'';
  const ctx=`a ${opt.floors}-story (${hM}m tall) ${use||'office'} building${loc}`;
  const spec=`double-skin facade (FIT frame curtain wall) with ${sk} on the ${faces} facade(s), ${fit.depth}mm ventilated cavity`;
  const guide=hasBase?' Use the provided massing/site diagram as the EXACT building footprint shape, proportion, height and placement — render it photorealistically, do not invent a different form.':'';
  return{

function projectResults(p){
  try{
    const frames=asFrames(p);
    const agg=zoneAgg(p.zones,p.floorZones,frames,p.crt,p.grd,p.os,p.E,p.P,p.FD,p.zonePer);
    const L=costLines(p.zones,p.floorZones,frames,p.crt,p.grd,p.os,p.P,p.FD,p.zonePer);
    const modules=p.zones.reduce((s,z)=>s+(z.moduleCount||0),0);
    const m2=agg.totalM2||0;
    return {total:L.execTotal,frameGlass:L.frameGlassTotal,conventional:L.conventional,addInvest:Math.max(0,L.execTotal-L.conventional),
      savedFrac:agg.savedFrac,annualSave:agg.annualSave,co2:agg.co2,payback:agg.payback,baseline:agg.baseline,optimized:agg.optimized,
      modules,m2,zoneCount:agg.zoneCount,perM2:m2>0?L.execTotal/m2:0};
  }catch(e){return null;}
}
function projectOverview(p){
  const frames=asFrames(p);
  const modules=p.zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  const m2=(Array.isArray(p.floorZones)?p.floorZones:[]).reduce((a,g)=>a+Math.max(0,g.areaM2||0)*Math.max(1,(g.to||1)-(g.from||1)+1),0);
  const sys=[p.crt.hasSkin&&'차양',p.crt.hasHvac&&'공조',p.grd.hasGrid&&'조명',p.os.hasOs&&'OS'].filter(Boolean).join('·')||'외피만';
  const ov=p.overview||{};
  return {modules,m2,sys,zones:p.zones.length,types:frames.length,building:ov.building||'',use:ov.use||''};
}

/* ═══ PLAN — 계획안 자동 생성 (기획서 v0.2 MVP 1차) ═══
   원칙: 렌더 이미지가 아닌 파라메트릭 Planning Model이 기준 (기획서 6장·15장).
   수량·견적은 모델 변경 시 준실시간 갱신, 렌더는 「다시 렌더하기」 클릭 시에만 재생성 (9장). */
/* 용도지역별 건폐율·용적률 법정 상한 (국토계획법 시행령 — 지자체 조례로 강화/완화 가능, 참고치) */
function jusoSanitize(kw){
  let s=String(kw||'').replace(/[%=><\[\]]/g,'');
  ['OR','SELECT','INSERT','DELETE','UPDATE','CREATE','DROP','EXEC','UNION','FETCH','DECLARE','TRUNCATE'].forEach(w=>{
    s=s.replace(new RegExp('\\b'+w+'\\b','gi'),'');
  });
  return s.trim();
}
function jusoSearch(keyword,page,confmKey,onOk,onErr){
  const kw=jusoSanitize(keyword);
  if(!kw){onErr('검색어를 입력하세요 (특수문자·SQL 예약어 제외).');return;}
  const cbName='__jusoCb'+Date.now()+'_'+Math.floor(Math.random()*1e5);
  let done=false;
  const sc=document.createElement('script');
  const cleanup=()=>{try{delete window[cbName];}catch(e){}if(sc.parentNode)sc.parentNode.removeChild(sc);};
  window[cbName]=(data)=>{
    done=true;cleanup();
    try{
      const c=data.results.common;
      if(c.errorCode!=='0'){onErr(c.errorCode+': '+c.errorMessage);return;}
      onOk({total:parseInt(c.totalCount,10)||0,list:data.results.juso||[]});
    }catch(e){onErr('응답 해석 실패: '+e.message);}
  };
  sc.src='https://business.juso.go.kr/addrlink/addrLinkApiJsonp.do?currentPage='+page
    +'&countPerPage=10&resultType=json&confmKey='+encodeURIComponent(confmKey||'TESTJUSOGOKR')
    +'&keyword='+encodeURIComponent(kw)+'&callback='+cbName;
  sc.onerror=()=>{if(!done){done=true;cleanup();onErr('API 호출 실패 — 네트워크/방화벽을 확인하세요.');}};
  setTimeout(()=>{if(!done){done=true;cleanup();onErr('응답 시간 초과 (10초)');}},10000);
  document.body.appendChild(sc);
}

/* ═══ V-WORLD 연속지적도 — 필지 경계·지목·용도지역 자동 조회 (JSONP — 백엔드 불필요) ═══
   req/data는 JSONP(callback) 지원. ned/data(토지대장)는 JSONP 미지원 → 공부상 면적은 미연동,
   경계 폴리곤에서 계산한 면적을 참고치로 제시한다 (연속지적도는 측량 성과가 아님). */
function vworldData(params,onOk,onErr){
  const cbName='__vwCb'+Date.now()+'_'+Math.floor(Math.random()*1e5);
  let done=false;
  const sc=document.createElement('script');
  const cleanup=()=>{try{delete window[cbName];}catch(e){}if(sc.parentNode)sc.parentNode.removeChild(sc);};
  window[cbName]=(data)=>{
    done=true;cleanup();
    try{
      const r=data.response||{};
      if(r.status==='NOT_FOUND'){onOk(null);return;}
      if(r.status!=='OK'){
        const code=r.error&&r.error.code,text=(r.error&&r.error.text)||r.status||'알 수 없는 오류';
        onErr(code==='INCORRECT_KEY'
          ?'V-World 키가 거부되었습니다 — vworld.kr 마이페이지 → 인증키 관리에서 활용 API에 「데이터 API」를 추가하세요 (ADMIN 탭에서 키 교체 가능).'
          :'V-World 오류: '+text);
        return;
      }
      onOk((r.result&&r.result.featureCollection)||null);
    }catch(e){onErr('응답 해석 실패: '+e.message);}
  };
  const qs=Object.entries({service:'data',request:'GetFeature',format:'json',crs:'EPSG:4326',size:10,...params,callback:cbName})
    .map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  sc.src='https://api.vworld.kr/req/data?'+qs;
  sc.onerror=()=>{if(!done){done=true;cleanup();onErr('V-World API 호출 실패 — 네트워크/방화벽을 확인하세요.');}};
  setTimeout(()=>{if(!done){done=true;cleanup();onErr('V-World 응답 시간 초과 (12초)');}},12000);
  document.body.appendChild(sc);
}

/* 행안부 주소검색 결과 1건 → PNU 19자리 (법정동코드10 + 산구분1 + 본번4 + 부번4) */
function jusoPNU(j){
  if(!j||!j.admCd)return'';
  const bon=String(parseInt(j.lnbrMnnm||'0',10)||0).padStart(4,'0');
  const bu=String(parseInt(j.lnbrSlno||'0',10)||0).padStart(4,'0');
  return j.admCd+(j.mtYn==='1'?'2':'1')+bon+bu;
}

/* WGS84 링 면적(㎡) — 구면 근사 */
function vwRingArea(ring){
  const R=6378137,rad=Math.PI/180;let a=0;
  for(let i=0;i<ring.length;i++){
    const p1=ring[i],p2=ring[(i+1)%ring.length];
    a+=(p2[0]-p1[0])*rad*(2+Math.sin(p1[1]*rad)+Math.sin(p2[1]*rad));
  }
  return Math.abs(a*R*R/2);
}

/* FeatureCollection → {areaM2, rings(외곽링 배열), bbox, center, widthM, depthM} */
function vwGeomStats(fc){
  const rings=[];let area=0;
  ((fc&&fc.features)||[]).forEach(f=>{
    const g=f.geometry;if(!g)return;
    const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
    polys.forEach(rs=>rs.forEach((r,i)=>{const a=vwRingArea(r);area+=i===0?a:-a;if(i===0)rings.push(r);}));
  });
  if(!rings.length)return null;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  rings.forEach(r=>r.forEach(p=>{if(p[0]<minX)minX=p[0];if(p[1]<minY)minY=p[1];if(p[0]>maxX)maxX=p[0];if(p[1]>maxY)maxY=p[1];}));
  const midLat=(minY+maxY)/2;
  return{areaM2:area,rings,bbox:[minX,minY,maxX,maxY],center:[(minX+maxX)/2,midLat],
    widthM:(maxX-minX)*111320*Math.cos(midLat*Math.PI/180),depthM:(maxY-minY)*110540};
}

/* 필지 경계 형상 SVG — 경위도 링을 로컬 미터 좌표로 투영해 그림 (지도 라이브러리 불필요) */
/* Web Mercator 타일 좌표 변환 */

  const pick=j=>{onChange(j.roadAddr||j.roadAddrPart1||'');setRes(null);setErr('');if(onPick)onPick(j);};

        <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:300,maxHeight:200,overflowY:'auto',background:C.white,border:`1.5px solid ${C.ink}`,boxShadow:'0 8px 22px rgba(0,0,0,.18)'}}>

/* ═══ NEW PROJECT MODAL ═══ */
function NewProjectModal({open,onCancel,onStart,confmKey,vworldKey}){
  const [v,setV]=useState({projectName:'신규 프로젝트',building:'',location:'',siteArea:'',use:'업무시설',floorsAbove:'',floorsBelow:'',height:'',gfa:'',client:'',architect:'',note:''});
  const [siteQ,setSiteQ]=useState(null); /* 지적도 조회 상태 {state:'loading'|'ok'|'err',msg,jimok,useZone} */
  if(!open)return null;
  const NUMK=['gfa','floorsAbove','floorsBelow','height','siteArea'];
  /* 주소 선택 → PNU → 연속지적도 경계 → 계산면적을 대지면적에 자동 입력 (ParcelModal과 동일 파이프라인) */
  const lookupSite=(j)=>{
    const pnu=jusoPNU(j);
    if(!pnu||!vworldKey){setSiteQ(null);return;}
    setSiteQ({state:'loading'});
    vworldData({data:'LP_PA_CBND_BUBUN',key:vworldKey,attrFilter:'pnu:=:'+pnu},fc=>{
      const st=fc&&vwGeomStats(fc);
      if(!st){setSiteQ({state:'err',msg:'해당 지번의 지적도 경계를 찾지 못했습니다 — 면적을 직접 입력하세요.'});return;}
      const props=(fc.features[0]&&fc.features[0].properties)||{};
      const jimok=((props.jibun||'').match(/[가-힣]+$/)||[''])[0];
      setSiteQ({state:'ok',jimok,useZone:''});
      setV(s=>({...s,siteArea:String(Math.round(st.areaM2*10)/10)}));
      vworldData({data:'LT_C_UQ111',key:vworldKey,geomFilter:`POINT(${st.center[0]} ${st.center[1]})`},fz=>{
        const u=(fz&&fz.features&&fz.features[0]&&fz.features[0].properties&&fz.features[0].properties.uname)||'';
        if(u)setSiteQ(q=>q&&q.state==='ok'?{...q,useZone:u}:q);
      },()=>{});
    },m=>setSiteQ({state:'err',msg:m}));
  };
  const set=k=>e=>{
    const next=NUMK.includes(k)?e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,''):e.target.value;
    setV(s=>({...s,[k]:next}));
  };
  const TF=(k,label,unit)=>{
    const isN=NUMK.includes(k);
    const raw=v[k]==null?'':String(v[k]);

/* ═══ APPLY BAR ═══ footer 바로 위에 상시 fixed — 변경사항 적용/되돌리기 */
function ApplyBar({dirty,onApply,onRevert,label,live,lcc}){

      </span>
      {live&&<div style={{display:'flex',gap:15,alignItems:'center',flexWrap:'wrap',marginLeft:'auto',marginRight:16}}>
        {[
          ['추가공사비', lcc?wd(lcc.netPremium):'-', C.amber],
          ['에너지절감률', pct(live.savedFrac), C.green],
          ['에너지절감액', won(live.annualSave), C.green],
          ['임대프리미엄', lcc?won((lcc.rentGainAnnual||0)+(lcc.rentPremAnnual||0)):'-', C.green],
          ['투자회수', lcc?(lcc.pay===0?'즉시':(lcc.pay!=null?lcc.pay+'년':'미회수')):'-', C.ink]
        ].map(([k,v,col])=>(
          <span key={k} style={{display:'flex',flexDirection:'column',lineHeight:1.2}}><span style={{fontSize:8.5,color:C.light,letterSpacing:'.06em'}}>{k}{dirty?' (실시간)':''}</span><span style={{fontFamily:FF.disp,fontWeight:700,fontSize:14.5,letterSpacing:'-.01em',color:col}}>{v}</span></span>
        ))}
      </div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onRevert} disabled={!dirty} style={{padding:'7px 16px',fontSize:12,fontWeight:500,borderRadius:980,border:`1px solid ${C.border}`,background:C.white,color:C.sub,opacity:dirty?1:0.4,cursor:dirty?'pointer':'not-allowed',transition:'all .18s ease'}}>되돌리기</button>
        <button onClick={onApply} disabled={!dirty} style={{padding:'7px 24px',fontSize:12.5,fontWeight:600,fontFamily:FF.disp,letterSpacing:'-.005em',borderRadius:980,border:'none',background:dirty?C.blue:C.gray,color:dirty?C.white:C.light,cursor:dirty?'pointer':'not-allowed',transition:'all .18s ease'}}>적용 APPLY</button>
      </div>
    </div>
  );
}

function FitPlatform(){
  const _dp=defaultProject();

  const [activeFrameId,setActiveFrameId]=useState(_dp.frames[0].id);
  const [overview,setOverview]=useState(_dp.overview);
  const [crt,setCrt]=useState(_dp.crt);

  const [E,setE]=useState(_dp.E);

  const [FD,setFD]=useState(()=>{

      if(!parsed.juso_confm_key||parsed.juso_confm_key==='TESTJUSOGOKR'||parsed.juso_confm_key==='devU01TX0FVVEgyMDI2MDYxMDE2MTI0OTExOTAzNzM=')parsed.juso_confm_key=FIT_DATA_DEFAULT.juso_confm_key;
      if(!parsed.vworld_key)parsed.vworld_key=FIT_DATA_DEFAULT.vworld_key; /* V-World 키 — 구버전 FD에 없으면 기본키 주입 */
      if(parsed.samwoo_multiplier&&!parsed.samoo_multiplier)parsed.samoo_multiplier=parsed.samwoo_multiplier; /* 구키 마이그레이션 */
      /* 재보정 버전 게이트 — 구버전 저장 FD는 단가/원자재/유리/실행률을 새 기준선으로 강제 채택, 사용자 키·계수는 보존 */
      if((parsed._calib_ver||0)<(FIT_DATA_DEFAULT._calib_ver||0)){
        return {...FIT_DATA_DEFAULT,
          juso_confm_key:parsed.juso_confm_key,vworld_key:parsed.vworld_key,
          ai_provider:parsed.ai_provider||FIT_DATA_DEFAULT.ai_provider,ai_gemini_key:parsed.ai_gemini_key||'',ai_image_key:parsed.ai_image_key||'',
          energy_factors:{...FIT_DATA_DEFAULT.energy_factors,...(parsed.energy_factors||{})},
          base_construction:{...FIT_DATA_DEFAULT.base_construction,...(parsed.base_construction||{})}};
      }
      return {...FIT_DATA_DEFAULT,...parsed,energy_factors:{...FIT_DATA_DEFAULT.energy_factors,...(parsed.energy_factors||{})},base_construction:{...FIT_DATA_DEFAULT.base_construction,...(parsed.base_construction||{})},skin_prices:{...FIT_DATA_DEFAULT.skin_prices,...(parsed.skin_prices||{})}};}}catch{}
    return FIT_DATA_DEFAULT;
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_admin_fd_v1',JSON.stringify(FD));}catch{}
  },[FD]);
  const [projectName,setProjectName]=useState('신규 프로젝트');
  /* 프로젝트 리스트는 localStorage에 자동 저장/복원 (브라우저별, 약 5MB 한도) */
  const [projects,setProjects]=useState(()=>{
    try{const raw=typeof localStorage!=='undefined'&&localStorage.getItem('fit_platform_projects_v1');return raw?JSON.parse(raw):[];}catch{return[];}
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_projects_v1',JSON.stringify(projects));}catch{}
  },[projects]);
  const [sel,setSel]=useState([]);
  const [activeProjectId,setActiveProjectId]=useState(null);
  const [flash,setFlash]=useState('');
  const toast=m=>{setFlash(m);setTimeout(()=>setFlash(''),2400);};

  /* ═══ PLAN MODEL — 계획안 자동 생성 상태 (localStorage 자동 저장) ═══ */
  const PLAN_DEFAULT={
    site:{parcels:[],width:60,depth:40,coverage:60,far:800},
    targets:{use:'업무시설',far:400,gfa:12000,floors:10,floorH:4500},
    options:[],selected:null,
    fit:{faces:{F:true,R:true,B:false,L:true},frontEdge:0,floorFrom:1,floorTo:10,moduleW:1200,corner:'corner',depth:1200,hasSkin:true,skinType:'str_louver'},
    render:null,versions:[]
  };
  const [plan,setPlan]=useState(()=>{
    try{const raw=typeof localStorage!=='undefined'&&localStorage.getItem('fit_platform_plan_v1');if(raw){const p=JSON.parse(raw);const site={...PLAN_DEFAULT.site,...(p.site||{})};if(!Array.isArray(site.parcels))site.parcels=[];/* 구버전(문자열) 마이그레이션 */return{...PLAN_DEFAULT,...p,site,targets:{...PLAN_DEFAULT.targets,...(p.targets||{})},fit:(()=>{const pf=p.fit||{};const fc=pf.faces||{};const nf=('F'in fc||'N'in fc)?{F:!!(fc.F!==undefined?fc.F:fc.S),R:!!(fc.R!==undefined?fc.R:fc.E),B:!!(fc.B!==undefined?fc.B:fc.N),L:!!(fc.L!==undefined?fc.L:fc.W)}:PLAN_DEFAULT.fit.faces;return{...PLAN_DEFAULT.fit,...pf,faces:nf,frontEdge:pf.frontEdge||0};})()};}}catch{}
    return PLAN_DEFAULT;
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_plan_v1',JSON.stringify(plan));}catch{}
  },[plan]);
  /* PLAN→프로젝트 적용 이력 — COST/FRAME 탭에 출처 표시용. 프로젝트 파일(.fitproj)에 함께 저장 */
  const [planMeta,setPlanMeta]=useState(null);
  const [renders,setRenders]=useState(null); /* AI 렌더 {exterior,detail,interior,time,label} — 메모리 전용(미저장) */
  const captureRef=useRef(null);
  const captureRegister=(fn)=>{captureRef.current=fn;};
  const [renderBusy,setRenderBusy]=useState('');
  const aiRenderView=async(viewKey,extra)=>{
    const opt=(plan.options||[]).find(o=>o.id===plan.selected);
    if(!opt){window.alert('PLAN에서 매스 옵션을 먼저 생성·선택하세요.');return false;}
    const provider=(FD&&FD.ai_provider)||'gemini';
    const key=((provider==='gemini'?FD.ai_gemini_key:FD.ai_image_key)||'').trim();
    if(!key){window.alert(`ADMIN 탭에 ${provider==='gemini'?'Gemini(Google AI Studio)':'OpenAI'} API 키를 먼저 등록하세요.`);return false;}
    const use=(plan.targets&&plan.targets.use)||'office';
    const site=(plan.site&&Array.isArray(plan.site.parcels)&&plan.site.parcels[0])||null;
    let base=null;
    if(viewKey==='exterior'&&provider==='gemini'&&captureRef.current){try{base=await captureRef.current();}catch(e){base=null;}}
    const pr=renderPrompts(opt,plan.fit,use,site,!!base);
    let prompt=pr[viewKey]; if(extra&&extra.trim())prompt+=' Additional client direction: '+extra.trim()+'.';
    setRenderBusy(viewKey);
    try{
      const img=await aiRenderImage(prompt,key,viewKey==='exterior'?'1536x1024':'1024x1024',provider,base);
      setRenders(prev=>({...(prev||{}),[viewKey]:img,time:new Date().toLocaleString('ko-KR'),label:`${opt.name.split(' — ')[0]} · ${opt.floors}F`,usedBase:viewKey==='exterior'?!!base:(prev&&prev.usedBase)}));
      setRenderBusy('');return true;
    }catch(e){setRenderBusy('');window.alert('렌더 생성 실패: '+e.message);return false;}
  };

  /* ═══ COMMITTED STATE — 적용 버튼을 누른 시점의 입력값. 결과 계산은 이 값을 사용 ═══ */
  const [showNewModal,setShowNewModal]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [planAutoStart,setPlanAutoStart]=useState(false); /* 리스트 '계획안 생성' → PLAN 탭 마운트 시 필지모달 자동 오픈+기본모델 생성(one-shot) */
  const [committed,setCommitted]=useState(()=>({
    zones:_dp.zones, frames:_dp.frames, crt:_dp.crt, grd:_dp.grd,
    os:_dp.os, E:_dp.E, P:_dp.P, overview:_dp.overview, zonePer:_dp.zonePer||165, floorZones:_dp.floorZones
  }));
  const _curMap={zones,frames,crt,grd,os,E,P,overview,zonePer,floorZones};
  const applyKeys=(keys,label)=>{
    setCommitted(c=>{const n={...c};keys.forEach(k=>n[k]=_curMap[k]);return n;});
    toast(`${label||'변경'}사항을 적용했습니다`);
  };
  const revertKeys=(keys)=>{
    keys.forEach(k=>{
      if(k==='zones')setZones(committed.zones);
      else if(k==='frames'){setFrames(committed.frames);if(committed.frames[0])setActiveFrameId(committed.frames[0].id);}
      else if(k==='crt')setCrt(committed.crt);
      else if(k==='grd')setGrd(committed.grd);
      else if(k==='os')setOs(committed.os);
      else if(k==='E')setE(committed.E);
      else if(k==='P')setP(committed.P);
      else if(k==='overview')setOverview(committed.overview);
      else if(k==='zonePer')setZonePer(committed.zonePer);
      else if(k==='floorZones')setFloorZones(committed.floorZones);
    });
    toast('변경사항을 되돌렸습니다');
  };
  const isDirty=(keys)=>keys.some(k=>JSON.stringify(_curMap[k])!==JSON.stringify(committed[k]));
  const syncCommitted=(snap)=>setCommitted({
    zones:snap.zones,frames:snap.frames,crt:snap.crt,grd:snap.grd,
    os:snap.os,E:snap.E,P:snap.P,overview:snap.overview,zonePer:snap.zonePer||165,floorZones:snap.floorZones||[]
  });
  /* ADMIN 탭 전용 P 세터 — 관리자 변경은 raw·committed 동시 갱신(즉시 결과 반영) */
  const setPAdmin=(u)=>{
    setP(prev=>typeof u==='function'?u(prev):u);
    setCommitted(c=>({...c,P:typeof u==='function'?u(c.P):u}));
  };
  /* ApplyBar 실시간 결과 — raw 입력(미적용 포함) 기준 미리보기 */
  const liveAgg=useMemo(()=>{try{return zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer);}catch(e){return null;}},[zones,frames,crt,grd,os,E,P,FD,zonePer]);
  const liveLcc=useMemo(()=>{try{return liveAgg?lccAnalyze(liveAgg,E,P,FD,(overview&&overview.location)||''):null;}catch(e){return null;}},[liveAgg,E,P,FD,overview]);

  // active frame derivation (so single-frame components keep working)
  const f=frames.find(x=>x.id===activeFrameId)||frames[0];
  const setF=updater=>setFrames(fs=>fs.map(fr=>fr.id===(f&&f.id)?(typeof updater==='function'?updater(fr):{...fr,...updater}):fr));
  /* FRAME 설정값(폭 W·깊이 D·높이 H) → 한상은 계획안 iframe 모델에 반영(타입별).
     이름 'TYPE n' → 한상은 타입 인덱스 n-1. setActiveFType로 해당 타입 선택 후 setAFW/D/H 설정 → updateReadout+buildPlan 재모델링. 미존재 타입은 생략. */
  useEffect(()=>{
    try{
      if(!f)return;
      const fr=document.getElementById('plan-massing-frame'); const w=fr&&fr.contentWindow; if(!w)return;
      if(typeof w.setActiveFType!=='function'||typeof w.setAFW!=='function')return;
      const m=/^TYPE\s*(\d+)/.exec(String(f.name||'')); const idx=m?(parseInt(m[1],10)-1):0;
      let cnt=0; try{cnt=w.fTypeCount();}catch(e){}
      if(idx<0||idx>=cnt)return;                       /* 모델링에 아직 없는 타입이면 생략 */
      const dm=(typeof w.fTypeDims==='function')?w.fTypeDims(idx):{};
      const cap=frameFHCapMM(f.name);                  /* 모델 층고 캡(mm) */
      const W2=Math.round(f.frameWidth||1200), D2=Math.round(f.depth||800);
      let H2=Math.round(f.frameHeight||4000);
      if(cap&&H2>cap){ H2=Math.floor(cap/50)*50; const fid=f.id; setFrames(fs=>fs.map(fr=>fr.id===fid?{...fr,frameHeight:H2}:fr)); } /* 저장값이 층고 초과 → 층고로 정규화(모델과 일치) */
      if(dm&&Math.round(dm.W)===W2&&Math.round(dm.D)===D2&&Math.round(dm.H)===H2)return; /* 동일하면 재모델 생략 */
      let prev=null; try{const ds=w.getDesignState();prev=ds&&ds.types&&ds.types.activeFType;}catch(e){}
      w.setActiveFType(idx);
      w.setAFW(W2); if(typeof w.setAFD==='function')w.setAFD(D2); if(typeof w.setAFH==='function')w.setAFH(H2);
      if(typeof w.updateReadout==='function')w.updateReadout();
      if(typeof w.buildPlan==='function')w.buildPlan();
      if(prev!=null&&prev!==idx&&typeof w.setActiveFType==='function')w.setActiveFType(prev); /* 한상은 활성타입 원복(비파괴) */
    }catch(e){}
  },[f&&f.id,f&&f.frameWidth,f&&f.depth,f&&f.frameHeight]);

  const captureProject=(id)=>({id,name:projectName||'무제',createdAt:new Date().toISOString(),overview,frames,zones,zonePer,floorZones,crt,grd,os,E,P,FD,planMeta});
  const restoreProject=(p)=>{

  /* PLAN 탭 → 프로젝트 주입: Planning Model 기준으로 프레임·존·스킨 설정 생성 (기획서 10장 연동) */
  /* 한상은 계획안 툴(상은/index.html iframe) 결과 → 프로젝트 전개. window.__massingValues/__landInfo/VWorldContext.site 매핑 */
  const applyMassing=({mv,landInfo,site})=>{
    if(!mv){window.alert('계획안 결과가 없습니다.\n좌측 계획안 툴에서 매스·FIT 계획을 진행한 뒤 「계획안 결과 가져오기」를 누르세요.');return;}
    const mapSkin=k=>({'스트링':'str_louver','패브릭':'fab_louver','메탈':'al_louver','롤블라인드':'roller','베네시안':'venetian'}[k]||'venetian');
    const gPre=g=>((g==='low')||/저철분/.test(String(g)))?'시장단가_저철분':'시장단가_중간';
    const floors=Math.max(1,Math.round(mv.floors||10));
    const skin=mapSkin(mv.skinType);
    const w=(document.getElementById('plan-massing-frame')||{}).contentWindow;
    const newFrames=[], newZones=[]; let zid=1;
    /* 1순위: 인덱스 정렬 window 함수 — 정의된 모든 타입(미배정 0-count 포함)을 프레임으로, 배정수량(face/corner)을 존으로 */
    let nT=0; try{ nT=(w&&typeof w.fTypeCount==='function')?w.fTypeCount():0; }catch(e){}
    if(nT>0){
      let fcs=[],ccs=[]; try{fcs=w.fTypeFaceCounts()||[];}catch(e){} try{ccs=w.fTypeCornerCounts()||[];}catch(e){}
      for(let i=0;i<nT;i++){
        let dm={},gl=''; try{dm=w.fTypeDims(i)||{};}catch(e){} try{gl=w.fGlassOf(i);}catch(e){}
        const id=String.fromCharCode(65+i);
        newFrames.push({...frameDefaults(id,'TYPE '+(i+1)),frameWidth:Math.round(dm.W||1200),depth:Math.round(dm.D||800),frameHeight:Math.round(dm.H||4000),floors,glassPreset:gPre(gl),skinType:skin});
        const fc=Math.round(fcs[i]||0), cc=Math.round(ccs[i]||0);
        if(fc>0)newZones.push({id:zid++,name:'TYPE '+(i+1),face:'F',moduleCount:fc,frameId:id});
        if(cc>0)newZones.push({id:zid++,name:'TYPE '+(i+1)+' 코너',face:'ETC',moduleCount:cc,frameId:id});
      }
    }else{
      /* 2순위: __massingValues.frameTypes/cornerTypes (구버전·함수 미노출 시) */
      const ftL=Array.isArray(mv.frameTypes)?mv.frameTypes:[], ctL=Array.isArray(mv.cornerTypes)?mv.cornerTypes:[];
      const addType=(t,corner,i)=>{const id=String.fromCharCode(65+newFrames.length);newFrames.push({...frameDefaults(id,(corner?'코너 ':'TYPE ')+(i+1)),frameWidth:Math.round(t.W||1200),depth:Math.round(t.D||800),frameHeight:Math.round(t.H||4000),floors,glassPreset:gPre(t.glass),skinType:skin});newZones.push({id:zid++,name:(corner?'코너 ':'TYPE ')+(i+1),face:corner?'ETC':'F',moduleCount:Math.max(0,Math.round(t.count||0)),frameId:id});};
      ftL.forEach((t,i)=>addType(t,false,i)); ctL.forEach((t,i)=>addType(t,true,i));
    }
    if(!newFrames.length){const id='A';newFrames.push({...frameDefaults(id,'TYPE A'),frameWidth:Math.round(mv.frameW||1200),depth:Math.round(mv.frameD||800),frameHeight:Math.round(mv.frameH||4000),floors,skinType:skin});}
    if(!newZones.length){newZones.push({id:1,name:'입면',face:'F',moduleCount:Math.max(0,Math.round(mv.frameCount||0)),frameId:newFrames[0].id});}
    const area=Math.max(0,mv.area||0);
    const newFloorZones=[{id:'all',part:'기준층',from:1,to:floors,areaM2:floors>0?Math.round(area/floors):Math.round(area)}];
    const newCrt={...crt,hasSkin:(mv.skinCount||0)>0,skinType:skin,hasHvac:(mv.cartridge||0)>0,hvacSys:'cart'};
    const li=landInfo||{}, firstP=(site&&Array.isArray(site.parcels)&&site.parcels[0])||null;
    const newOverview={...overview,floorsAbove:String(floors),siteArea:li.areaM2?String(Math.round(li.areaM2)):overview.siteArea,location:(firstP&&(firstP.label||firstP.addr))||overview.location,use:(firstP&&firstP._zone)||overview.use};
    const cr=mv.constructRate||mv.constructionRate||1.5, dr=mv.deliveryRate||1.3;
    const newFD={...FD,exec_rate:{...(FD.exec_rate||{}),"재료":dr,"노무":cr,"경비":cr}};
    const tot=newZones.reduce((s,z)=>s+(z.moduleCount||0),0);
    setFrames(newFrames);setActiveFrameId(newFrames[0].id);
    setZones(newZones);setFloorZones(newFloorZones);setCrt(newCrt);setOverview(newOverview);setFD(newFD);
    syncCommitted({zones:newZones,frames:newFrames,crt:newCrt,grd,os,E,P,overview:newOverview,zonePer,floorZones:newFloorZones});
    setPlanMeta({name:'한상은 계획안 연동',time:new Date().toLocaleString('ko-KR'),floors,total:tot,source:'massing'});
    setTab('PLATFORM');
    toast(`계획안 연동 완료 — 프레임 ${newFrames.length}타입 · 모듈 ${tot.toLocaleString()}EA · 실행률 ${dr}/${cr}`);
  };

      ${agg.cSkin>0?row('스킨카트리지',won(agg.cSkin)):''}
      ${agg.cHvac>0?row('공조시스템',won(agg.cHvac)):''}
      ${agg.cGrid>0?row('조명 (GRID)',won(agg.cGrid)):''}
      ${agg.osFlat>0?row('OS 시스템',won(agg.osFlat)):''}
      ${(L.meSub||0)>0?row('M&E (엑세스·복사패널)',won(L.meSub)):''}
      ${row('재료비 합계',won(L.matSub))}
      ${row('노무비 / 경비',won(L.laborSub)+' / '+won(L.expSub))}
      ${row('총 공사비 (실행률 포함)',won(L.execTotal),true)}
      ${(agg.hvacCompare||0)>0?row('공조 비교견적 (공사범위 제외)',won(agg.hvacCompare)):''}
      ${row('기존 커튼월 (참고)',won(L.conventional))}
      ${row('삼우 납품가 / 공사가 (계)',`${won(L.samooDeliver)} / ${won(L.samooConstr)}`)}
      <div style="font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;letter-spacing:.08em;margin:18px 0 6px">프레임 타입별</div>
      <table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1.5px solid #1D1D1F">
        <th style="text-align:left;padding:5px 8px;font-size:10px;color:#6E6E73">타입</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">규격</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">수량</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">합계</th>
      </tr></thead><tbody>${typeRows}</tbody></table>
      <div style="font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;letter-spacing:.08em;margin:18px 0 6px">존별 구성</div>
      <table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1.5px solid #1D1D1F">
        <th style="text-align:left;padding:5px 8px;font-size:10px;color:#6E6E73">층구간</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">적용층</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">연면적</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#6E6E73">존수</th>
      </tr></thead><tbody>${zoneRows}</tbody></table>
      <div style="margin-top:24px;font-size:9px;color:#86868B;border-top:1px solid #E5E5EA;padding-top:8px">${FD._placeholder?'※ 단가는 예시 추정치이며 fit_data.json 적용 시 실제 금액으로 재계산됩니다. ':''}© FIT Platform Consulting Tool — SAMOO Architects &amp; Engineers</div>
    `;
    document.body.appendChild(node);
    try{
      const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true});
      const img=canvas.toDataURL('image/png');
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF('p','mm','a4');
      const pw=210, ph=297, iw=pw, ih=canvas.height*pw/canvas.width;
      let heightLeft=ih, position=0;
      pdf.addImage(img,'PNG',0,position,iw,ih);heightLeft-=ph;
      while(heightLeft>0){position=heightLeft-ih;pdf.addPage();pdf.addImage(img,'PNG',0,position,iw,ih);heightLeft-=ph;}
      pdf.save(`${sanitizeName(projectName)}_보고서.pdf`);
      toast('PDF 보고서를 내보냈습니다');
    }catch(err){window.alert('PDF 생성 실패: '+err.message);}
    finally{document.body.removeChild(node);}
  };
  const TB=({onClick,label,accent})=>(
    <button onClick={onClick} style={{background:accent?C.blue:'transparent',color:accent?C.white:C.blue,border:`1px solid ${accent?C.blue:C.border}`,borderRadius:980,padding:'6px 16px',fontFamily:FF.disp,fontWeight:600,fontSize:12.5,letterSpacing:'-.005em',whiteSpace:'nowrap',transition:'all .18s ease'}}>{label}</button>
  );

  const TABS=[
    {id:'LIST',label:'PROJECTS',sub:'프로젝트 리스트',grp:0,ico:<V s={14} ch={<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>}/>},
    {id:'PLAN',label:'PLAN',sub:'계획안 생성',grp:1,ico:<V s={14} ch={<><path d="M2 22l10-18 10 18z"/><line x1="12" y1="14" x2="12" y2="22"/><line x1="7" y1="22" x2="17" y2="22"/></>}/>},
    {id:'PLATFORM',label:'PLATFORM',sub:'종합 분석',grp:1,ico:<IcoOs s={14}/>},
    {id:'COST',label:'COST',sub:'공사비',grp:2,ico:<V s={14} ch={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>}/>},
    {id:'ENERGY',label:'ENERGY',sub:'에너지 절감',grp:2,ico:<V s={14} ch={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>},
    {id:'LCC',label:'LCC',sub:'생애주기비용',grp:2,ico:<V s={14} ch={<><path d="M3 3v18h18"/><polyline points="7 14 11 10 14 13 19 7"/></>}/>},
    {id:'FRAME',label:'FRAME',sub:'프레임',grp:3,ico:<V s={14} ch={<rect x="3" y="3" width="18" height="18" rx="1"/>}/>},
    {id:'SKIN',label:'SKIN',sub:'스킨카트리지',grp:3,ico:<IcoWn s={14}/>},
    {id:'HVAC',label:'HVAC',sub:'공조시스템',grp:3,ico:<IcoWn s={14}/>},
    {id:'GRID',label:'GRID',sub:'조명',grp:3,ico:<IcoLt s={14}/>},
    {id:'OS',label:'OS',sub:'운영 시스템',grp:3,ico:<IcoOs s={14}/>},
    {id:'DRAWINGS',label:'DRAWINGS',sub:'도면',grp:4,ico:<V s={14} ch={<><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>}/>},
    {id:'AERIAL',label:'AERIAL',sub:'조감도',grp:4,ico:<V s={14} ch={<><path d="M2 22l10-18 10 18"/><line x1="2" y1="22" x2="22" y2="22"/></>}/>},
    {id:'PERSP',label:'PERSPECTIVE',sub:'투시도',grp:4,ico:<V s={14} ch={<><path d="M3 3l18 4v10l-18 4z"/></>}/>},
    {id:'INFO',label:'INFO',sub:'기능 설명',grp:5,ico:<V s={14} ch={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>}/>},
    {id:'ADMIN',label:'ADMIN',sub:'관리자 설정',grp:6,ico:<V s={14} ch={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>},
  ];
  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.ink,paddingBottom:['PLATFORM','FRAME','SKIN','HVAC','GRID','OS'].includes(tab)?125:60}}>
      {/* NAV */}
      <nav style={{background:'rgba(255,255,255,.72)',backdropFilter:'saturate(180%) blur(20px)',WebkitBackdropFilter:'saturate(180%) blur(20px)',borderBottom:'1px solid rgba(0,0,0,.08)',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',height:52,gap:16}}>
          <div style={{display:'flex',alignItems:'baseline',gap:11,flexShrink:0}}>
            <span style={{fontFamily:FF.disp,fontWeight:700,fontSize:20,letterSpacing:'-.01em',color:C.ink}}>FIT</span>
            <span style={{fontSize:11,color:C.light,letterSpacing:'.02em'}}>Future Space Platform</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,overflowX:'auto'}}>
            <input value={projectName} onChange={e=>setProjectName(e.target.value)} placeholder="프로젝트명"
              style={{border:`1px solid ${C.border}`,borderRadius:980,background:C.white,padding:'7px 15px',fontSize:13,color:C.ink,width:180,outline:'none',flexShrink:0,fontFamily:FF.body}}/>
            <TB onClick={()=>setShowReport(true)} label="보고서" accent/>
          </div>
        </div>
        {/* tab bar with group separators */}
        <div style={{display:'flex',borderTop:'1px solid rgba(0,0,0,.06)',overflowX:'auto',alignItems:'stretch'}}>
          {TABS.map((t,i)=>{
            const on=tab===t.id;
            const sep=i>0&&TABS[i-1].grp!==t.grp;
            return(
              <React.Fragment key={t.id}>
                {sep&&<div style={{width:1,background:'rgba(0,0,0,.07)',alignSelf:'stretch',margin:'8px 3px'}}/>}
                <button onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:7,padding:'9px 18px',
                  background:'transparent',border:'none',borderBottom:on?`2px solid ${C.blue}`:'2px solid transparent',
                  cursor:'pointer',whiteSpace:'nowrap',transition:'all .18s ease',flexShrink:0}}>
                  <span style={{color:on?C.blue:C.light}}>{t.ico}</span>
                  <span>
                    <span style={{display:'block',fontFamily:FF.disp,fontWeight:on?600:500,fontSize:13,letterSpacing:'-.005em',color:on?C.ink:C.sub}}>{t.label}</span>
                    <span style={{display:'block',fontSize:10,color:on?C.sub:C.light,letterSpacing:'-.005em'}}>{t.sub}</span>
                  </span>
                </button>
              </React.Fragment>
            );
          })}
        </div>
      </nav>

      {/* PLAN(한상은 계획안 iframe) — 탭 전환에도 모델 유지: 항상 마운트하고 숨김 토글 */}
      <div style={{display:tab==='PLAN'?'block':'none'}}>
        <PlanTab applyMassing={applyMassing} toast={toast} zones={zones} setZones={setZones} floorZones={floorZones} setFloorZones={setFloorZones} zonePer={zonePer} setZonePer={setZonePer} frames={frames} E={E} setE={setE}/>
      </div>

      {tab==='LIST'     &&<ProjectListTab projects={projects} setProjects={setProjects} sel={sel} setSel={setSel} current={{id:activeProjectId,projectName,zones,frames,crt,grd,os,E,P,FD}} loadFromList={loadFromList} saveCurrentToList={saveCurrentToList} toast={toast} newProject={newProject} saveProject={saveProject} loadProject={loadProject} onCreatePlan={createPlanFromList}/>}
      {tab==='PLAN'     &&<ApplyBar dirty={isDirty(['zones','floorZones','zonePer','E'])} onApply={()=>applyKeys(['zones','floorZones','zonePer','E'],'PLAN')} onRevert={()=>revertKeys(['zones','floorZones','zonePer','E'])} label="PLAN (모듈·조닝·에너지 파라미터)" live={liveAgg} lcc={liveLcc}/>}
      {tab==='PLATFORM' &&<>
        <PlatformTab frames={frames} f={f} crt={crt} grd={grd} os={os} E={E} P={P} FD={FD} overview={overview} setOverview={setOverview} committed={committed} plan={plan} zones={zones} floorZones={floorZones} zonePer={zonePer}/>
        <ApplyBar dirty={isDirty(['overview'])} onApply={()=>applyKeys(['overview'],'PLATFORM')} onRevert={()=>revertKeys(['overview'])} label="PROJECT OVERVIEW (개요)" live={liveAgg}/>
      </>}
      {tab==='COST'     &&<CostTab zones={zones} frames={frames} crt={crt} grd={grd} os={os} P={P} setP={setP} FD={FD} setFD={setFD} committed={committed} planMeta={planMeta}/>}
      {tab==='ENERGY'   &&<EnergyTab zones={zones} frames={frames} f={f} crt={crt} grd={grd} os={os} E={E} P={P} FD={FD} committed={committed}/>}
      {tab==='LCC'      &&<LccTab zones={zones} frames={frames} f={f} crt={crt} grd={grd} os={os} E={E} P={P} FD={FD} committed={committed}/>}
      {tab==='FRAME'    &&<>
        <FrameTab f={f} setF={setF} crt={crt} frames={frames} activeFrameId={activeFrameId} setActiveFrameId={setActiveFrameId} setFrames={setFrames} planMeta={planMeta} FD={FD} toast={toast}/>
        <ApplyBar dirty={isDirty(['frames'])} onApply={()=>applyKeys(['frames'],'FRAME')} onRevert={()=>revertKeys(['frames'])} label="FRAME" live={liveAgg}/>
      </>}
      {tab==='SKIN'     &&<>
        <SkinTab frames={frames} crt={crt} setCrt={setCrt} setFrames={setFrames} FD={FD}/>
        <ApplyBar dirty={isDirty(['crt'])} onApply={()=>applyKeys(['crt'],'SKIN/HVAC')} onRevert={()=>revertKeys(['crt'])} label="SKIN CARTRIDGE" live={liveAgg}/>
      </>}
      {tab==='HVAC'     &&<>
        <HvacTab frames={frames} crt={crt} setCrt={setCrt} FD={FD}/>
        <ApplyBar dirty={isDirty(['crt'])} onApply={()=>applyKeys(['crt'],'SKIN/HVAC')} onRevert={()=>revertKeys(['crt'])} label="공조시스템" live={liveAgg}/>
      </>}
      {tab==='GRID'     &&<>
        <GridTab grd={grd} setGrd={setGrd}/>
        <ApplyBar dirty={isDirty(['grd'])} onApply={()=>applyKeys(['grd'],'GRID')} onRevert={()=>revertKeys(['grd'])} label="GRID" live={liveAgg}/>
      </>}
      {tab==='OS'       &&<>
        <OsTab os={os} setOs={setOs} crt={crt} FD={FD}/>
        <ApplyBar dirty={isDirty(['os'])} onApply={()=>applyKeys(['os'],'OS')} onRevert={()=>revertKeys(['os'])} label="OS" live={liveAgg}/>
      </>}
      {tab==='DRAWINGS' &&<DrawingsTab/>}
      {tab==='AERIAL'   &&<AerialTab/>}
      {tab==='PERSP'    &&<PerspectiveTab renders={renders} projectName={projectName} aiRenderView={aiRenderView} renderBusy={renderBusy} canRender={!!(plan.options||[]).find(o=>o.id===plan.selected)}/>}
      {tab==='INFO'     &&<InfoTab/>}
      {tab==='ADMIN'    &&<AdminTab FD={FD} setFD={setFD} toast={toast} P={P} setP={setPAdmin}/>}

      <NewProjectModal open={showNewModal} onCancel={()=>setShowNewModal(false)} onStart={startNewProject} confmKey={FD.juso_confm_key} vworldKey={FD.vworld_key||''}/>

      {showReport&&(
        <div onClick={()=>setShowReport(false)} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(15,15,13,.45)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.white,width:420,maxWidth:'100%',padding:'26px 28px',boxShadow:'0 12px 40px rgba(0,0,0,.25)'}}>
            <div style={{fontFamily:FF.disp,fontSize:20,letterSpacing:'.08em',color:C.ink,marginBottom:4}}>보고서 추출</div>
            <p style={{fontSize:12.5,color:C.sub,lineHeight:1.6,marginBottom:20}}>현재 프로젝트의 견적·에너지 결과를 추출할 형식을 선택하세요.</p>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button onClick={()=>{setShowReport(false);exportExcel();}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,background:C.greenLt,borderLeft:`3px solid ${C.green}`,padding:'14px 16px',textAlign:'left',cursor:'pointer'}}>
                <span><span style={{display:'block',fontSize:14,fontWeight:600,color:C.green}}>EXCEL</span><span style={{display:'block',fontSize:11.5,color:C.sub,marginTop:2}}>견적·존·모듈·시스템 시트 (.xlsx)</span></span>
                <span style={{fontFamily:FF.disp,fontSize:22,color:C.green}}>→</span>
              </button>
              <button onClick={()=>{setShowReport(false);exportPDF();}} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,background:C.panel,border:`1px solid ${C.borderDark}`,padding:'14px 16px',textAlign:'left',cursor:'pointer'}}>
                <span><span style={{display:'block',fontSize:14,fontWeight:600,color:C.ink}}>PDF</span><span style={{display:'block',fontSize:11.5,color:C.sub,marginTop:2}}>요약 보고서 (개요·공사비·에너지)</span></span>
                <span style={{fontFamily:FF.disp,fontSize:22,color:C.ink}}>→</span>
              </button>
            </div>
            <button onClick={()=>setShowReport(false)} style={{marginTop:18,width:'100%',background:'transparent',border:'none',color:C.light,fontSize:12.5,padding:'6px',cursor:'pointer'}}>취소</button>
          </div>
        </div>
      )}

      {flash&&<div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:C.ink,color:C.white,padding:'10px 22px',fontSize:13,letterSpacing:'.02em',zIndex:200,boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>{flash}</div>}

      <footer style={{position:'fixed',bottom:0,left:0,right:0,zIndex:90,borderTop:`1.5px solid ${C.border}`,background:C.white,padding:'12px 32px',display:'flex',justifyContent:'space-between',fontSize:10,color:C.light,flexWrap:'wrap',gap:8,boxShadow:'0 -2px 8px rgba(0,0,0,.04)'}}>
        <span>© FIT Platform — SAMOO Architects &amp; Engineers</span>
        <span>에너지 계수: 태평로빌딩 EnergyPlus(rev-05) 보정 · 단가: fit_data.json 적용 시 실제값</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FitPlatform/>);
</script>
</body>
</html>

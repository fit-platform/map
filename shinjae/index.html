function surchargeRate(mtx,floors,W){
  if(!mtx||!mtx.rates)return 1.0;
  const fb=mtx.floor_bands||[],wb=mtx.width_bands||[];
  let fi=fb.findIndex(b=>b.max==null||floors<=b.max); if(fi<0)fi=Math.max(0,fb.length-1);
  let wi=wb.findIndex(b=>b.max==null||W<=b.max); if(wi<0)wi=Math.max(0,wb.length-1);
  const r=(mtx.rates[fi]||[])[wi];
  return (typeof r==='number'&&r>0)?r:1.0;
}

      {code:"MPS-213",sub:"01R",cut:900,qty:1,note:"FIN BRACKET 우(정착)",type:"연결"},

    const warnings=[];
    const rows=raw.map(r=>{
      const m=this.db.raw_material[r.code]||{}; const uw=m.unit_weight||0; const valid=r.cut>0;
      if(!valid)warnings.push(`⚠️ ${r.code} ${r.sub} 절단길이 비정상: ${r.cut.toFixed(1)}mm`);
      const wEach=round((r.cut/1000)*uw,3);
      return{code:r.code,sub:r.sub,name:m.name||"",cut_mm:round(r.cut,1),qty:r.qty,unit_weight:uw,weight_each:wEach,weight_total:round(wEach*r.qty,3),note:r.note,type:r.type||'기타',valid};
    });
    return{rows,warnings};
  }
  subMaterials(p){
    const {W,H,D,H1,H2,H3,H4}=p;
    const gasket={G15:{len_m:round(H3*2/1000,2)},G16:{len_m:round(H2*2/1000,2)},G17:{len_m:round((W+H)*2/1000,2)},G18:{len_m:round(W*2/1000,2)},G19:{len_m:round(H3*2/1000,2)},G20:{len_m:round(W*2/1000,2)}};
    const azon={AZ01:{len_m:round(Math.ceil((H3*2+H2*2+W*2)*1.3/1000),1)},AZ02:{len_m:round(Math.ceil((W*2+H2)*1.3/1000),1)}};
    return{gasket,azon};
  }
  glass(p){
    const {W,H,D,H1,H2,H3,H4}=p; const a=(w,h)=>round((w*h)/1e6,2);
    return{
      "외부접합_G1":{area_m2:a(W,H),type:"외부접합",note:"외부 접합유리 전체"},
      "내부복층_G2":{area_m2:a(W,H3),type:"내부복층",note:"VISION 복층"},
      "단열시트_상부":{area_m2:a(W-84,H2-77),type:"단열시트",note:"SPANDREL 단열시트"},
      "단열시트_하부":{area_m2:a(W-84,H4-77),type:"단열시트",note:"하부 단열시트"},
      "가이드프레임":{area_m2:a(W-50,H1-50),type:"단판유리",note:"가이드 단판유리"},
      "진공단열_상부":{area_m2:a(D-234,H2-83.5),type:"진공단열패널",note:"SPANDREL 진공단열"},
      "진공단열_하부":{area_m2:a(D-234,H4-83.5),type:"진공단열패널",note:"하부 진공단열"}
    };
  }
  estimate(input){
    const p={W:input.W,H:input.H,D:input.D,H1:input.H1??250,H2:input.H2??600,H4:input.H4??250,floors:input.floors??10,qty:input.qty??1,frameType:input.frameType??"유리",offset:input.offset||{}};
    p.H3=p.H-p.H1-p.H2-p.H4;
    const up=this.db.unit_price, thick=input.glassThickOverride||this._glassThickness(p.floors), discount=this._discountRate(p.qty);
    const {rows:profiles,warnings}=this.profiles(p);
    const sub=this.subMaterials(p), glass=this.glass(p);
    const valids=profiles.filter(r=>r.valid);
    const totalWeight=valids.reduce((s,r)=>s+r.weight_total,0);
    /* 할증 매트릭스(층수밴드×폭밴드) — 수직+연결 부재에만 구조할증 적용, 유리·가로·기타는 ×1.0. 매트릭스 부재 시 구버전 일괄 할증률로 폴백 */
    const mtx=this.db.surcharge_matrix;
    let surchargeWeight, sRate, surchargedBaseW, plainW;
    if(mtx&&mtx.rates){
      const applyTypes=mtx.apply_types||["수직","연결"];
      sRate=surchargeRate(mtx,p.floors,p.W);
      surchargedBaseW=valids.filter(r=>applyTypes.includes(r.type)).reduce((s,r)=>s+r.weight_total,0);
      plainW=totalWeight-surchargedBaseW;
      surchargeWeight=Math.ceil((plainW+surchargedBaseW*sRate)*10)/10;
    }else{
      sRate=up["할증률"]; surchargedBaseW=totalWeight; plainW=0;
      surchargeWeight=Math.ceil(totalWeight*up["할증률"]*10)/10;
    }
    const rawCost=surchargeWeight*up["원자재_per_kg"];
    const azonM=Object.values(sub.azon).reduce((s,v)=>s+v.len_m,0);
    const gasketM=Object.values(sub.gasket).reduce((s,v)=>s+v.len_m,0);
    const azonCost=azonM*(up["azon_kg_per_m"]||0.7)*(up["azon_per_kg"]||3000);   /* kg기준: 길이(로스포함)×kg/m×원/kg */
    const gasketCost=gasketM*(up["gasket_kg_per_m"]||0.55)*(up["gasket_per_kg"]||15000);
    let glassCost=0; const glassDetail={};
    for(const [k,g] of Object.entries(glass)){
      const unitP=this._glassUnitPrice(g.type,thick,{glassPreset:input.glassPreset,glassPriceManual:input.glassPriceManual});
      const cost=Math.round(g.area_m2*unitP);
      glassDetail[k]={area_m2:g.area_m2,type:g.type,unit_price:unitP,cost,note:g.note}; glassCost+=cost;
    }
    const processCost=surchargeWeight*up["가공비_per_kg"];   /* 원자재 가공·조립비 (중량×단가/kg) */
    /* 부속자재비 — Fastener·Structure Plate·1T EGI·ROLLER·UNIT 일반부자재 등. 세트당 합산(ADMIN 편집). #상세견적 '부속 자재비' */
    const accessoryCost=((this.db.accessory_items)||[]).reduce((s,a)=>s+(Number(a.price)||0),0);
    /* 설치·부대비 — 유리끼우기(접합+복층 면적기준)·화스너취부·구조/웨더코킹·포장운반. #상세견적 '가공·조립 및 유리설치' 중 설치·부대 항목 */
    const ip=this.db.install_price||{};
    const glazingArea=(glassDetail['외부접합_G1']?glassDetail['외부접합_G1'].area_m2:0)+(glassDetail['내부복층_G2']?glassDetail['내부복층_G2'].area_m2:0);
    const installCost=glazingArea*(ip.glazing_per_m2||0)+(ip.fastener_set||0)+(ip.caulking_set||0)+(ip.packing_set||0);
    const subtotal=rawCost+azonCost+gasketCost+glassCost+processCost+accessoryCost+installCost;
    const mgmtProfit=Math.ceil(subtotal*up["관리이윤율"]/1000)*1000;
    const unitSet=subtotal+mgmtProfit;
    const discounted=Math.round(unitSet*discount/10000)*10000;
    const projectTotal=discounted*p.qty;
    const sm=this.db.samoo_multiplier||this.db.samwoo_multiplier||{"납품":1.10,"공사":1.25}; /* 구키(samwoo) 호환 */
    return{
      summary:{W:p.W,H:p.H,D:p.D,H1:p.H1,H2:p.H2,H3:p.H3,H4:p.H4,floors:p.floors,glass_thickness:thick,qty:p.qty,discount_rate:discount,glass_preset:input.glassPreset||"시장단가_중간"},
      warnings, weight:{total_kg:round(totalWeight,2),surcharge_kg:surchargeWeight,surcharge_rate:sRate,surcharged_base_kg:round(surchargedBaseW,2),plain_kg:round(plainW,2)},
      cost_breakdown:{"원자재비":Math.round(rawCost),"AZON비":Math.round(azonCost),"GASKET비":Math.round(gasketCost),"유리비":Math.round(glassCost),"부속자재비":Math.round(accessoryCost),"가공비":Math.round(processCost),"설치부대비":Math.round(installCost),"소계":Math.round(subtotal),"관리이윤":Math.round(mgmtProfit),"세트단가_1개":Math.round(unitSet),"할인적용단가":Math.round(discounted),"프로젝트_합계":Math.round(projectTotal)},
      glass_detail:glassDetail,
      samoo:{"납품가":Math.round(projectTotal*sm["납품"]),"공사가":Math.round(projectTotal*sm["공사"])},

function frameEstimate(f,qty,FD){
  try{
    /* FRAME 탭에서 ADMIN 카탈로그 항목 직접 선택 시 → 단가/두께 오버라이드로 견적 직결.
       단가는 선택 시점 스냅샷이 아니라 견적 시점에 ADMIN glass_price_preset(=카탈로그 파생)에서 실시간 조회 → ADMIN 단가 변경이 즉시 반영(단일 출처). 미선택이면 glassPreset(기본 중간·층수 자동두께)로 폴백 */
    const gpm={}; let thickOv=null;
    const pp=((FD||FIT_DATA_DEFAULT).glass_price_preset)||{};
    const presetOf=g=>g==='저철분'?'시장단가_저철분':'시장단가_중간';
    if(f.outerGlassSel&&f.outerGlassSel.key){ thickOv=f.outerGlassSel.key.replace('외부접합_',''); const pr=(pp[presetOf(f.outerGlassSel.grade)]||{})[f.outerGlassSel.key]; gpm[f.outerGlassSel.key]=(pr!=null?pr:f.outerGlassSel.price); }
    if(f.innerGlassSel&&f.innerGlassSel.key){ const pr=(pp[presetOf(f.innerGlassSel.grade)]||{})[f.innerGlassSel.key]; gpm[f.innerGlassSel.key]=(pr!=null?pr:f.innerGlassSel.price); }
    return new FitEngine(FD||FIT_DATA_DEFAULT).estimate({W:f.frameWidth,H:f.frameHeight,D:f.depth,H1:f.H1,H2:f.H2,H4:f.H4,floors:f.floors,qty:Math.max(1,Math.round(qty||1)),frameType:f.engineFrameType||'유리',glassPreset:f.glassPreset,glassPriceManual:gpm,glassThickOverride:thickOv}); }
  catch(e){ return null; }
}

/* 공조시스템 해석: A 공조카트리지(cart, 바닥형/천장형 = 공사범위) / B 중앙(central) / C EHP(ehp) / D 기타(etc) = 비교견적(총공사비 제외).
   legacy(이전 버전 floor/ceiling 최상위)도 cart로 흡수. cartKind=floor/ceiling, floor는 floorType(iso 등압→FTU / pres 가압→circ·front). */
/* 유리 카탈로그 → 엔진용 glass_price_preset 파생 (key 매핑 항목만). 공통=양 프리셋 모두 */
function presetFromCatalog(cat){
  const out={"시장단가_중간":{},"시장단가_저철분":{}};
  (cat||[]).forEach(g=>(g.items||[]).forEach(it=>{ if(!it.key)return;
    if(it.preset==='저철분')out["시장단가_저철분"][it.key]=it.price;
    else if(it.preset==='공통'){out["시장단가_중간"][it.key]=it.price;out["시장단가_저철분"][it.key]=it.price;}
    else out["시장단가_중간"][it.key]=it.price; }));
  return out;
}
/* 조닝수 기반 노무 할인률 (FD.zone_labor_discount) — OS·제어 노무에 적용 */
function zoneLaborDiscount(FD,n){
  const tiers=(FD&&FD.zone_labor_discount)||[{max:null,rate:1.0}];
  for(const t of tiers){if(t.max==null||n<t.max)return t.rate;}
  return 1.0;
}
function hvacKind(crt){
  if(!crt||!crt.hasHvac)return{sys:null,isCart:false,ceil:false,kind:null};
  let s=crt.hvacSys||'cart';
  if(s==='floor')return{sys:'cart',isCart:true,ceil:false,kind:'floor'};     /* legacy */
  if(s==='ceiling')return{sys:'cart',isCart:true,ceil:true,kind:'ceiling'};  /* legacy */
  if(s==='cart'){const k=crt.cartKind||'floor';return{sys:'cart',isCart:true,ceil:k==='ceiling',kind:k};}
  return{sys:s,isCart:false,ceil:false,kind:null};                            /* central/ehp/etc */
}
function zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer){
  const zPer=zonePer||165; /* 존당 기준 바닥면적(㎡) — 공조·제어조닝 존수량 */
  const ef=(FD&&FD.energy_factors)||{};
  const osBoost=os.hasOs?(os.sunTrack?(ef.os_suntrack??0.015):0)+(os.energy?(ef.os_energy??0.01):0):0;
  const gridFac=grd.hasGrid?((grd.daylight?(ef.grid_daylight??0.01):0)+(grd.dimming?(ef.grid_dimming??0.01):0)):0;
  const rHvacFull=ef.hvac??0.085;
  const osZ=Array.isArray(floorZones)?floorZones.reduce((a,g)=>a+Math.max(1,Math.ceil(Math.max(0,g.areaM2||0)/zPer))*Math.max(1,(g.to||1)-(g.from||1)+1),0):0; /* OS 조닝수=존수 */
  /* FIT 제어(ICT·b.IoT) — 가압식(pres)/등압식(iso) SKU 내역 (FD.os_control). 재료=osc.mat, 노무=osc.labor, 경비=osc.exp */
  const oscPreset=(crt.floorType==='pres')?'pres':'iso';
  const osc=(os.hasOs&&FD&&FD.os_control&&FD.os_control[oscPreset])||null;
  const osCtlMat=osc?(osc.mat||0):0, osCtlLabor=osc?(osc.labor||0):0, osCtlExp=osc?(osc.exp||0):0;
  const osFlat=os.hasOs?(osCtlMat+(os.sunTrack?P.pOsSun:0)+(os.energy?P.pOsEnergy:0)+(os.bms?P.pOsBms:0)):0; /* 제어 재료(SKU 내역) + 옵션 */
  /* 입면 모듈 → FRAME+GLASS (프레임 타입별) */
  const byTypeQty={};
  zones.forEach(z=>{const fr=zoneFrame(z,frames);byTypeQty[fr.id]=(byTypeQty[fr.id]||0)+(z.moduleCount||0);});
  let frameGlass=0,cSkin=0,skinN=0,shadeWSum=0; /* 스킨=프레임 타입별 합산 */
  Object.keys(byTypeQty).forEach(fid=>{const fr=frames.find(x=>x.id===fid)||frames[0];const q=byTypeQty[fid];const est=frameEstimate(fr,q,FD);frameGlass+=est?est.cost_breakdown["프로젝트_합계"]:0;
    const sp=frameSkinSpec(fr,crt); if(crt.hasSkin&&sp&&fr.depth>=sp.minD){cSkin+=q*skinP(sp,FD);skinN+=q;shadeWSum+=q*sp.shade;}});
  const modTotal=zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  /* 대표 프레임(에너지·스킨·깊이 조건) */
  const repFr=(zones[0]&&zoneFrame(zones[0],frames))||frames[0]||{};
  const envFac=isSolarControl(repFr)?(ef.env_high??0.105):(ef.env_std??0.096);
  const shadeFac=modTotal>0?(shadeWSum/modTotal)/100:0; /* 차양효과 = 프레임별 모듈수 가중평균 */
  const hk=hvacKind(crt);                                         /* A 카트리지(공사범위) / B 중앙·C EHP·D 기타(비교견적·제외) */
  const hvacOk=hk.isCart&&repFr.depth>=1000;                       /* 카트리지(바닥/천장)는 이중외피 깊이 1,000mm↑에서만 */
  const rHvac=hvacOk?rHvacFull:0;                                 /* 에너지 절감계수는 카트리지에만 적용(중앙·EHP·기타 제외) */
  /* 층구간(floorZones) → 바닥면적·존수량 */
  const fz=Array.isArray(floorZones)?floorZones:[];
  let totalM2=0,zoneCount=0;
  fz.forEach(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);const a=Math.max(0,g.areaM2||0);totalM2+=a*nf;zoneCount+=Math.max(1,Math.ceil(a/zPer))*nf;});
  const hvacN=hvacOk?zoneCount:0;
  /* 공조카트리지 세트(조닝1)당 = 본체(풍량 CMH별)+설치+컨트롤판넬+현장배선 — 신평택 CDC 실견적 분해 (FD.hvac_cart) */
  const hc=(FD&&FD.hvac_cart)||{};
  const cmhBody=(hc.cmh_prices&&hc.cmh_prices[crt.cmh||'3600'])||(P.pHvac||0);
  const cartSet=cmhBody+(hc.install_set||0)+(hc.control_panel_set||0)+(hc.field_wiring_set||0);
  let cHvac=hvacN*cartSet;                                        /* 분산 공조카트리지 (존수×세트단가) */
  if(hvacOk){
    const o=crt.hvacOpts||{};                                     /* 옵션: 전열교환기/가습/UV — 존수량 기준 가산 */
    if(o.erv)cHvac+=hvacN*(P.pErv||0);
    if(o.humid)cHvac+=hvacN*(P.pHumid||0);
    if(o.uv)cHvac+=hvacN*(P.pUv||0);
    if(hk.kind==='floor'){                                        /* 바닥공조 취출 방식 */
      const ft=crt.floorType||'iso';
      if(ft==='iso'){const ftuP=(crt.ftuType==='standard'?(hc.ftu_standard||0):(hc.ftu_heater||0))+(hc.ftu_install||0);cHvac+=zoneCount*(P.pFtuPerZone||8)*ftuP;} /* 등압식 → FTU (존수×12개×(타입단가+설치)) */
      else cHvac+=totalM2*((crt.presDiff||'circ')==='front'?(P.pDiffFront||0):(P.pDiffCirc||0)); /* 가압식: 전면취출/원형디퓨져 */
    }
  }
  const hvacCompare=hk.sys==='ehp'?totalM2*(P.pEhp||0):hk.sys==='central'?totalM2*(P.pCentral||0):hk.sys==='etc'?totalM2*(P.pEtc||0):0; /* 중앙·EHP·기타 = 공사범위 제외 비교견적 (total 미포함) */
  const cGrid=grd.hasGrid?(P.pGrid+(grd.daylight?P.pDaylight:0)+(grd.dimming?P.pDimming:0))*modTotal:0;
  let conventional=0;
  zones.forEach(z=>{const fr=zoneFrame(z,frames);conventional+=(fr.frameWidth/1000)*(fr.frameHeight/1000)*(z.moduleCount||0)*P.pConv;});
  const sf=1-(1-envFac)*(1-shadeFac-osBoost)*(1-rHvac)*(1-gridFac);
  const baseline=E.eui*totalM2;
  const saved=baseline*sf, annualSave=saved*E.elec, co2=saved*0.46;
  /* M&E(os.me) + 재료/노무/경비 3분할 + 실행률 — costLines와 동일 산식으로 PLATFORM/ApplyBar 정합 */
  const meSub=(os.me&&FD&&FD.me_prices)?totalM2*(((FD.me_prices.엑세스플로어)||0)+((FD.me_prices.복사패널)||0)):0;
  const total=frameGlass+cSkin+cHvac+cGrid+osFlat+meSub;
  const matSub=total;
  const laborSub=modTotal*(P.pFrameLabor||0)+skinN*(P.pSkinLabor||0)+hvacN*(P.pHvacLabor||0)+(grd.hasGrid?modTotal*(P.pGridLabor||0):0)+(os.hasOs?osCtlLabor:0); /* OS 노무 = 제어 SKU 내역 노무 */
  const expSub=modTotal*(P.pFrameExp||0)+skinN*(P.pSkinExp||0)+hvacN*(P.pHvacExp||0)+(grd.hasGrid?modTotal*(P.pGridExp||0):0)+(os.hasOs?osCtlExp:0); /* OS 경비 = 제어 SKU 내역 경비 */
  const er=(FD&&FD.exec_rate)||{재료:1.3,노무:1.5,경비:1.5};
  const directSub=matSub+laborSub+expSub;
  const execTotal=Math.round(matSub*(er.재료||1)+laborSub*(er.노무||1)+expSub*(er.경비||1));
  const savedFrac=baseline?saved/baseline:0;
  const payback=annualSave>0?(execTotal-conventional)/annualSave:null;
  return{total,matSub,laborSub,expSub,meSub,directSub,execTotal,er,frameGlass,cSkin,cHvac,hvacCompare,hvSys:hk.sys,cGrid,osFlat,baseline,saved,annualSave,co2,conventional,savedFrac,payback,optimized:baseline-saved,zoneCount,hvacN,modTotal,totalM2,zonePer:zPer};
}

const Lbl=({ch,caps=true})=><span style={{display:'block',fontSize:10,fontWeight:600,color:C.sub,letterSpacing:caps?'.08em':'.02em',textTransform:caps?'uppercase':'none',marginBottom:5,fontFamily:FF.disp}}>{ch}</span>;
const HR=()=><div style={{height:1,background:C.border,margin:'18px 0'}}/>;
/* 입력/산출 구분 칩 — tag="input"(테두리)·"result"(녹색 채움) */
const TagChip=({t})=>t==='input'
  ?<span style={{fontSize:9.5,fontWeight:600,padding:'2.5px 9px',borderRadius:980,border:`1px solid ${C.borderDark}`,color:C.sub,letterSpacing:'.02em',whiteSpace:'nowrap',fontFamily:FF.disp}}>입력 INPUT</span>
  :t==='result'
  ?<span style={{fontSize:9.5,fontWeight:600,padding:'2.5px 9px',borderRadius:980,background:C.green,color:C.white,letterSpacing:'.02em',whiteSpace:'nowrap',fontFamily:FF.disp}}>자동 산출 RESULT</span>
  :null;
const SH=({code,sub,tag})=><div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:14}}><span style={{fontFamily:FF.disp,fontSize:18,fontWeight:700,letterSpacing:'-.015em',color:C.ink}}>{code}</span>{sub&&<span style={{fontSize:11.5,color:C.sub}}>{sub}</span>}<TagChip t={tag}/></div>;

const NF=({label,value,onChange,unit,step=1,min=0,max})=>{
  /* 사용자 입력 중 버퍼 — 전부 지우거나 "-"/"."만 남은 상태에선 commit하지 않아 결과·렌더 폭주 방지 */
  const [buf,setBuf]=useState(null);
  /* 편집 중(buf 활성)에는 raw 그대로 표시 — "1." 같은 소수점 중간 입력이 지워지지 않도록. 콤마는 blur 후 복원 */
  const disp=buf!==null?buf:((typeof value==='number'&&isFinite(value))?value.toLocaleString():'');
  return(
    <div><Lbl ch={label}/>
      <div style={{display:'flex',alignItems:'baseline',gap:6,border:`1px solid ${C.border}`,borderRadius:10,background:C.white,padding:'7px 11px'}}>
        <input type="text" inputMode="decimal" value={disp}
          onChange={e=>{
            const raw=e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,'');
            setBuf(raw);
            if(raw===''||raw==='-'||raw==='.'||raw==='-.')return;
            const n=parseFloat(raw);
            if(isFinite(n))onChange(n);
          }}
          onBlur={()=>setBuf(null)}
          style={{flex:1,background:'transparent',border:'none',outline:'none',color:C.ink,fontFamily:FF.mono,fontSize:13,fontWeight:500,padding:0,minWidth:0}}/>
        {unit&&<span style={{fontSize:10,color:C.light,whiteSpace:'nowrap'}}>{unit}</span>}
      </div>
    </div>
  );
};

/* 테이블 셀용 숫자 입력 — NF와 동일한 편집 버퍼(소수점 입력 보존) */
const NumCell=({value,onChange,dp=3})=>{
  const [buf,setBuf]=useState(null);
  const disp=buf!==null?buf:((typeof value==='number'&&isFinite(value))?value.toLocaleString(undefined,{maximumFractionDigits:dp}):'');
  return(
    <input type="text" inputMode="decimal" value={disp}
      onChange={e=>{
        const raw=e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,'');
        setBuf(raw);
        if(raw===''||raw==='-'||raw==='.'||raw==='-.')return;
        const n=parseFloat(raw);
        if(isFinite(n))onChange(n);
      }}
      onBlur={()=>setBuf(null)}
      style={{width:'100%',border:'none',borderBottom:`1px solid ${C.border}`,background:'transparent',fontSize:11,color:C.ink,outline:'none',padding:'4px 0',fontFamily:FF.mono,textAlign:'right'}}/>
  );
};

const SR=({label,value,min,max,step=1,onChange,unit,warn})=>(
  <div><div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}><Lbl ch={label}/><span style={{fontFamily:FF.mono,fontSize:13,color:C.ink}}>{value}{unit}</span></div>
    <input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(parseFloat(e.target.value))} style={{width:'100%'}}/>
    {warn&&<p style={{fontSize:10,color:C.red,marginTop:5}}>{warn}</p>}
  </div>
);

const ChoiceGrid=({options,value,onChange,cols=2})=>(
  <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`,gap:6}}>
    {options.map(o=>{
      const on=value===o.id;
      const disabled=o.disabled;
      return<button key={o.id} onClick={()=>!disabled&&onChange(o.id)} style={{textAlign:'left',padding:'9px 12px',borderRadius:12,
        border:`1px solid ${on?C.blue:C.border}`,
        boxShadow:on?`0 0 0 1px ${C.blue} inset`:'none',
        background:on?C.blueLt:disabled?C.panel:C.white,
        opacity:disabled?0.4:1,cursor:disabled?'not-allowed':'pointer',transition:'all .18s ease'}}>
        <span style={{display:'block',fontFamily:FF.disp,fontWeight:600,fontSize:12,letterSpacing:'-.005em',color:C.ink}}>{o.label}</span>
        {o.sub&&<span style={{display:'block',fontSize:9.5,color:on?C.blue:C.sub,marginTop:1,fontFamily:FF.mono}}>{o.sub}</span>}
        {o.badge&&<span style={{display:'inline-block',marginTop:4,fontSize:8.5,fontWeight:600,padding:'1.5px 7px',borderRadius:980,background:o.badgeColor||C.green,color:C.white,fontFamily:FF.disp}}>{o.badge}</span>}
      </button>;
    })}
  </div>
);

const Toggle=({on,onClick,label,sub})=>(
  <button onClick={onClick} style={{display:'flex',alignItems:'center',gap:10,width:'100%',textAlign:'left',borderRadius:12,
    background:on?C.blueLt:C.white,border:`1px solid ${on?C.blue:C.border}`,boxShadow:on?`0 0 0 1px ${C.blue} inset`:'none',padding:'9px 12px',transition:'all .18s ease'}}>
    <span style={{width:16,height:16,borderRadius:'50%',border:`1.5px solid ${on?C.blue:C.borderDark}`,
      flexShrink:0,display:'grid',placeItems:'center',background:on?C.blue:'transparent',color:C.white}}>
      {on&&<IcoCh/>}
    </span>
    <span style={{flex:1}}>
      <span style={{display:'block',fontSize:12,fontWeight:600,color:C.ink}}>{label}</span>
      {sub&&<span style={{display:'block',fontSize:10,color:C.light,marginTop:1}}>{sub}</span>}
    </span>
  </button>
);

/* ═══ CROSS-SECTION SVG ═══ */
function SectionSVG({f,crt}){
  const sec=frameSection(f);
  /* frameHeight가 0/NaN/너무 작은 값일 때 scaleY=Infinity로 렌더 폭주하는 것 방지 */
  const safeH=Math.max(100,Number.isFinite(f.frameHeight)&&f.frameHeight>0?f.frameHeight:4500);
  const safeD=Math.max(50,Number.isFinite(f.depth)&&f.depth>0?f.depth:450);
  const scaleY=320/safeH;
  const cavW=Math.max(50,Math.min(160,(safeD/1500)*160));
  const glassW=14, marginL=104, marginR=88;
  const totalW=marginL+glassW+cavW+glassW+marginR;
  const h2=sec.H2*scaleY, h3=sec.H3*scaleY, h4=sec.H4*scaleY, h1=sec.H1*scaleY;
  const frameH=safeH*scaleY;
  const innerX=marginL, outerX=marginL+glassW+cavW;
  const top=20, svgH=frameH+60;
  const y2=top, y3=top+h2, y4=top+h2+h3, y1=top+h2+h3+h4;
  const skinCart=frameSkinSpec(f,crt); /* 프레임별 루버 */
  const skinOk=crt.hasSkin&&skinCart&&f.depth>=skinCart.minD&&f.depth<=skinCart.maxD;
  const hvacOk=hvacKind(crt).isCart&&f.depth>=1000; /* 단면 캐비티 AIR HANDLING 표시는 카트리지(바닥/천장)만 */

  const insHatch=(x,y,w,h)=>{
    const lines=[];
    for(let i=0;i<h+w;i+=8){lines.push(<line key={i} x1={x+Math.max(0,i-h)} y1={y+Math.min(i,h)} x2={x+Math.min(i,w)} y2={y+Math.max(0,i-w)} stroke={C.borderDark} strokeWidth={0.6}/>);}
    return<><rect x={x} y={y} width={w} height={h} fill={C.panel}/>{lines}<rect x={x} y={y} width={w} height={h} fill="none" stroke={C.borderDark} strokeWidth={0.7}/></>;
  };
  const lab=(y,h,t1,t2,col)=>(<>
    <text x={innerX-5} y={y+h/2+2} textAnchor="end" fontSize="6.5" fontFamily={FF.mono} fill={col}>{t1}</text>
    <text x={innerX-5} y={y+h/2+11} textAnchor="end" fontSize="7" fontFamily={FF.mono} fill={C.light}>{t2}</text>
  </>);

  return(
    <svg viewBox={`0 0 ${totalW} ${svgH}`} width="100%" style={{display:'block',background:C.white,border:`1px solid ${C.border}`}}>
      <text x={innerX+glassW/2} y={14} textAnchor="middle" fontSize="7" fontFamily={FF.mono} fill={C.light}>INNER</text>
      <text x={innerX+glassW+cavW/2} y={14} textAnchor="middle" fontSize="7" fontFamily={FF.mono} fill={C.light}>CAVITY {fmt(f.depth)}</text>
      <text x={outerX+glassW/2} y={14} textAnchor="middle" fontSize="7" fontFamily={FF.mono} fill={C.light}>OUTER</text>

      {/* INNER — H2 상부 스팬드럴 */}
      {insHatch(innerX,y2,glassW,h2)}
      {lab(y2,h2,'스팬드럴(상)',`H2 ${fmt(sec.H2)}mm`,C.sub)}
      {/* H3 비전 */}
      <rect x={innerX} y={y3} width={glassW} height={h3} fill={C.blueLt} stroke={C.blue} strokeWidth={0.7}/>
      {sec.needsSplit&&<line x1={innerX} x2={innerX+glassW} y1={y3+h3/2} y2={y3+h3/2} stroke={C.blue} strokeWidth={0.7} strokeDasharray="3 2"/>}
      {lab(y3,h3,'비전(시창)',`H3 ${fmt(sec.H3)}mm`,C.blue)}
      {/* H4 하부 스팬드럴 */}
      {insHatch(innerX,y4,glassW,h4)}
      {lab(y4,h4,'스팬드럴(하)',`H4 ${fmt(sec.H4)}mm`,C.sub)}
      {/* H1 가이드 */}
      <rect x={innerX} y={y1} width={glassW} height={h1} fill={C.gray} stroke={C.borderDark} strokeWidth={0.7}/>
      {Array.from({length:2}).map((_,k)=><line key={k} x1={innerX+2} x2={innerX+glassW-2} y1={y1+h1*(k+1)/3} y2={y1+h1*(k+1)/3} stroke={C.borderDark} strokeWidth={0.7}/>)}
      {lab(y1,h1,'가이드',`H1 ${fmt(sec.H1)}mm`,C.sub)}

      {/* OUTER — 외부접합 전체 H */}
      <rect x={outerX} y={top} width={glassW} height={frameH} fill={C.blueLt} stroke={C.blue} strokeWidth={0.7} opacity={0.8}/>
      {sec.needsSplit&&<line x1={outerX} x2={outerX+glassW} y1={top+frameH/2} y2={top+frameH/2} stroke={C.blue} strokeWidth={0.7} strokeDasharray="3 2"/>}
      <text x={outerX+glassW+5} y={top+frameH/2+2} fontSize="6.5" fontFamily={FF.mono} fill={C.blue}>외부접합</text>
      <text x={outerX+glassW+5} y={top+frameH/2+11} fontSize="7" fontFamily={FF.mono} fill={C.light}>{sec.thickness} · H {fmt(f.frameHeight)}mm</text>

      {/* CAVITY — skin cartridge over vision */}
      {skinOk&&(()=>{
        /* 루버 종류별 도식: 롤블라인드=상단 롤+스크린 절반 / 베네시안=상단 절반까지 블레이드(촘촘) / 수직루버=폭별 수직 박스(≤1200→3, 1200+→4) */
        const sx=innerX+glassW+4, sw=cavW-8, sy=y3, sh=h3, cx=sx+sw/2, id=skinCart.id;
        let body=null;
        if(id==='roller'){
          const rollH=Math.min(11,sh*0.13), scrTop=sy+rollH, scrH=(sh-rollH)*0.5, tex=Math.max(2,Math.round(scrH/9));
          body=(<>
            <rect x={sx+2} y={scrTop} width={sw-4} height={scrH} fill={C.amber} opacity={0.16} stroke={C.amber} strokeWidth={0.7}/>
            {Array.from({length:tex}).map((_,k)=><line key={'t'+k} x1={sx+3} x2={sx+sw-3} y1={scrTop+(k+1)*scrH/(tex+1)} y2={scrTop+(k+1)*scrH/(tex+1)} stroke={C.amber} strokeWidth={0.5} opacity={0.45}/>)}
            <rect x={sx+1} y={scrTop+scrH-2.5} width={sw-2} height={2.6} fill={C.amber}/>
            <rect x={sx} y={sy} width={sw} height={rollH} rx={Math.min(rollH/2,5)} fill={C.amber} opacity={0.85} stroke={C.amber} strokeWidth={0.7}/>
          </>);
        } else if(id==='venetian'){
          const half=sh*0.5, n=Math.max(9,Math.round(half/3.4));
          body=(<>
            <rect x={sx} y={sy} width={sw} height={3} fill={C.amber}/>
            {Array.from({length:n}).map((_,k)=><line key={'b'+k} x1={sx+1} x2={sx+sw-1} y1={sy+4+(k+0.5)*(half-4)/n} y2={sy+4+(k+0.5)*(half-4)/n} stroke={C.amber} strokeWidth={1} strokeLinecap="round" opacity={0.85}/>)}
          </>);
        } else {
          const n=(f.frameWidth>1200)?4:3, gap=2, bw=(sw-gap*(n+1))/n, bh=sh*0.9, by=sy+sh*0.05;
          body=Array.from({length:n}).map((_,k)=><rect key={'v'+k} x={sx+gap+k*(bw+gap)} y={by} width={Math.max(2,bw)} height={bh} fill={C.amber} opacity={0.16} stroke={C.amber} strokeWidth={0.7}/>);
        }
        return(<g>
          <rect x={sx} y={sy} width={sw} height={sh} fill="none" stroke={C.amber} strokeWidth={0.6} strokeDasharray="4 2"/>
          {body}
          <text x={cx} y={sy-3} textAnchor="middle" fontSize="6.5" fontFamily={FF.mono} fill={C.amber}>SKIN CARTRIDGE</text>
        </g>);
      })()}
      {hvacOk&&(
        <g>
          <rect x={innerX+glassW+4} y={y4} width={cavW-8} height={h4} fill="none" stroke={C.green} strokeWidth={0.7} strokeDasharray="4 2"/>
          <text x={innerX+glassW+cavW/2} y={y4-3} textAnchor="middle" fontSize="6.5" fontFamily={FF.mono} fill={C.green}>AIR HANDLING</text>
          {Array.from({length:2}).map((_,k)=><line key={k} x1={innerX+glassW+10} x2={innerX+glassW+cavW-10} y1={y4+h4*(0.4+k*0.25)} y2={y4+h4*(0.4+k*0.25)} stroke={C.green} strokeWidth={0.6}/>)}
        </g>
      )}

      <text x={totalW/2} y={svgH-6} textAnchor="middle" fontSize="7" fontFamily={FF.mono} fill={sec.needsSplit?C.red:C.light}>{sec.needsSplit?'⚠ 높이 6m 초과 — 유리 2분절 필요':`H ${fmt(f.frameHeight)} = H1 ${fmt(sec.H1)}+H2 ${fmt(sec.H2)}+H3 ${fmt(sec.H3)}+H4 ${fmt(sec.H4)}`}</text>
      <line x1={innerX} y1={svgH-22} x2={outerX+glassW} y2={svgH-22} stroke={C.light} strokeWidth={0.6}/>
      <text x={(innerX+outerX+glassW)/2} y={svgH-25} textAnchor="middle" fontSize="6.5" fontFamily={FF.mono} fill={C.sub}>D={fmt(f.depth)}mm</text>
    </svg>
  );
}

/* ═══ PLATFORM TAB ═══ */
function PlatformTab({zones,setZones,zonePer,setZonePer,floorZones,setFloorZones,frames,f,crt,grd,os,E,setE,P,FD,overview,setOverview,committed,plan}){
  const [editId,setEditId]=useState(null);
  const [showE,setShowE]=useState(false);
  const [showOv,setShowOv]=useState(true);
  const [showParcels,setShowParcels]=useState(false);
  let _id=zones.length+10;
  /* 결과 계산은 committed(적용된 값) 사용. 입력 UI는 raw state 그대로 */
  const C_=committed||{zones,frames,crt,grd,os,E,P};
  const cFrame=(C_.frames&&(C_.frames.find(x=>x.id===f.id)||C_.frames[0]))||f;
  const cCrt=C_.crt, cGrd=C_.grd, cOs=C_.os;
  const results=useMemo(()=>{
    const c=C_;
    const osFlat=c.os.hasOs?(c.P.pOsBase+(c.os.sunTrack?c.P.pOsSun:0)+(c.os.energy?c.P.pOsEnergy:0)+(c.os.bms?c.P.pOsBms:0)):0;
    const agg=zoneAgg(c.zones,C_.floorZones,c.frames,c.crt,c.grd,c.os,c.E,c.P,FD,C_.zonePer);
    return{agg,osFlat};
  },[committed,FD]);
  const {agg}=results;
  const lcc=useMemo(()=>lccAnalyze(agg,C_.E,C_.P,FD,(C_.overview&&C_.overview.location)||(overview&&overview.location)||''),[agg,C_.E,C_.P,FD,C_.overview,overview]);
  const wd=v=>(v<0?'−':'')+won(Math.abs(Math.round(v||0)));
  const costItems=[{c:'FRAME + GLASS (엔진)',v:agg.frameGlass,col:C.blue},{c:'SKIN CARTRIDGE',v:agg.cSkin,col:C.amber},{c:'AIR HANDLING',v:agg.cHvac,col:C.green},{c:'GRID (조명)',v:agg.cGrid,col:'#5a3e7a'},{c:'OS 시스템',v:agg.osFlat,col:C.ink}].filter(i=>i.v>0);
  const cMax=Math.max(...costItems.map(i=>i.v),1);
  const ov=overview||{};
  const NUMK_OV=['gfa','floorsAbove','floorsBelow','height','siteArea'];
  const ovf=(k,label,unit)=>{
    const isN=NUMK_OV.includes(k);
    const raw=ov[k]==null?'':String(ov[k]);
    const disp=isN&&raw!==''?(isFinite(Number(raw.replace(/,/g,'')))?Number(raw.replace(/,/g,'')).toLocaleString():raw):raw;
    return(
      <div><Lbl ch={label}/><div style={{display:'flex',alignItems:'baseline',gap:5,border:`1px solid ${C.borderDark}`,background:C.white,padding:'7px 10px'}}>
        <input value={disp} onChange={e=>{
          const next=isN?e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,''):e.target.value;
          setOverview(s=>({...s,[k]:next}));
        }} style={{flex:1,border:'none',background:'transparent',fontSize:12,color:C.ink,outline:'none',fontFamily:isN?FF.mono:'inherit'}}/>
        {unit&&<span style={{fontSize:10,color:C.light}}>{unit}</span>}
      </div></div>
    );
  };
  /* PLAN 연동 — 필지(SSOT)·계획안 선택 옵션에서 OVERVIEW 파생 */
  const planParcels=((plan&&plan.site&&Array.isArray(plan.site.parcels))?plan.site.parcels:[]).filter(q=>q&&q.addr);
  const planArea=planParcels.reduce((a,q)=>a+(Number(q.area)||0),0);
  const planOpt=(plan&&Array.isArray(plan.options))?plan.options.find(o=>o.id===plan.selected):null;
  const planUse=(plan&&plan.targets&&plan.targets.use)||'';
  const locSummary=planParcels.length?(planParcels.length>1?`${planParcels[0].addr} 외 ${planParcels.length-1}필지`:planParcels[0].addr):'';
  /* 용도·층수·높이·연면적: PLAN 계획안과 상시 동기화 / 대지위치·면적: 비었을 때만 기본 채움(수정 허용) */
  useEffect(()=>{
    const patch={};
    if(planUse&&ov.use!==planUse)patch.use=planUse;
    if(planOpt){
      if(String(ov.floorsAbove||'')!==String(planOpt.floors))patch.floorsAbove=String(planOpt.floors);
      if(String(ov.height||'')!==String(planOpt.height))patch.height=String(planOpt.height);
      if(String(ov.gfa||'')!==String(planOpt.gfa))patch.gfa=String(planOpt.gfa);
    }
    if(locSummary&&!ov.location)patch.location=locSummary;
    if(planArea>0&&!ov.siteArea)patch.siteArea=String(Math.round(planArea*10)/10);
    if(Object.keys(patch).length)setOverview(s2=>({...s2,...patch}));
  },[planUse,planOpt&&planOpt.floors,planOpt&&planOpt.height,planOpt&&planOpt.gfa,locSummary,planArea]);
  /* 읽기전용(PLAN 동기화) 필드 카드 */
  const ovRO=(label,val,unit,note)=>(
    <div><Lbl ch={label}/>
      <div style={{display:'flex',alignItems:'baseline',gap:5,border:`1px solid ${C.green}`,background:C.greenLt,padding:'7px 10px'}}>
        <span style={{flex:1,fontSize:12,color:C.green,fontFamily:FF.mono}}>{(val===''||val==null)?'—':val}</span>
        {unit&&<span style={{fontSize:10,color:C.light}}>{unit}</span>}
      </div>
      <span style={{fontSize:8.5,color:C.green,letterSpacing:'.04em'}}>⧉ {note||'PLAN 연동'}</span>
    </div>
  );

  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="PLATFORM" sub="종합 분석 — 견적·에너지 종합" tag="result"/>
      {/* 건축 개요 */}
      <button onClick={()=>setShowOv(s=>!s)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'transparent',border:'none',padding:'2px 0',width:'100%',marginBottom:showOv?12:18}}>
        <span style={{fontFamily:FF.disp,fontSize:16,letterSpacing:'.08em',color:C.ink}}>PROJECT OVERVIEW <span style={{fontSize:11,color:C.light,marginLeft:6}}>건축 개요</span></span>
        <IcoDn s={16} rot={showOv?180:0}/>

/* ═══ FRAME TAB ═══ */
/* 한상은 계획안 모델의 '층고' = 프레임 높이 H 상한(mm).
   모델은 fhCapFor(mount,ti)로 H를 층고(insert면 -슬래브) 이하로 클램프 → 그 값을 그대로 캡으로 사용.
   타입 인덱스 ti: 'TYPE n' → n-1 (0=기준프레임). 모델 미로딩/접근불가면 null(=캡 없음). */
function frameFHCapMM(frameName){
  try{
    const ifr=document.getElementById('plan-massing-frame'), w=ifr&&ifr.contentWindow;
    if(!w||typeof w.getDesignState!=='function')return null;
    const m=/^TYPE\s*(\d+)/.exec(String(frameName||'')); const ti=m?Math.max(0,parseInt(m[1],10)-1):0;
    const ds=w.getDesignState();
    let mount='attach';
    if(ti>0&&ds&&Array.isArray(ds.frameTypesEx)&&ds.frameTypesEx[ti-1]&&ds.frameTypesEx[ti-1].mount)mount=ds.frameTypesEx[ti-1].mount;
    else if(ds&&ds.frameMount)mount=ds.frameMount;
    if(typeof w.fhCapFor==='function'){const c=w.fhCapFor(mount,ti);if(isFinite(c)&&c>0)return Math.round(c);}
    const fh=ds&&ds.building&&ds.building.tFloorH;
    return (isFinite(fh)&&fh>0)?Math.round(fh*1000):null;
  }catch(e){return null;}
}

function FrameTab({f,setF,crt,frames,activeFrameId,setActiveFrameId,setFrames,planMeta,FD,toast}){
  const fhCap=frameFHCapMM(f&&f.name);   /* 모델 층고 캡(mm) — 없으면 null */
  const fhCapStep=fhCap?Math.floor(fhCap/50)*50:null;  /* 50mm 스텝 정렬 상한 */
  const sec=useMemo(()=>frameSection(f),[f]);
  const pf=k=>v=>setF(s=>({...s,[k]:v}));
  /* 계획안(한상은 iframe) 프레임 타입 → FRAME 동기화: 치수·유리만 갱신, 내 세부사양(H분절·유리카탈로그·루버 등) 보존. 이름(TYPE n/코너 n) 매칭 */
  const syncTypes=()=>{
    try{
      const ifr=document.getElementById('plan-massing-frame'), w=ifr&&ifr.contentWindow;
      if(!w){window.alert('계획안 툴을 불러오지 못했습니다.');return;}
      const gPre=g=>((g==='low')||/저철분/.test(String(g)))?'시장단가_저철분':'시장단가_중간';
      let specs=[];
      /* 1순위: getDesignState()로 정의된 모든 타입(base+frameTypesEx) — 베이 배정·견적단계 무관, 4개 타입 전부 반영 */
      let design=null; try{ if(typeof w.getDesignState==='function') design=w.getDesignState(); }catch(e){}
      if(design&&(design.frame||Array.isArray(design.frameTypesEx))){
        const base=design.frame||{};
        specs.push({name:'TYPE 1',t:{W:base.frameW,D:base.frameD,H:base.frameH,glass:design.glassType}});
        (design.frameTypesEx||[]).forEach((t,i)=>specs.push({name:'TYPE '+(i+2),t:{W:t.W,D:t.D,H:t.H,glass:t.glass}}));
      }else{
        /* 2순위: __massingValues.frameTypes (count>0 배정 타입만) */
        const mv=w.__massingValues;
        if(!mv){window.alert('계획안 결과가 없습니다. PLAN 탭에서 계획안 도구로 타입을 만든 뒤 동기화하세요.');return;}
        const ftL=Array.isArray(mv.frameTypes)?mv.frameTypes:[], ctL=Array.isArray(mv.cornerTypes)?mv.cornerTypes:[];
        specs=[...ftL.map((t,i)=>({name:'TYPE '+(i+1),t})),...ctL.map((t,i)=>({name:'코너 '+(i+1),t}))];
      }
      if(!specs.length){window.alert('계획안에 프레임 타입이 없습니다.');return;}
      let added=0,updated=0;
      setFrames(prev=>{
        const next=prev.map(x=>({...x})), usedId=new Set(next.map(x=>x.id));
        const newId=()=>{let c=65;while(usedId.has(String.fromCharCode(c)))c++;const id=String.fromCharCode(c);usedId.add(id);return id;};
        specs.forEach(({name,t})=>{
          const dims={frameWidth:Math.round(t.W||1200),depth:Math.round(t.D||800),frameHeight:Math.round(t.H||4000),glassPreset:gPre(t.glass)};
          const ex=next.find(x=>x.name===name);
          if(ex){Object.assign(ex,dims);updated++;}        /* H분절·유리Sel·루버·engineFrameType 등 세부사양 보존 */
          else{const id=newId();next.push({...frameDefaults(id,name),...dims});added++;}
        });
        return next;
      });
      if(toast)toast(`계획안 타입 동기화 — 갱신 ${updated} · 추가 ${added} (치수·유리만, 세부사양 보존)`);
    }catch(e){window.alert('동기화 오류: '+((e&&e.message)||e));}
  };
  const addType=()=>{
    const used=new Set(frames.map(x=>x.id));
    let code='A'.charCodeAt(0); while(used.has(String.fromCharCode(code)))code++;
    const id=String.fromCharCode(code);
    const base=frames.find(x=>x.id===activeFrameId)||frames[0];
    const nf={...base,id,name:`TYPE ${id}`};
    setFrames(fs=>[...fs,nf]); setActiveFrameId(id);
  };
  const delType=()=>{
    if(frames.length<=1){window.alert('최소 1개 타입은 있어야 합니다.');return;}
    if(!window.confirm(`'${f.name}' 타입을 삭제할까요? (이 타입을 쓰는 존은 첫 타입으로 이동)`))return;
    setFrames(fs=>fs.filter(x=>x.id!==activeFrameId));
    setActiveFrameId(frames.find(x=>x.id!==activeFrameId).id);
  };
  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="FRAME" sub="프레임 타입별 사양" tag="input"/>
      {/* 타입 선택 바 */}
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:18,paddingBottom:14,borderBottom:`1.5px solid ${C.border}`}}>

          <NF label="이중외피 깊이 D" unit="mm" value={f.depth} step={50} min={450} max={1500} onChange={v=>setF(s=>({...s,depth:Math.round(v/50)*50}))}/>

        {f.depth<600&&<div style={{fontSize:10.5,color:C.amber,marginBottom:6,lineHeight:1.6}}>※ 깊이 450~550mm: 롤블라인드·베네시안만 적용 가능</div>}

        </div>
        <div style={{marginBottom:14}}><Lbl ch="외부 프레임 타입"/><ChoiceGrid options={[{id:'유리',label:'유리 타입',sub:'MPS-013'},{id:'키넥티',label:'키넥티',sub:'MPS-016'}]} value={f.engineFrameType} onChange={pf('engineFrameType')} cols={2}/></div>
        {/* 유리 — ADMIN '유리 단가(종류별)' 카탈로그 직결. 선택 항목이 견적단가에 직접 반영 */}
        {(()=>{
          const outerItems=glassCatGroup(FD,'jh').items.filter(it=>it.key);
          const innerItems=glassCatGroup(FD,'bc').items.filter(it=>it.key);
          const autoThick=f.floors>10?'17.52T':'13.52T';
          const curOuter=f.outerGlassSel||(outerItems.find(it=>it.key==='외부접합_'+autoThick&&it.preset==='중간')||outerItems[0]||null);
          const curInner=f.innerGlassSel||(innerItems.find(it=>it.preset==='중간')||innerItems[0]||null);
          const oid=curOuter?(curOuter.key+'|'+(curOuter.grade||curOuter.preset)):'';
          const iid=curInner?(curInner.key+'|'+(curInner.grade||curInner.preset)):'';
          const pick=(field,items)=>id=>{const it=items.find(x=>(x.key+'|'+x.preset)===id);if(it)setF(s=>({...s,[field]:{key:it.key,price:it.price,name:it.name,grade:it.preset}}));};
          const efx=(FD&&FD.energy_factors)||{};
          return(<>
            <div style={{marginBottom:6}}><Lbl ch={`외부 접합유리 · 두께 자동 ${autoThick}`}/>
              <ChoiceGrid options={outerItems.map(it=>({id:it.key+'|'+it.preset,label:it.name,sub:won(it.price)+'/㎡'}))} value={oid} onChange={pick('outerGlassSel',outerItems)} cols={2}/></div>
            <div style={{marginBottom:10}}><Lbl ch="내부 복층유리"/>
              <ChoiceGrid options={innerItems.map(it=>({id:it.key+'|'+it.preset,label:it.name,sub:won(it.price)+'/㎡'}))} value={iid} onChange={pick('innerGlassSel',innerItems)} cols={2}/></div>
            <Toggle on={isSolarControl(f)} onClick={()=>setF(s=>({...s,solarControl:!isSolarControl(s)}))} label="고사양 일사차폐 유리" sub={`외피 절감계수 ${Math.round(((efx.env_high??0.105))*1000)/10}% (일반 ${Math.round(((efx.env_std??0.096))*1000)/10}%)`}/>
            <p style={{fontSize:10,color:C.light,marginTop:10,lineHeight:1.6}}>※ 유리 종류·단가는 <b>ADMIN「유리 단가」</b> 연동 — 선택 즉시 견적 반영. 두께(13.52/17.52T)는 층수·풍하중으로 자동 결정. 단열·패널은 카탈로그 단가 자동반영.</p>
          </>);
        })()}
      </div>

      {/* section diagram */}
      <div>
        <SH code="SECTION DIAGRAM" sub="이중외피 단면 — 자동 업데이트" tag="result"/>
        <SectionSVG f={f} crt={crt}/>
        <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          {[{l:'외부접합 (H)',v:`${fmt(sec.outerGlassH)}mm`},{l:'비전 H3',v:`${fmt(sec.H3)}mm`},{l:'스팬드럴 H2',v:`${fmt(sec.H2)}mm`},{l:'이중외피 깊이 D',v:`${fmt(f.depth)}mm`},{l:'프레임 폭 W',v:`${fmt(f.frameWidth)}mm`},{l:'유리 두께',v:sec.thickness}].map(r=>(
            <div key={r.l} style={{background:C.panel,padding:'10px 12px',borderLeft:`3px solid ${C.green}`}}>
              <Lbl ch={r.l}/>
              <div style={{fontFamily:FF.mono,fontSize:16,color:C.ink}}>{r.v}</div>
            </div>
          ))}
        </div>
        {sec.needsSplit&&(
          <div style={{marginTop:16,padding:'14px',background:C.redLt,border:`1.5px solid ${C.red}`}}>
            <span style={{fontFamily:FF.disp,fontSize:14,letterSpacing:'.08em',color:C.red}}>2분절 (SPLIT REQUIRED)</span>
            <p style={{fontSize:11,color:C.red,marginTop:6,lineHeight:1.6}}>층고 {fmt(f.frameHeight)}mm는 6,000mm 초과 — 내·외부 유리 모두 높이 방향 2분절 시공이 필요합니다. 중간 수평 프레임이 추가되며 단가에 반영됩니다.</p>
          </div>
        )}
      </div>
    </div>
    </div>
  );
}

/* ═══ SKIN CARTRIDGE TAB ═══ 프레임 타입별 루버 개별 지정 */
const SKIN_NONE={id:'none',label:'미적용',en:'No Louver',minD:0,maxD:99999,shade:0};
function SkinTab({frames,crt,setCrt,setFrames,FD}){
  const setFrameSkin=(fid,id)=>setFrames(fs=>fs.map(fr=>fr.id===fid?{...fr,skinType:id}:fr));
  const opts=[SKIN_NONE,...SKIN_CARTS];
  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="SKIN CARTRIDGE" sub="전동 차양 — 프레임 타입별 루버" tag="input"/>
      <Toggle on={crt.hasSkin} onClick={()=>setCrt(s=>({...s,hasSkin:!s.hasSkin}))} label="스킨카트리지 적용" sub="전동 차양을 이중외피 내 설치 · 프레임 타입마다 루버 종류를 다르게 지정 · 비용·에너지 절감은 타입별로 합산"/>
      {crt.hasSkin&&(
        <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:16}}>
          {frames.map(fr=>{
            const cur=fr.skinType||crt.skinType||'venetian';
            return(
              <div key={fr.id} style={{border:`1px solid ${C.border}`,background:C.panel,padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:10}}>
                  <span style={{fontFamily:FF.disp,fontSize:15,letterSpacing:'.05em',color:C.ink}}>{fr.name}</span>
                  <span style={{fontFamily:FF.mono,fontSize:11,color:C.sub}}>W{fr.frameWidth} · D{fr.depth}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(225px,1fr))',gap:8}}>
                  {opts.map(c=>{
                    const on=cur===c.id; const ok=c.id==='none'||(fr.depth>=c.minD&&fr.depth<=c.maxD);
                    return(
                      <button key={c.id} onClick={()=>ok&&setFrameSkin(fr.id,c.id)} disabled={!ok} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'9px 12px',border:`1.5px solid ${on?C.ink:C.border}`,background:on?C.ink:ok?C.white:C.panel,color:on?C.white:ok?C.ink:C.light,opacity:ok?1:0.45,cursor:ok?'pointer':'not-allowed',textAlign:'left'}}>
                        <span style={{display:'flex',flexDirection:'column',minWidth:0}}>
                          <span style={{fontFamily:FF.disp,fontSize:12.5,letterSpacing:'.04em',whiteSpace:'nowrap'}}>{c.label}</span>
                          <span style={{fontSize:9.5,fontFamily:FF.mono,color:on?'#ccc':C.light,marginTop:1}}>{c.id==='none'?'차양 미적용':`D${c.minD}~${c.maxD} · -${c.shade}%`}</span>
                        </span>
                        {c.id!=='none'&&<span style={{fontFamily:FF.mono,fontSize:11,color:on?C.white:C.amber,whiteSpace:'nowrap'}}>{won(skinP(c,FD))}</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
      <p style={{fontSize:10,color:C.light,marginTop:14,lineHeight:1.7}}>※ 프레임 타입마다 루버를 개별 지정합니다. 적용범위(깊이)를 벗어나는 루버는 선택 불가하며, 「미적용」 또는 깊이 부족 타입의 존은 차양 미적용으로 계산됩니다. SKIN 비용·차양효과는 프레임 타입별 모듈 수량으로 합산됩니다.</p>
    </div>
  );
}

/* ═══ AIR HANDLING (공조시스템) TAB ═══ */
/* radioRow/checkRow는 컴포넌트가 아니라 JSX를 반환하는 헬퍼(직접 호출) — 내부 컴포넌트 정의 금지 규약 위배 아님(remount 없음) */
function hvRadioRow(checked,label,sub,onClick,disabled,indent){
  return(
    <div onClick={disabled?undefined:onClick} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'11px 13px',marginLeft:(indent||0)*22,marginTop:6,borderRadius:12,border:`1px solid ${checked?C.blue:C.border}`,boxShadow:checked?`0 0 0 1px ${C.blue} inset`:'none',background:checked?C.blueLt:C.white,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1,transition:'all .18s ease'}}>
      <div style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${checked?C.blue:C.borderDark}`,flexShrink:0,marginTop:1,display:'flex',alignItems:'center',justifyContent:'center'}}>{checked&&<div style={{width:8,height:8,borderRadius:'50%',background:C.blue}}/>}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,color:C.ink}}>{label}</div>
        {sub&&<div style={{fontSize:10.5,color:C.sub,marginTop:2,lineHeight:1.5}}>{sub}</div>}
      </div>
    </div>
  );
}
function hvCheckRow(checked,label,onClick){
  return(
    <div onClick={onClick} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderRadius:980,border:`1px solid ${checked?C.blue:C.border}`,boxShadow:checked?`0 0 0 1px ${C.blue} inset`:'none',background:checked?C.blueLt:C.white,cursor:'pointer',transition:'all .18s ease'}}>
      <div style={{width:15,height:15,borderRadius:'50%',border:`1.5px solid ${checked?C.blue:C.borderDark}`,background:checked?C.blue:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:9,lineHeight:1}}>{checked?'✓':''}</div>
      <span style={{fontSize:12,fontWeight:checked?600:400,color:C.ink}}>{label}</span>
    </div>
  );
}

          <div key={fr.id} style={{padding:'8px 13px',borderRadius:10,border:`1px solid ${ok?C.green:C.border}`,background:ok?C.greenLt:C.white}}>
            <span style={{fontFamily:FF.disp,fontWeight:600,fontSize:12,letterSpacing:'-.005em',color:C.ink}}>{fr.name}</span>
            <span style={{fontFamily:FF.mono,fontSize:11,color:C.sub,marginLeft:8}}>D{fr.depth}</span>

      </div>
      <Toggle on={crt.hasHvac} onClick={()=>pc('hasHvac')(!crt.hasHvac)} label="공조시스템 적용" sub="아래에서 시스템 유형을 선택 — 견적·에너지 절감에 반영"/>
      {crt.hasHvac&&<div style={{marginTop:14}}>

        {hvRadioRow(sys==='cart','A. 공조카트리지 (기본 적용)','바닥형/천장형 분산 공조 — 풍량·FTU 상세 스펙 선택 · 전열교환기·가습·UV 옵션'+(anyOk?'':' · 현재 적용 가능 깊이 타입 없음'),()=>pc('hvacSys')('cart'),false,0)}
        {sys==='cart'&&<>
          {/* 공조카트리지 풍량(CMH) 상세 스펙 — 신평택 CDC 실견적 분해 */}

            <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.max(1,cmhList.length)},1fr)`,gap:6,marginBottom:9}}>
              {cmhList.map(k=>{const on=cmh===k;const p=(hc.cmh_prices||{})[k];return(
                <button key={k} onClick={()=>pc('cmh')(k)} style={{padding:'8px 6px',borderRadius:12,border:`1px solid ${on?C.blue:C.border}`,boxShadow:on?`0 0 0 1px ${C.blue} inset`:'none',background:on?C.blueLt:C.white,color:C.ink,cursor:'pointer',textAlign:'center',transition:'all .18s ease'}}>
                  <span style={{display:'block',fontFamily:FF.disp,fontWeight:600,fontSize:13,letterSpacing:'-.005em'}}>{(+k).toLocaleString()}</span>
                  <span style={{display:'block',fontSize:9,fontFamily:FF.mono,color:on?C.blue:C.light,marginTop:1}}>{won(p)}·{k==='3600'?'실값':'추정'}</span>

      {os.hasOs&&(
        <div style={{display:'flex',flexDirection:'column',gap:20,marginTop:20}}>

            <Toggle on={os.energy} onClick={()=>po('energy')(!os.energy)} label="에너지 모니터링 대시보드" sub="실시간 소비·절감 현황 시각화 / 월별 리포트 제공"/>

            <Toggle on={os.scheduler} onClick={()=>po('scheduler')(!os.scheduler)} label="스케줄 & 프리셋 모드" sub={`쾌적·절약·스케줄 모드 — ${OS_MODES.map(m=>m.label).join(' / ')}`}/>
          </div>
          <HR/>
          {/* FIT 제어(ICT·b.IoT) SKU 상세 내역 — 읽기전용, ADMIN 편집 */}
          {osc&&(()=>{

            const inst=Math.max(0,(osc.mat||0)-equip);
            const tot=(osc.mat||0)+(osc.labor||0)+(osc.exp||0);
            const cats=['시스템','DDC','Field'];
            return(

                <span style={{fontFamily:FF.disp,fontSize:14,letterSpacing:'.06em',color:C.ink}}>FIT 제어 상세 (ICT · b.IoT)</span>
                <span style={{fontSize:11,color:C.ink,fontWeight:600}}>{osc.label}</span>
                <span style={{fontSize:10,color:C.light,marginLeft:'auto'}}>HVAC 등압/가압 선택 연동 · 관수8지구 실견적 기준 (ADMIN 편집)</span>
              </div>
              <div style={{border:`1px solid ${C.border}`}}>
                {cats.map(cat=>{const its=(osc.items||[]).filter(it=>it.c===cat);if(!its.length)return null;return(
                  <div key={cat}>
                    <div style={{background:C.panel,padding:'5px 12px',fontFamily:FF.mono,fontSize:10,color:C.sub,letterSpacing:'.04em',borderTop:`1px solid ${C.border}`}}>{cat==='시스템'?'시스템 자재비':cat==='DDC'?'DDC Part':'Field Device'}</div>
                    {its.map((it,i)=>(
                      <div key={i} style={{display:'flex',justifyContent:'space-between',gap:8,padding:'5px 12px',borderTop:`1px solid ${C.border}`,fontSize:11}}>
                        <span style={{color:C.ink,flex:1}}>{it.n}{it.s?<span style={{color:C.light,fontSize:9.5}}> · {it.s}</span>:null}</span>
                        <span style={{fontFamily:FF.mono,color:C.sub,whiteSpace:'nowrap'}}>{it.q}×{won(it.p)}</span>
                        <span style={{fontFamily:FF.mono,color:C.ink,minWidth:70,textAlign:'right'}}>{won((it.q||0)*(it.p||0))}</span>
                      </div>))}
                  </div>);})}
                <div style={{display:'flex',justifyContent:'space-between',padding:'5px 12px',borderTop:`1px solid ${C.border}`,fontSize:11}}>
                  <span style={{color:C.ink,flex:1}}>설치공사 자재 <span style={{color:C.light,fontSize:9.5}}>· 전선·케이블·제어반 등</span></span>
                  <span style={{fontFamily:FF.mono,color:C.ink,minWidth:70,textAlign:'right'}}>{won(inst)}</span>
                </div>
                {[['재료비 합계',osc.mat,C.ink],['설치·시운전 노무',osc.labor,C.sub],['기술료·경비·공과잡비',osc.exp,C.sub]].map(([l,v,col])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 12px',borderTop:`1px solid ${C.border}`,background:C.panel,fontSize:11}}>
                    <span style={{color:col}}>{l}</span><span style={{fontFamily:FF.mono,color:col}}>{won(v)}</span>
                  </div>))}
                <div style={{display:'flex',justifyContent:'space-between',padding:'7px 12px',borderTop:`1.5px solid ${C.ink}`,fontSize:12}}>
                  <span style={{fontWeight:700}}>제어 합계</span><span style={{fontFamily:FF.mono,color:C.amber,fontWeight:700}}>{won(tot)}</span>
                </div>
              </div>
              <p style={{fontSize:10,color:C.light,marginTop:8,lineHeight:1.6}}>※ 재료=장비 SKU+설치자재, 노무·경비는 묶음(설치·시운전·기술료). 수량·금액은 ADMIN「FIT 제어(ICT·b.IoT) 단가」에서 조정. 견적 재료/노무/경비에 각각 반영됩니다.</p>
            </div>
          );})()}
          <HR/>
          <div style={{padding:'14px 16px',background:C.greenLt,borderLeft:`3px solid ${C.green}`}}>
            <Lbl ch="OS 통합 효과"/>
            {[{on:os.sunTrack,t:'태양 추적 → 차양 최적화 → 냉방 에너지 3% 추가 절감'},
              {on:os.energy,t:'에너지 모니터링 → 이상 소비 조기 감지 → 운영비 절감'},
              {on:os.comfort,t:'PMV 지수 기반 자동 제어 → 재실자 쾌적도 향상'},
              {on:os.bms,t:'BMS 연동 → 통합 관제 → 운영 인력 효율화'}].filter(r=>r.on).map((r,i)=>(
              <p key={i} style={{fontSize:11,color:C.green,lineHeight:1.7}}>✓ {r.t}</p>
            ))}
            {![os.sunTrack,os.energy,os.comfort,os.bms].some(Boolean)&&<p style={{fontSize:11,color:C.light}}>기능을 선택하면 적용 효과가 표시됩니다.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ COST LINE ITEMS (엔진 기반) ═══ */
function costLines(zones,floorZones,frames,crt,grd,os,P,FD,zonePer){
  const zPer=zonePer||165;
  const byTypeQty={};
  zones.forEach(z=>{const fr=zoneFrame(z,frames);byTypeQty[fr.id]=(byTypeQty[fr.id]||0)+(z.moduleCount||0);});
  const byType=Object.keys(byTypeQty).map(fid=>{const fr=frames.find(x=>x.id===fid)||frames[0];const qty=byTypeQty[fid];return{fr,qty,est:frameEstimate(fr,qty,FD)};});
  const frameGlassTotal=byType.reduce((s,t)=>s+(t.est?t.est.cost_breakdown["프로젝트_합계"]:0),0);
  const samooDeliver=byType.reduce((s,t)=>s+(t.est?t.est.samoo["납품가"]:0),0);
  const samooConstr=byType.reduce((s,t)=>s+(t.est?t.est.samoo["공사가"]:0),0);
  const mc=zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  const repFr=(zones[0]&&zoneFrame(zones[0],frames))||frames[0]||{};
  const hk=hvacKind(crt);
  const hvacOk=hk.isCart&&repFr.depth>=1000;
  const fz=Array.isArray(floorZones)?floorZones:[];
  let zoneCount=0,totalM2=0; fz.forEach(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);const a=Math.max(0,g.areaM2||0);zoneCount+=Math.max(1,Math.ceil(a/zPer))*nf;totalM2+=a*nf;});
  /* 스킨카트리지 = 프레임 타입별 루버 — 적용 가능(깊이) 타입만 합산 */
  const skinRows=byType.map(t=>{const sp=frameSkinSpec(t.fr,crt);return (crt.hasSkin&&sp&&t.fr.depth>=sp.minD)?{fr:t.fr,sp,qty:t.qty}:null;}).filter(Boolean);
  const skinN=skinRows.reduce((s,r)=>s+r.qty,0), hvacN=hvacOk?zoneCount:0;
  let conventional=0; zones.forEach(z=>{const fr=zoneFrame(z,frames);conventional+=(fr.frameWidth/1000)*(fr.frameHeight/1000)*(z.moduleCount||0)*P.pConv;});
  const skin=[];  /* SKIN CARTRIDGE — 프레임 타입별 루버 */
  skinRows.forEach(r=>skin.push({item:'스킨카트리지',spec:`${r.fr.name} · ${r.sp.label}`,unit:'대',qty:r.qty,price:skinP(r.sp,FD),amt:r.qty*skinP(r.sp,FD)}));
  const skinSub=skin.reduce((s,x)=>s+x.amt,0);
  const ah=[];   /* AH CARTRIDGE — 공조카트리지(본체+설치+판넬+배선)+옵션+FTU/디퓨저 */
  if(hvacN>0){
    const hc=(FD&&FD.hvac_cart)||{};
    const cmh=crt.cmh||'3600';
    const cmhBody=(hc.cmh_prices&&hc.cmh_prices[cmh])||(P.pHvac||0);
    ah.push({item:'공조카트리지 본체',spec:`${cmh}CMH · EC FAN · 동파방지키트 포함`,unit:'세트',qty:hvacN,price:cmhBody,amt:hvacN*cmhBody});
    if(hc.install_set)ah.push({item:'  설치비',spec:'공조카트리지',unit:'세트',qty:hvacN,price:hc.install_set,amt:hvacN*hc.install_set});
    if(hc.control_panel_set)ah.push({item:'  컨트롤판넬',spec:'FMS·덕트·댐퍼 등',unit:'세트',qty:hvacN,price:hc.control_panel_set,amt:hvacN*hc.control_panel_set});
    if(hc.field_wiring_set)ah.push({item:'  현장설치 배선',spec:'유니트별 배선',unit:'세트',qty:hvacN,price:hc.field_wiring_set,amt:hvacN*hc.field_wiring_set});
    const o=crt.hvacOpts||{};
    if(o.erv)ah.push({item:'전열교환기',spec:'선택옵션',unit:'대',qty:hvacN,price:P.pErv||0,amt:hvacN*(P.pErv||0)});
    if(o.humid)ah.push({item:'가습',spec:'선택옵션',unit:'대',qty:hvacN,price:P.pHumid||0,amt:hvacN*(P.pHumid||0)});
    if(o.uv)ah.push({item:'UV 필터',spec:'선택옵션',unit:'대',qty:hvacN,price:P.pUv||0,amt:hvacN*(P.pUv||0)});
    if(hk.kind==='floor'){
      const ft=crt.floorType||'iso';
      if(ft==='iso'){const ftuN=zoneCount*(P.pFtuPerZone||8);const ftuP=(crt.ftuType==='standard'?(hc.ftu_standard||0):(hc.ftu_heater||0))+(hc.ftu_install||0);ah.push({item:'FTU (등압식 바닥공조)',spec:`${crt.ftuType==='standard'?'STANDARD':'HEATER 포함'} · 설치 포함 (존당 ${P.pFtuPerZone||8}개)`,unit:'개',qty:ftuN,price:ftuP,amt:ftuN*ftuP});}
      else if((crt.presDiff||'circ')==='front')ah.push({item:'전면취출 바닥공조 (가압식)',spec:'전면 취출구',unit:'㎡',qty:Math.round(totalM2),price:P.pDiffFront||0,amt:totalM2*(P.pDiffFront||0)});
      else ah.push({item:'원형디퓨져 (가압식)',spec:'원형 디퓨저',unit:'㎡',qty:Math.round(totalM2),price:P.pDiffCirc||0,amt:totalM2*(P.pDiffCirc||0)});
    }
  }
  const ahSub=ah.reduce((s,x)=>s+x.amt,0);
  const cart=[...skin,...ah]; const cartSub=skinSub+ahSub;
  const compare=[]; /* B 중앙 · C EHP · D 기타 = 공사범위 제외 · 비교견적 (total 미포함) */
  if(hk.sys==='ehp')compare.push({item:'EHP + 전열교환기',spec:'공사범위 제외 · 비교견적',unit:'㎡',qty:Math.round(totalM2),price:P.pEhp||0,amt:totalM2*(P.pEhp||0)});
  if(hk.sys==='central')compare.push({item:'중앙공조',spec:'공사범위 제외 · 비교견적',unit:'㎡',qty:Math.round(totalM2),price:P.pCentral||0,amt:totalM2*(P.pCentral||0)});
  if(hk.sys==='etc')compare.push({item:'기타 공조',spec:'공사범위 제외 · 비교견적',unit:'㎡',qty:Math.round(totalM2),price:P.pEtc||0,amt:totalM2*(P.pEtc||0)});
  const compareSub=compare.reduce((s,x)=>s+x.amt,0);
  const grid=[];
  if(grd.hasGrid){const gp=P.pGrid+(grd.daylight?P.pDaylight:0)+(grd.dimming?P.pDimming:0);grid.push({item:'GRID 조명 모듈',spec:[grd.daylight&&'채광센서',grd.dimming&&'조광'].filter(Boolean).join('+')||'기본 LED',unit:'모듈',qty:mc,price:gp,amt:mc*gp});}
  const gridSub=grid.reduce((s,x)=>s+x.amt,0);
  /* FIT 제어(ICT·b.IoT) SKU 내역 — 가압식(pres)/등압식(iso) 프리셋. 재료(mat)는 osArr(장비 SKU + 설치자재)로 분해 표시, 노무·경비는 laborSub/expSub로 별도 집계 */
  const oscPreset=(crt.floorType==='pres')?'pres':'iso';
  const osc=(os.hasOs&&FD&&FD.os_control&&FD.os_control[oscPreset])||null;
  const osCtl=[];  /* 제어 — ICT·b.IoT SKU(시스템·DDC·Field) + 설치공사 자재 */
  const osFit=[];  /* FIT OS — 태양추적·에너지모니터링·BMS 연동 */
  if(os.hasOs&&osc){
    (osc.items||[]).forEach(it=>osCtl.push({item:`[${it.c}] ${it.n}`,spec:it.s||'',unit:'EA',qty:it.q,price:it.p,amt:(it.q||0)*(it.p||0)}));
    const equip=(osc.items||[]).reduce((s,it)=>s+(it.q||0)*(it.p||0),0);
    const inst=Math.max(0,(osc.mat||0)-equip);
    if(inst>0)osCtl.push({item:'[설치] 설치공사 자재',spec:'전선·케이블·튜브·제어반 등',unit:'식',qty:1,price:Math.round(inst),amt:inst});
    if(os.sunTrack)osFit.push({item:'태양 추적 제어',spec:'Sun Tracking',unit:'식',qty:1,price:P.pOsSun,amt:P.pOsSun});
    if(os.energy)osFit.push({item:'에너지 모니터링',spec:'Dashboard',unit:'식',qty:1,price:P.pOsEnergy,amt:P.pOsEnergy});
    if(os.bms)osFit.push({item:'BMS 연동',spec:'API Integration',unit:'식',qty:1,price:P.pOsBms,amt:P.pOsBms});
  } /* OS 노무·경비(제어 SKU)는 laborSub/expSub로 별도 집계 */
  const osCtlLabor=osc?(osc.labor||0):0, osCtlExp=osc?(osc.exp||0):0;
  const osCtlSub=osCtl.reduce((s,x)=>s+x.amt,0), osFitSub=osFit.reduce((s,x)=>s+x.amt,0);
  const osArr=[...osCtl,...osFit]; const osSub=osCtlSub+osFitSub;
  const me=[]; /* M&E 추가 공사범위 (os.me 토글) — 바닥면적 기준 */
  if(os.me&&FD&&FD.me_prices){const mp=FD.me_prices;
    if(mp.엑세스플로어)me.push({item:'엑세스플로어',spec:'M&E · 바닥',unit:'㎡',qty:Math.round(totalM2),price:mp.엑세스플로어,amt:totalM2*mp.엑세스플로어});
    if(mp.복사패널)me.push({item:'복사패널',spec:'M&E · 복사냉난방',unit:'㎡',qty:Math.round(totalM2),price:mp.복사패널,amt:totalM2*mp.복사패널});}
  const meSub=me.reduce((s,x)=>s+x.amt,0);
  const total=frameGlassTotal+cartSub+gridSub+osSub+meSub;
  /* ── 재료/노무/경비 3분할 + 실행률(삼우 간접비) ── 단가=P, 실행률=FD.exec_rate. total=재료비 합 */
  const matSub=total;
  const osLaborDisc=zoneLaborDiscount(FD,zoneCount); /* (참고) 조닝수 할인 — 제어 SKU 내역 방식에선 미적용 */
  const laborSub=mc*(P.pFrameLabor||0)+skinN*(P.pSkinLabor||0)+hvacN*(P.pHvacLabor||0)+(grd.hasGrid?mc*(P.pGridLabor||0):0)+(os.hasOs?osCtlLabor:0); /* OS 노무 = 제어 SKU 내역 노무 */
  const expSub=mc*(P.pFrameExp||0)+skinN*(P.pSkinExp||0)+hvacN*(P.pHvacExp||0)+(grd.hasGrid?mc*(P.pGridExp||0):0)+(os.hasOs?osCtlExp:0); /* OS 경비 = 제어 SKU 내역 경비 */
  const er=(FD&&FD.exec_rate)||{재료:1.3,노무:1.5,경비:1.5};
  const directSub=matSub+laborSub+expSub;
  const execTotal=Math.round(matSub*(er.재료||1)+laborSub*(er.노무||1)+expSub*(er.경비||1));
  return{byType,frameGlassTotal,samooDeliver,samooConstr,skin,skinSub,ah,ahSub,cart,cartSub,compare,compareSub,hvSys:hk.sys,grid,gridSub,osCtl,osCtlSub,osFit,osFitSub,os:osArr,osSub,me,meSub,osLaborDisc,total,matSub,laborSub,expSub,directSub,execTotal,er,conventional,mc,hvacN,skinN,zoneCount};
}


/* ═══ COST DETAIL TAB ═══ */
function CostTab({zones,frames,crt,grd,os,P,setP,FD,setFD,committed,planMeta}){
  const [openGlass,setOpenGlass]=useState({});
  const [secOpen,setSecOpen]=useState({frame:true});
  const [jsonText,setJsonText]=useState('');
  const [jsonMsg,setJsonMsg]=useState('');
  const C_=committed||{zones,frames,crt,grd,os,P};
  const L=useMemo(()=>costLines(C_.zones,C_.floorZones,C_.frames,C_.crt,C_.grd,C_.os,C_.P,FD,C_.zonePer),[committed,FD]);
  const applyJson=()=>{
    try{ const d=JSON.parse(jsonText); if(!d.unit_price||!d.raw_material) throw new Error('unit_price/raw_material 누락'); if(d.samwoo_multiplier&&!d.samoo_multiplier)d.samoo_multiplier=d.samwoo_multiplier; setFD(d); setJsonMsg('✓ fit_data.json 적용 완료 — 실제 데이터로 재계산되었습니다.'); }
    catch(e){ setJsonMsg('✗ JSON 오류: '+e.message); }
  };
  const Brow=({label,v,strong,note})=>(
    <tr style={{borderBottom:`1px solid ${C.border}`,background:strong?C.panel:'transparent'}}>
      <td style={{padding:'8px 12px',fontSize:12,fontWeight:strong?700:600,color:C.ink}}>{label}{note&&<span style={{fontSize:10,color:C.light,marginLeft:8,fontWeight:400}}>{note}</span>}</td>
      <td style={{padding:'8px 12px',textAlign:'right',fontFamily:FF.mono,fontSize:strong?13:12,fontWeight:strong?700:400,color:strong?C.amber:C.ink}}>{won(v||0)}</td>
    </tr>
  );
  const ARow=({x})=>(
    <tr style={{borderBottom:`1px solid ${C.border}`}}>
      <td style={{padding:'9px 12px',fontSize:12,fontWeight:600}}>{x.item}</td>
      <td style={{padding:'9px 12px',fontSize:11,color:C.sub}}>{x.spec}</td>
      <td style={{padding:'9px 12px',textAlign:'right',fontFamily:FF.mono,fontSize:11,color:C.sub}}>{x.qty}{x.unit}</td>
      <td style={{padding:'9px 12px',textAlign:'right',fontFamily:FF.mono,fontSize:11,color:C.sub}}>{x.price.toLocaleString()}</td>

    <div style={{overflowX:'auto'}}><table style={{width:'100%'}}>
      <thead><tr style={{borderBottom:`1px solid ${C.border}`,background:C.panel}}>{[['항목','left'],['규격','left'],['수량','right'],['단가','right'],['금액','right']].map(([h,a])=><th key={h} style={{padding:'7px 12px',textAlign:a,fontSize:9.5,fontFamily:FF.disp,letterSpacing:'.04em',color:C.sub,fontWeight:600}}>{h}</th>)}</tr></thead>
      <tbody>{rows.map((x,i)=><ARow key={i} x={x}/>)}</tbody>
    </table></div>
  );
  const Section=({id,title,sub,subtotal,accent,defaultOpen,dashed,children})=>{
    const open=secOpen[id]??defaultOpen??false;
    return(
      <div style={{border:`1px ${dashed?'dashed':'solid'} ${dashed?C.borderDark:C.border}`,borderRadius:12,marginBottom:12,overflow:'hidden',background:C.white}}>
        <button onClick={()=>setSecOpen(s=>({...s,[id]:!(s[id]??defaultOpen??false)}))} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'12px 16px',background:open?C.panel:'transparent',border:'none',borderBottom:open?`1px solid ${C.border}`:'none',cursor:'pointer',textAlign:'left'}}>
          <IcoDn s={14} rot={open?180:0}/>
          <span style={{fontFamily:FF.disp,fontWeight:700,fontSize:13.5,letterSpacing:'-.01em',color:C.ink}}>{title}</span>
          {sub&&<span style={{fontSize:10.5,color:C.light}}>{sub}</span>}
          <span style={{marginLeft:'auto',fontFamily:FF.mono,fontSize:14,fontWeight:700,color:accent||C.amber}}>{won(subtotal||0)}</span>
        </button>
        {open&&<div>{children}</div>}
      </div>
    );
  };
  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="COST DETAIL" sub="세부 공사비 견적 — FIT 견적 엔진" tag="result"/>

      {planMeta&&(
        <div style={{padding:'10px 14px',background:C.blueLt,borderLeft:`3px solid ${C.blue}`,marginBottom:16,fontSize:11,color:C.blue,lineHeight:1.7}}>

        </div>

      {FD._placeholder&&(
        <div style={{padding:'12px 16px',background:C.redLt,border:`1.5px solid ${C.red}`,marginBottom:20}}>
          <span style={{fontFamily:FF.disp,fontSize:13,letterSpacing:'.06em',color:C.red}}>⚠ 예시 단가로 계산 중</span>
          <p style={{fontSize:11,color:C.red,marginTop:4,lineHeight:1.6}}>견적 엔진 로직은 실제 엑셀과 동일하나, 원자재 단중·단가는 예시값입니다. 아래 <b>fit_data.json 붙여넣기</b>에 실제 데이터를 입력하면 정확한 금액이 산출됩니다.</p>
        </div>

      <p style={{fontSize:11,color:C.sub,marginBottom:12,lineHeight:1.6}}>항목을 펼쳐 세부 내역을 확인하세요. 각 헤더 금액은 해당 항목 <b>재료비 소계</b>입니다.</p>
      <Section id="frame" title="① FRAME + GLASS" sub={`프레임 타입별 · ${L.byType.length}개`} subtotal={L.frameGlassTotal} defaultOpen={true}>
        <div style={{padding:'10px 12px 4px'}}>
      {L.byType.map(({fr,qty,est})=>{
        if(!est)return null;
        const cb=est.cost_breakdown, sm=est.summary, w=est.weight, open=!!openGlass[fr.id];
        return(
          <div key={fr.id} style={{border:`1.5px solid ${C.ink}`,marginBottom:16}}>
            <div style={{background:C.ink,color:C.white,padding:'8px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>

            <button onClick={()=>setOpenGlass(s=>({...s,[fr.id]:!s[fr.id]}))} style={{display:'flex',alignItems:'center',gap:6,background:'transparent',border:'none',borderTop:`1px solid ${C.border}`,width:'100%',color:C.sub,fontSize:11,padding:'8px 12px'}}>
              <IcoDn s={13} rot={open?180:0}/> 유리 구간별 상세
            </button>
            {open&&<div style={{overflowX:'auto',borderTop:`1px solid ${C.border}`}}><table>
              <thead><tr style={{borderBottom:`1px solid ${C.border}`,background:C.panel}}>{['구간','유형','면적','단가','금액'].map((h,i)=><th key={h} style={{padding:'6px 10px',textAlign:i<2?'left':'right',fontSize:9.5,fontFamily:FF.disp,letterSpacing:'.06em',color:C.sub,fontWeight:400}}>{h}</th>)}</tr></thead>
              <tbody>{Object.entries(est.glass_detail).map(([k,g])=>(
                <tr key={k} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'6px 10px',fontSize:11}}>{k}</td><td style={{padding:'6px 10px',fontSize:11,color:C.sub}}>{g.type}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',fontFamily:FF.mono,fontSize:11,color:C.sub}}>{g.area_m2}㎡</td>
                  <td style={{padding:'6px 10px',textAlign:'right',fontFamily:FF.mono,fontSize:11,color:C.sub}}>{g.unit_price.toLocaleString()}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',fontFamily:FF.mono,fontSize:11}}>{won(g.cost)}</td>
                </tr>))}</tbody>
            </table></div>}
          </div>
        );
      })}
        </div>
      </Section>

      {L.skin.length>0&&<Section id="skin" title="② SKIN CARTRIDGE" sub={`전동 차양 · ${L.skin.length}개`} subtotal={L.skinSub} accent={C.green}><AtTable rows={L.skin}/></Section>}
      {L.ah.length>0&&<Section id="ah" title="③ AH CARTRIDGE" sub={`공조 카트리지 · ${L.ah.length}개`} subtotal={L.ahSub} accent={C.green}><AtTable rows={L.ah}/></Section>}
      {L.grid.length>0&&<Section id="grid" title="④ GRID" sub={`조명 · ${L.grid.length}개`} subtotal={L.gridSub} accent={C.green}><AtTable rows={L.grid}/></Section>}
      {L.me&&L.me.length>0&&<Section id="me" title="⑤ M&E" sub={`엑세스플로어·복사패널 · ${L.me.length}개`} subtotal={L.meSub} accent={C.green}><AtTable rows={L.me}/></Section>}
      {L.osCtl.length>0&&<Section id="osctl" title="⑥ 제어 (ICT · b.IoT)" sub={`${L.osCtl.length}개 SKU`} subtotal={L.osCtlSub} accent={C.green}><AtTable rows={L.osCtl}/></Section>}
      {L.osFit.length>0&&<Section id="osfit" title="⑦ FIT OS" sub={`운영 시스템 · ${L.osFit.length}개`} subtotal={L.osFitSub} accent={C.green}><AtTable rows={L.osFit}/></Section>}
      {L.compare&&L.compare.length>0&&<Section id="cmp" title="비교견적 (총공사비 미포함)" sub="공사범위 제외" subtotal={L.compareSub} accent={C.sub} dashed><AtTable rows={L.compare}/></Section>}

      {/* 재료/노무/경비 3분할 + 실행률(삼우 간접비) 포함 총액 */}
      <div style={{border:`1.5px solid ${C.ink}`,marginBottom:14}}><table style={{width:'100%'}}><tbody>
        <Brow label="재료비 합계 (FRAME+GLASS · 카트리지 · 조명 · OS)" v={L.matSub}/>
        <Brow label="노무비 합계" v={L.laborSub}/>
        <Brow label="경비 합계" v={L.expSub}/>
        <Brow label="직접공사비 합계 (재료 + 노무 + 경비)" v={L.directSub} strong/>
      </tbody></table></div>
      <div style={{background:C.ink,color:C.white,padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:6}}>
        <span><span style={{fontFamily:FF.disp,fontSize:18,letterSpacing:'.08em'}}>실행률 포함 총액</span>
          <span style={{fontSize:10.5,color:'#cfccc6',marginLeft:10}}>삼우 간접비 — 재료 ×{L.er.재료} · 노무 ×{L.er.노무} · 경비 ×{L.er.경비}</span></span>
        <span style={{fontFamily:FF.disp,fontSize:24}}>{won(L.execTotal)}</span>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:8}}>
        <div style={{padding:'14px',border:`1px solid ${C.border}`}}><Lbl ch="기존 커튼월 (참고)"/><div style={{fontFamily:FF.disp,fontSize:20,color:C.sub}}>{won(L.conventional)}</div></div>
        <div style={{padding:'14px',border:`1px solid ${C.ink}`}}><Lbl ch="추가 투자"/><div style={{fontFamily:FF.disp,fontSize:20,color:C.ink}}>{won(Math.max(0,L.total-L.conventional))}</div></div>
        <div style={{padding:'14px',border:`1px solid ${C.green}`,background:C.greenLt}}><Lbl ch="삼우 납품가 (Frame 계)"/><div style={{fontFamily:FF.disp,fontSize:20,color:C.green}}>{won(L.samooDeliver)}</div></div>
        <div style={{padding:'14px',border:`1px solid ${C.green}`,background:C.greenLt}}><Lbl ch="삼우 공사가 (Frame 계)"/><div style={{fontFamily:FF.disp,fontSize:20,color:C.green}}>{won(L.samooConstr)}</div></div>
      </div>

      {L.byType.some(t=>t.est&&t.est.warnings.length>0)&&<div style={{padding:'12px 16px',background:C.redLt,borderLeft:`3px solid ${C.red}`,marginTop:12}}>
        {L.byType.flatMap(t=>t.est?t.est.warnings:[]).map((wn,i)=><p key={i} style={{fontSize:11,color:C.red,lineHeight:1.6}}>{wn}</p>)}
      </div>}

      <HR/>
      <p style={{fontFamily:FF.disp,fontSize:14,letterSpacing:'.08em',color:C.ink,marginBottom:8}}>fit_data.json 데이터 적용</p>
      <p style={{fontSize:11,color:C.light,marginBottom:10,lineHeight:1.6}}>코드 탭에서 추출한 <b>fit_data.json</b> 전체를 아래에 붙여넣고 적용하면, 실제 원자재 단중·단가·할인티어·삼우배수로 모든 프레임 타입 견적이 재계산됩니다.</p>
      <textarea value={jsonText} onChange={e=>setJsonText(e.target.value)} placeholder='{ "unit_price": {...}, "raw_material": {...}, "glass_price_preset": {...}, "discount_tiers": [...], "default_offset": {...}, "samoo_multiplier": {...} }'
        style={{width:'100%',height:120,background:C.panel,border:`1px solid ${C.border}`,padding:12,fontFamily:FF.mono,fontSize:11,color:C.ink,outline:'none',resize:'vertical'}}/>
      <div style={{display:'flex',alignItems:'center',gap:14,marginTop:10}}>
        <button onClick={applyJson} style={{background:C.ink,color:C.white,border:'none',padding:'9px 20px',fontFamily:FF.disp,fontSize:13,letterSpacing:'.08em',cursor:'pointer'}}>적용 APPLY</button>
        <button onClick={()=>{setFD(FIT_DATA_DEFAULT);setJsonMsg('예시 데이터로 되돌렸습니다.');}} style={{background:'transparent',color:C.sub,border:`1px solid ${C.border}`,padding:'9px 16px',fontSize:12,cursor:'pointer'}}>예시값 복원</button>
        {jsonMsg&&<span style={{fontSize:11,color:jsonMsg[0]==='✓'?C.green:C.red}}>{jsonMsg}</span>}
      </div>

      <p style={{fontSize:10,color:C.light,marginTop:14,lineHeight:1.7}}>※ 부가 단가(카트리지·조명·OS)는 ADMIN 탭 → 「부가 단가」에서 관리합니다.</p>
    </div>
  );
}

/* ═══ ENERGY EXPLANATION TAB ═══ */
function EnergyTab({zones,frames,f,crt,grd,os,E,P,FD,committed}){
  const C_=committed||{zones,frames,crt,grd,os,E,P};
  const cFrame=(C_.frames&&(C_.frames.find(x=>x.id===f.id)||C_.frames[0]))||f;
  const agg=useMemo(()=>zoneAgg(C_.zones,C_.floorZones,C_.frames,C_.crt,C_.grd,C_.os,C_.E,C_.P,FD,C_.zonePer),[committed,FD]);
  const skinSpec=frameSkinSpec(cFrame,C_.crt); /* 현재 프레임의 루버 (없으면 null) */
  /* 절감 계수: FD.energy_factors(ADMIN 탭에서 조정). 기본값은 태평로빌딩 EnergyPlus 시뮬레이션(rev-05) */
  const ef=(FD&&FD.energy_factors)||{};
  const envFac=isSolarControl(cFrame)?(ef.env_high??0.105):(ef.env_std??0.096);
  const shadeFac=(C_.crt.hasSkin&&skinSpec&&cFrame.depth>=skinSpec.minD)?skinSpec.shade/100:0;
  const hvacFac=(hvacKind(C_.crt).isCart&&cFrame.depth>=1000)?(ef.hvac??0.085):0; /* 에너지 절감계수는 카트리지(바닥/천장)만, 중앙·EHP·기타 제외 */
  const gridFac=C_.grd.hasGrid?((C_.grd.daylight?(ef.grid_daylight??0.01):0)+(C_.grd.dimming?(ef.grid_dimming??0.01):0)):0;
  const osFac=C_.os.hasOs?((C_.os.sunTrack?(ef.os_suntrack??0.015):0)+(C_.os.energy?(ef.os_energy??0.01):0)):0;

  const systems=[
    {code:'DOUBLE SKIN',ko:'이중외피',fac:envFac,on:true,mech:'내·외부 이중유리 사이의 공기층이 완충대(buffer zone) 역할을 하여 외기 열전달을 차단합니다. 고사양 일사차폐 유리 적용 시 효과가 커집니다.',col:C.blue},
    {code:'SKIN CARTRIDGE',ko:'전동차양',fac:shadeFac,on:shadeFac>0,mech:`${skinSpec?skinSpec.label:'전동 루버'}가 일사를 능동적으로 차단해 여름철 냉방 부하를 줄입니다. 차양 종류에 따라 차폐 성능이 달라집니다.`,col:C.amber},
    {code:'AIR HANDLING',ko:'공조카트리지',fac:hvacFac,on:hvacFac>0,mech:'공조기를 외피 내 분산 배치하여 급기 경로를 단축하고 존별 개별 제어로 불필요한 공조를 최소화합니다.',col:C.green},
    {code:'GRID',ko:'조명 (채광센서)',fac:gridFac,on:gridFac>0,mech:'채광 센서가 자연광 유입량을 감지해 인공조명을 자동 조절(daylight harvesting)하여 조명 에너지를 절감합니다.',col:'#5a3e7a'},
    {code:'OS',ko:'운영 시스템',fac:osFac,on:osFac>0,mech:'태양 추적 기반 차양 자동 제어와 에너지 모니터링으로 운영 단계의 낭비를 최적화합니다.',col:C.ink},
  ];

  // waterfall
  let running=1;
  const steps=[{label:'BASELINE',pct:1,drop:0,col:C.borderDark}];
  systems.filter(s=>s.on&&s.fac>0).forEach(s=>{
    const before=running; running=running*(1-s.fac);
    steps.push({label:s.code,pct:running,drop:before-running,col:s.col});
  });

  return(
    <div style={{maxWidth:1080,margin:'0 auto',padding:'24px 32px 40px'}}>
      <SH code="ENERGY" sub="에너지 절감 산정 방식" tag="result"/>
      <p style={{fontSize:13,color:C.sub,marginBottom:8,lineHeight:1.8}}>
        FIT 시스템은 <b style={{color:C.ink}}>외피 단열 · 능동 차양 · 분산 공조 · 스마트 조명 · 운영 최적화</b>가 연계되어 에너지를 절감합니다.
        각 시스템의 절감 기여를 중첩 보정(overlap)하여 산정하며, 시스템을 더할수록 절감 효과가 누적됩니다.
      </p>
      <p style={{fontSize:11,color:C.green,marginBottom:8,lineHeight:1.7,padding:'8px 12px',background:C.greenLt,borderLeft:`3px solid ${C.green}`}}>
        ✓ 절감 계수는 <b>태평로빌딩 EnergyPlus 시뮬레이션(설계설명서 rev-05, 총 36 시나리오)</b>의 마진 효과를 곱셈 중첩식으로 역산한 값입니다 — 스마트 합리화모델 대비 FIT Frame -9.6%, Skin Cartridge -0.9~1.5%p, AH Cartridge+FTU -5.8%p, 전열교환기 -2.6%p, Grid Dimming -0.4%p 등을 기반으로 보정.
      </p>

      {/* 종합 결과 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10,margin:'18px 0 24px'}}>
        {[{c:'TOTAL REDUCTION',v:pct(agg.savedFrac),s:'기존 건물 대비',acc:C.green},
          {c:'ANNUAL ENERGY',v:kwh(agg.saved),s:`기준 ${kwh(agg.baseline)} → ${kwh(agg.optimized)}`,acc:C.green},
          {c:'CO₂ REDUCTION',v:`${(agg.co2/1000).toFixed(1)}t`,s:'tCO₂ / 년',acc:C.green}].map(k=>(
          <div key={k.c} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px 16px'}}>
            <Lbl ch={k.c}/>
            <div style={{fontFamily:FF.disp,fontWeight:700,fontSize:26,letterSpacing:'-.02em',color:k.acc,lineHeight:1.1,marginTop:2}}>{k.v}</div>
            <div style={{fontSize:10.5,color:C.light,marginTop:5}}>{k.s}</div>
          </div>
        ))}
      </div>

      {/* WATERFALL */}
      <SH code="REDUCTION FLOW" sub="시스템별 절감 흐름" tag="result"/>
      <div style={{border:`1px solid ${C.border}`,padding:'28px 24px 20px',marginBottom:28,background:C.white,overflowX:'auto'}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:14,height:240,paddingTop:30,marginBottom:14,minWidth:520}}>
          {steps.map((st,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end',position:'relative',minWidth:54}}>

              <span style={{fontFamily:FF.disp,fontSize:14,color:i===0?C.sub:st.col,marginBottom:6,lineHeight:1,whiteSpace:'nowrap'}}>{(st.pct*100).toFixed(1)}%</span>
              <div style={{width:'100%',height:`${st.pct*100}%`,background:st.col,transition:'height .4s'}}/>
            </div>
          ))}
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end',minWidth:60}}>
            <span style={{fontFamily:FF.disp,fontSize:17,color:C.green,marginBottom:6,lineHeight:1,whiteSpace:'nowrap'}}>{(running*100).toFixed(1)}%</span>
            <div style={{width:'100%',height:`${running*100}%`,background:C.green,border:`2px solid ${C.ink}`}}/>

/* ═══ FORMAT ═══ */
const fmt=v=>{if(v===undefined||v===null||v==='')return'';const n=typeof v==='number'?v:Number(String(v).replace(/,/g,''));return isFinite(n)?n.toLocaleString():String(v);};
const numParse=v=>{const n=Number(String(v==null?'':v).replace(/,/g,''));return isFinite(n)?n:0;};
const won=v=>{v=Math.round(v);if(v>=1e8){const e=Math.floor(v/1e8),m=Math.round((v%1e8)/1e4);return m>0?`${e.toLocaleString()}억 ${m.toLocaleString()}만원`:`${e.toLocaleString()}억원`;}if(v>=1e4)return`${Math.round(v/1e4).toLocaleString()}만원`;return`${v.toLocaleString()}원`;};
const kwh=v=>v>=1000?`${Number((v/1000).toFixed(1)).toLocaleString()} MWh`:`${Math.round(v).toLocaleString()} kWh`;
const pct=v=>`${(v*100).toFixed(1)}%`;
const mm=v=>`${Number(v||0).toLocaleString()}mm`;

/* ═══ SPECS ═══ */
const FRAME_TYPES=[{id:'hidden',label:'히든 (Hidden)',mult:1.2},{id:'exposed',label:'노출 (Exposed)',mult:1.1},{id:'standard',label:'일반 (Standard)',mult:1.0}];
const OUTER_GLASS=[{id:'low_iron_lam',label:'저철분 접합유리',sub:'Low-Iron Laminated',p:130000},{id:'std_lam',label:'일반 접합유리',sub:'Standard Laminated',p:90000},{id:'low_ref',label:'저반사 유리',sub:'Low-Reflection',p:110000},{id:'high_spec',label:'고사양 (일사차폐↑)',sub:'High Performance',p:180000}];
const INNER_GLASS_TYPE=[{id:'low_iron',label:'저철분',sub:'Low-Iron',p:110000},{id:'standard',label:'일반',sub:'Standard',p:80000}];
const INNER_GLASS_PERF=[{id:'double',label:'로이 복층',sub:'Low-E Double',p:0},{id:'triple',label:'로이 삼복층',sub:'Low-E Triple',p:40000}];
/* shade%: 태평로 EnergyPlus 시뮬레이션 기준 — Skin Cartridge 운전 모드별 0.9~1.5%p 마진 효과를 카트리지 종류 차등으로 매핑 */
const SKIN_CARTS=[
  {id:'roller',label:'전동 롤 블라인드',en:'Electric Roller Blind',minD:450,maxD:1500,p:900000,shade:1.0},
  {id:'venetian',label:'전동 베네시안 블라인드',en:'Electric Venetian Blind',minD:450,maxD:1500,p:1200000,shade:1.5},
  {id:'al_louver',label:'알루미늄 전동 수직루버',en:'Aluminium Motorized Vertical Louver',minD:600,maxD:1500,p:2100000,shade:1.3},
  {id:'str_louver',label:'전동 수직루버 (String)',en:'Motorized Vertical Louver — String',minD:600,maxD:1500,p:1600000,shade:1.2},
  {id:'fab_louver',label:'전동 수직루버 (Fabric)',en:'Motorized Vertical Louver — Fabric',minD:600,maxD:1500,p:1900000,shade:1.2},
];
/* 스킨카트리지 단가 — ADMIN(FD.skin_prices) 오버라이드 우선, 없으면 기본 p */
const skinP=(c,FD)=>((FD&&FD.skin_prices&&FD.skin_prices[c.id]!=null)?FD.skin_prices[c.id]:c.p);
/* 입면 명칭 — 방위 대신 정면/우측면/배면/좌측면 (전체 툴 공통). 정면=큰 도로에 면하는 면, 시계방향 R→B→L */
const FACES=[{id:'F',ko:'정면'},{id:'R',ko:'우측면'},{id:'B',ko:'배면'},{id:'L',ko:'좌측면'}];
const FACE_KO={F:'정면',R:'우측면',B:'배면',L:'좌측면'};
const LIGHTING_TYPES=[{id:'integrated',label:'외피 통합형',sub:'Facade-Integrated LED'},{id:'independent',label:'독립형 천장 LED',sub:'Independent Ceiling LED'}];
const OS_MODES=[{id:'comfort',label:'쾌적 모드',sub:'Comfort Priority'},{id:'eco',label:'에너지 절약',sub:'Energy Priority'},{id:'schedule',label:'스케줄 모드',sub:'Time-Based Schedule'}];

/* ═══ FIT QUOTE ENGINE (실제 견적 엑셀 로직 이식) ═══ */
function round(x,n){const f=Math.pow(10,n);return Math.round(x*f)/f;}
class FitEngine{
  constructor(data){this.db=data;}
  _discountRate(qty){for(const t of this.db.discount_tiers){if(t.max_qty===null||qty<t.max_qty)return t.rate;}return 1.0;}
  _glassThickness(floors){return floors>10?"17.52T":"13.52T";}
  _glassUnitPrice(type,thickness,opts){
    const manual=opts.glassPriceManual||{};
    const preset=this.db.glass_price_preset[opts.glassPreset||"시장단가_중간"]||{};
    let key=type; if(type==="외부접합")key=`외부접합_${thickness}`;
    if(manual[key]!=null)return manual[key];
    return preset[key]!=null?preset[key]:(preset[type]||0);
  }
  profiles(p){
    const {W,H,D,H1,H2,H3,H4}=p;
    const off={...this.db.default_offset,...(p.offset||{})};
    const outFrame=(p.frameType==="키넥티")?"MPS-016":"MPS-013";
    const gratingCut=D-off.grating_depth_offset, stiffLower=D-off.stiffener_lower_offset, stiffUpper=D-off.stiffener_upper_offset;
    const gratingQty=Math.ceil((W-65)/190);
    const raw=[
      {code:"MPS-012",sub:"001",cut:H-H1-10,qty:2,note:"INNER 좌/우 세로"},
      {code:"MPS-012",sub:"002",cut:H-H1-10,qty:2,note:"INNER 좌/우 세로(복수)"},
      {code:"MPS-012",sub:"003",cut:W-10,qty:2,note:"INNER 상/하 가로"},
      {code:outFrame,sub:"001",cut:H-109,qty:2,note:"OUT 좌/우 세로"},
      {code:outFrame,sub:"002",cut:W-39,qty:2,note:"OUT 상/하 가로"},
      {code:"MPS-014",sub:"001",cut:W-10+70,qty:1,note:"GUIDE FRAME"},
      {code:"MPS-015",sub:"001",cut:W-39,qty:1,note:"INNER TRANSOM"},
      {code:"MPS-017",sub:"001",cut:W-208,qty:2,note:"THERMAL MOLD 상/하"},
      {code:"MPS-017",sub:"002",cut:H3-100,qty:2,note:"THERMAL MOLD 좌/우"},
      {code:"MPS-111",sub:"011",cut:H2-86.5,qty:2,note:"INNER G.BEAD SPANDREL"},
      {code:"MPS-111",sub:"012",cut:H3-83,qty:2,note:"INNER G.BEAD VISION"},
      {code:"MPS-109",sub:"001",cut:H-100,qty:2,note:"OUT G.BEAD 좌/우"},
      {code:"MPS-109",sub:"002",cut:W-100,qty:2,note:"OUT G.BEAD 상/하"},
      {code:"MPS-113",sub:"001",cut:stiffLower,qty:2,note:"하부 STIFFENER"},
      {code:"MPS-114",sub:"001",cut:stiffUpper,qty:2,note:"상부 STIFFENER-1"},
      {code:"MPS-115",sub:"001",cut:stiffUpper,qty:2,note:"상부 STIFFENER-2"},
      {code:"MPS-116",sub:"001",cut:W-39,qty:1,note:"SILL CAVITY"},
      {code:"MPS-117",sub:"001",cut:W-39,qty:1,note:"HEAD CAVITY-1"},
      {code:"MPS-118",sub:"001",cut:W-39,qty:1,note:"HEAD CAVITY-2"},
      {code:"MPS-119",sub:"001",cut:W-39,qty:1,note:"HEAD CAVITY-3"},
      {code:"MPS-207",sub:"001",cut:gratingCut,qty:gratingQty,note:"GRATING"},
      {code:"MPS-217",sub:"001",cut:W-200,qty:4,note:"20x20 ANGLE"},
      {code:"MPS-204",sub:"001",cut:200,qty:4,note:"G.S. BLOCK 고정"},
      {code:"MPS-S014",sub:"001",cut:66.5,qty:2,note:"CORNER PIECE 상"},
      {code:"MPS-S014",sub:"002",cut:33.5,qty:2,note:"CORNER PIECE 하"},
      {code:"MPS-205",sub:"001",cut:50,qty:2,note:"CORNER PIECE-2 (50)"},
      {code:"MPS-205",sub:"002",cut:33.5,qty:2,note:"CORNER PIECE-2 (33.5)"},
      {code:"MPS-206",sub:"001",cut:26.5,qty:4,note:"CORNER PIECE-3"},
      {code:"MPS-102",sub:"001",cut:H1-50,qty:2,note:"가이드 DECO"},
      {code:"MPS-103",sub:"001",cut:H1-50,qty:1,note:"가이드 STIFFENER"},
      {code:"MPS-112",sub:"001",cut:W-50,qty:1,note:"가이드 STIFFENER-2"},
      {code:"MPS-212",sub:"001",cut:W-50,qty:1,note:"가이드 DECO COVER"}
    ];
    const warnings=[];
    const rows=raw.map(r=>{
      const m=this.db.raw_material[r.code]||{}; const uw=m.unit_weight||0; const valid=r.cut>0;
      if(!valid)warnings.push(`⚠️ ${r.code} ${r.sub} 절단길이 비정상: ${r.cut.toFixed(1)}mm`);
      const wEach=round((r.cut/1000)*uw,3);
      return{code:r.code,sub:r.sub,name:m.name||"",cut_mm:round(r.cut,1),qty:r.qty,unit_weight:uw,weight_each:wEach,weight_total:round(wEach*r.qty,3),note:r.note,valid};
    });
    return{rows,warnings};
  }
  subMaterials(p){
    const {W,H,D,H1,H2,H3,H4}=p;
    const gasket={G15:{len_m:round(H3*2/1000,2)},G16:{len_m:round(H2*2/1000,2)},G17:{len_m:round((W+H)*2/1000,2)},G18:{len_m:round(W*2/1000,2)},G19:{len_m:round(H3*2/1000,2)},G20:{len_m:round(W*2/1000,2)}};
    const azon={AZ01:{len_m:round(Math.ceil((H3*2+H2*2+W*2)*1.3/1000),1)},AZ02:{len_m:round(Math.ceil((W*2+H2)*1.3/1000),1)}};
    return{gasket,azon};
  }
  glass(p){
    const {W,H,D,H1,H2,H3,H4}=p; const a=(w,h)=>round((w*h)/1e6,2);
    return{
      "외부접합_G1":{area_m2:a(W,H),type:"외부접합",note:"외부 접합유리 전체"},
      "내부복층_G2":{area_m2:a(W,H3),type:"내부복층",note:"VISION 복층"},
      "단열시트_상부":{area_m2:a(W-84,H2-77),type:"단열시트",note:"SPANDREL 단열시트"},
      "단열시트_하부":{area_m2:a(W-84,H4-77),type:"단열시트",note:"하부 단열시트"},
      "가이드프레임":{area_m2:a(W-50,H1-50),type:"단판유리",note:"가이드 단판유리"},
      "진공단열_상부":{area_m2:a(D-234,H2-83.5),type:"진공단열패널",note:"SPANDREL 진공단열"},
      "진공단열_하부":{area_m2:a(D-234,H4-83.5),type:"진공단열패널",note:"하부 진공단열"}
    };
  }
  estimate(input){
    const p={W:input.W,H:input.H,D:input.D,H1:input.H1??250,H2:input.H2??600,H4:input.H4??250,floors:input.floors??10,qty:input.qty??1,frameType:input.frameType??"유리",offset:input.offset||{}};
    p.H3=p.H-p.H1-p.H2-p.H4;
    const up=this.db.unit_price, thick=this._glassThickness(p.floors), discount=this._discountRate(p.qty);
    const {rows:profiles,warnings}=this.profiles(p);
    const sub=this.subMaterials(p), glass=this.glass(p);
    const totalWeight=profiles.filter(r=>r.valid).reduce((s,r)=>s+r.weight_total,0);
    const surchargeWeight=Math.ceil(totalWeight*up["할증률"]*10)/10;
    const rawCost=surchargeWeight*up["원자재_per_kg"];
    const azonM=Object.values(sub.azon).reduce((s,v)=>s+v.len_m,0);
    const gasketM=Object.values(sub.gasket).reduce((s,v)=>s+v.len_m,0);
    const azonCost=azonM*up["azon_loss배수"]*up["azon_per_m"];
    const gasketCost=gasketM*up["gasket_loss배수"]*up["gasket_per_m"];
    let glassCost=0; const glassDetail={};
    for(const [k,g] of Object.entries(glass)){
      const unitP=this._glassUnitPrice(g.type,thick,{glassPreset:input.glassPreset,glassPriceManual:input.glassPriceManual});
      const cost=Math.round(g.area_m2*unitP);
      glassDetail[k]={area_m2:g.area_m2,type:g.type,unit_price:unitP,cost,note:g.note}; glassCost+=cost;
    }
    const processCost=surchargeWeight*up["가공비_per_kg"];
    const subtotal=rawCost+azonCost+gasketCost+glassCost+processCost;
    const mgmtProfit=Math.ceil(subtotal*up["관리이윤율"]/1000)*1000;
    const unitSet=subtotal+mgmtProfit;
    const discounted=Math.round(unitSet*discount/10000)*10000;
    const projectTotal=discounted*p.qty;
    const sm=this.db.samoo_multiplier||this.db.samwoo_multiplier||{"납품":1.10,"공사":1.25}; /* 구키(samwoo) 호환 */
    return{
      summary:{W:p.W,H:p.H,D:p.D,H1:p.H1,H2:p.H2,H3:p.H3,H4:p.H4,floors:p.floors,glass_thickness:thick,qty:p.qty,discount_rate:discount,glass_preset:input.glassPreset||"시장단가_중간"},
      warnings, weight:{total_kg:round(totalWeight,2),surcharge_kg:surchargeWeight},
      cost_breakdown:{"원자재비":Math.round(rawCost),"AZON비":Math.round(azonCost),"GASKET비":Math.round(gasketCost),"유리비":Math.round(glassCost),"가공비":Math.round(processCost),"소계":Math.round(subtotal),"관리이윤":Math.round(mgmtProfit),"세트단가_1개":Math.round(unitSet),"할인적용단가":Math.round(discounted),"프로젝트_합계":Math.round(projectTotal)},
      glass_detail:glassDetail,
      samoo:{"납품가":Math.round(projectTotal*sm["납품"]),"공사가":Math.round(projectTotal*sm["공사"])},
      profiles
    };
  }
}

/* fit_data.json 기본값 — ⚠ 예시 추정치(교정 필요). COST 탭에서 실제 데이터로 교체하세요. */
const FIT_DATA_DEFAULT={
  _placeholder:true,
  discount_tiers:[{max_qty:50,rate:1.0},{max_qty:200,rate:0.97},{max_qty:null,rate:0.93}],
  glass_price_preset:{"시장단가_중간":{"외부접합_13.52T":95000,"외부접합_17.52T":130000,"내부복층":85000,"단열시트":60000,"단판유리":50000,"진공단열패널":250000}},
  default_offset:{grating_depth_offset:40,stiffener_lower_offset:100,stiffener_upper_offset:100},
  unit_price:{"할증률":1.05,"원자재_per_kg":8000,"azon_loss배수":1.3,"azon_per_m":3000,"gasket_loss배수":1.1,"gasket_per_m":2000,"가공비_per_kg":3000,"관리이윤율":0.15},

function frameEstimate(f,qty,FD){
  try{ return new FitEngine(FD||FIT_DATA_DEFAULT).estimate({W:f.frameWidth,H:f.frameHeight,D:f.depth,H1:f.H1,H2:f.H2,H4:f.H4,floors:f.floors,qty:Math.max(1,Math.round(qty||1)),frameType:f.engineFrameType||'유리',glassPreset:f.glassPreset}); }
  catch(e){ return null; }
}

/* ═══ COMPUTE ═══ */
function frameSection(f){
  const H1=f.H1??250,H2=f.H2??600,H4=f.H4??250;
  const H3=Math.max(0,f.frameHeight-H1-H2-H4);
  return{H1,H2,H3,H4,visionH:H3,outerGlassH:f.frameHeight,needsSplit:f.frameHeight>6000,thickness:f.floors>10?'17.52T':'13.52T'};
}

function zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer){
  const zPer=zonePer||165; /* 존당 기준 바닥면적(㎡) — 공조·제어조닝 존수량 */
  const ef=(FD&&FD.energy_factors)||{};
  const skinSpec=SKIN_CARTS.find(c=>c.id===crt.skinType)||SKIN_CARTS[1];
  const osBoost=os.hasOs?(os.sunTrack?(ef.os_suntrack??0.015):0)+(os.energy?(ef.os_energy??0.01):0):0;
  const gridFac=grd.hasGrid?((grd.daylight?(ef.grid_daylight??0.01):0)+(grd.dimming?(ef.grid_dimming??0.01):0)):0;
  const rHvacFull=ef.hvac??0.085;
  const osFlat=os.hasOs?(P.pOsBase+(os.sunTrack?P.pOsSun:0)+(os.energy?P.pOsEnergy:0)+(os.bms?P.pOsBms:0)):0;
  /* 입면 모듈 → FRAME+GLASS (프레임 타입별) */
  const byTypeQty={};
  zones.forEach(z=>{const fr=zoneFrame(z,frames);byTypeQty[fr.id]=(byTypeQty[fr.id]||0)+(z.moduleCount||0);});
  let frameGlass=0;
  Object.keys(byTypeQty).forEach(fid=>{const fr=frames.find(x=>x.id===fid)||frames[0];const est=frameEstimate(fr,byTypeQty[fid],FD);frameGlass+=est?est.cost_breakdown["프로젝트_합계"]:0;});
  const modTotal=zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  /* 대표 프레임(에너지·스킨·깊이 조건) */
  const repFr=(zones[0]&&zoneFrame(zones[0],frames))||frames[0]||{};
  const outerSpec=OUTER_GLASS.find(g=>g.id===repFr.outerGlassType)||OUTER_GLASS[1];
  const envFac=outerSpec.id==='high_spec'?(ef.env_high??0.105):(ef.env_std??0.096);
  const skinOk=crt.hasSkin&&repFr.depth>=skinSpec.minD;
  const shadeFac=skinOk?skinSpec.shade/100:0;
  const hvacOk=crt.hasHvac&&repFr.depth>=1000;
  const rHvac=hvacOk?rHvacFull:0;
  /* 층구간(floorZones) → 바닥면적·존수량 */
  const fz=Array.isArray(floorZones)?floorZones:[];
  let totalM2=0,zoneCount=0;
  fz.forEach(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);const a=Math.max(0,g.areaM2||0);totalM2+=a*nf;zoneCount+=Math.max(1,Math.ceil(a/zPer))*nf;});
  const skinN=skinOk?modTotal:0;
  const cSkin=skinN*skinP(skinSpec,FD);
  const hvacN=hvacOk?zoneCount:0;
  const cHvac=hvacN*P.pHvac;
  const cGrid=grd.hasGrid?(P.pGrid+(grd.daylight?P.pDaylight:0)+(grd.dimming?P.pDimming:0))*modTotal:0;
  let conventional=0;
  zones.forEach(z=>{const fr=zoneFrame(z,frames);conventional+=(fr.frameWidth/1000)*(fr.frameHeight/1000)*(z.moduleCount||0)*P.pConv;});
  const sf=1-(1-envFac)*(1-shadeFac-osBoost)*(1-rHvac)*(1-gridFac);
  const baseline=E.eui*totalM2;
  const saved=baseline*sf, annualSave=saved*E.elec, co2=saved*0.46;
  const total=frameGlass+cSkin+cHvac+cGrid+osFlat;
  const savedFrac=baseline?saved/baseline:0;
  const payback=annualSave>0?(total-conventional)/annualSave:null;
  return{total,frameGlass,cSkin,cHvac,cGrid,osFlat,baseline,saved,annualSave,co2,conventional,savedFrac,payback,optimized:baseline-saved,zoneCount,modTotal,totalM2,zonePer:zPer};
}

const NF=({label,value,onChange,unit,step=1,min=0,max})=>{

  const [buf,setBuf]=useState(null);
  /* 편집 중(buf 활성)에는 raw 그대로 표시 — "1." 같은 소수점 중간 입력이 지워지지 않도록. 콤마는 blur 후 복원 */
  const disp=buf!==null?buf:((typeof value==='number'&&isFinite(value))?value.toLocaleString():'');

    <div><Lbl ch={label}/>

            setBuf(raw);
            if(raw===''||raw==='-'||raw==='.'||raw==='-.')return;
            const n=parseFloat(raw);
            if(isFinite(n))onChange(n);
          }}
          onBlur={()=>setBuf(null)}
          style={{flex:1,background:'transparent',border:'none',outline:'none',color:C.ink,fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,padding:0,minWidth:0}}/>
        {unit&&<span style={{fontSize:11,color:C.light,whiteSpace:'nowrap'}}>{unit}</span>}

    </div>
  );
};

/* ═══ CROSS-SECTION SVG ═══ */
function SectionSVG({f,crt}){
  const sec=frameSection(f);
  /* frameHeight가 0/NaN/너무 작은 값일 때 scaleY=Infinity로 렌더 폭주하는 것 방지 */
  const safeH=Math.max(100,Number.isFinite(f.frameHeight)&&f.frameHeight>0?f.frameHeight:4500);
  const safeD=Math.max(50,Number.isFinite(f.depth)&&f.depth>0?f.depth:450);
  const scaleY=320/safeH;
  const cavW=Math.max(50,Math.min(160,(safeD/1500)*160));
  const glassW=14, marginL=104, marginR=88;
  const totalW=marginL+glassW+cavW+glassW+marginR;
  const h2=sec.H2*scaleY, h3=sec.H3*scaleY, h4=sec.H4*scaleY, h1=sec.H1*scaleY;
  const frameH=safeH*scaleY;
  const innerX=marginL, outerX=marginL+glassW+cavW;
  const top=20, svgH=frameH+60;
  const y2=top, y3=top+h2, y4=top+h2+h3, y1=top+h2+h3+h4;
  const skinCart=SKIN_CARTS.find(c=>c.id===crt.skinType);
  const skinOk=crt.hasSkin&&skinCart&&f.depth>=skinCart.minD&&f.depth<=skinCart.maxD;
  const hvacOk=crt.hasHvac&&f.depth>=1000;

  const insHatch=(x,y,w,h)=>{
    const lines=[];
    for(let i=0;i<h+w;i+=8){lines.push(<line key={i} x1={x+Math.max(0,i-h)} y1={y+Math.min(i,h)} x2={x+Math.min(i,w)} y2={y+Math.max(0,i-w)} stroke={C.borderDark} strokeWidth={0.8}/>);}
    return<><rect x={x} y={y} width={w} height={h} fill={C.panel}/>{lines}<rect x={x} y={y} width={w} height={h} fill="none" stroke={C.borderDark} strokeWidth={1}/></>;
  };
  const lab=(y,h,t1,t2,col)=>(<>
    <text x={innerX-5} y={y+h/2+2} textAnchor="end" fontSize="7.5" fontFamily="'DM Mono',monospace" fill={col}>{t1}</text>
    <text x={innerX-5} y={y+h/2+11} textAnchor="end" fontSize="7" fontFamily="'DM Mono',monospace" fill={C.light}>{t2}</text>
  </>);

  return(
    <svg viewBox={`0 0 ${totalW} ${svgH}`} width="100%" style={{display:'block',background:C.white,border:`1px solid ${C.border}`}}>
      <text x={innerX+glassW/2} y={14} textAnchor="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill={C.light}>INNER</text>
      <text x={innerX+glassW+cavW/2} y={14} textAnchor="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill={C.light}>CAVITY {fmt(f.depth)}</text>
      <text x={outerX+glassW/2} y={14} textAnchor="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill={C.light}>OUTER</text>

      {/* INNER — H2 상부 스팬드럴 */}
      {insHatch(innerX,y2,glassW,h2)}
      {lab(y2,h2,'스팬드럴(상)',`H2 ${fmt(sec.H2)}mm`,C.sub)}
      {/* H3 비전 */}
      <rect x={innerX} y={y3} width={glassW} height={h3} fill={C.blueLt} stroke={C.blue} strokeWidth={1}/>
      {sec.needsSplit&&<line x1={innerX} x2={innerX+glassW} y1={y3+h3/2} y2={y3+h3/2} stroke={C.blue} strokeWidth={1.5} strokeDasharray="3 2"/>}
      {lab(y3,h3,'비전(시창)',`H3 ${fmt(sec.H3)}mm`,C.blue)}
      {/* H4 하부 스팬드럴 */}
      {insHatch(innerX,y4,glassW,h4)}
      {lab(y4,h4,'스팬드럴(하)',`H4 ${fmt(sec.H4)}mm`,C.sub)}
      {/* H1 가이드 */}
      <rect x={innerX} y={y1} width={glassW} height={h1} fill={C.gray} stroke={C.borderDark} strokeWidth={1}/>
      {Array.from({length:2}).map((_,k)=><line key={k} x1={innerX+2} x2={innerX+glassW-2} y1={y1+h1*(k+1)/3} y2={y1+h1*(k+1)/3} stroke={C.borderDark} strokeWidth={0.7}/>)}
      {lab(y1,h1,'가이드',`H1 ${fmt(sec.H1)}mm`,C.sub)}

      {/* OUTER — 외부접합 전체 H */}
      <rect x={outerX} y={top} width={glassW} height={frameH} fill={C.blueLt} stroke={C.blue} strokeWidth={1} opacity={0.8}/>
      {sec.needsSplit&&<line x1={outerX} x2={outerX+glassW} y1={top+frameH/2} y2={top+frameH/2} stroke={C.blue} strokeWidth={1.5} strokeDasharray="3 2"/>}
      <text x={outerX+glassW+5} y={top+frameH/2+2} fontSize="7.5" fontFamily="'DM Mono',monospace" fill={C.blue}>외부접합</text>
      <text x={outerX+glassW+5} y={top+frameH/2+11} fontSize="7" fontFamily="'DM Mono',monospace" fill={C.light}>{sec.thickness} · H {fmt(f.frameHeight)}mm</text>

      {/* CAVITY — skin cartridge over vision */}
      {skinOk&&(
        <g>
          <rect x={innerX+glassW+4} y={y3} width={cavW-8} height={h3} fill="none" stroke={C.amber} strokeWidth={1} strokeDasharray="4 2"/>
          {Array.from({length:6}).map((_,k)=><line key={k} x1={innerX+glassW+10} x2={innerX+glassW+cavW-10} y1={y3+h3*(0.12+k*0.14)} y2={y3+h3*(0.12+k*0.14)} stroke={C.amber} strokeWidth={1.5} strokeLinecap="square"/>)}
          <text x={innerX+glassW+cavW/2} y={y3-3} textAnchor="middle" fontSize="6.5" fontFamily="'DM Mono',monospace" fill={C.amber}>SKIN CARTRIDGE</text>
        </g>
      )}
      {hvacOk&&(
        <g>
          <rect x={innerX+glassW+4} y={y4} width={cavW-8} height={h4} fill="none" stroke={C.green} strokeWidth={1} strokeDasharray="4 2"/>
          <text x={innerX+glassW+cavW/2} y={y4-3} textAnchor="middle" fontSize="6.5" fontFamily="'DM Mono',monospace" fill={C.green}>AIR HANDLING</text>
          {Array.from({length:2}).map((_,k)=><line key={k} x1={innerX+glassW+10} x2={innerX+glassW+cavW-10} y1={y4+h4*(0.4+k*0.25)} y2={y4+h4*(0.4+k*0.25)} stroke={C.green} strokeWidth={0.8}/>)}
        </g>
      )}

      <text x={totalW/2} y={svgH-6} textAnchor="middle" fontSize="8" fontFamily="'DM Mono',monospace" fill={sec.needsSplit?C.red:C.light}>{sec.needsSplit?'⚠ 높이 6m 초과 — 유리 2분절 필요':`H ${fmt(f.frameHeight)} = H1 ${fmt(sec.H1)}+H2 ${fmt(sec.H2)}+H3 ${fmt(sec.H3)}+H4 ${fmt(sec.H4)}`}</text>
      <line x1={innerX} y1={svgH-22} x2={outerX+glassW} y2={svgH-22} stroke={C.light} strokeWidth={0.8}/>
      <text x={(innerX+outerX+glassW)/2} y={svgH-25} textAnchor="middle" fontSize="7.5" fontFamily="'DM Mono',monospace" fill={C.sub}>D={fmt(f.depth)}mm</text>
    </svg>
  );
}

/* ═══ PLATFORM TAB ═══ */
function PlatformTab({zones,setZones,zonePer,setZonePer,floorZones,setFloorZones,frames,f,crt,grd,os,E,setE,P,FD,overview,setOverview,committed,plan}){
  const [editId,setEditId]=useState(null);
  const [showE,setShowE]=useState(false);
  const [showOv,setShowOv]=useState(true);
  const [showParcels,setShowParcels]=useState(false);
  let _id=zones.length+10;
  /* 결과 계산은 committed(적용된 값) 사용. 입력 UI는 raw state 그대로 */
  const C_=committed||{zones,frames,crt,grd,os,E,P};
  const cFrame=(C_.frames&&(C_.frames.find(x=>x.id===f.id)||C_.frames[0]))||f;
  const cCrt=C_.crt, cGrd=C_.grd, cOs=C_.os;
  const results=useMemo(()=>{
    const c=C_;
    const osFlat=c.os.hasOs?(c.P.pOsBase+(c.os.sunTrack?c.P.pOsSun:0)+(c.os.energy?c.P.pOsEnergy:0)+(c.os.bms?c.P.pOsBms:0)):0;
    const agg=zoneAgg(c.zones,C_.floorZones,c.frames,c.crt,c.grd,c.os,c.E,c.P,FD,C_.zonePer);
    return{agg,osFlat};
  },[committed,FD]);
  const {agg}=results;
  const costItems=[{c:'FRAME + GLASS (엔진)',v:agg.frameGlass,col:C.blue},{c:'SKIN CARTRIDGE',v:agg.cSkin,col:C.amber},{c:'AIR HANDLING',v:agg.cHvac,col:C.green},{c:'GRID (조명)',v:agg.cGrid,col:'#5a3e7a'},{c:'OS 시스템',v:agg.osFlat,col:C.ink}].filter(i=>i.v>0);
  const cMax=Math.max(...costItems.map(i=>i.v),1);
  const ov=overview||{};
  const NUMK_OV=['gfa','floorsAbove','floorsBelow','height','siteArea'];
  const ovf=(k,label,unit)=>{
    const isN=NUMK_OV.includes(k);
    const raw=ov[k]==null?'':String(ov[k]);
    const disp=isN&&raw!==''?(isFinite(Number(raw.replace(/,/g,'')))?Number(raw.replace(/,/g,'')).toLocaleString():raw):raw;
    return(
      <div><Lbl ch={label}/><div style={{display:'flex',alignItems:'baseline',gap:5,border:`1px solid ${C.borderDark}`,background:C.white,padding:'7px 10px'}}>
        <input value={disp} onChange={e=>{
          const next=isN?e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,''):e.target.value;
          setOverview(s=>({...s,[k]:next}));
        }} style={{flex:1,border:'none',background:'transparent',fontSize:12,color:C.ink,outline:'none',fontFamily:isN?"'DM Mono',monospace":'inherit'}}/>
        {unit&&<span style={{fontSize:10,color:C.light}}>{unit}</span>}
      </div></div>
    );
  };
  /* PLAN 연동 — 필지(SSOT)·계획안 선택 옵션에서 OVERVIEW 파생 */
  const planParcels=((plan&&plan.site&&Array.isArray(plan.site.parcels))?plan.site.parcels:[]).filter(q=>q&&q.addr);
  const planArea=planParcels.reduce((a,q)=>a+(Number(q.area)||0),0);
  const planOpt=(plan&&Array.isArray(plan.options))?plan.options.find(o=>o.id===plan.selected):null;
  const planUse=(plan&&plan.targets&&plan.targets.use)||'';
  const locSummary=planParcels.length?(planParcels.length>1?`${planParcels[0].addr} 외 ${planParcels.length-1}필지`:planParcels[0].addr):'';
  /* 용도·층수·높이·연면적: PLAN 계획안과 상시 동기화 / 대지위치·면적: 비었을 때만 기본 채움(수정 허용) */
  useEffect(()=>{
    const patch={};
    if(planUse&&ov.use!==planUse)patch.use=planUse;
    if(planOpt){
      if(String(ov.floorsAbove||'')!==String(planOpt.floors))patch.floorsAbove=String(planOpt.floors);
      if(String(ov.height||'')!==String(planOpt.height))patch.height=String(planOpt.height);
      if(String(ov.gfa||'')!==String(planOpt.gfa))patch.gfa=String(planOpt.gfa);
    }
    if(locSummary&&!ov.location)patch.location=locSummary;
    if(planArea>0&&!ov.siteArea)patch.siteArea=String(Math.round(planArea*10)/10);
    if(Object.keys(patch).length)setOverview(s2=>({...s2,...patch}));
  },[planUse,planOpt&&planOpt.floors,planOpt&&planOpt.height,planOpt&&planOpt.gfa,locSummary,planArea]);
  /* 읽기전용(PLAN 동기화) 필드 카드 */
  const ovRO=(label,val,unit,note)=>(
    <div><Lbl ch={label}/>
      <div style={{display:'flex',alignItems:'baseline',gap:5,border:`1px solid ${C.green}`,background:C.greenLt,padding:'7px 10px'}}>
        <span style={{flex:1,fontSize:12,color:C.green,fontFamily:"'DM Mono',monospace"}}>{(val===''||val==null)?'—':val}</span>
        {unit&&<span style={{fontSize:10,color:C.light}}>{unit}</span>}
      </div>
      <span style={{fontSize:8.5,color:C.green,letterSpacing:'.04em'}}>⧉ {note||'PLAN 연동'}</span>
    </div>
  );

  return(
    <div style={{maxWidth:1200,margin:'0 auto',padding:'24px 32px'}}>
      {/* 건축 개요 */}
      <button onClick={()=>setShowOv(s=>!s)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'transparent',border:'none',padding:'2px 0',width:'100%',marginBottom:showOv?12:18}}>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:'.08em',color:C.ink}}>PROJECT OVERVIEW <span style={{fontSize:11,color:C.light,marginLeft:6}}>건축 개요</span></span>
        <IcoDn s={16} rot={showOv?180:0}/>
      </button>
      {showOv&&<div style={{border:`1px solid ${C.border}`,padding:'16px 18px',marginBottom:24,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'14px 18px'}}>
        {ovf('building','건물명')}
        <div style={{gridColumn:'1/-1'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
            <Lbl ch={planParcels.length?"대지위치 ⧉ PLAN 연동":"대지위치"}/>
            {planParcels.length>1&&<button onClick={()=>setShowParcels(v=>!v)} style={{display:'flex',alignItems:'center',gap:4,background:'transparent',border:'none',color:C.green,fontSize:10.5,cursor:'pointer',padding:'0 0 4px'}}>외 {planParcels.length-1}필지 전체보기 <IcoDn s={13} rot={showParcels?180:0}/></button>}
          </div>
          <AddrSearchInput value={ov.location||''} onChange={t=>setOverview(s=>({...s,location:t}))} confmKey={FD.juso_confm_key}/>
          {showParcels&&planParcels.length>1&&<div style={{marginTop:6,border:`1px solid ${C.border}`,background:C.panel,padding:'8px 12px'}}>
            {planParcels.map((q,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',gap:10,fontSize:11,padding:'3px 0',borderBottom:i<planParcels.length-1?`1px solid ${C.border}`:'none'}}>
                <span style={{color:C.sub}}>{q.type==='virtual'?'[가상] ':''}{q.addr}{q.jibun?` (${q.jibun})`:''}</span>
                <span style={{fontFamily:"'DM Mono',monospace",color:C.ink,whiteSpace:'nowrap'}}>{q.area>0?fmt(q.area)+'㎡':'—'}</span>
              </div>
            ))}
            {planArea>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:700,paddingTop:5,marginTop:3,borderTop:`1px solid ${C.borderDark}`}}><span>합계</span><span style={{fontFamily:"'DM Mono',monospace",color:C.amber}}>{fmt(Math.round(planArea))}㎡</span></div>}
          </div>}
        </div>
        {planUse
          ?ovRO('용도',ov.use,'','PLAN 연동')
          :<div><Lbl ch="용도"/><select value={ov.use||'업무시설'} onChange={e=>setOverview(s=>({...s,use:e.target.value}))} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'7px 10px'}}>{['업무시설','공동주택','복합시설','교육연구','의료시설','문화집회','기타'].map(u=><option key={u}>{u}</option>)}</select></div>}
        {planOpt?ovRO('지상층수',fmt(ov.floorsAbove),'F','PLAN 매스'):ovf('floorsAbove','지상층수','F')}
        {ovf('floorsBelow','지하층수','F')}
        {planOpt?ovRO('건물높이',fmt(ov.height),'m','PLAN 매스'):ovf('height','건물높이','m')}
        {ovf('siteArea',planArea>0?`대지면적 ⧉PLAN ${fmt(Math.round(planArea))}㎡`:'대지면적','㎡')}
        {planOpt?ovRO('연면적',fmt(ov.gfa),'㎡','PLAN 매스'):ovf('gfa','연면적','㎡')}
        {ovf('client','발주처')}
        {ovf('architect','설계자')}
        <div style={{gridColumn:'1/-1'}}><Lbl ch="비고"/><input value={ov.note||''} onChange={e=>setOverview(s=>({...s,note:e.target.value}))} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'7px 10px'}}/></div>
      </div>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:36}}>
      {/* left */}
      <div>
        <SH code="ZONES" sub="고층부·기준층·저층부 — 층구간별 바닥면적 → 존수량" tag="input"/>
        <div style={{background:C.panel,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{minWidth:160}}><NF label="존당 기준 바닥면적" unit="㎡/존" value={zonePer} step={10} min={10} onChange={v=>setZonePer(Math.max(10,v))}/></div>
          <span style={{fontSize:10.5,color:C.sub,lineHeight:1.6,flex:1}}>각 층구간의 <b>층당 바닥면적</b>을 이 기준으로 나눠 층별 존수량을 산정하고 적용층수를 곱합니다. 공조기·제어조닝 견적이 존수량 기준으로 계산됩니다.</span>
        </div>
        {(floorZones||[]).map((g,gi)=>{
          const nf=Math.max(1,(g.to||1)-(g.from||1)+1);
          const zPerFloor=Math.max(1,Math.ceil((g.areaM2||0)/(zonePer||165)));
          const zc=zPerFloor*nf;
          const setG=(patch)=>setFloorZones(s=>s.map((x,i)=>i===gi?{...x,...patch}:x));
          return(
          <div key={g.id||gi} style={{padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <input value={g.part||''} onChange={e=>setG({part:e.target.value})} style={{fontWeight:700,fontSize:12.5,color:C.ink,border:'none',borderBottom:`1.5px solid ${C.border}`,background:'transparent',outline:'none',width:90,padding:'2px 0'}}/>
              <span style={{flex:1}}/>
              <span style={{fontSize:10,color:C.light}}>존수</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,color:C.green,fontWeight:700}}>{fmt(zc)}<span style={{fontSize:9,color:C.light}}>존 ({fmt(zPerFloor)}/층×{nf}층)</span></span>
              <button onClick={()=>setFloorZones(s=>s.length>1?s.filter((_,i)=>i!==gi):s)} disabled={(floorZones||[]).length<=1} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.red,padding:'5px 7px',fontSize:10,opacity:(floorZones||[]).length<=1?0.3:1,cursor:(floorZones||[]).length<=1?'not-allowed':'pointer'}}><IcoTr s={11}/></button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1.2fr',gap:10}}>
              <NF label="시작층" unit="F" value={g.from} step={1} min={1} onChange={v=>setG({from:Math.max(1,Math.round(v))})}/>
              <NF label="끝층" unit="F" value={g.to} step={1} min={1} onChange={v=>setG({to:Math.max(1,Math.round(v))})}/>
              <NF label="층당 바닥면적" unit="㎡" value={g.areaM2} step={50} min={0} onChange={v=>setG({areaM2:Math.max(0,v)})}/>
            </div>
          </div>);
        })}
        <button onClick={()=>setFloorZones(s=>[...s,{id:'z'+Date.now(),part:`구간 ${s.length+1}`,from:1,to:1,areaM2:660}])} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5,width:'100%',background:'transparent',border:`1px dashed ${C.border}`,color:C.sub,padding:'8px 0',fontSize:11,marginTop:10,cursor:'pointer'}}><IcoPl s={12}/> 층구간 추가</button>
        {(()=>{const tot=(floorZones||[]).reduce((a,g)=>a+Math.max(0,g.areaM2||0)*Math.max(1,(g.to||1)-(g.from||1)+1),0);const zc=(floorZones||[]).reduce((a,g)=>a+Math.max(1,Math.ceil((g.areaM2||0)/(zonePer||165)))*Math.max(1,(g.to||1)-(g.from||1)+1),0);return(
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',borderTop:`1.5px solid ${C.ink}`,marginTop:10,paddingTop:8}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.08em',color:C.ink}}>합계 연면적 · 존수</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:13}}>{fmt(Math.round(tot))}㎡ · <span style={{color:C.green,fontWeight:700}}>{fmt(zc)}존</span></span>
          </div>);})()}

        <HR/>
        <SH code="MODULES" sub="입면별 FIT 모듈 (프레임 견적 기준)" tag="input"/>
        {zones.map(z=>(
          <div key={z.id} style={{display:'grid',gridTemplateColumns:'1.3fr 1fr auto',gap:10,alignItems:'end',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
            <div><Lbl ch="입면"/>
              <select value={z.face||'F'} onChange={e=>setZones(s=>s.map(zz=>zz.id===z.id?{...zz,face:e.target.value}:zz))} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:12,color:C.ink,outline:'none',padding:'6px 8px'}}>
                {FACES.map(fc=><option key={fc.id} value={fc.id}>{fc.ko}</option>)}
                <option value="ETC">기타</option>
              </select>
            </div>
            <NF label="모듈 수" unit="개" value={z.moduleCount} onChange={v=>setZones(s=>s.map(zz=>zz.id===z.id?{...zz,moduleCount:Math.max(0,Math.round(v))}:zz))}/>
            <div style={{display:'flex',gap:6,alignItems:'end'}}>
              {frames.length>1
                ?<div><Lbl ch="프레임"/><select value={z.frameId||(frames[0]&&frames[0].id)} onChange={e=>setZones(s=>s.map(zz=>zz.id===z.id?{...zz,frameId:e.target.value}:zz))} style={{border:`1px solid ${C.borderDark}`,background:C.white,fontSize:11,color:C.ink,padding:'6px 8px',outline:'none'}}>{frames.map(fr=><option key={fr.id} value={fr.id}>{fr.name}</option>)}</select></div>
                :<div style={{minWidth:20}}/>}
              <button onClick={()=>setZones(s=>s.length>1?s.filter(zz=>zz.id!==z.id):s)} disabled={zones.length<=1} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.red,padding:'6px 7px',fontSize:10,opacity:zones.length<=1?0.3:1,cursor:zones.length<=1?'not-allowed':'pointer',marginBottom:1}}><IcoTr s={11}/></button>
            </div>
          </div>
        ))}
        <button onClick={()=>setZones(s=>[...s,{id:Date.now(),name:`입면 ${s.length+1}`,face:'F',moduleCount:12,frameId:(frames[0]&&frames[0].id)||'A'}])} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5,width:'100%',background:'transparent',border:`1px dashed ${C.border}`,color:C.sub,padding:'8px 0',fontSize:11,marginTop:10,cursor:'pointer'}}><IcoPl s={12}/> 입면 추가</button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',borderTop:`1.5px solid ${C.ink}`,marginTop:10,paddingTop:8}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.08em',color:C.ink}}>총 모듈</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.amber,fontWeight:700}}>{fmt(zones.reduce((a,z)=>a+(z.moduleCount||0),0))}모듈</span>
        </div>

        <HR/>
        <button onClick={()=>setShowE(s=>!s)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'transparent',border:'none',padding:'4px 0',width:'100%',marginBottom:showE?14:0}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.1em',color:C.sub}}>ENERGY · PRICE PARAMETERS</span>
          <IcoDn s={15} rot={showE?180:0}/>
        </button>
        {showE&&<div style={{background:C.panel,padding:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px 14px'}}>
          <NF label="기준 EUI kWh/㎡·년" value={E.eui} onChange={v=>setE(s=>({...s,eui:v}))} step={10}/>
          <NF label="전기요금 원/kWh" value={E.elec} onChange={v=>setE(s=>({...s,elec:v}))} step={10}/>
        </div>}
      </div>

      {/* right */}
      <div>
        <SH code="SIMULATION RESULT" sub="전체 종합" tag="result"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,borderLeft:`1.5px solid ${C.border}`,marginBottom:28}}>
          {[{c:'TOTAL COST',v:won(agg.total),s:`추가투자 ${won(Math.max(0,agg.total-agg.conventional))}`,acc:C.amber},
            {c:'ENERGY SAVING',v:pct(agg.savedFrac),s:`연간 ${kwh(agg.saved)} 절감`,acc:C.green},
            {c:'ANNUAL SAVING',v:won(agg.annualSave),s:`CO₂ ${(agg.co2/1000).toFixed(1)} tCO₂/년`,acc:C.green},
            {c:'PAYBACK',v:agg.payback>0?`${agg.payback.toFixed(1)}Y`:'즉시',s:'추가투자 ÷ 연간절감',acc:C.ink}].map(k=>(
            <div key={k.c} style={{padding:'0 20px 16px',borderRight:`1.5px solid ${C.border}`}}>
              <Lbl ch={k.c}/>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,lineHeight:1.05,color:k.acc,marginBottom:4}}>{k.v}</div>
              <div style={{fontSize:10.5,color:C.light}}>{k.s}</div>
            </div>
          ))}
        </div>

        <SH code="COST BREAKDOWN" sub="항목별 공사비" tag="result"/>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
          {costItems.map(it=>(
            <div key={it.c}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'.06em',color:C.sub}}>{it.c}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.ink}}>{won(it.v)}</span>
              </div>
              <div style={{height:3,background:C.panel}}><div style={{height:'100%',width:`${(it.v/cMax)*100}%`,background:it.col,transition:'width .3s'}}/></div>
            </div>
          ))}
        </div>

        <div style={{paddingTop:14,borderTop:`1.5px solid ${C.ink}`,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <div><Lbl ch="기존 커튼월"/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.sub}}>{won(agg.conventional)}</div></div>
          <div><Lbl ch="FIT 총공사비"/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.amber}}>{won(agg.total)}</div></div>
          <div><Lbl ch="추가 투자"/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.ink}}>{won(Math.max(0,agg.total-agg.conventional))}</div></div>
        </div>

        {/* SMART X GREEN PLUS */}
        <HR/>
        <Lbl ch="SMART X GREEN PLUS"/>
        {[{l:'DOUBLE SKIN FACADE',v:OUTER_GLASS.find(g=>g.id===cFrame.outerGlassType)?.id==='high_spec'?10.5:9.6,on:true},
          {l:`SKIN CARTRIDGE (${SKIN_CARTS.find(c=>c.id===cCrt.skinType)?.en||''})`,v:SKIN_CARTS.find(c=>c.id===cCrt.skinType)?.shade||0,on:cCrt.hasSkin&&cFrame.depth>=(SKIN_CARTS.find(c=>c.id===cCrt.skinType)?.minD||999)},
          {l:'AIR HANDLING CARTRIDGE',v:8.5,on:cCrt.hasHvac&&cFrame.depth>=1000},
          {l:'GRID — 채광 센서',v:1,on:cGrd.hasGrid&&cGrd.daylight},
          {l:'OS — SUN TRACKING',v:1.5,on:cOs.hasOs&&cOs.sunTrack}].map(r=>(
          <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,opacity:r.on?1:0.28}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:C.sub}}>{r.l}</span>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:r.on?C.green:C.light}}>-{r.v}%</span>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderTop:`1.5px solid ${C.ink}`,paddingTop:8,marginTop:4}}>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,fontWeight:600}}>TOTAL REDUCTION</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.green}}>-{(agg.savedFrac*100).toFixed(1)}%</span>
        </div>
      </div>
      </div>
    </div>
  );
}

/* ═══ FRAME TAB ═══ */
function FrameTab({f,setF,crt,frames,activeFrameId,setActiveFrameId,setFrames,planMeta}){
  const sec=useMemo(()=>frameSection(f),[f]);
  const pf=k=>v=>setF(s=>({...s,[k]:v}));
  const addType=()=>{
    const used=new Set(frames.map(x=>x.id));
    let code='A'.charCodeAt(0); while(used.has(String.fromCharCode(code)))code++;
    const id=String.fromCharCode(code);
    const base=frames.find(x=>x.id===activeFrameId)||frames[0];
    const nf={...base,id,name:`TYPE ${id}`};
    setFrames(fs=>[...fs,nf]); setActiveFrameId(id);
  };
  const delType=()=>{
    if(frames.length<=1){window.alert('최소 1개 타입은 있어야 합니다.');return;}
    if(!window.confirm(`'${f.name}' 타입을 삭제할까요? (이 타입을 쓰는 존은 첫 타입으로 이동)`))return;
    setFrames(fs=>fs.filter(x=>x.id!==activeFrameId));
    setActiveFrameId(frames.find(x=>x.id!==activeFrameId).id);
  };
  return(
    <div style={{maxWidth:1200,margin:'0 auto',padding:'20px 32px 28px'}}>
      {/* 타입 선택 바 */}
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:18,paddingBottom:14,borderBottom:`1.5px solid ${C.border}`}}>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.1em',color:C.light,marginRight:4}}>FRAME TYPE</span>
        {frames.map(fr=>{const on=fr.id===activeFrameId;return(
          <button key={fr.id} onClick={()=>setActiveFrameId(fr.id)} style={{background:on?C.ink:'transparent',color:on?C.white:C.sub,border:`1px solid ${on?C.ink:C.border}`,padding:'6px 14px',fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:'.06em'}}>{fr.name}</button>
        );})}
        <button onClick={addType} style={{background:'transparent',color:C.green,border:`1px dashed ${C.green}`,padding:'6px 12px',fontSize:12}}>＋ 타입 추가</button>
        <span style={{flex:1}}/>
        <input value={f.name} onChange={e=>setF(s=>({...s,name:e.target.value}))} style={{border:`1px solid ${C.border}`,background:C.panel,padding:'6px 10px',fontSize:12,color:C.ink,width:130,outline:'none'}}/>
        <button onClick={delType} style={{background:'transparent',color:C.red,border:`1px solid ${C.border}`,padding:'6px 12px',fontSize:12}}>타입 삭제</button>
      </div>
      {planMeta&&f.name&&f.name.indexOf('PLAN')===0&&(
        <div style={{padding:'9px 14px',background:C.blueLt,border:`1px solid ${C.blue}`,marginBottom:16,fontSize:11,color:C.blue,lineHeight:1.6}}>
          ⧉ 이 프레임은 <b>{planMeta.name}</b>에서 생성되었습니다 (모듈 {fmt(planMeta.moduleW)}mm · 층고 {fmt(planMeta.floorH)}mm · H분절 자동 산정). 여기서 치수를 수정하면 PLAN 수량 산정과 달라질 수 있으며, PLAN 탭에서 재적용하면 덮어써집니다.
        </div>
      )}
    <div style={{display:'grid',gridTemplateColumns:'340px 1fr',gap:40,alignItems:'start'}}>
      {/* form */}
      <div>
        <SH code="FRAME" sub={`${f.name} — 이중외피 프레임 스펙`} tag="input"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px 14px',marginBottom:20}}>
          <NF label="프레임 높이 (H)" unit="mm" value={f.frameHeight} step={50} min={3000} max={10000} onChange={v=>setF(s=>({...s,frameHeight:Math.round(v/50)*50}))}/>
          <NF label="층수 (floors)" unit="F" value={f.floors} step={1} min={1} max={60} onChange={pf('floors')}/>
          <NF label="H2 상부 스팬드럴" unit="mm" value={f.H2} step={50} min={0} max={2000} onChange={v=>setF(s=>({...s,H2:Math.round(v/50)*50}))}/>
          <NF label="H4 하부 스팬드럴" unit="mm" value={f.H4} step={50} min={0} max={2000} onChange={v=>setF(s=>({...s,H4:Math.round(v/50)*50}))}/>
          <NF label="H1 가이드" unit="mm" value={f.H1} step={50} min={0} max={1000} onChange={v=>setF(s=>({...s,H1:Math.round(v/50)*50}))}/>
          <div style={{background:C.panel,padding:'10px 12px',borderLeft:`3px solid ${C.green}`}}>
            <Lbl ch="H3 비전 (자동)"/>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,color:sec.H3>0?C.ink:C.red,lineHeight:1}}>{sec.H3} <span style={{fontSize:12,color:C.light}}>mm</span></div>
          </div>
        </div>

        {/* derived */}
        <div style={{background:C.greenLt,border:`1px solid ${C.green}`,padding:'12px 14px',marginBottom:20}}>
          <Lbl ch="자동 산출 결과 (견적 엔진)"/>
          {[{l:'외부접합 높이 (H)',v:`${fmt(sec.outerGlassH)} mm`},{l:'비전 H3',v:`${fmt(sec.H3)} mm`},{l:'스팬드럴 H2 / H4',v:`${fmt(sec.H2)} / ${fmt(sec.H4)} mm`},{l:'유리 두께 (층수 기준)',v:sec.thickness}].map(r=>(
            <div key={r.l} style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:11,color:C.sub}}>{r.l}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:C.green}}>{r.v}</span>
            </div>
          ))}
          {sec.H3<=0&&<div style={{marginTop:8,padding:'6px 10px',background:C.redLt,border:`1px solid ${C.red}`,fontSize:11,color:C.red}}>⚠ H1+H2+H4 합이 H를 초과 — 비전(H3)이 음수입니다. 값을 조정하세요.</div>}
          {sec.needsSplit&&<div style={{marginTop:8,padding:'6px 10px',background:C.redLt,border:`1px solid ${C.red}`,fontSize:11,color:C.red}}>⚠ 높이 6m 초과 — 내·외부 유리 높이 방향 2분절 필요</div>}
        </div>

        <HR/>
        <div style={{marginBottom:16}}>
          <SR label="이중외피 깊이 (D)" value={f.depth} min={450} max={1500} step={50} onChange={pf('depth')} unit="mm"
            warn={f.depth<600?'※ 450~550mm: 롤블라인드·베네시안만 적용 가능':null}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px',marginBottom:16}}>
          <NF label="프레임 폭 (W)" unit="mm" value={f.frameWidth} step={10} min={900} max={2400} onChange={v=>setF(s=>({...s,frameWidth:Math.round(v/10)*10}))}/>
        </div>

        <HR/>
        <div style={{marginBottom:16}}><Lbl ch="외부 프레임 타입 (견적)"/><ChoiceGrid options={[{id:'유리',label:'유리 타입',sub:'OUT FRAME · MPS-013'},{id:'키넥티',label:'키넥티 타입',sub:'OUT FRAME · MPS-016'}]} value={f.engineFrameType} onChange={pf('engineFrameType')} cols={2}/></div>

        <HR/>
        <div style={{marginBottom:16}}><Lbl ch="외부유리 사양 (a)"/><ChoiceGrid options={OUTER_GLASS.map(g=>({id:g.id,label:g.label,sub:g.sub}))} value={f.outerGlassType} onChange={pf('outerGlassType')} cols={2}/></div>
        <p style={{fontSize:10,color:C.light,marginBottom:16,lineHeight:1.6}}>※ 유리 두께는 구조계산값(건물높이·풍하중·유리규격)에 따라 결정되며 단가에 연동됩니다. 풍하중 계산 결과 제공 가능.</p>

        <div style={{marginBottom:16}}><Lbl ch="내부유리 타입 (b)"/><ChoiceGrid options={INNER_GLASS_TYPE} value={f.innerGlassType} onChange={pf('innerGlassType')}/></div>
        <p style={{fontSize:10,color:C.light,marginBottom:16,lineHeight:1.6}}>※ 내부유리 풍하중은 외부유리 대비 1/2 적용.</p>
        <div style={{marginBottom:16}}><Lbl ch="내부유리 성능 (c) — 단열 등급"/><ChoiceGrid options={INNER_GLASS_PERF} value={f.innerGlassPerf} onChange={pf('innerGlassPerf')}/></div>
      </div>

      {/* section diagram */}
      <div>
        <SH code="SECTION DIAGRAM" sub="이중외피 단면 — 자동 업데이트" tag="result"/>
        <SectionSVG f={f} crt={crt}/>
        <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          {[{l:'외부접합 (H)',v:`${fmt(sec.outerGlassH)}mm`},{l:'비전 H3',v:`${fmt(sec.H3)}mm`},{l:'스팬드럴 H2',v:`${fmt(sec.H2)}mm`},{l:'이중외피 깊이 D',v:`${fmt(f.depth)}mm`},{l:'프레임 폭 W',v:`${fmt(f.frameWidth)}mm`},{l:'유리 두께',v:sec.thickness}].map(r=>(
            <div key={r.l} style={{background:C.panel,padding:'10px 12px',borderLeft:`3px solid ${C.green}`}}>
              <Lbl ch={r.l}/>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,color:C.ink}}>{r.v}</div>
            </div>
          ))}
        </div>
        {sec.needsSplit&&(
          <div style={{marginTop:16,padding:'14px',background:C.redLt,border:`1.5px solid ${C.red}`}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.08em',color:C.red}}>2분절 (SPLIT REQUIRED)</span>
            <p style={{fontSize:11,color:C.red,marginTop:6,lineHeight:1.6}}>층고 {fmt(f.frameHeight)}mm는 6,000mm 초과 — 내·외부 유리 모두 높이 방향 2분절 시공이 필요합니다. 중간 수평 프레임이 추가되며 단가에 반영됩니다.</p>
          </div>
        )}
      </div>
    </div>
    </div>
  );
}

/* ═══ SKIN CARTRIDGE TAB ═══ */
function SkinTab({frames,crt,setCrt,FD}){
  const pc=k=>v=>setCrt(s=>({...s,[k]:v}));
  const sel=SKIN_CARTS.find(c=>c.id===crt.skinType)||SKIN_CARTS[1];
  return(
    <div style={{maxWidth:900,margin:'0 auto',padding:'28px 32px'}}>
      <SH code="SKIN CARTRIDGE" sub="전동 차양 — 스킨카트리지" tag="input"/>
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
        {frames.map(fr=>{const ok=fr.depth>=sel.minD&&fr.depth<=sel.maxD;return(
          <div key={fr.id} style={{padding:'8px 12px',border:`1px solid ${ok?C.green:C.border}`,background:ok?C.greenLt:C.panel}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.04em',color:C.ink}}>{fr.name}</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub,marginLeft:8}}>D{fr.depth}</span>
            <span style={{fontSize:9,marginLeft:8,color:ok?C.green:C.red}}>{ok?'적용가능':'깊이부족'}</span>

      </div>
      <Toggle on={crt.hasSkin} onClick={()=>pc('hasSkin')(!crt.hasSkin)} label="스킨카트리지 적용" sub="전동 차양을 이중외피 내 설치 · 각 존의 프레임 타입 깊이에 따라 자동 적용"/>
      {crt.hasSkin&&(
        <div style={{marginTop:14,display:'flex',flexDirection:'column',gap:10}}>
          {SKIN_CARTS.map(c=>{
            const on=crt.skinType===c.id;
            return(
              <button key={c.id} onClick={()=>pc('skinType')(c.id)} style={{display:'flex',alignItems:'center',gap:14,width:'100%',textAlign:'left',padding:'14px 16px',
                border:`1.5px solid ${on?C.ink:C.border}`,background:on?C.ink:C.white,transition:'all .15s'}}>
                <span style={{width:20,height:20,borderRadius:'50%',border:`1.5px solid ${on?C.white:C.borderDark}`,display:'grid',placeItems:'center',background:on?C.white:'transparent',flexShrink:0}}>
                  {on&&<span style={{width:8,height:8,borderRadius:'50%',background:C.ink,display:'block'}}/>}
                </span>
                <span style={{flex:1}}>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:'.06em',color:on?C.white:C.ink}}>{c.label}</span>
                  <span style={{display:'block',fontSize:10.5,color:on?'#ccc':C.light,fontFamily:"'DM Mono',monospace",marginTop:2}}>{c.en} · 적용범위 {c.minD}~{c.maxD}mm · 차양효과 -{c.shade}%</span>
                </span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:on?C.white:C.amber}}>{won(skinP(c,FD))}/대</span>
              </button>
            );
          })}
        </div>
      )}
      <p style={{fontSize:10,color:C.light,marginTop:14,lineHeight:1.7}}>※ 선택한 스킨카트리지는 적용범위(깊이)를 만족하는 프레임 타입의 존에만 자동 반영됩니다. 깊이가 부족한 타입의 존은 차양 미적용으로 계산됩니다.</p>
    </div>
  );
}

            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub,marginLeft:8}}>D{fr.depth}</span>

              {[{l:'적용 깊이 범위',v:'1,000 ~ 1,500mm'},{l:'공조 면적 기준',v:'전용면적 50평당 1대'},{l:'카트리지 배치',v:'외피 내 분산'}].map(r=>(
                <div key={r.l}><Lbl ch={r.l}/><div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:C.green}}>{r.v}</div></div>
              ))}

            <div key={v.k} style={{border:`1px solid ${C.border}`,background:C.white}}>

/* ═══ COST LINE ITEMS (엔진 기반) ═══ */
function costLines(zones,floorZones,frames,crt,grd,os,P,FD,zonePer){
  const zPer=zonePer||165;
  const skinSpec=SKIN_CARTS.find(c=>c.id===crt.skinType)||SKIN_CARTS[1];
  const byTypeQty={};
  zones.forEach(z=>{const fr=zoneFrame(z,frames);byTypeQty[fr.id]=(byTypeQty[fr.id]||0)+(z.moduleCount||0);});
  const byType=Object.keys(byTypeQty).map(fid=>{const fr=frames.find(x=>x.id===fid)||frames[0];const qty=byTypeQty[fid];return{fr,qty,est:frameEstimate(fr,qty,FD)};});
  const frameGlassTotal=byType.reduce((s,t)=>s+(t.est?t.est.cost_breakdown["프로젝트_합계"]:0),0);
  const samooDeliver=byType.reduce((s,t)=>s+(t.est?t.est.samoo["납품가"]:0),0);
  const samooConstr=byType.reduce((s,t)=>s+(t.est?t.est.samoo["공사가"]:0),0);
  const mc=zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  const repFr=(zones[0]&&zoneFrame(zones[0],frames))||frames[0]||{};
  const skinOk=crt.hasSkin&&repFr.depth>=skinSpec.minD;
  const hvacOk=crt.hasHvac&&repFr.depth>=1000;
  const fz=Array.isArray(floorZones)?floorZones:[];
  let zoneCount=0; fz.forEach(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);zoneCount+=Math.max(1,Math.ceil(Math.max(0,g.areaM2||0)/zPer))*nf;});
  const skinN=skinOk?mc:0, hvacN=hvacOk?zoneCount:0;
  let conventional=0; zones.forEach(z=>{const fr=zoneFrame(z,frames);conventional+=(fr.frameWidth/1000)*(fr.frameHeight/1000)*(z.moduleCount||0)*P.pConv;});
  const cart=[];
  if(skinN>0)cart.push({item:'스킨카트리지',spec:skinSpec.label,unit:'대',qty:skinN,price:skinP(skinSpec,FD),amt:skinN*skinP(skinSpec,FD)});
  if(hvacN>0)cart.push({item:'공조카트리지',spec:`분산 공조기 (${zPer}㎡/존)`,unit:'대',qty:hvacN,price:P.pHvac,amt:hvacN*P.pHvac});
  const cartSub=cart.reduce((s,x)=>s+x.amt,0);
  const grid=[];
  if(grd.hasGrid){const gp=P.pGrid+(grd.daylight?P.pDaylight:0)+(grd.dimming?P.pDimming:0);grid.push({item:'GRID 조명 모듈',spec:[grd.daylight&&'채광센서',grd.dimming&&'조광'].filter(Boolean).join('+')||'기본 LED',unit:'모듈',qty:mc,price:gp,amt:mc*gp});}
  const gridSub=grid.reduce((s,x)=>s+x.amt,0);
  const osArr=[];
  if(os.hasOs){
    osArr.push({item:'FIT OS 기본',spec:'통합 제어 플랫폼',unit:'식',qty:1,price:P.pOsBase,amt:P.pOsBase});
    if(os.sunTrack)osArr.push({item:'태양 추적 제어',spec:'Sun Tracking',unit:'식',qty:1,price:P.pOsSun,amt:P.pOsSun});
    if(os.energy)osArr.push({item:'에너지 모니터링',spec:'Dashboard',unit:'식',qty:1,price:P.pOsEnergy,amt:P.pOsEnergy});
    if(os.bms)osArr.push({item:'BMS 연동',spec:'API Integration',unit:'식',qty:1,price:P.pOsBms,amt:P.pOsBms});
  }
  const osSub=osArr.reduce((s,x)=>s+x.amt,0);
  const total=frameGlassTotal+cartSub+gridSub+osSub;
  return{byType,frameGlassTotal,samooDeliver,samooConstr,cart,cartSub,grid,gridSub,os:osArr,osSub,total,conventional,mc,hvacN,skinN,zoneCount};
}

              <tbody>{Object.entries(est.glass_detail).map(([k,g])=>(
                <tr key={k} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'6px 10px',fontSize:11}}>{k}</td><td style={{padding:'6px 10px',fontSize:11,color:C.sub}}>{g.type}</td>
                  <td style={{padding:'6px 10px',textAlign:'right',fontFamily:"'DM Mono',monospace",fontSize:11,color:C.sub}}>{g.area_m2}㎡</td>

                </tr>))}</tbody>
            </table></div>}

        );
      })}

      {(L.cart.length>0||L.grid.length>0||L.os.length>0)&&<>

        <div style={{border:`1px solid ${C.border}`,marginBottom:20,overflowX:'auto'}}>
          <table>
            <thead><tr style={{borderBottom:`1.5px solid ${C.ink}`}}>{[['항목','left'],['규격','left'],['수량','right'],['단가','right'],['금액','right']].map(([h,a])=><th key={h} style={{padding:'8px 12px',textAlign:a,fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.06em',color:C.sub,fontWeight:400}}>{h}</th>)}</tr></thead>
            <tbody>{[...L.cart,...L.grid,...L.os].map((x,i)=><ARow key={i} x={x}/>)}</tbody>
          </table>

      <div style={{background:C.ink,color:C.white,padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>

        <div style={{padding:'14px',border:`1px solid ${C.ink}`}}><Lbl ch="추가 투자"/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.ink}}>{won(Math.max(0,L.total-L.conventional))}</div></div>

/* ═══ ENERGY EXPLANATION TAB ═══ */
function EnergyTab({zones,frames,f,crt,grd,os,E,P,FD,committed}){
  const C_=committed||{zones,frames,crt,grd,os,E,P};
  const cFrame=(C_.frames&&(C_.frames.find(x=>x.id===f.id)||C_.frames[0]))||f;
  const agg=useMemo(()=>zoneAgg(C_.zones,C_.floorZones,C_.frames,C_.crt,C_.grd,C_.os,C_.E,C_.P,FD,C_.zonePer),[committed,FD]);
  const outerSpec=OUTER_GLASS.find(g=>g.id===cFrame.outerGlassType)||OUTER_GLASS[1];
  const skinSpec=SKIN_CARTS.find(c=>c.id===C_.crt.skinType)||SKIN_CARTS[1];
  /* 절감 계수: FD.energy_factors(ADMIN 탭에서 조정). 기본값은 태평로빌딩 EnergyPlus 시뮬레이션(rev-05) */
  const ef=(FD&&FD.energy_factors)||{};
  const envFac=outerSpec.id==='high_spec'?(ef.env_high??0.105):(ef.env_std??0.096);
  const shadeFac=C_.crt.hasSkin&&cFrame.depth>=skinSpec.minD?skinSpec.shade/100:0;
  const hvacFac=C_.crt.hasHvac&&cFrame.depth>=1000?(ef.hvac??0.085):0;
  const gridFac=C_.grd.hasGrid?((C_.grd.daylight?(ef.grid_daylight??0.01):0)+(C_.grd.dimming?(ef.grid_dimming??0.01):0)):0;
  const osFac=C_.os.hasOs?((C_.os.sunTrack?(ef.os_suntrack??0.015):0)+(C_.os.energy?(ef.os_energy??0.01):0)):0;

  const systems=[
    {code:'DOUBLE SKIN',ko:'이중외피',fac:envFac,on:true,mech:'내·외부 이중유리 사이의 공기층이 완충대(buffer zone) 역할을 하여 외기 열전달을 차단합니다. 고사양 일사차폐 유리 적용 시 효과가 커집니다.',col:C.blue},
    {code:'SKIN CARTRIDGE',ko:'전동차양',fac:shadeFac,on:shadeFac>0,mech:`${skinSpec.label}가 일사를 능동적으로 차단해 여름철 냉방 부하를 줄입니다. 차양 종류에 따라 차폐 성능이 달라집니다.`,col:C.amber},
    {code:'AIR HANDLING',ko:'공조카트리지',fac:hvacFac,on:hvacFac>0,mech:'공조기를 외피 내 분산 배치하여 급기 경로를 단축하고 존별 개별 제어로 불필요한 공조를 최소화합니다.',col:C.green},
    {code:'GRID',ko:'조명 (채광센서)',fac:gridFac,on:gridFac>0,mech:'채광 센서가 자연광 유입량을 감지해 인공조명을 자동 조절(daylight harvesting)하여 조명 에너지를 절감합니다.',col:'#5a3e7a'},
    {code:'OS',ko:'운영 시스템',fac:osFac,on:osFac>0,mech:'태양 추적 기반 차양 자동 제어와 에너지 모니터링으로 운영 단계의 낭비를 최적화합니다.',col:C.ink},
  ];

  // waterfall
  let running=1;
  const steps=[{label:'BASELINE',pct:1,drop:0,col:C.borderDark}];
  systems.filter(s=>s.on&&s.fac>0).forEach(s=>{
    const before=running; running=running*(1-s.fac);
    steps.push({label:s.code,pct:running,drop:before-running,col:s.col});
  });

  return(
    <div style={{maxWidth:1000,margin:'0 auto',padding:'28px 32px'}}>
      <SH code="ENERGY" sub="에너지 절감 산정 방식" tag="result"/>
      <p style={{fontSize:13,color:C.sub,marginBottom:8,lineHeight:1.8}}>
        FIT 시스템은 <b style={{color:C.ink}}>외피 단열 · 능동 차양 · 분산 공조 · 스마트 조명 · 운영 최적화</b>가 연계되어 에너지를 절감합니다.
        각 시스템의 절감 기여를 중첩 보정(overlap)하여 산정하며, 시스템을 더할수록 절감 효과가 누적됩니다.
      </p>
      <p style={{fontSize:11,color:C.green,marginBottom:8,lineHeight:1.7,padding:'8px 12px',background:C.greenLt,border:`1px solid ${C.green}`}}>
        ✓ 절감 계수는 <b>태평로빌딩 EnergyPlus 시뮬레이션(설계설명서 rev-05, 총 36 시나리오)</b>의 마진 효과를 곱셈 중첩식으로 역산한 값입니다 — 스마트 합리화모델 대비 FIT Frame -9.6%, Skin Cartridge -0.9~1.5%p, AH Cartridge+FTU -5.8%p, 전열교환기 -2.6%p, Grid Dimming -0.4%p 등을 기반으로 보정.
      </p>

      {/* 종합 결과 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:0,borderLeft:`1.5px solid ${C.border}`,margin:'24px 0'}}>
        {[{c:'TOTAL REDUCTION',v:pct(agg.savedFrac),s:'기존 건물 대비',acc:C.green},
          {c:'ANNUAL ENERGY',v:kwh(agg.saved),s:`기준 ${kwh(agg.baseline)} → ${kwh(agg.optimized)}`,acc:C.green},
          {c:'CO₂ REDUCTION',v:`${(agg.co2/1000).toFixed(1)}t`,s:'tCO₂ / 년',acc:C.green}].map(k=>(
          <div key={k.c} style={{padding:'0 24px 14px',borderRight:`1.5px solid ${C.border}`}}>
            <Lbl ch={k.c}/>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:34,color:k.acc,lineHeight:1.05,marginBottom:4}}>{k.v}</div>
            <div style={{fontSize:10.5,color:C.light}}>{k.s}</div>
          </div>
        ))}
      </div>

      {/* WATERFALL */}
      <SH code="REDUCTION FLOW" sub="시스템별 절감 흐름" tag="result"/>
      <div style={{border:`1px solid ${C.border}`,padding:'28px 24px 20px',marginBottom:28,background:C.white,overflowX:'auto'}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:14,height:240,paddingTop:30,marginBottom:14,minWidth:520}}>
          {steps.map((st,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end',position:'relative',minWidth:54}}>
              {st.drop>0&&<span style={{position:'absolute',top:-28,left:'50%',transform:'translateX(-50%)',fontSize:10,color:C.red,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',padding:'1px 4px',background:C.redLt,borderRadius:2}}>↓{(st.drop*100).toFixed(1)}%</span>}
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:i===0?C.sub:st.col,marginBottom:6,lineHeight:1,whiteSpace:'nowrap'}}>{(st.pct*100).toFixed(1)}%</span>
              <div style={{width:'100%',height:`${st.pct*100}%`,background:st.col,transition:'height .4s'}}/>
            </div>
          ))}
          <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end',minWidth:60}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:C.green,marginBottom:6,lineHeight:1,whiteSpace:'nowrap'}}>{(running*100).toFixed(1)}%</span>
            <div style={{width:'100%',height:`${running*100}%`,background:C.green,border:`2px solid ${C.ink}`}}/>
          </div>
        </div>
        <div style={{display:'flex',gap:14,minWidth:520}}>
          {steps.map((st,i)=><span key={i} style={{flex:1,textAlign:'center',fontSize:9.5,color:i===0?C.sub:st.col,fontFamily:"'DM Mono',monospace",letterSpacing:'.02em',lineHeight:1.35,wordBreak:'keep-all',minWidth:54}}>{st.label}</span>)}
          <span style={{flex:1,textAlign:'center',fontSize:9.5,color:C.green,fontFamily:"'DM Mono',monospace",fontWeight:700,lineHeight:1.35,minWidth:60}}>FIT 적용</span>
        </div>
      </div>

      {/* FORMULA */}
      <SH code="METHODOLOGY" sub="산정 공식"/>
      <div style={{background:C.ink,color:C.white,padding:'20px 24px',marginBottom:28,fontFamily:"'DM Mono',monospace"}}>
        <p style={{fontSize:11,color:'#aaa',marginBottom:12,letterSpacing:'.04em'}}>// 절감률 = 1 − (1−외피)(1−차양−OS)(1−공조)(1−조명)</p>
        <p style={{fontSize:14,lineHeight:1.9}}>
          절감률 = 1 − (1−<span style={{color:C.blue,filter:'brightness(2)'}}>{(envFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:C.amber,filter:'brightness(2.2)'}}>{(shadeFac*100).toFixed(1)}%</span>−<span style={{color:'#ccc'}}>{(osFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:C.green,filter:'brightness(2)'}}>{(hvacFac*100).toFixed(1)}%</span>)
          × (1−<span style={{color:'#b89adb'}}>{(gridFac*100).toFixed(1)}%</span>)
        </p>
        <p style={{fontSize:20,marginTop:14,color:C.green,filter:'brightness(1.6)'}}>= {pct(agg.savedFrac)}</p>
        <p style={{fontSize:10,color:'#888',marginTop:12,lineHeight:1.7}}>* 곱셈 중첩 방식: 단순 합산이 아닌 중첩 보정으로 100%를 초과하지 않으며 실제 누적 효과를 반영합니다.<br/>* 연간 절감 에너지 = 기준 EUI({C_.E.eui} kWh/㎡·년) × 전용면적 × 절감률</p>
      </div>

      {/* SYSTEM CARDS */}
      <SH code="SYSTEM CONTRIBUTION" sub="시스템별 절감 메커니즘"/>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {systems.map(s=>(
          <div key={s.code} style={{display:'flex',gap:18,padding:'16px 18px',border:`1px solid ${C.border}`,opacity:s.on?1:0.4,background:s.on?C.white:C.panel}}>
            <div style={{width:90,flexShrink:0,borderRight:`1px solid ${C.border}`,paddingRight:18}}>
              <span style={{display:'block',fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:'.06em',color:s.col}}>{s.code}</span>
              <span style={{display:'block',fontSize:10.5,color:C.sub,marginTop:1}}>{s.ko}</span>
              <span style={{display:'block',fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:s.on?s.col:C.light,marginTop:8}}>-{(s.fac*100).toFixed(1)}%</span>
            </div>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:C.sub,lineHeight:1.7}}>{s.mech}</p>
              {!s.on&&<p style={{fontSize:11,color:C.red,marginTop:6}}>※ 현재 미적용 — 해당 탭에서 활성화하면 절감 효과가 반영됩니다.</p>}
            </div>
          </div>
        ))}
      </div>

      <p style={{fontSize:11,color:C.light,marginTop:24,lineHeight:1.7}}>
        ※ 절감 계수는 태평로빌딩 EnergyPlus 시뮬레이션 기준으로 보정된 값이며, 다른 건물·기후대·운전 시나리오에 적용할 때는 별도 정밀 시뮬레이션으로 재교정하는 것이 권장됩니다. 기준 EUI 250 kWh/㎡·년은 시뮬레이션의 스마트 합리화 모델 값으로, 프로젝트별 기준값은 PLATFORM 탭에서 조정 가능합니다.
      </p>
    </div>
  );
}

function sanitizeName(s){return (s||'project').replace(/[\\/:*?"<>|]/g,'_').trim()||'project';}
/* ═══ AI 렌더 — Gemini(gemini-2.5-flash-image, 기본) / OpenAI(gpt-image-1) ═══ */
async function aiRenderImage(prompt,key,size,provider,baseB64){
  if((provider||'gemini')==='gemini'){
    const parts=[];
    if(baseB64)parts.push({inlineData:{mimeType:'image/png',data:baseB64}});
    parts.push({text:prompt});
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key='+encodeURIComponent(key),{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts}],generationConfig:{responseModalities:['IMAGE','TEXT']}})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message||'Gemini 오류');
    const rparts=(((d.candidates||[])[0]||{}).content||{}).parts||[];
    const img=rparts.find(q=>q.inlineData&&q.inlineData.data);
    if(!img){const t=rparts.find(q=>q.text);throw new Error('이미지가 반환되지 않았습니다'+(t?' — '+t.text.slice(0,140):' (안전필터/한도 가능성)'));}
    return 'data:'+(img.inlineData.mimeType||'image/png')+';base64,'+img.inlineData.data;
  }
  const r=await fetch('https://api.openai.com/v1/images/generations',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-image-1',prompt,size:size||'1536x1024',n:1})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message||'OpenAI 오류');
  const b=(d.data&&d.data[0])||{};
  return b.b64_json?('data:image/png;base64,'+b.b64_json):(b.url||'');
}
function renderPrompts(opt,fit,use,site,hasBase){
  const sk=(SKIN_CARTS.find(c=>c.id===fit.skinType)||{}).en||'motorized louver';
  const faces=FACES.filter(f=>fit.faces&&fit.faces[f.id]).map(f=>({F:'front (main road side)',R:'right',B:'rear',L:'left'}[f.id]||f.ko)).join(', ')||'front';
  const hM=Math.round((opt.floors||1)*(opt.floorH||4500)/1000);
  const loc=(site&&site.addr)?` on a site at ${site.addr}, South Korea`:'';
  const ctx=`a ${opt.floors}-story (${hM}m tall) ${use||'office'} building${loc}`;
  const spec=`double-skin facade (FIT frame curtain wall) with ${sk} on the ${faces} facade(s), ${fit.depth}mm ventilated cavity`;
  const guide=hasBase?' Use the provided massing/site diagram as the EXACT building footprint shape, proportion, height and placement — render it photorealistically, do not invent a different form.':'';
  return{

    detail:`Photorealistic close-up architectural detail of the ${spec.replace('double-skin facade','double-skin facade module')}: aluminium mullions, ${sk}, outer laminated glass and inner low-E glazing with the ventilated cavity between. Sharp focus, material realism, soft daylight, architectural photography.`,
    interior:`Photorealistic interior view from inside a modern ${use||'office'} floor of the building, looking out through the double-skin facade window with ${sk} partly open, abundant natural daylight, contemporary interior with people working, wide angle, architectural visualization.`

function asFrames(p){ if(Array.isArray(p.frames)&&p.frames.length)return p.frames; if(p.f)return [{id:'A',name:'TYPE A',...p.f}]; return defaultProject().frames; }
function zoneFrame(z,frames){ return frames.find(fr=>fr.id===z.frameId)||frames[0]; }
function projectResults(p){
  try{
    const frames=asFrames(p);
    const agg=zoneAgg(p.zones,p.floorZones,frames,p.crt,p.grd,p.os,p.E,p.P,p.FD,p.zonePer);
    const L=costLines(p.zones,p.floorZones,frames,p.crt,p.grd,p.os,p.P,p.FD,p.zonePer);
    const modules=p.zones.reduce((s,z)=>s+(z.moduleCount||0),0);
    const m2=agg.totalM2||0;
    return {total:L.total,frameGlass:L.frameGlassTotal,conventional:L.conventional,addInvest:Math.max(0,L.total-L.conventional),
      savedFrac:agg.savedFrac,annualSave:agg.annualSave,co2:agg.co2,payback:agg.payback,baseline:agg.baseline,optimized:agg.optimized,
      modules,m2,zoneCount:agg.zoneCount,perM2:m2>0?L.total/m2:0};
  }catch(e){return null;}
}
function projectOverview(p){
  const frames=asFrames(p);
  const modules=p.zones.reduce((s,z)=>s+(z.moduleCount||0),0);
  const m2=(Array.isArray(p.floorZones)?p.floorZones:[]).reduce((a,g)=>a+Math.max(0,g.areaM2||0)*Math.max(1,(g.to||1)-(g.from||1)+1),0);
  const sys=[p.crt.hasSkin&&'차양',p.crt.hasHvac&&'공조',p.grd.hasGrid&&'조명',p.os.hasOs&&'OS'].filter(Boolean).join('·')||'외피만';
  const ov=p.overview||{};
  return {modules,m2,sys,zones:p.zones.length,types:frames.length,building:ov.building||'',use:ov.use||''};
}

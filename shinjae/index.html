/* ═══ NEW PROJECT MODAL ═══ */
function NewProjectModal({open,onCancel,onStart,confmKey,vworldKey}){
  const [v,setV]=useState({projectName:'신규 프로젝트',building:'',location:'',siteArea:'',use:'업무시설',floorsAbove:'',floorsBelow:'',height:'',gfa:'',client:'',architect:'',note:''});
  const [siteQ,setSiteQ]=useState(null); /* 지적도 조회 상태 {state:'loading'|'ok'|'err',msg,jimok,useZone} */
  if(!open)return null;
  const NUMK=['gfa','floorsAbove','floorsBelow','height','siteArea'];
  /* 주소 선택 → PNU → 연속지적도 경계 → 계산면적을 대지면적에 자동 입력 (ParcelModal과 동일 파이프라인) */
  const lookupSite=(j)=>{
    const pnu=jusoPNU(j);
    if(!pnu||!vworldKey){setSiteQ(null);return;}
    setSiteQ({state:'loading'});
    vworldData({data:'LP_PA_CBND_BUBUN',key:vworldKey,attrFilter:'pnu:=:'+pnu},fc=>{
      const st=fc&&vwGeomStats(fc);
      if(!st){setSiteQ({state:'err',msg:'해당 지번의 지적도 경계를 찾지 못했습니다 — 면적을 직접 입력하세요.'});return;}
      const props=(fc.features[0]&&fc.features[0].properties)||{};
      const jimok=((props.jibun||'').match(/[가-힣]+$/)||[''])[0];
      setSiteQ({state:'ok',jimok,useZone:''});
      setV(s=>({...s,siteArea:String(Math.round(st.areaM2*10)/10)}));
      vworldData({data:'LT_C_UQ111',key:vworldKey,geomFilter:`POINT(${st.center[0]} ${st.center[1]})`},fz=>{
        const u=(fz&&fz.features&&fz.features[0]&&fz.features[0].properties&&fz.features[0].properties.uname)||'';
        if(u)setSiteQ(q=>q&&q.state==='ok'?{...q,useZone:u}:q);
      },()=>{});
    },m=>setSiteQ({state:'err',msg:m}));
  };
  const set=k=>e=>{
    const next=NUMK.includes(k)?e.target.value.replace(/,/g,'').replace(/[^\d.\-]/g,''):e.target.value;
    setV(s=>({...s,[k]:next}));
  };
  const TF=(k,label,unit)=>{
    const isN=NUMK.includes(k);
    const raw=v[k]==null?'':String(v[k]);
    const disp=isN&&raw!==''?(isFinite(Number(raw.replace(/,/g,'')))?Number(raw.replace(/,/g,'')).toLocaleString():raw):raw;
    return(
      <div><Lbl ch={label}/>
        <div style={{display:'flex',alignItems:'baseline',gap:6,border:`1px solid ${C.borderDark}`,background:C.white,padding:'8px 10px'}}>
          <input value={disp} onChange={set(k)} style={{flex:1,border:'none',background:'transparent',fontSize:13,color:C.ink,outline:'none',padding:0,fontFamily:isN?"'DM Mono',monospace":'inherit'}}/>
          {unit&&<span style={{fontSize:11,color:C.light}}>{unit}</span>}
        </div>
      </div>
    );
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'grid',placeItems:'center',padding:24}}>
      <div style={{background:C.white,border:`2px solid ${C.ink}`,padding:'28px 32px',maxWidth:680,width:'100%',maxHeight:'92vh',overflow:'auto',boxShadow:'0 12px 40px rgba(0,0,0,.25)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:'.1em',color:C.ink}}>NEW PROJECT</span>
          <span style={{fontSize:11,color:C.light,letterSpacing:'.04em'}}>새 프로젝트 정보</span>
        </div>
        <p style={{fontSize:11,color:C.sub,marginBottom:18,lineHeight:1.7}}>프로젝트명과 건축 개요를 입력하세요. 비워둔 항목은 나중에 PLATFORM 탭에서 채울 수 있습니다.</p>
        <div style={{marginBottom:14}}>{TF('projectName','프로젝트명')}</div>
        <HR/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'14px 18px',marginBottom:16}}>
          {TF('building','건물명')}
          <div style={{gridColumn:'span 2'}}><Lbl ch="대지위치 — 주소검색"/><AddrSearchInput value={v.location} onChange={t=>setV(s=>({...s,location:t}))} confmKey={confmKey} onPick={lookupSite}/></div>
          <div style={{gridColumn:'span 2'}}>
            {TF('siteArea','대지면적 — 지적도 자동조회','㎡')}
            {siteQ&&siteQ.state==='loading'&&<p style={{fontSize:9.5,color:C.sub,marginTop:4}}>⟳ 지적도(V-World) 조회 중…</p>}
            {siteQ&&siteQ.state==='ok'&&<p style={{fontSize:9.5,color:C.green,marginTop:4}}>✓ 연속지적도 계산면적 적용{siteQ.jimok?` · 지목 ${siteQ.jimok}`:''}{siteQ.useZone?` · ${siteQ.useZone}`:''} — 공부상 면적과 다를 수 있으니 확인 후 수정하세요.</p>}
            {siteQ&&siteQ.state==='err'&&<p style={{fontSize:9.5,color:C.red,marginTop:4}}>⚠ {siteQ.msg}</p>}
            {!siteQ&&!vworldKey&&<p style={{fontSize:9.5,color:C.light,marginTop:4}}>※ V-World 키 미등록 — 주소 선택 시 자동 조회가 비활성화됩니다 (ADMIN 탭).</p>}
          </div>
          <div><Lbl ch="용도"/><select value={v.use} onChange={set('use')} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:13,color:C.ink,outline:'none',padding:'8px 10px'}}>{['업무시설','공동주택','복합시설','교육연구','의료시설','문화집회','기타'].map(u=><option key={u}>{u}</option>)}</select></div>
          {TF('floorsAbove','지상층수','F')}
          {TF('floorsBelow','지하층수','F')}
          {TF('height','건물높이','m')}
          {TF('gfa','연면적','㎡')}
          {TF('client','발주처')}
          {TF('architect','설계자')}
        </div>
        <div style={{marginBottom:20}}>
          <Lbl ch="비고"/>
          <input value={v.note} onChange={set('note')} style={{width:'100%',border:`1px solid ${C.borderDark}`,background:C.white,fontSize:13,color:C.ink,outline:'none',padding:'8px 10px'}}/>
        </div>
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',paddingTop:18,borderTop:`1px solid ${C.border}`}}>
          <button onClick={onCancel} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.sub,padding:'9px 18px',fontSize:12,cursor:'pointer'}}>취소</button>
          <button onClick={()=>onStart(v)} style={{background:C.ink,color:C.white,border:'none',padding:'9px 24px',fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:'.08em',cursor:'pointer'}}>시작 START</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ APPLY BAR ═══ footer 바로 위에 상시 fixed — 변경사항 적용/되돌리기 */
function ApplyBar({dirty,onApply,onRevert,label,live}){
  return(
    <div style={{position:'fixed',left:0,right:0,bottom:50,zIndex:80,padding:'12px 32px',background:dirty?C.amberLt:C.panel,borderTop:`2px solid ${dirty?C.amber:C.border}`,borderBottom:`1px solid ${dirty?C.amber:C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,boxShadow:dirty?'0 -4px 12px rgba(122,79,42,.15)':'0 -2px 6px rgba(0,0,0,.04)'}}>
      <span style={{fontSize:12,color:dirty?C.amber:C.sub,fontWeight:dirty?600:400,display:'flex',alignItems:'center',gap:8}}>
        <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dirty?C.amber:C.light}}/>
        {dirty
          ? <><b>{label}</b> — 적용되지 않은 변경사항이 있습니다. 결과는 이전 값으로 계산되고 있습니다.</>
          : <><b>{label}</b> — 모든 입력이 결과에 반영된 상태입니다.</>}
      </span>
      {live&&<div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',marginLeft:'auto',marginRight:16}}>
        {[['총공사비',won(live.total),C.amber],['에너지절감',pct(live.savedFrac),C.green],['회수기간',live.payback>0?live.payback.toFixed(1)+'년':'즉시',C.ink]].map(([k,v,col])=>(
          <span key={k} style={{display:'flex',flexDirection:'column',lineHeight:1.2}}><span style={{fontSize:8.5,color:C.light,letterSpacing:'.06em'}}>{k}{dirty?' (실시간)':''}</span><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:col}}>{v}</span></span>
        ))}
      </div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onRevert} disabled={!dirty} style={{padding:'7px 14px',fontSize:12,border:`1px solid ${C.border}`,background:'transparent',color:C.sub,opacity:dirty?1:0.4,cursor:dirty?'pointer':'not-allowed'}}>되돌리기</button>
        <button onClick={onApply} disabled={!dirty} style={{padding:'7px 22px',fontSize:12,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:'.08em',border:'none',background:dirty?C.ink:C.light,color:C.white,cursor:dirty?'pointer':'not-allowed'}}>적용 APPLY</button>
      </div>
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function FitPlatform(){
  const _dp=defaultProject();
  const [tab,setTab]=useState('LIST');
  const [zones,setZones]=useState(_dp.zones);
  const [zonePer,setZonePer]=useState(_dp.zonePer||165);
  const [floorZones,setFloorZones]=useState(_dp.floorZones);
  const [frames,setFrames]=useState(_dp.frames);
  const [activeFrameId,setActiveFrameId]=useState(_dp.frames[0].id);
  const [overview,setOverview]=useState(_dp.overview);
  const [crt,setCrt]=useState(_dp.crt);
  const [grd,setGrd]=useState(_dp.grd);
  const [os,setOs]=useState(_dp.os);
  const [E,setE]=useState(_dp.E);
  const [P,setP]=useState(_dp.P);
  /* ADMIN 표준값(FD)은 별도 키로 localStorage에 자동 저장 — 새 프로젝트 시작/외부 불러오기에도 유지 */
  const [FD,setFD]=useState(()=>{
    try{const raw=typeof localStorage!=='undefined'&&localStorage.getItem('fit_platform_admin_fd_v1');if(raw){const parsed=JSON.parse(raw);
      /* 구버전에 저장된 테스트키는 새 기본 승인키로 자동 교체 */
      if(!parsed.juso_confm_key||parsed.juso_confm_key==='TESTJUSOGOKR')parsed.juso_confm_key=FIT_DATA_DEFAULT.juso_confm_key;
      if(!parsed.vworld_key)parsed.vworld_key=FIT_DATA_DEFAULT.vworld_key; /* V-World 키 — 구버전 FD에 없으면 기본키 주입 */
      if(parsed.samwoo_multiplier&&!parsed.samoo_multiplier)parsed.samoo_multiplier=parsed.samwoo_multiplier; /* 구키 마이그레이션 */
      return {...FIT_DATA_DEFAULT,...parsed,energy_factors:{...FIT_DATA_DEFAULT.energy_factors,...(parsed.energy_factors||{})},base_construction:{...FIT_DATA_DEFAULT.base_construction,...(parsed.base_construction||{})},skin_prices:{...FIT_DATA_DEFAULT.skin_prices,...(parsed.skin_prices||{})}};}}catch{}
    return FIT_DATA_DEFAULT;
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_admin_fd_v1',JSON.stringify(FD));}catch{}
  },[FD]);
  const [projectName,setProjectName]=useState('신규 프로젝트');
  /* 프로젝트 리스트는 localStorage에 자동 저장/복원 (브라우저별, 약 5MB 한도) */
  const [projects,setProjects]=useState(()=>{
    try{const raw=typeof localStorage!=='undefined'&&localStorage.getItem('fit_platform_projects_v1');return raw?JSON.parse(raw):[];}catch{return[];}
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_projects_v1',JSON.stringify(projects));}catch{}
  },[projects]);
  const [sel,setSel]=useState([]);
  const [activeProjectId,setActiveProjectId]=useState(null);
  const [flash,setFlash]=useState('');
  const toast=m=>{setFlash(m);setTimeout(()=>setFlash(''),2400);};

  /* ═══ PLAN MODEL — 계획안 자동 생성 상태 (localStorage 자동 저장) ═══ */
  const PLAN_DEFAULT={
    site:{parcels:[],width:60,depth:40,coverage:60,far:800},
    targets:{use:'업무시설',far:400,gfa:12000,floors:10,floorH:4500},
    options:[],selected:null,
    fit:{faces:{F:true,R:true,B:false,L:true},frontEdge:0,floorFrom:2,floorTo:10,moduleW:1500,corner:'corner',depth:1200,hasSkin:true,skinType:'venetian'},
    render:null,versions:[]
  };
  const [plan,setPlan]=useState(()=>{
    try{const raw=typeof localStorage!=='undefined'&&localStorage.getItem('fit_platform_plan_v1');if(raw){const p=JSON.parse(raw);const site={...PLAN_DEFAULT.site,...(p.site||{})};if(!Array.isArray(site.parcels))site.parcels=[];/* 구버전(문자열) 마이그레이션 */return{...PLAN_DEFAULT,...p,site,targets:{...PLAN_DEFAULT.targets,...(p.targets||{})},fit:(()=>{const pf=p.fit||{};const fc=pf.faces||{};const nf=('F'in fc||'N'in fc)?{F:!!(fc.F!==undefined?fc.F:fc.S),R:!!(fc.R!==undefined?fc.R:fc.E),B:!!(fc.B!==undefined?fc.B:fc.N),L:!!(fc.L!==undefined?fc.L:fc.W)}:PLAN_DEFAULT.fit.faces;return{...PLAN_DEFAULT.fit,...pf,faces:nf,frontEdge:pf.frontEdge||0};})()};}}catch{}
    return PLAN_DEFAULT;
  });
  useEffect(()=>{
    try{if(typeof localStorage!=='undefined')localStorage.setItem('fit_platform_plan_v1',JSON.stringify(plan));}catch{}
  },[plan]);
  /* PLAN→프로젝트 적용 이력 — COST/FRAME 탭에 출처 표시용. 프로젝트 파일(.fitproj)에 함께 저장 */
  const [planMeta,setPlanMeta]=useState(null);
  const [renders,setRenders]=useState(null); /* AI 렌더 {exterior,detail,interior,time,label} — 메모리 전용(미저장) */
  const captureRef=useRef(null);
  const captureRegister=(fn)=>{captureRef.current=fn;};
  const [renderBusy,setRenderBusy]=useState('');
  const aiRenderView=async(viewKey,extra)=>{
    const opt=(plan.options||[]).find(o=>o.id===plan.selected);
    if(!opt){window.alert('PLAN에서 매스 옵션을 먼저 생성·선택하세요.');return false;}
    const provider=(FD&&FD.ai_provider)||'gemini';
    const key=((provider==='gemini'?FD.ai_gemini_key:FD.ai_image_key)||'').trim();
    if(!key){window.alert(`ADMIN 탭에 ${provider==='gemini'?'Gemini(Google AI Studio)':'OpenAI'} API 키를 먼저 등록하세요.`);return false;}
    const use=(plan.targets&&plan.targets.use)||'office';
    const site=(plan.site&&Array.isArray(plan.site.parcels)&&plan.site.parcels[0])||null;
    let base=null;
    if(viewKey==='exterior'&&provider==='gemini'&&captureRef.current){try{base=await captureRef.current();}catch(e){base=null;}}
    const pr=renderPrompts(opt,plan.fit,use,site,!!base);
    let prompt=pr[viewKey]; if(extra&&extra.trim())prompt+=' Additional client direction: '+extra.trim()+'.';
    setRenderBusy(viewKey);
    try{
      const img=await aiRenderImage(prompt,key,viewKey==='exterior'?'1536x1024':'1024x1024',provider,base);
      setRenders(prev=>({...(prev||{}),[viewKey]:img,time:new Date().toLocaleString('ko-KR'),label:`${opt.name.split(' — ')[0]} · ${opt.floors}F`,usedBase:viewKey==='exterior'?!!base:(prev&&prev.usedBase)}));
      setRenderBusy('');return true;
    }catch(e){setRenderBusy('');window.alert('렌더 생성 실패: '+e.message);return false;}
  };

  /* ═══ COMMITTED STATE — 적용 버튼을 누른 시점의 입력값. 결과 계산은 이 값을 사용 ═══ */
  const [showNewModal,setShowNewModal]=useState(false);
  const [committed,setCommitted]=useState(()=>({
    zones:_dp.zones, frames:_dp.frames, crt:_dp.crt, grd:_dp.grd,
    os:_dp.os, E:_dp.E, P:_dp.P, overview:_dp.overview, zonePer:_dp.zonePer||165, floorZones:_dp.floorZones
  }));
  const _curMap={zones,frames,crt,grd,os,E,P,overview,zonePer,floorZones};
  const applyKeys=(keys,label)=>{
    setCommitted(c=>{const n={...c};keys.forEach(k=>n[k]=_curMap[k]);return n;});
    toast(`${label||'변경'}사항을 적용했습니다`);
  };
  const revertKeys=(keys)=>{
    keys.forEach(k=>{
      if(k==='zones')setZones(committed.zones);
      else if(k==='frames'){setFrames(committed.frames);if(committed.frames[0])setActiveFrameId(committed.frames[0].id);}
      else if(k==='crt')setCrt(committed.crt);
      else if(k==='grd')setGrd(committed.grd);
      else if(k==='os')setOs(committed.os);
      else if(k==='E')setE(committed.E);
      else if(k==='P')setP(committed.P);
      else if(k==='overview')setOverview(committed.overview);
      else if(k==='zonePer')setZonePer(committed.zonePer);
      else if(k==='floorZones')setFloorZones(committed.floorZones);
    });
    toast('변경사항을 되돌렸습니다');
  };
  const isDirty=(keys)=>keys.some(k=>JSON.stringify(_curMap[k])!==JSON.stringify(committed[k]));
  const syncCommitted=(snap)=>setCommitted({
    zones:snap.zones,frames:snap.frames,crt:snap.crt,grd:snap.grd,
    os:snap.os,E:snap.E,P:snap.P,overview:snap.overview,zonePer:snap.zonePer||165,floorZones:snap.floorZones||[]
  });
  /* ADMIN 탭 전용 P 세터 — 관리자 변경은 raw·committed 동시 갱신(즉시 결과 반영) */
  const setPAdmin=(u)=>{
    setP(prev=>typeof u==='function'?u(prev):u);
    setCommitted(c=>({...c,P:typeof u==='function'?u(c.P):u}));
  };
  /* ApplyBar 실시간 결과 — raw 입력(미적용 포함) 기준 미리보기 */
  const liveAgg=useMemo(()=>{try{return zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer);}catch(e){return null;}},[zones,frames,crt,grd,os,E,P,FD,zonePer]);

  // active frame derivation (so single-frame components keep working)
  const f=frames.find(x=>x.id===activeFrameId)||frames[0];
  const setF=updater=>setFrames(fs=>fs.map(fr=>fr.id===(f&&f.id)?(typeof updater==='function'?updater(fr):{...fr,...updater}):fr));

  const captureProject=(id)=>({id,name:projectName||'무제',createdAt:new Date().toISOString(),overview,frames,zones,zonePer,floorZones,crt,grd,os,E,P,FD,planMeta});
  const restoreProject=(p)=>{
    const fr=asFrames(p);
    const overview=p.overview||defaultProject().overview;
    const zonesAdj=(p.zones||[]).map(z=>({...z,frameId:z.frameId&&fr.some(x=>x.id===z.frameId)?z.frameId:fr[0].id}));
    setOverview(overview);
    setFrames(fr); setActiveFrameId(fr[0].id);
    setZones(zonesAdj);setZonePer(p.zonePer||165);setFloorZones(p.floorZones||defaultProject().floorZones);
    setCrt(p.crt);setGrd(p.grd);setOs(p.os);setE(p.E);setP(p.P);
    /* p.FD가 있으면 그 프로젝트의 단가 적용, 없으면 현재 ADMIN 표준값 유지 */
    if(p.FD){if(p.FD.samwoo_multiplier&&!p.FD.samoo_multiplier)p.FD={...p.FD,samoo_multiplier:p.FD.samwoo_multiplier};} /* 구키 마이그레이션 */
    if(p.FD)setFD({...FIT_DATA_DEFAULT,...p.FD,energy_factors:{...FIT_DATA_DEFAULT.energy_factors,...(p.FD.energy_factors||{})},base_construction:{...FIT_DATA_DEFAULT.base_construction,...(p.FD.base_construction||{})}});
    setProjectName(p.name||p.projectName||'무제');
    setPlanMeta(p.planMeta||null);
    syncCommitted({zones:zonesAdj,frames:fr,crt:p.crt,grd:p.grd,os:p.os,E:p.E,P:p.P,overview,zonePer:p.zonePer||165,floorZones:p.floorZones||defaultProject().floorZones});
  };

  const saveCurrentToList=()=>{
    const id=activeProjectId||Date.now();
    const snap=captureProject(id);
    setProjects(ps=>{const i=ps.findIndex(x=>x.id===id);if(i>=0){const c=[...ps];c[i]=snap;return c;}return[...ps,snap];});
    setActiveProjectId(id);
    toast(activeProjectId?'리스트 프로젝트를 갱신했습니다':'프로젝트를 리스트에 추가했습니다');
  };
  const loadFromList=(p)=>{ restoreProject(p); setActiveProjectId(p.id); setTab('PLATFORM'); toast('프로젝트를 편집기로 불러왔습니다'); };

  /* PLAN 탭 → 프로젝트 주입: Planning Model 기준으로 프레임·존·스킨 설정 생성 (기획서 10장 연동) */
  const applyPlanToProject=({opt,fit,qty})=>{
    const hs=planHSplit(opt.floorH);
    const fr={...frameDefaults('A','PLAN TYPE A'),frameWidth:fit.moduleW,frameHeight:opt.floorH,depth:fit.depth,floors:opt.floors,H1:hs.H1,H2:hs.H2,H4:hs.H4};
    const ko=FACE_KO;
    const newZones=Object.entries(qty.per).filter(([,n])=>n>0).map(([f,n],i)=>({
      id:i+1,name:`${ko[f]} 입면`,face:f,moduleCount:n*qty.nF,frameId:'A'
    }));
    if(qty.cornerN>0)newZones.push({id:newZones.length+1,name:'코너 이형',face:'ETC',moduleCount:qty.cornerN*qty.nF,frameId:'A'});
    const ftA=Math.round(opt.foot), nfl=opt.floors, lt=Math.min(2,nfl);
    const newFloorZones=[{id:'low',part:'저층부',from:1,to:lt,areaM2:ftA}];
    if(nfl>lt+1){newFloorZones.push({id:'std',part:'기준층',from:lt+1,to:nfl-1,areaM2:ftA});newFloorZones.push({id:'high',part:'고층부',from:nfl,to:nfl,areaM2:ftA});}
    else if(nfl>lt){newFloorZones.push({id:'std',part:'기준층',from:lt+1,to:nfl,areaM2:ftA});}
    const newFrames=[fr];
    const newCrt={...crt,hasSkin:fit.hasSkin,skinType:fit.skinType};
    const firstParcel=(Array.isArray(plan.site.parcels)&&plan.site.parcels[0])||null;
    const newOverview={...overview,use:plan.targets.use,gfa:String(opt.gfa),floorsAbove:String(opt.floors),height:String(opt.height),location:(firstParcel&&firstParcel.addr)||overview.location};
    setFrames(newFrames);setActiveFrameId('A');
    setZones(newZones);setFloorZones(newFloorZones);setCrt(newCrt);setOverview(newOverview);
    syncCommitted({zones:newZones,frames:newFrames,crt:newCrt,grd,os,E,P,overview:newOverview,zonePer,floorZones:newFloorZones});
    setPlanMeta({opt:opt.id,name:opt.name,time:new Date().toLocaleString('ko-KR'),moduleW:fit.moduleW,floorH:opt.floorH,floors:opt.floors,total:qty.total,from:qty.from,to:qty.to});
    setTab('PLATFORM');
    toast(`계획안 Option ${opt.id} 적용 — 모듈 ${qty.total.toLocaleString()}EA, ${newZones.length}개 존 구성`);
  };

  const newProject=()=>setShowNewModal(true);
  const startNewProject=(info)=>{
    const d=defaultProject();
    const ovIn=Object.fromEntries(Object.entries(info||{}).filter(([k])=>k!=='projectName'));
    const overview={...d.overview,...ovIn};
    setProjectName((info&&info.projectName)||d.projectName);
    setOverview(overview);
    setFrames(d.frames);setActiveFrameId(d.frames[0].id);
    setZones(d.zones);setZonePer(d.zonePer||165);setFloorZones(d.floorZones);setCrt(d.crt);setGrd(d.grd);setOs(d.os);
    setE(d.E);setP(d.P);
    /* FD는 ADMIN 표준값(현재 값) 유지 — d.FD로 reset하지 않음 */
    setActiveProjectId(null);setPlanMeta(null);setTab('PLATFORM');
    syncCommitted({zones:d.zones,frames:d.frames,crt:d.crt,grd:d.grd,os:d.os,E:d.E,P:d.P,overview,zonePer:d.zonePer||165,floorZones:d.floorZones});
    setShowNewModal(false);
    toast(`'${(info&&info.projectName)||'새 프로젝트'}'를 시작했습니다`);
  };
  const saveProject=()=>{
    const data={_fitproj:1,version:'1.5',projectName,savedAt:new Date().toISOString(),overview,frames,zones,zonePer,floorZones,crt,grd,os,E,P,FD,planMeta};
    downloadBlob(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),`${sanitizeName(projectName)}.fitproj.json`);
    toast('프로젝트 파일을 저장했습니다 (.fitproj.json)');
  };
  const loadProject=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
    inp.onchange=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;
      const r=new FileReader();
      r.onload=()=>{try{const d=JSON.parse(r.result);
        restoreProject({...d,name:d.projectName||d.name});
        setActiveProjectId(null);setTab('PLATFORM');toast('프로젝트를 불러왔습니다');
      }catch(err){window.alert('불러오기 실패: 올바른 .fitproj.json 파일이 아닙니다.\n'+err.message);}};
      r.readAsText(file);
    };
    inp.click();
  };
  const exportExcel=()=>{
    if(typeof XLSX==='undefined'){window.alert('엑셀 라이브러리를 불러오지 못했습니다. 인터넷 연결(cdnjs)을 확인하세요.');return;}
    const agg=zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer);
    const L=costLines(zones,floorZones,frames,crt,grd,os,P,FD,zonePer);
    const wb=XLSX.utils.book_new();
    const ov=overview||{};
    const summary=[
      ['FIT PLATFORM 견적·에너지 요약'],['프로젝트',projectName],['건물명',ov.building||''],['대지위치',ov.location||''],['용도',ov.use||''],['규모',`지상 ${fmt(ov.floorsAbove)||'-'}F / 지하 ${fmt(ov.floorsBelow)||'-'}F`],['대지면적(㎡)',ov.siteArea?numParse(ov.siteArea):''],['연면적(㎡)',ov.gfa?numParse(ov.gfa):''],['생성일',new Date().toLocaleString('ko-KR')],[],
      ['── 공사비 ──'],
      ['총 공사비(원)',L.total],['  FRAME + GLASS',L.frameGlassTotal],['  스킨카트리지',agg.cSkin],['  공조카트리지',agg.cHvac],['  조명(GRID)',agg.cGrid],['  OS',agg.osFlat],
      ['기존 커튼월(참고)',L.conventional],['추가 투자',Math.max(0,L.total-L.conventional)],['삼우 납품가(계)',L.samooDeliver],['삼우 공사가(계)',L.samooConstr],[],
      ['── 에너지 ──'],
      ['에너지 절감율(%)',+(agg.savedFrac*100).toFixed(1)],['기준 에너지(kWh/년)',Math.round(agg.baseline)],['절감 후(kWh/년)',Math.round(agg.optimized)],
      ['연간 절감액(원)',Math.round(agg.annualSave)],['CO₂ 절감(kg/년)',Math.round(agg.co2)],['투자 회수기간(년)',agg.payback>0?+agg.payback.toFixed(1):'즉시'],
    ];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summary),'요약');
    const fr=[['프레임 타입','규격 W×H×D','H3','유리두께','수량(EA)','세트단가(1개)','할인적용단가','합계(원)','삼우 납품가','삼우 공사가']];
    L.byType.forEach(({fr:f2,qty,est})=>{ if(!est)return; const cb=est.cost_breakdown,sm=est.summary; fr.push([f2.name,`${fmt(sm.W)}×${fmt(sm.H)}×${fmt(sm.D)}`,sm.H3,sm.glass_thickness,qty,cb['세트단가_1개'],cb['할인적용단가'],cb['프로젝트_합계'],est.samoo['납품가'],est.samoo['공사가']]); });
    fr.push(['합계','','','','','','',L.frameGlassTotal,L.samooDeliver,L.samooConstr]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(fr),'프레임원가');
    const zPerX=zonePer||165;
    const zr=[['층구간','시작층','끝층','층당면적(㎡)','구간연면적(㎡)','존수']];
    (floorZones||[]).forEach(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);zr.push([g.part,g.from,g.to,g.areaM2,(g.areaM2||0)*nf,Math.max(1,Math.ceil((g.areaM2||0)/zPerX))*nf]);});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(zr),'ZONES_층구간');
    const mr=[['입면','모듈수','프레임타입'],...zones.map(z=>[FACE_KO[z.face]||z.name,z.moduleCount,(zoneFrame(z,frames)||{}).name||''])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(mr),'MODULES_입면');
    const sr=[['항목','규격','수량','단가(원)','금액(원)'],...[...L.cart,...L.grid,...L.os].map(x=>[x.item,x.spec,`${x.qty}${x.unit}`,x.price,x.amt])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sr),'추가시스템');
    XLSX.writeFile(wb,`${sanitizeName(projectName)}_견적.xlsx`);
    toast('Excel 파일을 내보냈습니다');
  };
  const exportPDF=async()=>{
    if(typeof html2canvas==='undefined'||!window.jspdf){window.alert('PDF 라이브러리를 불러오지 못했습니다. 인터넷 연결(cdnjs)을 확인하세요.');return;}
    toast('PDF 생성 중…');
    const agg=zoneAgg(zones,floorZones,frames,crt,grd,os,E,P,FD,zonePer);
    const L=costLines(zones,floorZones,frames,crt,grd,os,P,FD,zonePer);
    const ov=overview||{};
    const row=(a,b,bold)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #E5E2DC;${bold?'font-weight:700;':''}"><span style="color:#5C5955;font-size:12px">${a}</span><span style="font-size:12px;color:#0F0F0D">${b}</span></div>`;
    const ovLine=[ov.building&&`건물명 ${ov.building}`,ov.location&&`· ${ov.location}`,ov.use&&`· ${ov.use}`,(ov.floorsAbove||ov.floorsBelow)&&`· 지상${fmt(ov.floorsAbove)||'-'}/지하${fmt(ov.floorsBelow)||'-'}F`,ov.siteArea&&`· 대지 ${fmt(ov.siteArea)}㎡`,ov.gfa&&`· 연면적 ${fmt(ov.gfa)}㎡`].filter(Boolean).join(' ');
    const typeRows=L.byType.map(({fr:f2,qty,est})=>est?`<tr><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;font-size:11px">${f2.name}</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${fmt(est.summary.W)}×${fmt(est.summary.H)}×${fmt(est.summary.D)}</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${fmt(qty)}EA</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${won(est.cost_breakdown['프로젝트_합계'])}</td></tr>`:'').join('');
    const zPerP=zonePer||165;
    const zoneRows=(floorZones||[]).map(g=>{const nf=Math.max(1,(g.to||1)-(g.from||1)+1);const zc=Math.max(1,Math.ceil((g.areaM2||0)/zPerP))*nf;return `<tr><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;font-size:11px">${g.part}</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${g.from}~${g.to}F</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${fmt((g.areaM2||0)*nf)}㎡</td><td style="padding:5px 8px;border-bottom:1px solid #E5E2DC;text-align:right;font-size:11px">${fmt(zc)}존</td></tr>`;}).join('');
    const node=document.createElement('div');
    node.style.cssText='position:fixed;left:-9999px;top:0;width:760px;background:#fff;padding:44px;font-family:"Noto Sans KR",sans-serif;color:#0F0F0D;';
    node.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #0F0F0D;padding-bottom:12px;margin-bottom:8px">
        <div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.12em">FIT PLATFORM</div>
        <div style="font-size:11px;color:#5C5955;letter-spacing:.06em">CONSULTING REPORT · 견적·에너지 분석</div></div>
        <div style="text-align:right;font-size:11px;color:#5C5955">${new Date().toLocaleDateString('ko-KR')}<br>SAMOO Architects &amp; Engineers</div>
      </div>
      <div style="font-size:18px;font-weight:700;margin:14px 0 2px">${projectName}</div>
      ${ovLine?`<div style="font-size:11px;color:#5C5955;margin-bottom:14px">${ovLine}</div>`:'<div style="margin-bottom:14px"></div>'}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div style="border:1px solid #D8D5CE;padding:12px"><div style="font-size:10px;color:#5C5955;letter-spacing:.08em">총 공사비</div><div style="font-family:'Bebas Neue';font-size:24px;color:#7A4F2A">${won(L.total)}</div></div>
        <div style="border:1px solid #D8D5CE;padding:12px"><div style="font-size:10px;color:#5C5955;letter-spacing:.08em">에너지 절감율</div><div style="font-family:'Bebas Neue';font-size:24px;color:#2A5B3B">${(agg.savedFrac*100).toFixed(1)}%</div></div>
        <div style="border:1px solid #D8D5CE;padding:12px"><div style="font-size:10px;color:#5C5955;letter-spacing:.08em">연간 절감액</div><div style="font-family:'Bebas Neue';font-size:24px;color:#2A5B3B">${won(agg.annualSave)}</div></div>
        <div style="border:1px solid #D8D5CE;padding:12px"><div style="font-size:10px;color:#5C5955;letter-spacing:.08em">투자 회수기간</div><div style="font-family:'Bebas Neue';font-size:24px">${agg.payback>0?agg.payback.toFixed(1)+'년':'즉시'}</div></div>
      </div>
      <div style="font-family:'Bebas Neue';font-size:15px;letter-spacing:.08em;margin-bottom:6px">공사비 구성</div>
      ${row('FRAME + GLASS (견적 엔진)',won(L.frameGlassTotal))}
      ${agg.cSkin>0?row('스킨카트리지',won(agg.cSkin)):''}
      ${agg.cHvac>0?row('공조카트리지',won(agg.cHvac)):''}
      ${agg.cGrid>0?row('조명 (GRID)',won(agg.cGrid)):''}
      ${agg.osFlat>0?row('OS 시스템',won(agg.osFlat)):''}
      ${row('총 공사비',won(L.total),true)}
      ${row('기존 커튼월 (참고)',won(L.conventional))}
      ${row('삼우 납품가 / 공사가 (계)',`${won(L.samooDeliver)} / ${won(L.samooConstr)}`)}
      <div style="font-family:'Bebas Neue';font-size:15px;letter-spacing:.08em;margin:18px 0 6px">프레임 타입별</div>
      <table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1.5px solid #0F0F0D">
        <th style="text-align:left;padding:5px 8px;font-size:10px;color:#5C5955">타입</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">규격</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">수량</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">합계</th>
      </tr></thead><tbody>${typeRows}</tbody></table>
      <div style="font-family:'Bebas Neue';font-size:15px;letter-spacing:.08em;margin:18px 0 6px">존별 구성</div>
      <table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:1.5px solid #0F0F0D">
        <th style="text-align:left;padding:5px 8px;font-size:10px;color:#5C5955">층구간</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">적용층</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">연면적</th><th style="text-align:right;padding:5px 8px;font-size:10px;color:#5C5955">존수</th>
      </tr></thead><tbody>${zoneRows}</tbody></table>
      <div style="margin-top:24px;font-size:9px;color:#A8A49E;border-top:1px solid #E5E2DC;padding-top:8px">${FD._placeholder?'※ 단가는 예시 추정치이며 fit_data.json 적용 시 실제 금액으로 재계산됩니다. ':''}© FIT Platform Consulting Tool — SAMOO Architects &amp; Engineers</div>
    `;
    document.body.appendChild(node);
    try{
      const canvas=await html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true});
      const img=canvas.toDataURL('image/png');
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF('p','mm','a4');
      const pw=210, ph=297, iw=pw, ih=canvas.height*pw/canvas.width;
      let heightLeft=ih, position=0;
      pdf.addImage(img,'PNG',0,position,iw,ih);heightLeft-=ph;
      while(heightLeft>0){position=heightLeft-ih;pdf.addPage();pdf.addImage(img,'PNG',0,position,iw,ih);heightLeft-=ph;}
      pdf.save(`${sanitizeName(projectName)}_보고서.pdf`);
      toast('PDF 보고서를 내보냈습니다');
    }catch(err){window.alert('PDF 생성 실패: '+err.message);}
    finally{document.body.removeChild(node);}
  };
  const TB=({onClick,label,accent})=>(
    <button onClick={onClick} style={{background:accent?C.ink:'transparent',color:accent?C.white:C.sub,border:`1px solid ${accent?C.ink:C.border}`,padding:'5px 11px',fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:'.06em',whiteSpace:'nowrap'}}>{label}</button>
  );

  const TABS=[
    {id:'LIST',label:'PROJECTS',sub:'프로젝트 리스트',grp:0,ico:<V s={14} ch={<><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>}/>},
    {id:'PLAN',label:'PLAN',sub:'계획안 생성',grp:1,ico:<V s={14} ch={<><path d="M2 22l10-18 10 18z"/><line x1="12" y1="14" x2="12" y2="22"/><line x1="7" y1="22" x2="17" y2="22"/></>}/>},
    {id:'PLATFORM',label:'PLATFORM',sub:'종합 분석',grp:1,ico:<IcoOs s={14}/>},
    {id:'COST',label:'COST',sub:'공사비',grp:2,ico:<V s={14} ch={<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>}/>},
    {id:'ENERGY',label:'ENERGY',sub:'에너지 절감',grp:2,ico:<V s={14} ch={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>}/>},
    {id:'FRAME',label:'FRAME',sub:'프레임',grp:3,ico:<V s={14} ch={<rect x="3" y="3" width="18" height="18" rx="1"/>}/>},
    {id:'SKIN',label:'SKIN',sub:'스킨카트리지',grp:3,ico:<IcoWn s={14}/>},
    {id:'HVAC',label:'HVAC',sub:'공조카트리지',grp:3,ico:<IcoWn s={14}/>},
    {id:'GRID',label:'GRID',sub:'조명',grp:3,ico:<IcoLt s={14}/>},
    {id:'OS',label:'OS',sub:'운영 시스템',grp:3,ico:<IcoOs s={14}/>},
    {id:'DRAWINGS',label:'DRAWINGS',sub:'도면',grp:4,ico:<V s={14} ch={<><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>}/>},
    {id:'AERIAL',label:'AERIAL',sub:'조감도',grp:4,ico:<V s={14} ch={<><path d="M2 22l10-18 10 18"/><line x1="2" y1="22" x2="22" y2="22"/></>}/>},
    {id:'PERSP',label:'PERSPECTIVE',sub:'투시도',grp:4,ico:<V s={14} ch={<><path d="M3 3l18 4v10l-18 4z"/></>}/>},
    {id:'INFO',label:'INFO',sub:'기능 설명',grp:5,ico:<V s={14} ch={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>}/>},
    {id:'ADMIN',label:'ADMIN',sub:'관리자 설정',grp:6,ico:<V s={14} ch={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}/>},
  ];
  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.ink,paddingBottom:['PLATFORM','FRAME','SKIN','HVAC','GRID','OS'].includes(tab)?125:60}}>
      {/* NAV */}
      <nav style={{background:C.white,borderBottom:`1.5px solid ${C.border}`,position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',height:50,gap:16}}>
          <div style={{display:'flex',alignItems:'baseline',gap:10,flexShrink:0}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:'.12em'}}>FIT</span>
            <span style={{fontSize:11,color:C.light,letterSpacing:'.08em'}}>FUTURE SPACE PLATFORM</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:7,overflowX:'auto'}}>
            <input value={projectName} onChange={e=>setProjectName(e.target.value)} placeholder="프로젝트명"
              style={{border:`1px solid ${C.border}`,background:C.panel,padding:'5px 10px',fontSize:12,color:C.ink,width:150,outline:'none',flexShrink:0}}/>
            <TB onClick={newProject} label="새 프로젝트"/>
            <TB onClick={saveCurrentToList} label="＋리스트"/>
            <TB onClick={saveProject} label="저장"/>
            <TB onClick={loadProject} label="불러오기"/>
            <span style={{width:1,height:20,background:C.border,flexShrink:0}}/>
            <TB onClick={exportExcel} label="EXCEL" accent/>
            <TB onClick={exportPDF} label="PDF" accent/>
          </div>
        </div>
        {/* tab bar with group separators */}
        <div style={{display:'flex',borderTop:`1px solid ${C.border}`,overflowX:'auto',alignItems:'stretch'}}>
          {TABS.map((t,i)=>{
            const on=tab===t.id;
            const sep=i>0&&TABS[i-1].grp!==t.grp;
            return(
              <React.Fragment key={t.id}>
                {sep&&<div style={{width:1,background:C.borderDark,alignSelf:'stretch',margin:'0 2px'}}/>}
                <button onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:7,padding:'9px 18px',
                  background:on?C.panel:'transparent',border:'none',borderBottom:on?`2px solid ${C.ink}`:'2px solid transparent',
                  cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s',flexShrink:0}}>
                  <span style={{color:on?C.ink:C.light}}>{t.ico}</span>
                  <span>
                    <span style={{display:'block',fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:'.1em',color:on?C.ink:C.sub}}>{t.label}</span>
                    <span style={{display:'block',fontSize:9,color:C.light,letterSpacing:'.02em'}}>{t.sub}</span>
                  </span>
                </button>
              </React.Fragment>
            );
          })}
        </div>
      </nav>

      {tab==='LIST'     &&<ProjectListTab projects={projects} setProjects={setProjects} sel={sel} setSel={setSel} current={{id:activeProjectId,projectName,zones,frames,crt,grd,os,E,P,FD}} loadFromList={loadFromList} saveCurrentToList={saveCurrentToList} toast={toast}/>}
      {tab==='PLAN'     &&<PlanTab plan={plan} setPlan={setPlan} FD={FD} setFD={setFD} applyPlan={applyPlanToProject} toast={toast} activeFrame={f} renders={renders} setTab={setTab} aiRenderView={aiRenderView} renderBusy={renderBusy} onRegisterCapture={captureRegister}/>}
      {tab==='PLATFORM' &&<>
        <PlatformTab zones={zones} setZones={setZones} zonePer={zonePer} setZonePer={setZonePer} floorZones={floorZones} setFloorZones={setFloorZones} frames={frames} f={f} crt={crt} grd={grd} os={os} E={E} setE={setE} P={P} FD={FD} overview={overview} setOverview={setOverview} committed={committed} plan={plan}/>
        <ApplyBar dirty={isDirty(['zones','floorZones','overview','E','zonePer'])} onApply={()=>applyKeys(['zones','floorZones','overview','E','zonePer'],'PLATFORM')} onRevert={()=>revertKeys(['zones','floorZones','overview','E','zonePer'])} label="PLATFORM (존·개요·에너지 파라미터)" live={liveAgg}/>
      </>}
      {tab==='COST'     &&<CostTab zones={zones} frames={frames} crt={crt} grd={grd} os={os} P={P} setP={setP} FD={FD} setFD={setFD} committed={committed} planMeta={planMeta}/>}
      {tab==='ENERGY'   &&<EnergyTab zones={zones} frames={frames} f={f} crt={crt} grd={grd} os={os} E={E} P={P} FD={FD} committed={committed}/>}
      {tab==='FRAME'    &&<>
        <FrameTab f={f} setF={setF} crt={crt} frames={frames} activeFrameId={activeFrameId} setActiveFrameId={setActiveFrameId} setFrames={setFrames} planMeta={planMeta}/>
        <ApplyBar dirty={isDirty(['frames'])} onApply={()=>applyKeys(['frames'],'FRAME')} onRevert={()=>revertKeys(['frames'])} label="FRAME" live={liveAgg}/>
      </>}
      {tab==='SKIN'     &&<>
        <SkinTab frames={frames} crt={crt} setCrt={setCrt} FD={FD}/>
        <ApplyBar dirty={isDirty(['crt'])} onApply={()=>applyKeys(['crt'],'SKIN/HVAC')} onRevert={()=>revertKeys(['crt'])} label="SKIN CARTRIDGE" live={liveAgg}/>
      </>}
      {tab==='HVAC'     &&<>
        <HvacTab frames={frames} crt={crt} setCrt={setCrt}/>
        <ApplyBar dirty={isDirty(['crt'])} onApply={()=>applyKeys(['crt'],'SKIN/HVAC')} onRevert={()=>revertKeys(['crt'])} label="HVAC CARTRIDGE" live={liveAgg}/>
      </>}
      {tab==='GRID'     &&<>
        <GridTab grd={grd} setGrd={setGrd}/>
        <ApplyBar dirty={isDirty(['grd'])} onApply={()=>applyKeys(['grd'],'GRID')} onRevert={()=>revertKeys(['grd'])} label="GRID" live={liveAgg}/>
      </>}
      {tab==='OS'       &&<>
        <OsTab os={os} setOs={setOs}/>
        <ApplyBar dirty={isDirty(['os'])} onApply={()=>applyKeys(['os'],'OS')} onRevert={()=>revertKeys(['os'])} label="OS" live={liveAgg}/>
      </>}
      {tab==='DRAWINGS' &&<DrawingsTab/>}
      {tab==='AERIAL'   &&<AerialTab/>}
      {tab==='PERSP'    &&<PerspectiveTab renders={renders} projectName={projectName} aiRenderView={aiRenderView} renderBusy={renderBusy} canRender={!!(plan.options||[]).find(o=>o.id===plan.selected)}/>}
      {tab==='INFO'     &&<InfoTab/>}
      {tab==='ADMIN'    &&<AdminTab FD={FD} setFD={setFD} toast={toast} P={P} setP={setPAdmin}/>}

      <NewProjectModal open={showNewModal} onCancel={()=>setShowNewModal(false)} onStart={startNewProject} confmKey={FD.juso_confm_key} vworldKey={FD.vworld_key||''}/>

      {flash&&<div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:C.ink,color:C.white,padding:'10px 22px',fontSize:13,letterSpacing:'.02em',zIndex:200,boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>{flash}</div>}

      <footer style={{position:'fixed',bottom:0,left:0,right:0,zIndex:90,borderTop:`1.5px solid ${C.border}`,background:C.white,padding:'12px 32px',display:'flex',justifyContent:'space-between',fontSize:10,color:C.light,flexWrap:'wrap',gap:8,boxShadow:'0 -2px 8px rgba(0,0,0,.04)'}}>
        <span>© FIT Platform Consulting Tool — SAMOO Architects &amp; Engineers</span>
        <span>※ 에너지 계수는 태평로빌딩 EnergyPlus 시뮬레이션(설계설명서 rev-05)으로 보정 / 단가는 fit_data.json 적용 시 실제 금액으로 갱신</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FitPlatform/>);
</script>
</body>
</html>

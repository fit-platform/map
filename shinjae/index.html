      <p style={{fontSize:10,color:C.light,marginTop:12,lineHeight:1.7}}>※ 행 체크 → 평균값과 비교 보고서(PDF·Excel) 추출 · 「편집」으로 해당 프로젝트를 편집기로 불러옴 · 리스트는 이 브라우저에 자동 저장되어 새로고침 후에도 유지됩니다. 다른 PC·브라우저로 옮기거나 백업하려면 <b>리스트 저장</b>으로 JSON 파일을 받아두세요.</p>
    </div>
  );
}

/* ═══ PLAN — 계획안 자동 생성 (기획서 v0.2 MVP 1차) ═══
   원칙: 렌더 이미지가 아닌 파라메트릭 Planning Model이 기준 (기획서 6장·15장).
   수량·견적은 모델 변경 시 준실시간 갱신, 렌더는 「다시 렌더하기」 클릭 시에만 재생성 (9장). */
/* 용도지역별 건폐율·용적률 법정 상한 (국토계획법 시행령 — 지자체 조례로 강화/완화 가능, 참고치) */
const ZONE_LIMITS=[
  ['제1종전용주거',50,100],['제2종전용주거',50,150],
  ['제1종일반주거',60,200],['제2종일반주거',60,250],['제3종일반주거',50,300],['준주거',70,500],
  ['중심상업',90,1500],['일반상업',80,1300],['근린상업',70,900],['유통상업',80,1100],
  ['전용공업',70,300],['일반공업',70,350],['준공업',70,400],
  ['보전녹지',20,80],['생산녹지',20,100],['자연녹지',20,100],
  ['계획관리',40,100],['생산관리',20,80],['보전관리',20,80],['농림',20,80],['자연환경보전',20,80],
];
const zoneLimit=u=>{if(!u)return null;const hit=ZONE_LIMITS.find(([k])=>u.indexOf(k)>=0);return hit?{name:u,bcr:hit[1],far:hit[2]}:null;};

/* 대지 치수·한도 일원화 — 실제 필지: 경계 bbox 형상비(면적 보정) + 용도지역 법정 한도, 가상: 면적 1.4:1 + 수동 한도 */
function siteDims(site){
  const parcels=Array.isArray(site.parcels)?site.parcels:[];
  const pArea=parcels.reduce((s,p)=>s+(Number(p.area)||0),0);
  const shaped=parcels.filter(p=>Array.isArray(p.rings)&&p.rings.length);
  let sw,sd;
  if(shaped.length){
    /* 기준축 = 경계 최장 에지 방위 — 그 축의 OBB(회전 외접사각)에서 양측 1m 이격 차감 */
    const pts=[];let minY=1e9,maxY=-1e9;
    shaped.forEach(p=>p.rings[0]&&p.rings[0].forEach(q=>{pts.push(q);if(q[1]<minY)minY=q[1];if(q[1]>maxY)maxY=q[1];}));
    const midLat=(minY+maxY)/2,kx=111320*Math.cos(midLat*Math.PI/180),ky=110540;
    let th=0,best=0;
    shaped.forEach(p=>{const r=p.rings[0]||[];for(let i=0;i<r.length;i++){const a=r[i],b=r[(i+1)%r.length];const dx=(b[0]-a[0])*kx,dy=(b[1]-a[1])*ky;const L=dx*dx+dy*dy;if(L>best){best=L;th=Math.atan2(dy,dx);}}});
    const c2=Math.cos(-th),s2=Math.sin(-th);
    let u0=1e15,u1=-1e15,v0=1e15,v1=-1e15;
    pts.forEach(q=>{const x=q[0]*kx,y=q[1]*ky;const u=x*c2-y*s2,v=x*s2+y*c2;if(u<u0)u0=u;if(u>u1)u1=u;if(v<v0)v0=v;if(v>v1)v1=v;});
    sw=Math.max(3,(u1-u0)-2);sd=Math.max(3,(v1-v0)-2);
  }else if(pArea>0){sw=Math.sqrt(pArea*1.4);sd=pArea/sw;}
  else{sw=Math.max(10,site.width||60);sd=Math.max(10,site.depth||40);}
  const zone=(parcels.find(q=>q.useZone)||{}).useZone||'';
  const zl=zoneLimit(zone);
  return{pArea,sw,sd,zone,cov:zl?zl.bcr:(site.coverage||60),far:zl?zl.far:(site.far||800),derived:!!zl};
}

function genPlanOptions(site,t){
  const dims=siteDims(site);
  const sw=dims.sw, sd=dims.sd, sArea=Math.max(1,sw*sd);
  const maxFoot=sArea*dims.cov/100;          /* 건폐율 한도 면적 */
  const tFar=Math.max(50,t.far||dims.far||400); /* 목표 용적률(%) */
  const reqGFA=sArea*tFar/100;               /* 목표 연면적 */
  const fh=t.floorH||4500;
  const floors=t.floors?Math.max(1,Math.round(t.floors)):Math.max(1,Math.ceil(reqGFA/maxFoot)); /* 자동: 건폐한도 내 최소 층수 */
  const reqFoot=reqGFA/floors;               /* 층당 평면 바운더리 면적 — 모든 옵션 통일 */
  const mk=(id,name,strategy,footW,footD,extra)=>{
    footW=Math.max(3,footW); footD=Math.max(3,footD);
    const foot=footW*footD;
    const gfa=Math.round(foot*floors);
    const bcr=foot/sArea*100;
    const risks=[];
    if(foot>maxFoot+1)risks.push(`평면 바운더리 ${fmt(Math.round(foot))}㎡가 건폐율 한도 ${fmt(Math.round(maxFoot))}㎡ 초과 (건폐율 ${round(bcr,1)}% > ${dims.cov}%) — 층수↑ 또는 면적↓ 필요`);
    if(floors*fh/1000>120)risks.push('높이 120m 초과 — 고층 구조 검토 필요');
    risks.push('대지경계·일조·사선 등 법규 검토 미반영 (개략 매스)');
    return Object.assign({id,name,strategy,footW:round(footW,1),footD:round(footD,1),floors,floorH:fh,foot:Math.round(foot),gfa,
      bcr:round(bcr,1),far:round(foot*floors/sArea*100,1),height:round(floors*fh/1000,1),overBcr:foot>maxFoot+1,reqFoot:Math.round(reqFoot),tFar,risks},extra||{});
  };
  /* 모든 옵션이 동일 reqFoot(면적)을 형상만 달리해 달성 — 연면적·용적률·층수 통일 */
  const rA=Math.sqrt(reqFoot/sArea);                 /* A: 대지경계 오프셋(균등 후퇴) */
  const offA=round((Math.sqrt(sArea)-Math.sqrt(reqFoot))/2,1); /* 정방근사 오프셋 거리(m) */
  const lng=Math.max(sw,sd);                          /* B: 가로 긴 슬림 바 */
  const Bw=lng*0.95, Bd=reqFoot/Bw;
  const Cd=Math.min(15,Math.sqrt(reqFoot));           /* C: 깊이 15m 이하 장방형 */
  const Cw=reqFoot/Cd;
  /* D 커스텀: 작도 폴리곤(site.customMass) 있으면 그 면적, 없으면 A 형상 기본 */
  const cm=site&&site.customMass;
  const Dfoot=cm&&cm.area>0?cm.area:reqFoot;
  const Dw=Math.sqrt(Dfoot*(sw/Math.max(sd,1))), Dd=Dfoot/Math.max(Dw,1);
  return[
    mk('A','Option A — 효율형',`대지경계 오프셋 — 경계에서 약 ${offA}m 균등 후퇴 (반복성·견적 효율)`,sw*rA,sd*rA,{offset:offA}),
    mk('B','Option B — 입면 특화형','가로로 긴 슬림 바 — FIT 입면 표현·디자인 다양성',Bw,Bd),
    mk('C','Option C — 에너지/LCC 최적형','깊이 15m 이하 남향 장방형 — 자연채광·일사 제어',Cw,Cd),
    mk('D','Option D — 커스텀',cm&&cm.area>0?`직접 작도 매스 (면적 ${fmt(Math.round(cm.area))}㎡)`:'직접 작도 — SIMULATION에서 평면 바운더리를 그려 정의 (미작도 시 A형상 기본)',Dw,Dd,{custom:true,hasShape:!!(cm&&cm.area>0)}),
  ];
}
function planQty(opt,fit){
  if(!opt)return null;
  /* 직사각 매스 4변[상,우,하,좌] 길이. frontEdge 변이 정면(F), 시계방향 R/B/L */
  const edgeLen=[opt.footW,opt.footD,opt.footW,opt.footD];
  const fe=(fit.frontEdge||0)%4;
  const faceEdge={F:fe,R:(fe+1)%4,B:(fe+2)%4,L:(fe+3)%4};
  const faceLen={};FACES.forEach(f=>{faceLen[f.id]=edgeLen[faceEdge[f.id]];});
  const from=Math.max(1,Math.min(fit.floorFrom||1,opt.floors));
  const to=Math.max(from,Math.min(fit.floorTo||opt.floors,opt.floors));
  const nF=to-from+1;
  const per={};let perFloor=0;
  FACES.forEach(f=>{if(fit.faces&&fit.faces[f.id]){per[f.id]=Math.max(0,Math.floor(faceLen[f.id]*1000/fit.moduleW));perFloor+=per[f.id];}});
  const cornerN=fit.corner==='corner'?(FACES.filter(f=>fit.faces&&fit.faces[f.id]).length>=2?4:0):0;
  const total=(perFloor+cornerN)*nF;
  const facadeArea=Object.entries(per).reduce((s,[f,n])=>s+faceLen[f]*(opt.floorH/1000)*nF,0);
  return{per,perFloor,cornerN,nF,from,to,total,faceLen,facadeArea:Math.round(facadeArea)};
}
/* 층고 비례 H1/H2/H4 분절 — FRAME 기본(층고 4500: 350/800/350)을 층고에 맞게 50mm 단위 스케일.
   PLAN 개략견적과 「프로젝트에 적용」 프레임이 동일 분절을 사용해 COST 정밀견적과 일치 */
function planHSplit(floorH){
  const r=(floorH||4500)/4500;
  const rd=v=>Math.max(50,Math.round(v*r/50)*50);
  return{H1:rd(350),H2:rd(800),H4:rd(350)};
}
function planEstimate(opt,fit,qty,FD){
  if(!opt||!qty||qty.total<=0)return null;
  const hs=planHSplit(opt.floorH);
  const est=frameEstimate({frameWidth:fit.moduleW,frameHeight:opt.floorH,depth:fit.depth,H1:hs.H1,H2:hs.H2,H4:hs.H4,floors:opt.floors,engineFrameType:'유리',glassPreset:'시장단가_중간'},qty.total,FD);
  if(!est)return null;
  const frameCost=est.cost_breakdown['프로젝트_합계'];
  const skin=SKIN_CARTS.find(c=>c.id===fit.skinType);
  const skinOk=fit.hasSkin&&skin&&fit.depth>=skin.minD&&fit.depth<=skin.maxD;
  const skinCost=skinOk?qty.total*skinP(skin,FD):0;
  const total=frameCost+skinCost;
  return{frameCost,skinCost,skinOk,total,lo:Math.round(total*0.85),hi:Math.round(total*1.15),unitSet:est.cost_breakdown['세트단가_1개']};
}

/* 액소노메트릭 렌더 — 「다시 렌더하기」 시점의 스냅샷(r)만 그림 */
function PlanAxonSVG({r}){
  if(!r)return null;
  const fw=r.footW,fd=r.footD,bh=r.floors*r.floorH/1000;
  const iso=(x,y,z)=>[x+0.5*y,-0.25*y-z];
  const pts=[iso(0,0,0),iso(fw,0,0),iso(fw,fd,0),iso(0,fd,0),iso(0,0,bh),iso(fw,0,bh),iso(fw,fd,bh),iso(0,fd,bh)];
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const VW=620,VH=440,pad=46;
  const s=Math.min((VW-pad*2)/(maxX-minX),(VH-pad*2)/(maxY-minY));
  const M=(x,y,z)=>{const p=iso(x,y,z);return`${((p[0]-minX)*s+pad).toFixed(1)},${((p[1]-minY)*s+pad).toFixed(1)}`;};
  const poly=(arr,fill,stroke,sw2,op)=><polygon points={arr.join(' ')} fill={fill} stroke={stroke} strokeWidth={sw2||1} opacity={op||1}/>;
  const fh=r.floorH/1000;
  const frontLines=[],sideLines=[],bandF=[],bandS=[];
  for(let i=1;i<r.floors;i++){frontLines.push(<line key={'f'+i} x1={M(0,0,i*fh).split(',')[0]} y1={M(0,0,i*fh).split(',')[1]} x2={M(fw,0,i*fh).split(',')[0]} y2={M(fw,0,i*fh).split(',')[1]} stroke={C.borderDark} strokeWidth={0.7}/>);sideLines.push(<line key={'s'+i} x1={M(fw,0,i*fh).split(',')[0]} y1={M(fw,0,i*fh).split(',')[1]} x2={M(fw,fd,i*fh).split(',')[0]} y2={M(fw,fd,i*fh).split(',')[1]} stroke={C.borderDark} strokeWidth={0.7}/>);}
  const mw=r.moduleW/1000;
  const vF=[],vS=[];
  for(let x=mw;x<fw;x+=mw)vF.push(<line key={'vf'+x} x1={M(x,0,0).split(',')[0]} y1={M(x,0,0).split(',')[1]} x2={M(x,0,bh).split(',')[0]} y2={M(x,0,bh).split(',')[1]} stroke={C.border} strokeWidth={0.5}/>);
  for(let y=mw;y<fd;y+=mw)vS.push(<line key={'vs'+y} x1={M(fw,y,0).split(',')[0]} y1={M(fw,y,0).split(',')[1]} x2={M(fw,y,bh).split(',')[0]} y2={M(fw,y,bh).split(',')[1]} stroke={C.border} strokeWidth={0.5}/>);
  const z1=(r.from-1)*fh,z2=r.to*fh;
  if(r.faces.S)bandF.push(poly([M(0,0,z1),M(fw,0,z1),M(fw,0,z2),M(0,0,z2)],C.blueLt,C.blue,1,0.55));
  if(r.faces.E)bandS.push(poly([M(fw,0,z1),M(fw,fd,z1),M(fw,fd,z2),M(fw,0,z2)],C.greenLt,C.green,1,0.5));
  return(
    <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" style={{display:'block',background:C.white,border:`1px solid ${C.border}`}}>
      {poly([M(0,0,bh),M(fw,0,bh),M(fw,fd,bh),M(0,fd,bh)],C.panel,C.borderDark,1)}
      {poly([M(0,0,0),M(fw,0,0),M(fw,0,bh),M(0,0,bh)],C.white,C.ink,1.2)}
      {poly([M(fw,0,0),M(fw,fd,0),M(fw,fd,bh),M(fw,0,bh)],C.gray,C.ink,1.2)}
      {bandF}{bandS}{frontLines}{sideLines}{vF}{vS}
      <text x={pad} y={VH-26} fontSize="10" fontFamily="'DM Mono',monospace" fill={C.sub}>{fmt(r.footW)}m × {fmt(r.footD)}m · {r.floors}F · H {r.floors*r.floorH/1000}m · 모듈 {fmt(r.moduleW)}mm</text>
      <text x={pad} y={VH-12} fontSize="9" fontFamily="'DM Mono',monospace" fill={C.light}>적용층 {r.from}~{r.to}F · 정면=남측(S) · 측면=동측(E) · 렌더 {r.time}</text>
      <text x={VW-pad} y={VH-12} textAnchor="end" fontSize="9" fontFamily="'DM Mono',monospace" fill={C.amber}>v{r.ver}</text>
    </svg>
  );
}

/* ═══ 행안부 도로명주소 검색API (JSONP — 활용가이드 2.4절) ═══
   브라우저에서 직접 호출. 승인키는 ADMIN 탭에서 관리 (기본: 테스트키 TESTJUSOGOKR — 운영 배포 시 business.juso.go.kr에서 사이트별 승인키 발급 필요). */
function jusoSanitize(kw){
  let s=String(kw||'').replace(/[%=><\[\]]/g,'');
  ['OR','SELECT','INSERT','DELETE','UPDATE','CREATE','DROP','EXEC','UNION','FETCH','DECLARE','TRUNCATE'].forEach(w=>{
    s=s.replace(new RegExp('\\b'+w+'\\b','gi'),'');
  });
  return s.trim();
}
function jusoSearch(keyword,page,confmKey,onOk,onErr){
  const kw=jusoSanitize(keyword);
  if(!kw){onErr('검색어를 입력하세요 (특수문자·SQL 예약어 제외).');return;}
  const cbName='__jusoCb'+Date.now()+'_'+Math.floor(Math.random()*1e5);
  let done=false;
  const sc=document.createElement('script');
  const cleanup=()=>{try{delete window[cbName];}catch(e){}if(sc.parentNode)sc.parentNode.removeChild(sc);};
  window[cbName]=(data)=>{
    done=true;cleanup();
    try{
      const c=data.results.common;
      if(c.errorCode!=='0'){onErr(c.errorCode+': '+c.errorMessage);return;}
      onOk({total:parseInt(c.totalCount,10)||0,list:data.results.juso||[]});
    }catch(e){onErr('응답 해석 실패: '+e.message);}
  };
  sc.src='https://business.juso.go.kr/addrlink/addrLinkApiJsonp.do?currentPage='+page
    +'&countPerPage=10&resultType=json&confmKey='+encodeURIComponent(confmKey||'TESTJUSOGOKR')
    +'&keyword='+encodeURIComponent(kw)+'&callback='+cbName;
  sc.onerror=()=>{if(!done){done=true;cleanup();onErr('API 호출 실패 — 네트워크/방화벽을 확인하세요.');}};
  setTimeout(()=>{if(!done){done=true;cleanup();onErr('응답 시간 초과 (10초)');}},10000);
  document.body.appendChild(sc);
}

/* ═══ V-WORLD 연속지적도 — 필지 경계·지목·용도지역 자동 조회 (JSONP — 백엔드 불필요) ═══
   req/data는 JSONP(callback) 지원. ned/data(토지대장)는 JSONP 미지원 → 공부상 면적은 미연동,
   경계 폴리곤에서 계산한 면적을 참고치로 제시한다 (연속지적도는 측량 성과가 아님). */
function vworldData(params,onOk,onErr){
  const cbName='__vwCb'+Date.now()+'_'+Math.floor(Math.random()*1e5);
  let done=false;
  const sc=document.createElement('script');
  const cleanup=()=>{try{delete window[cbName];}catch(e){}if(sc.parentNode)sc.parentNode.removeChild(sc);};
  window[cbName]=(data)=>{
    done=true;cleanup();
    try{
      const r=data.response||{};
      if(r.status==='NOT_FOUND'){onOk(null);return;}
      if(r.status!=='OK'){
        const code=r.error&&r.error.code,text=(r.error&&r.error.text)||r.status||'알 수 없는 오류';
        onErr(code==='INCORRECT_KEY'
          ?'V-World 키가 거부되었습니다 — vworld.kr 마이페이지 → 인증키 관리에서 활용 API에 「데이터 API」를 추가하세요 (ADMIN 탭에서 키 교체 가능).'
          :'V-World 오류: '+text);
        return;
      }
      onOk((r.result&&r.result.featureCollection)||null);
    }catch(e){onErr('응답 해석 실패: '+e.message);}
  };
  const qs=Object.entries({service:'data',request:'GetFeature',format:'json',crs:'EPSG:4326',size:10,...params,callback:cbName})
    .map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  sc.src='https://api.vworld.kr/req/data?'+qs;
  sc.onerror=()=>{if(!done){done=true;cleanup();onErr('V-World API 호출 실패 — 네트워크/방화벽을 확인하세요.');}};
  setTimeout(()=>{if(!done){done=true;cleanup();onErr('V-World 응답 시간 초과 (12초)');}},12000);
  document.body.appendChild(sc);
}

/* 행안부 주소검색 결과 1건 → PNU 19자리 (법정동코드10 + 산구분1 + 본번4 + 부번4) */
function jusoPNU(j){
  if(!j||!j.admCd)return'';
  const bon=String(parseInt(j.lnbrMnnm||'0',10)||0).padStart(4,'0');
  const bu=String(parseInt(j.lnbrSlno||'0',10)||0).padStart(4,'0');
  return j.admCd+(j.mtYn==='1'?'2':'1')+bon+bu;
}

/* WGS84 링 면적(㎡) — 구면 근사 */
function vwRingArea(ring){
  const R=6378137,rad=Math.PI/180;let a=0;
  for(let i=0;i<ring.length;i++){
    const p1=ring[i],p2=ring[(i+1)%ring.length];
    a+=(p2[0]-p1[0])*rad*(2+Math.sin(p1[1]*rad)+Math.sin(p2[1]*rad));
  }
  return Math.abs(a*R*R/2);
}

/* FeatureCollection → {areaM2, rings(외곽링 배열), bbox, center, widthM, depthM} */
function vwGeomStats(fc){
  const rings=[];let area=0;
  ((fc&&fc.features)||[]).forEach(f=>{
    const g=f.geometry;if(!g)return;
    const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
    polys.forEach(rs=>rs.forEach((r,i)=>{const a=vwRingArea(r);area+=i===0?a:-a;if(i===0)rings.push(r);}));
  });
  if(!rings.length)return null;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  rings.forEach(r=>r.forEach(p=>{if(p[0]<minX)minX=p[0];if(p[1]<minY)minY=p[1];if(p[0]>maxX)maxX=p[0];if(p[1]>maxY)maxY=p[1];}));
  const midLat=(minY+maxY)/2;
  return{areaM2:area,rings,bbox:[minX,minY,maxX,maxY],center:[(minX+maxX)/2,midLat],
    widthM:(maxX-minX)*111320*Math.cos(midLat*Math.PI/180),depthM:(maxY-minY)*110540};
}

/* 필지 경계 형상 SVG — 경위도 링을 로컬 미터 좌표로 투영해 그림 (지도 라이브러리 불필요) */
/* Web Mercator 타일 좌표 변환 */
const lon2tx=(lon,z)=>(lon+180)/360*Math.pow(2,z);
const lat2ty=(lat,z)=>(1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z);

/* ═══ PARCEL MAP — V-World 항공사진(WMTS) 배경 + 연속지적도 경계 + 줌/이동/거리측정(자) ═══ */
const MAP_CACHE={}; /* 대지형상 뷰 상태 캐시 — 탭 이동 후 복귀 시 줌·중심·뷰모드·회전·고도·측정점 유지 (세션 한정) */
function ParcelMapSVG({parcels,vworldKey,mass,drawEnabled,onDrawComplete,onSetFront,onRegisterCapture}){
  /* mass: {heightM,floors,floorH, rect:{wM,dM}|null, ringGeo:[[lon,lat]..]|null, label,
            fit:{depthM,faces,from,to,moduleWM,skinType,hasSkin}} — 출처 무관 공용 인터페이스
     (③ 매스 옵션·D-커스텀 작도·추후 스케치/렌더 기반 계획안 모두 동일 구조로 전달) */
  const shaped=parcels.filter(p=>Array.isArray(p.rings)&&p.rings.length);
  const W=920,H=480,TS=256,ZMIN=14,ZMAX=22,ZTILE=19;
  const PV=900;
  const bbox=useMemo(()=>{
    if(!shaped.length)return null;
    let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    shaped.forEach(p=>p.rings.forEach(r=>r.forEach(q=>{if(q[0]<minX)minX=q[0];if(q[1]<minY)minY=q[1];if(q[0]>maxX)maxX=q[0];if(q[1]>maxY)maxY=q[1];})));
    return{minX,minY,maxX,maxY,cx:(minX+maxX)/2,cy:(minY+maxY)/2};
  },[parcels]);
  const fitZ=useMemo(()=>{
    if(!bbox)return 18;
    for(let zz=ZMAX;zz>=ZMIN;zz--){
      const sx=(lon2tx(bbox.maxX,zz)-lon2tx(bbox.minX,zz))*TS;
      const sy=(lat2ty(bbox.minY,zz)-lat2ty(bbox.maxY,zz))*TS;
      if(sx<=W*0.8&&sy<=H*0.8)return Math.min(zz,ZTILE);
    }
    return ZMIN;
  },[bbox]);
  const ck=bbox?bbox.cx.toFixed(6)+','+bbox.cy.toFixed(6)+'_'+shaped.length:'';
  const cached=(ck&&MAP_CACHE.key===ck)?MAP_CACHE:null;
  const [z,setZ]=useState(cached?cached.z:fitZ);
  const [ctr,setCtr]=useState(cached?cached.ctr:(bbox?[bbox.cx,bbox.cy]:[126.978,37.566]));
  const [view,setView]=useState(cached?cached.view:'2d');
  const [rot,setRot]=useState(cached?cached.rot:0);
  const [tilt,setTilt]=useState(cached?cached.tilt:0.55);
  const [showMass,setShowMass]=useState(cached?cached.showMass:true);
  const [ruler,setRuler]=useState(cached?cached.ruler:false);
  const [pts,setPts]=useState(cached?cached.pts:[]);
  const [drawing,setDrawing]=useState(false); /* D-커스텀 평면 작도 모드 */
  const [frontMode,setFrontMode]=useState(false); /* 정면 지정 모드 — 매스 변 클릭 */
  const [bldgs,setBldgs]=useState((MAP_CACHE.bldgKey===ck&&MAP_CACHE.bldgs)?MAP_CACHE.bldgs:null);
  const [showBC,setShowBC]=useState(true);  /* 주변 건물 표시 */
  const [showBS,setShowBS]=useState(false); /* 대상지 현황 건물(기본 off) */
  const [bldgBusy,setBldgBusy]=useState(false);
  const [drawPts,setDrawPts]=useState([]);    /* 작도 점 [lon,lat] */
  const [drag,setDrag]=useState(null);
  const svgRef=useRef(null);
  const boxRef=useRef(null);
  const [boxW,setBoxW]=useState(W);
  useEffect(()=>{
    const m=()=>{if(boxRef.current)setBoxW(boxRef.current.clientWidth||W);};
    m();window.addEventListener('resize',m);
    return()=>window.removeEventListener('resize',m);
  },[]);
  useEffect(()=>{if(bbox&&MAP_CACHE.key!==ck){setCtr([bbox.cx,bbox.cy]);setZ(fitZ);setPts([]);setRot(0);setTilt(0.55);setView('2d');}},[ck,fitZ]);
  useEffect(()=>{if(ck){MAP_CACHE.key=ck;MAP_CACHE.z=z;MAP_CACHE.ctr=ctr;MAP_CACHE.view=view;MAP_CACHE.rot=rot;MAP_CACHE.tilt=tilt;MAP_CACHE.showMass=showMass;MAP_CACHE.ruler=ruler;MAP_CACHE.pts=pts;}});
  useEffect(()=>{
    const el=svgRef.current; if(!el||!shaped.length)return;
    const mc=(ntx,nty,zz)=>{const lon=ntx/Math.pow(2,zz)*360-180;const n=Math.PI-2*Math.PI*nty/Math.pow(2,zz);return[lon,180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)))];};
    const onWheel=ev=>{
      ev.preventDefault();
      const r=el.getBoundingClientRect();
      const x=(ev.clientX-r.left)*W/r.width, y=(ev.clientY-r.top)*H/r.height;
      const horiz=Math.abs(ev.deltaX)>Math.abs(ev.deltaY);
      if(ev.shiftKey||horiz){
        let gx=horiz?ev.deltaX:ev.deltaY, gy=horiz?ev.deltaY:0;
        if(view!=='2d'){const dy2=gy/tilt,rr=-rot*Math.PI/180,cr=Math.cos(rr),sr=Math.sin(rr);const tx2=gx*cr-dy2*sr,ty2=gx*sr+dy2*cr;gx=tx2;gy=ty2;}
        setCtr(mc(lon2tx(ctr[0],z)+gx/TS,lat2ty(ctr[1],z)+gy/TS,z));
        return;
      }
      const z2=Math.max(ZMIN,Math.min(ZMAX,z+(ev.deltaY<0?1:-1)));
      if(z2===z)return;
      if(view==='2d'){
        const ll=mc(lon2tx(ctr[0],z)+(x-W/2)/TS,lat2ty(ctr[1],z)+(y-H/2)/TS,z);
        setCtr(mc(lon2tx(ll[0],z2)-(x-W/2)/TS,lat2ty(ll[1],z2)-(y-H/2)/TS,z2));
      }
      setZ(z2);
    };
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[z,ctr,view,tilt,rot,shaped.length]);
  /* VWorld 건물(lt_c_spbd) footprint+지상층수 조회 — 3D 배경 건물(LoD1 압출) */
  useEffect(()=>{
    if(!bbox||!vworldKey)return;
    if(MAP_CACHE.bldgKey===ck&&MAP_CACHE.bldgs){setBldgs(MAP_CACHE.bldgs);return;}
    setBldgBusy(true);
    const geoRings=shaped.map(pp=>pp.rings[0]||[]);
    const inSite=(lon,lat)=>geoRings.some(r=>{let inn=false;for(let i=0,j=r.length-1;i<r.length;j=i++){const xi=r[i][0],yi=r[i][1],xj=r[j][0],yj=r[j][1];if(((yi>lat)!==(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi)+xi))inn=!inn;}return inn;});
    vworldData({data:'lt_c_spbd',key:vworldKey,geomFilter:`POINT(${bbox.cx} ${bbox.cy})`,buffer:350,size:1000},fc=>{
      const arr=[];
      ((fc&&fc.features)||[]).forEach(f=>{
        const g=f.geometry;if(!g)return;
        const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
        const floors=Math.max(1,parseInt((f.properties&&f.properties.gro_flo_co)||'1',10)||1);
        polys.forEach(rings=>{
          const ring=rings&&rings[0];if(!ring||ring.length<3)return;
          const gcx=ring.reduce((a,q)=>a+(+q[0]),0)/ring.length, gcy=ring.reduce((a,q)=>a+(+q[1]),0)/ring.length;
          arr.push({ring:ring.map(q=>[+(+q[0]).toFixed(6),+(+q[1]).toFixed(6)]),floors,site:inSite(gcx,gcy),gcx,gcy});
        });
      });
      MAP_CACHE.bldgKey=ck;MAP_CACHE.bldgs=arr;setBldgs(arr);setBldgBusy(false);
    },()=>{setBldgBusy(false);});
  },[ck,vworldKey]);
  /* 현재 매스/경계 뷰를 PNG base64로 캡처 — AI 렌더 image-to-image 베이스(VWorld 3D 형상 가이드) */
  useEffect(()=>{
    if(!onRegisterCapture)return;
    onRegisterCapture(async()=>{
      const svg=svgRef.current; if(!svg)return null;
      const xml=new XMLSerializer().serializeToString(svg);
      const url='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
      const im=new Image();
      await new Promise((res,rej)=>{im.onload=res;im.onerror=()=>rej(new Error('svg'));setTimeout(()=>rej(new Error('timeout')),3000);im.src=url;});
      const cv=document.createElement('canvas');cv.width=920;cv.height=480;
      const cx=cv.getContext('2d');cx.fillStyle='#e8eef4';cx.fillRect(0,0,920,480);cx.drawImage(im,0,0,920,480);
      return cv.toDataURL('image/png').split(',')[1];
    });
  },[onRegisterCapture]);
  /* 지적 경계 필지가 없을 때도 SIMULATION 패널 틀·안내는 표시 (이전엔 통째로 사라졌음) */
  if(!shaped.length)return(
    <div style={{border:`1px solid ${C.border}`,background:C.panel,padding:'12px 14px',marginBottom:14}}>
      <Lbl ch="SIMULATION — 항공사진·연속지적도·매스"/>
      <div style={{border:`1px dashed ${C.borderDark}`,background:'#39414a',aspectRatio:`${W}/${H}`,display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'0 24px'}}>
        <span style={{fontSize:12,color:'#cfccc6',lineHeight:1.8}}>
          {parcels.length
            ?'필지에 지적 경계(연속지적도)가 없습니다 — ① SITE에서 실제 필지를 주소검색으로 추가하거나, ADMIN 탭의 V-World 키를 확인하세요. (가상 필지는 경계 도형이 없어 시뮬레이션에 표시되지 않습니다)'
            :'① SITE에서 필지를 추가하면 항공사진·연속지적도 경계 위에 매스·FIT FRAME 시뮬레이션이 표시됩니다.'}
        </span>
      </div>
    </div>
  );
  const toPx=(lon,lat)=>[(lon2tx(lon,z)-lon2tx(ctr[0],z))*TS+W/2,(lat2ty(lat,z)-lat2ty(ctr[1],z))*TS+H/2];
  const toLL=(x,y)=>{
    const tx=lon2tx(ctr[0],z)+(x-W/2)/TS, ty=lat2ty(ctr[1],z)+(y-H/2)/TS;
    const lon=tx/Math.pow(2,z)*360-180;
    const n=Math.PI-2*Math.PI*ty/Math.pow(2,z);
    return[lon,180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)))];
  };
  const evPt=e=>{const r=e.currentTarget.getBoundingClientRect();return[(e.clientX-r.left)*W/r.width,(e.clientY-r.top)*H/r.height];};
  const zt=Math.min(z,ZTILE),sc=Math.pow(2,z-zt),ts=TS*sc;
  const tcx=lon2tx(ctr[0],zt),tcy=lat2ty(ctr[1],zt);
  const pad=view==='2d'?0:1;
  const tiles=[];
  if(vworldKey){
    for(let tx=Math.floor(tcx-(W/2)/ts)-pad;tx<=Math.floor(tcx+(W/2)/ts)+pad;tx++)
      for(let ty=Math.floor(tcy-(H/2)/ts)-pad;ty<=Math.floor(tcy+(H/2)/ts)+pad;ty++)
        tiles.push({tx,ty,x:(tx-tcx)*ts+W/2,y:(ty-tcy)*ts+H/2});
  }
  const mpp=156543.03392*Math.cos(ctr[1]*Math.PI/180)/Math.pow(2,z);
  const distM2=(a,b)=>{const R=6371000,rad2=Math.PI/180,dLa=(b[1]-a[1])*rad2,dLo=(b[0]-a[0])*rad2,h=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(a[1]*rad2)*Math.cos(b[1]*rad2)*Math.sin(dLo/2)*Math.sin(dLo/2);return 2*R*Math.asin(Math.sqrt(h));};
  const fmtD=d=>d>=1000?(d/1000).toFixed(2)+'km':d.toFixed(1)+'m';
  /* ── 경계 기준축 + 포함 판정 (매스·작도는 경계 안쪽 최소 1m 이격 강제) ── */
  const ringsPx=shaped.map(p=>(p.rings[0]||[]).map(q=>toPx(q[0],q[1])));
  const siteTheta=(()=>{let th=0,best=0;ringsPx.forEach(r=>{for(let i=0;i<r.length;i++){const a=r[i],b=r[(i+1)%r.length];const dx=b[0]-a[0],dy=b[1]-a[1];const L=dx*dx+dy*dy;if(L>best){best=L;th=Math.atan2(dy,dx);}}});return th;})();
  const ptInRing=(pt,r)=>{let inn=false;for(let i=0,j=r.length-1;i<r.length;j=i++){const xi=r[i][0],yi=r[i][1],xj=r[j][0],yj=r[j][1];if(((yi>pt[1])!==(yj>pt[1]))&&(pt[0]<(xj-xi)*(pt[1]-yi)/(yj-yi)+xi))inn=!inn;}return inn;};
  const segDist=(pt,a,b)=>{const dx=b[0]-a[0],dy=b[1]-a[1];const L2=dx*dx+dy*dy||1;let t=((pt[0]-a[0])*dx+(pt[1]-a[1])*dy)/L2;t=Math.max(0,Math.min(1,t));return Math.hypot(a[0]+t*dx-pt[0],a[1]+t*dy-pt[1]);};
  const insideWithMargin=(pt,marginPx)=>{
    const ri=ringsPx.findIndex(r=>ptInRing(pt,r));
    if(ri<0)return false;
    const r=ringsPx[ri];
    for(let i=0;i<r.length;i++){if(segDist(pt,r[i],r[(i+1)%r.length])<marginPx)return false;}
    return true;
  };
  const onDown=e=>{if(e.button===1)e.preventDefault();const[x,y]=evPt(e);setDrag({sx:x,sy:y,c0:ctr,r0:rot,t0:tilt,orbit:e.button===1||e.shiftKey,moved:false});};
  const onMove=e=>{
    if(!drag)return;
    const[x,y]=evPt(e);
    const dx=x-drag.sx,dy=y-drag.sy;
    if(!drag.moved&&Math.abs(dx)+Math.abs(dy)<=4)return;
    if(!drag.moved)setDrag(d=>({...d,moved:true}));
    if(view!=='2d'&&drag.orbit){
      setRot(drag.r0-dx*0.35);
      setTilt(Math.max(0.0872,Math.min(1.0,drag.t0+dy*0.003)));
      return;
    }
    let gx=dx,gy=dy;
    if(view!=='2d'){
      const dy2=dy/tilt, rr=-rot*Math.PI/180, cr=Math.cos(rr), sr=Math.sin(rr);
      gx=dx*cr-dy2*sr; gy=dx*sr+dy2*cr;
    }
    const ntx=lon2tx(drag.c0[0],z)-gx/TS,nty=lat2ty(drag.c0[1],z)-gy/TS;
    const lon=ntx/Math.pow(2,z)*360-180;
    const n=Math.PI-2*Math.PI*nty/Math.pow(2,z);
    setCtr([lon,180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)))]);
  };
  const onUp=e=>{
    if(drag&&!drag.moved&&view==='2d'){
      const[x,y]=evPt(e);
      if(frontMode&&onSetFront&&massGeom&&massGeom.foot.length>=3){
        let bi=0,bd=1e15;const f=massGeom.foot;
        for(let i=0;i<f.length;i++){const d=segDist([x,y],f[i],f[(i+1)%f.length]);if(d<bd){bd=d;bi=i;}}
        onSetFront(bi);setFrontMode(false);
      }
      else if(drawing)setDrawPts(ps=>[...ps,toLL(x,y)]);
      else if(ruler)setPts(ps=>[...ps,toLL(x,y)]);
    }
    setDrag(null);
  };
  const finishDraw=()=>{
    if(drawPts.length<3){window.alert('점 3개 이상을 찍어야 평면을 닫을 수 있습니다.');return;}
    const marginPx=1/mpp;
    if(drawPts.some(q=>!insideWithMargin(toPx(q[0],q[1]),marginPx))){window.alert('작도 평면이 대지경계선 안쪽 1m 이격 범위를 벗어났습니다 — 꼭짓점을 경계 안쪽으로 조정하세요.');return;}
    const area=vwRingArea(drawPts);
    if(onDrawComplete)onDrawComplete(drawPts.map(q=>[+q[0].toFixed(6),+q[1].toFixed(6)]),area);
    setDrawing(false);setDrawPts([]);
  };
  const calcSum=shaped.reduce((s2,p2)=>s2+(Number(p2.calcArea)||0),0);
  const segs=[];let tot=0;
  for(let i=1;i<pts.length;i++){const d=distM2(pts[i-1],pts[i]);tot+=d;segs.push(d);}
  /* ── 공통 변환 ── */
  const rad=rot*Math.PI/180,cosR=Math.cos(rad),sinR=Math.sin(rad);
  const rotP=([x,y])=>{const dx=x-W/2,dy=y-H/2;return[W/2+dx*cosR-dy*sinR,H/2+dx*sinR+dy*cosR];};
  const sax=Math.sqrt(Math.max(0.02,1-tilt*tilt)),cax=tilt;
  const proj=([x,y],h)=>{
    const X=x-W/2,Y=y-H/2;
    const xr=X*cosR-Y*sinR, yr=X*sinR+Y*cosR;
    const Y2=yr*cax-(h||0)*sax;
    const Z2=yr*sax+(h||0)*cax;
    const s2=1/Math.max(0.18,1-Z2/PV);
    return[W/2+xr*s2,H/2+Y2*s2];
  };
  const OFF=H*(1-tilt)*0.45;
  const obl=([x,y],h)=>{const[rx,ry]=rotP([x,y]);return[rx,ry*tilt+OFF-(h||0)*Math.sqrt(Math.max(0.02,1-tilt*tilt))/Math.sqrt(1-0.3025)];};
  const g3=view==='3dp'?proj:obl;
  const P2=a=>a.map(q=>q[0].toFixed(1)+','+q[1].toFixed(1)).join(' ');
  /* ── 매스 지오메트리: 옵션 실제 형상 (직사각 rect 또는 작도 ringGeo) ── */
  const massGeom=(()=>{
    if(!mass||!showMass)return null;
    const allPts=[];shaped.forEach(p=>p.rings[0]&&p.rings[0].forEach(q=>allPts.push(q)));
    if(!allPts.length)return null;
    const gcx=allPts.reduce((a,q)=>a+q[0],0)/allPts.length, gcy=allPts.reduce((a,q)=>a+q[1],0)/allPts.length;
    let foot; /* footprint px ring */
    let clampScale=1;
    if(mass.ringGeo&&mass.ringGeo.length>=3){
      foot=mass.ringGeo.map(q=>toPx(q[0],q[1]));
    }else{
      /* 기준축(siteTheta) 정렬 직사각 — OBB 중심 배치 후, 경계 1m 이격을 만족할 때까지 축소 */
      const wPx=((mass.rect&&mass.rect.wM)||20)/mpp, dPx=((mass.rect&&mass.rect.dM)||20)/mpp;
      const c2=Math.cos(-siteTheta),s2=Math.sin(-siteTheta);
      let u0=1e15,u1=-1e15,v0=1e15,v1=-1e15;
      ringsPx.forEach(r=>r.forEach(([x,y])=>{const u=x*c2-y*s2,v=x*s2+y*c2;if(u<u0)u0=u;if(u>u1)u1=u;if(v<v0)v0=v;if(v>v1)v1=v;}));
      const cu=(u0+u1)/2,cv=(v0+v1)/2;
      const ux=Math.cos(siteTheta),uy=Math.sin(siteTheta),vx=-uy,vy=ux;
      const cx=cu*ux+cv*vx, cy=cu*uy+cv*vy;
      const mk2=s3=>[[-1,-1],[1,-1],[1,1],[-1,1]].map(([su,sv])=>[cx+(su*wPx/2*ux+sv*dPx/2*vx)*s3,cy+(su*wPx/2*uy+sv*dPx/2*vy)*s3]);
      const marginPx=1/mpp;
      let s3=1;
      while(s3>0.25&&!mk2(s3).every(pt=>insideWithMargin(pt,marginPx)))s3-=0.04;
      clampScale=Math.max(0.25,s3);
      foot=mk2(clampScale);
    }
    const hM=(mass.heightM||10)/mpp; /* px */
    return{foot,hM,clampScale};
  })();
  /* ── FIT FRAME 셸 패널 (적용 입면, 면적선 밖 depth 돌출, 모듈선·층선·루버) ──
     ※ 루버 형상은 SKIN_CARTS 기준 단순화 표현 — Reference Book_ver1.21 도판 반영은 페이지 확인 후 보강 예정 */
  const framePanels=(()=>{
    if(!massGeom||!mass||!mass.fit||view==='2d')return null;
    const ft=mass.fit;
    const fhM=(mass.floorH||4500)/1000;
    const h1=((ft.from||1)-1)*fhM/mpp, h2=(ft.to||mass.floors||1)*fhM/mpp;
    const dp=(ft.depthM||1.2)/mpp;
    const foot=massGeom.foot;
    const fcx=foot.reduce((a,q)=>a+q[0],0)/foot.length, fcy=foot.reduce((a,q)=>a+q[1],0)/foot.length;
    const massMidY=foot.reduce((a,q)=>a+g3(q,0)[1],0)/foot.length;
    const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
    const skin=ft.skinType||'venetian';
    const panels=[];
    for(let ei=0;ei<foot.length;ei++){ /* 매스의 면(에지)을 따라 FIT FRAME 부착 */
      const a=foot[ei],b=foot[(ei+1)%foot.length];
      const ex=b[0]-a[0],ey=b[1]-a[1];const eL=Math.hypot(ex,ey)||1;
      let nx=ey/eL,ny=-ex/eL;
      const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2;
      if(((mx+nx*5-fcx)**2+(my+ny*5-fcy)**2)<((mx-nx*5-fcx)**2+(my-ny*5-fcy)**2)){nx=-nx;ny=-ny;} /* 바깥 법선 */
      const fe=(mass.frontEdge||0);
      const face=foot.length===4?['F','R','B','L'][((ei-fe)%4+4)%4]:(Math.abs(nx)>Math.abs(ny)?(nx>0?'R':'L'):(ny>0?'B':'F')); /* 정면 기준 F/R/B/L (커스텀은 법선 근사) */
      if(!(ft.faces&&ft.faces[face]))continue;
      const ao=[a[0]+nx*dp,a[1]+ny*dp], bo=[b[0]+nx*dp,b[1]+ny*dp];
      const faceLenM=eL*mpp;
      const nMod=Math.max(1,Math.floor(faceLenM/(ft.moduleWM||1.5)));
      const A1=g3(ao,h1),B1=g3(bo,h1),B2=g3(bo,h2),A2=g3(ao,h2);
      const els=[<polygon key="glass" points={P2([A1,B1,B2,A2])} fill="rgba(120,180,255,0.22)" stroke="#7fb8ff" strokeWidth="1.2"/>];
      [['c1',a,ao],['c2',b,bo]].forEach(([k2,pi,po])=>{
        els.push(<polygon key={k2} points={P2([g3(pi,h1),g3(po,h1),g3(po,h2),g3(pi,h2)])} fill="rgba(120,180,255,0.10)" stroke="#7fb8ff" strokeWidth="0.8"/>);
      });
      els.push(<line key="te" x1={g3(a,h2)[0]} y1={g3(a,h2)[1]} x2={g3(ao,h2)[0]} y2={g3(ao,h2)[1]} stroke="#7fb8ff" strokeWidth="0.8"/>);
      els.push(<line key="te2" x1={g3(b,h2)[0]} y1={g3(b,h2)[1]} x2={g3(bo,h2)[0]} y2={g3(bo,h2)[1]} stroke="#7fb8ff" strokeWidth="0.8"/>);
      for(let i=1;i<nMod;i++){
        const g=lerp(ao,bo,i/nMod);
        els.push(<line key={'m'+i} x1={g3(g,h1)[0]} y1={g3(g,h1)[1]} x2={g3(g,h2)[0]} y2={g3(g,h2)[1]} stroke="#cfe6ff" strokeWidth="0.7" opacity="0.8"/>);
      }
      for(let f3=(ft.from||1);f3<(ft.to||1);f3++){
        const hh=f3*fhM/mpp;
        els.push(<line key={'f'+f3} x1={g3(ao,hh)[0]} y1={g3(ao,hh)[1]} x2={g3(bo,hh)[0]} y2={g3(bo,hh)[1]} stroke="#9ecbff" strokeWidth="0.6" opacity="0.7"/>);
      }
      if(ft.hasSkin){
        if(skin==='venetian'){
          for(let i=1;i<=12;i++){const hh=h1+(h2-h1)*i/13;
            els.push(<line key={'v'+i} x1={g3(ao,hh)[0]} y1={g3(ao,hh)[1]} x2={g3(bo,hh)[0]} y2={g3(bo,hh)[1]} stroke="#ffd9a0" strokeWidth="1" opacity="0.75"/>);}
        }else if(skin==='roller'){

          els.push(<polygon key="rb" points={P2([g3(ao,hb),g3(bo,hb),g3(bo,h2),g3(ao,h2)])} fill="#e8c894" stroke="#b08c50" strokeWidth="0.8" opacity="0.9"/>);
          els.push(<polygon key="rs" points={P2([A1,B1,g3(bo,hb),g3(ao,hb)])} fill="rgba(255,228,180,0.18)"/>);
        }else{
          const per=Math.max(2,Math.round((ft.moduleWM||1.5)/0.4));
          const nL=nMod*per;
          const wd=skin==='al_louver'?1.6:1;
          for(let i=1;i<nL;i++){const g=lerp(ao,bo,i/nL);
            els.push(<line key={'l'+i} x1={g3(g,h1)[0]} y1={g3(g,h1)[1]} x2={g3(g,h2)[0]} y2={g3(g,h2)[1]} stroke="#ffd9a0" strokeWidth={wd} opacity={skin==='fab_louver'?0.45:0.7} strokeDasharray={skin==='str_louver'?'4 3':undefined}/>);}
        }
      }
      const midY=g3([mx+nx*dp,my+ny*dp],0)[1];
      panels.push({near:midY>=massMidY,depth:midY,els:<g key={'pn'+ei}>{els}</g>});
    }
    return panels;
  })();
  const bldgPrism=(b,key)=>{

    return(<g key={key}>
      {edges.map(i=>{const j=(i+1)%foot.length;const sh=(base[j][0]-base[i][0])>0?wallD:wall;return<polygon key={i} points={P2([base[i],base[j],top[j],top[i]])} fill={sh} stroke="rgba(40,44,52,.6)" strokeWidth="0.5" opacity="0.9"/>;})}

  const bldgList=(bldgs||[]).filter(b=>(b.site?showBS:showBC)&&bldgInView(b));

  const TBtn=({on,onClick,ch,title,w})=><button title={title} onClick={onClick} style={{minWidth:w||30,height:30,border:`1px solid ${on?C.ink:C.borderDark}`,background:on?C.ink:C.white,color:on?C.white:C.ink,fontSize:12,cursor:'pointer',lineHeight:1,padding:'0 6px'}}>{ch}</button>;

  return(
    <div style={{border:`1px solid ${C.border}`,background:C.panel,padding:'12px 14px',marginBottom:14}}>

        <Lbl ch={`SIMULATION — 항공사진·연속지적도·매스 (${shaped.length}필지${calcSum>0?` · 계산면적 ${fmt(Math.round(calcSum))}㎡`:''})`}/>

          <TBtn on={view==='3dp'} onClick={()=>{setView('3dp');setRuler(false);setDrawing(false);}} ch="투시" title="투시(퍼스펙티브) — 좌클릭 드래그=이동, 휠버튼 드래그=회전·고도" w={44}/>
          {view!=='2d'&&<>

            <TBtn onClick={()=>setTilt(t=>Math.max(0.0872,t-0.08))} ch="▼" title="고도 내리기 (저각)"/>
            <span style={{fontSize:10,color:C.sub,fontFamily:"'DM Mono',monospace"}}>고도 {Math.round(Math.asin(tilt)*180/Math.PI)}°</span>
          </>}
          {mass&&<TBtn on={showMass} onClick={()=>setShowMass(v=>!v)} ch="🏢 매스" title="계획안 매스+FIT FRAME 표시/숨김" w={58}/>}

          {view==='2d'&&!drawing&&<TBtn on={ruler} onClick={()=>setRuler(r=>!r)} ch="📏" title="자 — 거리 측정 (지도 클릭으로 점 추가)"/>}

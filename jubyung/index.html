<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIT Platform SCM Matrix · 사용 가이드북</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" />
<style>
  :root{
    --paper:#fbfbfd; --panel:#ffffff; --ink:#1c1c1e; --mut:#6e6e73; --faint:#8e8e93;
    --line:#e6e6eb; --line2:#eeeef2; --field:#f2f2f7;
    --oem:#007aff; --lease:#30b0c7; --plus:#5e5ce6; --jv:#34c759;
    --warn:#ff9f0a; --tip:#34c759; --note:#007aff;
    --radius:18px;
    --maxw:1080px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:-0.011em; line-height:1.72; font-size:16px;
  }
  .num{font-variant-numeric:tabular-nums}
  a{color:inherit}

  /* ── layout ── */
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px; display:grid; grid-template-columns:230px 1fr; gap:48px;}
  main{min-width:0; padding-bottom:120px;}
  aside{position:sticky; top:0; align-self:start; height:100vh; overflow:auto; padding:40px 0; scrollbar-width:none;}
  aside::-webkit-scrollbar{display:none}

  /* ── hero ── */
  .hero{border-bottom:1px solid var(--line); margin-bottom:46px; padding:62px 0 34px;}
  .eyebrow{font-size:12px; letter-spacing:.22em; font-weight:700; color:var(--mut); display:flex; align-items:center; gap:9px;}
  .eyebrow::before{content:""; width:22px; height:2px; background:var(--ink); display:inline-block; border-radius:2px;}
  .hero h1{font-size:clamp(30px,6vw,46px); line-height:1.1; letter-spacing:-.03em; font-weight:800; margin:16px 0 10px;}
  .hero h1 .sub{display:block; font-size:clamp(16px,3vw,21px); font-weight:600; color:var(--mut); letter-spacing:-.01em; margin-top:10px;}
  .hero p{color:var(--mut); font-size:16px; max-width:62ch; margin:14px 0 0;}
  .meta{margin-top:24px; display:flex; gap:8px; flex-wrap:wrap;}
  .pill{font-size:12.5px; font-weight:600; color:var(--mut); background:var(--field); border:1px solid var(--line); border-radius:999px; padding:5px 12px;}

  /* ── TOC ── */
  .toc-title{font-size:11px; letter-spacing:.18em; font-weight:700; color:var(--faint); margin:0 0 14px; padding-left:2px;}
  nav ol{list-style:none; margin:0; padding:0; counter-reset:toc;}
  nav li{counter-increment:toc; margin:0;}
  nav a{display:flex; gap:9px; align-items:baseline; text-decoration:none; color:var(--mut); font-size:13.5px; font-weight:500;
        padding:6px 10px; border-radius:9px; border-left:2px solid transparent; transition:.15s;}
  nav a::before{content:counter(toc,decimal-leading-zero); font-variant-numeric:tabular-nums; font-size:11px; color:var(--faint); font-weight:600; min-width:18px;}
  nav a:hover{color:var(--ink); background:var(--field);}
  nav a.active{color:var(--ink); font-weight:700; background:var(--field); border-left-color:var(--ink);}
  nav a.active::before{color:var(--ink);}

  /* ── sections ── */
  section{padding-top:30px; margin-top:30px; border-top:1px solid var(--line2); scroll-margin-top:24px;}
  section:first-of-type{border-top:none; margin-top:0;}
  h2{font-size:clamp(22px,4vw,28px); letter-spacing:-.02em; font-weight:800; margin:0 0 6px; display:flex; align-items:baseline; gap:12px;}
  h2 .no{font-size:14px; font-weight:700; color:var(--faint); font-variant-numeric:tabular-nums; letter-spacing:0;}
  h3{font-size:17.5px; font-weight:700; letter-spacing:-.01em; margin:30px 0 8px;}
  .lead{color:var(--mut); font-size:16px; margin:8px 0 18px; max-width:66ch;}
  p{margin:12px 0;}
  strong,b{font-weight:700;}
  .ink{color:var(--ink); font-weight:600;}
  code,.kbd{font-family:'Pretendard',monospace; background:var(--field); border:1px solid var(--line); border-radius:7px; padding:1px 7px; font-size:13.5px; font-weight:600; white-space:nowrap; font-variant-numeric:tabular-nums;}

  ul.clean{margin:12px 0; padding:0; list-style:none;}
  ul.clean>li{position:relative; padding:7px 0 7px 22px; border-bottom:1px solid var(--line2);}
  ul.clean>li:last-child{border-bottom:none;}
  ul.clean>li::before{content:""; position:absolute; left:3px; top:17px; width:6px; height:6px; border-radius:50%; background:var(--ink);}

  ol.steps{counter-reset:step; list-style:none; margin:16px 0; padding:0;}
  ol.steps>li{counter-increment:step; position:relative; padding:12px 0 12px 46px; border-bottom:1px solid var(--line2);}
  ol.steps>li:last-child{border-bottom:none;}
  ol.steps>li::before{content:counter(step); position:absolute; left:0; top:11px; width:28px; height:28px; border-radius:50%;
        background:var(--ink); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  ol.steps>li b{display:block; margin-bottom:1px;}

  /* ── callouts ── */
  .call{border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:14px 16px; margin:18px 0; background:var(--panel); font-size:14.5px;}
  .call .ttl{font-weight:700; font-size:12.5px; letter-spacing:.04em; text-transform:uppercase; margin-bottom:4px;}
  .call p{margin:4px 0;}
  .call.tip{border-left-color:var(--tip);} .call.tip .ttl{color:#1e8e3e;}
  .call.note{border-left-color:var(--note);} .call.note .ttl{color:#0061d6;}
  .call.warn{border-left-color:var(--warn);} .call.warn .ttl{color:#b06a00;}

  /* ── tables ── */
  .tbl{width:100%; border-collapse:collapse; margin:16px 0; font-size:14px; border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .tbl thead th{background:var(--field); text-align:left; font-weight:700; font-size:12.5px; color:var(--ink); padding:10px 13px; border-bottom:1px solid var(--line);}
  .tbl td{padding:10px 13px; border-bottom:1px solid var(--line2); vertical-align:top;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl td:first-child{font-weight:600; white-space:nowrap;}
  .tbl .num{text-align:right;}

  /* ── stage flow ── */
  .legend{display:flex; flex-wrap:wrap; gap:8px; margin:16px 0;}
  .badge{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; border-radius:999px; padding:6px 13px; border:1px solid transparent;}
  .dot{width:9px; height:9px; border-radius:50%;}
  .b-oem{background:#e8f1ff; color:#0061d6;} .b-oem .dot{background:var(--oem);}
  .b-lease{background:#e2f4f8; color:#1e7e91;} .b-lease .dot{background:var(--lease);}
  .b-plus{background:#ecebfd; color:#4a48c9;} .b-plus .dot{background:var(--plus);}
  .b-jv{background:#e5f8ea; color:#1e8e3e;} .b-jv .dot{background:var(--jv);}

  .flow{display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin:18px 0; padding:18px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);}
  .flow .step-pill{flex:1 1 120px; min-width:120px; text-align:center; border-radius:12px; padding:12px 8px;}
  .flow .step-pill .lab{font-weight:800; font-size:14px;}
  .flow .step-pill .cond{font-size:11.5px; color:var(--mut); margin-top:3px; font-weight:600;}
  .flow .arrow{color:var(--faint); font-size:18px; font-weight:700; flex:0 0 auto;}

  /* ── feature chips inline ── */
  .ui{display:inline-flex; align-items:center; gap:5px; background:var(--ink); color:#fff; font-size:12.5px; font-weight:700;
      border-radius:8px; padding:2px 9px; white-space:nowrap; letter-spacing:0; vertical-align:baseline;}

      <h1>SCM Matrix 대시보드<span class="sub">최적 공급 전략 모델 사용 설명서</span></h1>
      <p>프로젝트별 연도 공급물량과 OEM 공급가를 입력하면, 공급망 단계(OEM→임차→JV)의 적정성과 추이가 실시간으로 산출됩니다. 이 문서는 화면 구성부터 입력·해석·저장·공유까지의 사용법을 정리한 가이드입니다.</p>
      <div class="meta">
        <span class="pill">웹 버전 (단일 페이지)</span>
        <span class="pill">자동 저장 · 팀 서버 공유</span>

      </div>
    </header>

    <!-- 1 -->
    <section id="s1">
      <h2><span class="no">01</span>대시보드 개요</h2>
      <p class="lead">이 대시보드는 “FIT Platform 솔루션을 어느 시점에 어떤 공급 방식으로 생산·공급할 것인가”를 데이터로 판정하기 위한 도구입니다.</p>
      <p>핵심 질문은 단 하나입니다 — <span class="ink">연도별 공급물량이 임계점을 넘는 시점</span>에 맞춰 생산·공급 체계를 어떻게 전환할지입니다. 공급망 단계는 다음 네 단계로 구분되며, 연간 공급물량에 따라 자동으로 권고됩니다.</p>

      <div class="legend">
        <span class="badge b-oem"><span class="dot"></span>OEM</span>
        <span class="badge b-lease"><span class="dot"></span>임차</span>
        <span class="badge b-plus"><span class="dot"></span>임차+강화</span>
        <span class="badge b-jv"><span class="dot"></span>JV</span>
      </div>

      <ul class="clean">
        <li><b>OEM</b> — 물량이 적은 초기. 외부 협력사에 위탁 생산.</li>
        <li><b>임차</b> — 물량이 1차 임계(기본 500유닛)를 넘어 OEM 생산시설 임차가 유리해지는 구간.</li>
        <li><b>임차+강화</b> — 물량이 2차 임계(기본 2,000유닛)를 넘었으나 JV 연속 조건은 아직 미충족인 과도기.</li>
        <li><b>JV</b> — 2차 임계 물량이 지정 연수만큼 연속 유지되어 합작 생산법인 검토가 타당해지는 구간.</li>
      </ul>

      <div class="call note">
        <div class="ttl">핵심 개념</div>
        <p>“권고 단계”는 입력된 물량·가정값으로 <b>자동 계산된 결과</b>입니다. 가정값(임계물량·연속 연수 등)을 바꾸면 모든 표·차트·결론이 즉시 다시 계산됩니다.</p>
      </div>
    </section>

    <!-- 2 -->
    <section id="s2">
      <h2><span class="no">02</span>화면 한눈에 보기</h2>
      <p class="lead">화면은 위에서 아래로 “결론 → 입력 → 검증”의 흐름으로 배치되어 있습니다.</p>
      <ul class="clean">
        <li><b>헤더 · 툴바</b> — 제목과 오른쪽 상단의 동작 버튼들 (PDF 출력 · Excel · 서버 저장/불러오기 · 초기값). 인쇄 시 자동 숨김.</li>
        <li><b>시나리오 한 줄 요약</b> — 정점·2단계 시작·JV 충족·결론을 한 문장으로 강조 표시.</li>
        <li><b>핵심 요약</b> — KPI 4종, 공급물량 추이, FIT 공급가 구조와 마진율, 단계 전환 로드맵.</li>
        <li><b>차트 영역</b> — 물량 추이 · 유형별 누적 · 단계 추이 · 순효익 등 시각화.</li>
        <li><b>가정값 · OEM 생산능력</b> — 판정 기준이 되는 임계값과 협력사 연간 생산능력.</li>
        <li><b>① 물량표</b> — 프로젝트별·유닛유형별 연도 공급물량 입력 (핵심 입력부).</li>
        <li><b>①-2 OEM·공급가 표</b> — 솔루션별 OEM사·매입가·공급가·마진 입력.</li>
        <li><b>①-3 FIT 연도표</b> — 연도별 공급가·매입가·마진 합계 (자동 집계).</li>
        <li><b>② 단계 판정 결과</b> — 연도별 권고/적정 단계와 회수 지표 (검증부).</li>
        <li><b>단계 전환 조건</b> — 판정에 사용된 로직 설명.</li>
      </ul>
    </section>

    <!-- 3 -->
    <section id="s3">
      <h2><span class="no">03</span>빠른 시작 5단계</h2>
      <p class="lead">처음 열면 예시 데이터(10개 프로젝트)가 채워져 있습니다. 아래 순서로 내 데이터로 바꿔가며 사용하세요.</p>
      <ol class="steps">
        <li><b>① 물량표에서 프로젝트를 정리합니다</b> 필요 없는 예시 프로젝트는 삭제하고, <span class="ui ghost">프로젝트 추가</span> 로 내 프로젝트를 만든 뒤 이름과 연도별 유닛 수량을 입력합니다.</li>
        <li><b>①-2 표에서 OEM사와 가격을 입력합니다</b> 솔루션별 OEM사를 선택하고 매입가·공급 방식(비율%/정액₩)을 지정하면 공급가·마진이 자동 계산됩니다.</li>
        <li><b>가정값을 확인합니다</b> 1→2단계·2→3단계 전환 임계물량과 JV 연속 연수가 사업 기준과 맞는지 확인합니다.</li>
        <li><b>결과를 해석합니다</b> 상단의 핵심 요약·시나리오 문장과 ② 단계 판정 결과 표에서 권고 단계와 전환 시점을 확인합니다.</li>
        <li><b>저장·공유합니다</b> 작업은 브라우저에 자동 저장됩니다. 팀과 공유하려면 <span class="ui">서버 저장</span> 또는 <span class="ui ghost">Excel</span> 내보내기를 사용합니다.</li>
      </ol>
      <div class="call tip">
        <div class="ttl">팁</div>
        <p>언제든 <span class="ui ghost">초기값</span> 버튼으로 예시 데이터 상태로 되돌릴 수 있습니다. 실험적으로 값을 바꿔봐도 안전합니다.</p>
      </div>
    </section>

    <!-- 4 -->
    <section id="s4">
      <h2><span class="no">04</span>핵심 요약 읽는 법</h2>
      <p class="lead">상단 “핵심 요약”은 전체 결론을 시각적으로 압축한 영역입니다. 네 블록으로 구성됩니다.</p>

      <h3>KPI 카드 4종</h3>
      <ul class="clean">
        <li><b>누적 공급물량</b> — 전 기간 누적 유닛 수.</li>
        <li><b>총 FIT 공급가</b> — 전체 공급가 합계(억원).</li>
        <li><b>총 FIT 마진 · 마진율</b> — 공급가 대비 마진 총액과 비율.</li>
        <li><b>최대 공급 피크</b> — 가장 물량이 큰 연도와 그 수량.</li>
      </ul>

      <h3>공급 물량 추이</h3>
      <p>연도별 공급물량을 면적 그래프로 보여주고, 정점에는 점으로 표시합니다. 물량이 어느 해에 몰리는지 한눈에 확인할 수 있습니다.</p>

      <h3>FIT 공급가 구조 + 마진율 링</h3>
      <p>연도별 공급가를 <b>매입가(회색)</b>와 <b>마진(녹색)</b> 누적 막대로 나누어 보여주고, 오른쪽의 활동링(Activity Ring)이 전체 평균 마진율을 표시합니다.</p>

      <h3>단계 전환 로드맵</h3>
      <p>연도별 권고 단계를 색 띠로 이어 보여주고, 단계가 바뀌는 지점에 전환 배지를 표시합니다. 하단 두 콜아웃은 다음을 알려줍니다.</p>
      <ul class="clean">
        <li><b>임차 적합 진입</b> — 2단계(임차) 권고가 처음 시작되는 연도.</li>
        <li><b>{접속 연도} 권고 단계</b> — 지금 접속한 웹 시계의 연도(예: <code>2026 권고 단계</code>)를 기준으로, 현재 시점에 권고되는 단계와 그 기준 공급물량.</li>
      </ul>
      <div class="call note">
        <div class="ttl">참고</div>
        <p>“{접속 연도} 권고 단계”는 PC·모바일의 시스템 시계 연도를 자동으로 읽어 표기합니다. 연도가 모델 기간(’26~’34) 밖이면 가장 가까운 연도의 단계로 자동 매칭됩니다.</p>
      </div>
    </section>

    <!-- 5 -->
    <section id="s5">
      <h2><span class="no">05</span>시나리오 한 줄 요약</h2>
      <p class="lead">핵심 요약 위의 한 문장은 전체 결론을 텍스트로 요약합니다. 네 개의 핵심 수치가 강조 색상(파랑) 볼드로 표시됩니다.</p>
      <ul class="clean">
        <li><b>정점</b> — 최대 공급 연도와 유닛 수량 (숫자·단위가 각각 볼드).</li>
        <li><b>2단계 권고 시작</b> — OEM 생산시설 임차가 처음 권고되는 연도.</li>
        <li><b>JV 단계 전환</b> — JV 조건(2,000유닛·연속 연수) 충족 여부(충족/미충족).</li>
        <li><b>결론</b> — <code>→ JV 검토 착수</code> 또는 <code>→ OEM 생산시설 임차 유지</code>.</li>
      </ul>
      <p>입력값이 바뀌면 이 문장도 즉시 다시 쓰입니다. 회의·보고에서 한 줄로 핵심을 전달할 때 그대로 사용할 수 있습니다.</p>
    </section>

    <!-- 6 -->
    <section id="s6">
      <h2><span class="no">06</span>가정값 입력</h2>
      <p class="lead">판정의 기준이 되는 값들입니다. 사업 전제가 달라지면 이 값을 조정하세요. 모든 값은 변경 즉시 전체 결과에 반영됩니다.</p>
      <table class="tbl">
        <thead><tr><th>입력 항목</th><th>단위</th><th>기본값</th><th>의미</th></tr></thead>
        <tbody>
          <tr><td>1→2단계 전환</td><td>유닛</td><td class="num">500</td><td>연간 공급물량이 이 값 이상이면 OEM→임차 단계를 권고합니다. (gate1)</td></tr>
          <tr><td>2→3단계 전환</td><td>유닛</td><td class="num">2,000</td><td>연간 공급물량이 이 값 이상이면 JV 후보 구간에 진입합니다. (gate2)</td></tr>
          <tr><td>JV 기간</td><td>년</td><td class="num">2</td><td>2차 임계를 연속으로 충족해야 하는 햇수. 이 조건을 만족하면 JV 권고.</td></tr>
          <tr><td>마진회수율</td><td>0–1</td><td class="num">0.65</td><td>연간 FIT 마진 중 회수로 인정하는 비율. 회수마진 산출에 사용.</td></tr>
          <tr><td>생산라인 임차 비용</td><td>억원</td><td class="num">5</td><td>회수기간 계산의 분자(투자액 성격).</td></tr>
          <tr><td>생산라인 임차 기간</td><td>년</td><td class="num">2</td><td>순효익 계산 시 회수마진에서 차감되는 비용 항목.</td></tr>
        </tbody>
      </table>
      <div class="call warn">
        <div class="ttl">주의</div>
        <p>임계물량을 낮추면 단계 전환이 앞당겨지고, 높이면 늦춰집니다. ② 표의 권고/적정 단계가 의도와 다르면 먼저 이 가정값부터 점검하세요.</p>
      </div>
    </section>

    <!-- 7 -->
    <section id="s7">
      <h2><span class="no">07</span>OEM 생산능력 · 파트너</h2>
      <p class="lead">솔루션 유형별로 협력사와 연간 생산능력(capacity)을 등록해 두는 영역입니다. 이 값은 가동률 계산의 기준이 됩니다.</p>
      <ul class="clean">
        <li><b>파트너 추가/삭제</b> — 각 솔루션 유형마다 협력사를 여러 곳 등록할 수 있습니다.</li>
        <li><b>연간 생산능력</b> — 협력사별 연간 생산 가능 유닛 수. 비워 두면(미정) 가동률 계산에서 제외됩니다.</li>
        <li><b>가동률</b> — 연간 공급물량 ÷ 등록된 생산능력으로 산출되어 ② 표에 표시됩니다.</li>
      </ul>
      <p>여기서 등록한 협력사 목록은 ①-2 표의 OEM사 풀다운(▾)에 그대로 나타납니다.</p>
    </section>

    <!-- 8 -->

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>FIT 스튜디오 — 상은 × 희진 분할</title>
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: #1a1a1a; }
  .bar { height: 42px; flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 0 16px;
         background: #1a1a1a; color: #e68d39; font-size: 13px; font-weight: 600; }
  .bar .t { letter-spacing: 0.12em; }
  .bar .desc { font-weight: 400; color: #c9c9c4; font-size: 12px; }
  .bar .split-ctl { margin-left: auto; display: flex; align-items: center; gap: 8px; font-weight: 400; color: #c9c9c4; font-size: 12px; }
  .bar .split-ctl input[type=range] { width: 160px; }
  .split { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
  .pane { flex: 0 0 50%; min-width: 0; position: relative; background: #efefed; }
  .pane iframe { width: 100%; height: 100%; border: 0; display: block; }
  /* 두 앱 사이의 선 = 드래그 슬라이더 */
  #gutter { flex: 0 0 8px; background: #e68d39; cursor: col-resize; position: relative; z-index: 10;
            transition: background .15s; }
  #gutter:hover, #gutter.drag { background: #f29b4d; }
  #gutter::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 2px; height: 34px; background: rgba(255,255,255,0.85); border-radius: 2px;
            box-shadow: 4px 0 0 rgba(255,255,255,0.85), -4px 0 0 rgba(255,255,255,0.85); }
  .split.dragging iframe { pointer-events: none; }
  .plabel { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 5;
            background: rgba(26,26,26,0.82); color: #fff; font-size: 11px; font-weight: 600;
            padding: 3px 10px; border-radius: 3px; letter-spacing: 0.06em; pointer-events: none; }
</style>
</head>
<body>
  <div class="bar">
    <span class="t">FIT 스튜디오</span>
    <span class="desc">왼쪽 상은에서 모델링 → ‘→ 희진으로 보내기’ 클릭 → 오른쪽 희진 지도에 실시간 반영 · 가운데 선을 드래그해 비율 조절</span>
  </div>
  <div class="split">
    <div class="pane left" id="paneL">
      <iframe id="sangeun" src="studio_sangeun.html"></iframe>
    </div>
    <div id="gutter" title="드래그해서 좌우 비율 조절"></div>
    <div class="pane right" id="paneR">
      <iframe id="heejin" src="studio_heejin.html"></iframe>
    </div>
  </div>
  <script>
    // 좌우 분할 비율 조절 (희진을 키우면 캡쳐 영역도 그만큼 넓어짐)
    function setSplit(v) {
      v = Math.max(15, Math.min(85, Math.round(Number(v) || 50)));
      document.getElementById("paneL").style.flexBasis = v + "%";
      document.getElementById("paneR").style.flexBasis = (100 - v) + "%";
      var lbl = document.getElementById("splitLbl"); if (lbl) lbl.textContent = v + " : " + (100 - v);
      var sr = document.getElementById("splitRange"); if (sr && Number(sr.value) !== v) sr.value = v;
    }
    // 두 앱 사이의 선(gutter)을 드래그해 비율 조절
    (function() {
      var split = document.querySelector(".split"), gutter = document.getElementById("gutter"), dragging = false;
      function onMove(e) {
        if (!dragging) return;
        var r = split.getBoundingClientRect();
        var x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        setSplit(x / r.width * 100);
        if (e.cancelable) e.preventDefault();
      }
      function stop() { dragging = false; gutter.classList.remove("drag"); split.classList.remove("dragging"); }
      gutter.addEventListener("mousedown", function() { dragging = true; gutter.classList.add("drag"); split.classList.add("dragging"); });
      gutter.addEventListener("touchstart", function() { dragging = true; gutter.classList.add("drag"); split.classList.add("dragging"); });
      window.addEventListener("mousemove", onMove);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("mouseup", stop);
      window.addEventListener("touchend", stop);
    })();
    // 상은 iframe이 parent로 보낸 모델을 희진 iframe으로 중계.
    var hj = document.getElementById("heejin");
    window.addEventListener("message", function(ev) {
      var d = ev.data;
      if (!d || d.type !== "fitModel") return;
      if (hj && hj.contentWindow) hj.contentWindow.postMessage(d, "*");
    });
  </script>
</body>
</html>
